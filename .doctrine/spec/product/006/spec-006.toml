responsibilities = [
  "Establish Doctrine's working files inside an arbitrary project so the rest of the system has a home to operate from.",
  "Locate the project's root reliably from anywhere inside it, so files land in the right place without the operator stating where.",
  "Show the operator exactly what will change before anything is written, so provisioning is reviewable rather than blind.",
