responsibilities = [
  "Bind four `record_kind`s (assumption, decision, question, constraint) onto four engine `Kind`s, each its own tree and reservation namespace under `.doctrine/knowledge/<kind>/`, diverging only by prefix (ASM/DEC/QUE/CON) and the per-kind `[facet]` seed ‚Äî one `knowledge_record` entity discriminated by `record_kind`, never parallel per-kind schemas.",
  "Carry a per-kind lifecycle vocabulary ‚Äî assumption `held‚Üítesting‚Üívalidated|invalidated|obsolete`, decision `proposed‚Üíaccepted|rejected|superseded`, question `open‚Üíanswered|obsolete`, constraint `active‚Üíwaived|superseded|retired` ‚Äî keyed by `record_kind`, with a per-kind `is_terminal` predicate driving the default-list hide-set; a transition to a state outside the record's own kind vocabulary is refused, never coerced.",
  "Hold the kind-specific typed `[facet]` block per kind (assumption: claim/confidence/basis/validation-plan/validated-by; decision: context/choice/alternatives/rationale/consequences/decided-by; question: question/why-matters/answer/answered-by; constraint: statement/source/applies-to/waiver) and the shared minimal evidence support structure (`supports`/`contradicts`/`notes` of citations) as typed enumerated storage through the `\"\" -> None` optional seam ‚Äî confidence is assumption-only, never a common field.",
  "Resolve `record_kind` from the id prefix on the read path (`show`/transition/relate), so one verb set dispatches across all four prefixes; identity (kind prefix + number) is permanent and `record_kind` is fixed at capture ‚Äî a record never silently changes kind.",
  "Hold the outbound relation seam over the SPEC-018 cross-corpus relation contract ‚Äî forward links to backlog items, risks, slices, specs, ADRs, requirements, and drift records, and the spawn-work edge authored once on the record (ADR-004), reverse derived ‚Äî always present even when empty.",
  "Own the cross-kind supersession lifecycle: a transactional supersede verb that co-writes `supersedes`/`superseded_by` (the ADR-004 ¬ß5 carve-out), moves the predecessor to a terminal status valid for its own kind without changing that kind, and admits a `record_kind` crossing only along the ¬ß6 allowed matrix when the successor is the authoritative continuation ‚Äî never for mere influence, evidence, consequence, or origin.",
  "Declare the records' priority-engine posture (SL-047): no record state is ever `Workable`, so records are never eligible, never in `survey`/`next`, and carry zero work-lineage consequence. Records are nonetheless meant to *gate* dependents (open `QUE` blocks a slice's design, `active` `CON` blocks a `REQ`, ‚Ä¶); decoupling blocking from eligibility ‚Äî a third `Gating` class + a record‚Üíitem gating edge into the `dep` overlay ‚Äî is the priority-engine change tracked as IMP-047. Interim: parked `Terminal`-inert (the REC posture), gating only via a spawned backlog item.",
]
