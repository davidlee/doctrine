responsibilities = [
  "Define the ref taxonomy and its two mutability classes over git's object+ref model: the mutable coordination/aggregate refs (`dispatch/<N>`, `candidate/<N>/<label>` ref tip, `edge`, trunk) versus the immutable evidence refs (`review/<N>`, `phase/<N>-NN`) — created once under zero-oid CAS, reported-not-clobbered when stale (R2).",
  "Fix the pinned fork-point invariant (RV-030 F-1): stage-1 projections parent on `trunk_base_B = merge-base(dispatch/<N>, trunk)`, never the live trunk tip, so a foreign commit on trunk between coordinate and sync cannot silently reparent the projection; `refresh-base` is the sole explicit advance (a real `git merge --no-ff` on the dispatch branch).",
  "Specify the two-stage, audit-gated projection: stage-1 `prepare-review` materialises `review/<N>` + `phase/<N>-NN` + the CAS journal with no trunk write; stage-2 `integrate` is opt-in, post-audit, fast-forward-only, expected-tip-CAS, and reports — never auto-resolves — a moved target.",
  "Specify the CAS journal recovery contract: a per-row journal (`{target_ref, expected_old_oid, planned_new_oid, applied_new_oid, status}`) committed to `dispatch/<N>` before any external ref mutation; idempotent 3-way replay (current==planned ⇒ no-op; current==expected_old ⇒ advance; else ⇒ refuse), with a worktree-aware advance leg (pure `update_ref_cas` vs checked-out `merge --ff-only`, non-ff-on-checkout refused).",
  "Specify the candidate interaction layer (SL-068): `candidate/<N>/<label>` mutable branches as the safe audit/repair surface over immutable evidence; admission by immutable OID — `candidate create` records a Doctrine no-ff 3-way `merge_oid`, `admit` pins `admitted_oid`, and downstream `integrate --trunk` targets `admitted_oid` (never the live candidate tip), refusing a moved trunk rather than merging at close time.",
  "State the repair→integrate propagation contract (RV-116): a repair committed on a review-surface candidate does NOT auto-flow to the close-target — the close-target candidate must be sourced from the repaired candidate (or the fix cherry-picked / re-admitted) before close; the decoupling is intentional (admit-by-OID), and the operator carries the propagation burden.",
  "Require run-ledger object-db sourcing: `journal.toml`, `boundaries.toml`, and `orthogonal.toml` are tree-read from the `dispatch/<N>` branch tip (`read_path_at`), never the working filesystem — identical in stage-1 and stage-2 — and gate trunk resolution on `freshest_descendant` (advance-only-to-strict-descendant over the `DOCTRINE_TRUNK_REF → origin/HEAD → main → master` ladder) with the `is_ancestor(planned_new_oid, trunk_tip)` close-time integration backstop.",
]

