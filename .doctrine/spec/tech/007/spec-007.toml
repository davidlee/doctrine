responsibilities = [
  "Own the memory entity as a named (UUID-identity, no-reservation) entity riding the shared engine: a client-minted `memory_uid` directory holding an edit-preserving `memory.toml` plus a `memory.md` prose body, with a `mem.<type>.<domain>.<subject>` `memory_key` slug aliased by a convenience symlink that is never the directory's identity.",
  "Carry the memory model's domain vocabulary — the six memory types (concept, fact, pattern, signpost, system, thread), the six lifecycle statuses (active, draft, superseded, retracted, archived, quarantined) with their default-retrieval visibility, and the review/verification axis (unverified, verified, stale, disputed) kept separate from lifecycle status.",
  "Provide the `record` producer: mint the uid, build the git context frame as a pure-layer input, write scope (paths/globs/commands/tags) and the captured anchor, and scaffold the item — `memory new` is the uniform-grammar alias dispatching the identical handler.",
  "Build and freeze the git context frame (`src/git.rs`): repo-id by precedence (explicit → remote → local-root, ambiguous multi-remote an error), the content-bearing `checkout_state_id` for dirty trees, born/unborn/non-repo as three distinct states — reproduced byte-for-byte from forgettable's `GitContextFrameV1` (`forget.remote.v1` / `forget.checkout.v1`) so a record and a backend claim derive identical ids.",
  "Provide the scope-aware reader (`src/retrieve.rs`): scope-first lexical `find`/`retrieve` matching paths/globs/commands/tags by specificity weight, ordered by the nine-key deterministic sort tuple so the same query yields the same order, with workspace/repo/status/trust/git hard filters applied first.",
  "Compute git-anchored staleness in four explicit modes (scoped+attested by commits touching scoped paths since `verified_sha`; scoped-unattested and unscoped by days-since-`reviewed`; the global/derived class evergreen and decay-exempt), resolving every undecidable reachability case to an explicit fresh/stale/unknown/unanchored/reference state rather than a silent hide.",
  "Enforce the security posture on `retrieve`: render every memory as a quoted, attributed, delimited data block (never instruction), suppress quarantined/retracted, and apply the non-bypassable trust holdback that withholds low-trust high-severity memories from agent context while `find`/`show` keep them inspectable.",
  "Carry the `verify` attestation verb (stamp the verification axis against a clean working tree, refusing a dirty one) and the global/derived orientation class (ADR-002): `repo = \"\"` + `anchor_kind = none` memories, scoped yet unanchored, materialised into the gitignored `shipped/` tree by `memory sync` and admitted in every partition.",
]

