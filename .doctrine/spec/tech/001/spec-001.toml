id = 1
slug = "graph-derived-priority-engine"
title = "Graph-Derived Priority Engine"
status = "draft"
kind = "tech"
category = "prioritisation"
c4_level = "container"
descends_from = "PRD-011"
tags = ["priority", "graph", "backlog", "actionability", "crate-boundary", "policy-adapter", "explanation"]
responsibilities = [
  "Define the generic priority graph core — opaque node ids, typed directed edges, reverse-edge index, reachability, typed acyclicity with cycle diagnostics, deterministic ordering, structured explanation paths — as a standalone publishable crate free of doctrine vocabulary.",
  "Specify the doctrine policy layer that maps entity kind, lifecycle, resolution, and relation type into derived channels (actionable / blocked / blocking / priority hint / reason).",
  "Specify the registry adapter that scans doctrine entities into the core node/edge model preserving canonical ids, keeping all policy interpretation out of the core.",
  "Fix the crate and module boundary and the external-publishing posture (closes PRD-011 OQ-003).",
  "Define the derived-surface CLI contracts (survey / next / explain / blockers / inspect) and their disposable cache/projection shape.",
  "Honour the forbidden-core constraint: no time, scheduling, commitment, urgency, or product vocabulary in the graph crate.",
]

