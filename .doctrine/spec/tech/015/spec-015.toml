responsibilities = [
  "Bind five `ItemKind`s (Issue, Improvement, Chore, Risk, Idea) onto five engine `Kind`s, each its own tree and reservation namespace under `.doctrine/backlog/<kind>/`, diverging only by prefix (ISS/IMP/CHR/RSK/IDE) and the risk-only `[facet]` seed.",
  "Fix the closed work-item status vocabulary (open, triaged, started, resolved, closed) with a backlog-local `is_terminal` predicate (resolved/closed) driving the default `backlog list` hide-set, independent of the slice lifecycle.",
  "Carry the kind-specific closed enums — `Resolution` (one generic kind-agnostic close-reason set) and the risk `[facet]` axes (`RiskLevel` likelihood/impact, origin, controls) — as typed enumerated storage through the `\"\" -> None` optional seam.",
  "Hold the outbound `[relationships]` seam (slices, specs, drift forward links plus the two priority-engine item→item edges — `needs` hard, `after` soft — and the `triggers` watched-glob rider) appended edit-preservingly, refusing on a missing seeded array.",
  "Mediate capture through `backlog new` and survey through `backlog list`, deriving canonical refs from the engine prefix and grouping the cross-kind list by declaration-order `ordinal` — a grouping, never a priority claim.",
  "Project items into the `backlog_order` cordage adapter (`needs` hard / `after` soft overlays + exposure tiebreak) so priority order is composed by cordage, with the adapter owning only the domain vocabulary and performing no sort of its own.",
]

