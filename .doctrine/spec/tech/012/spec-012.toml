responsibilities = [
  "Provision a worktree fork through `worktree provision` as the sole copy path: a pure `select_copies` core copies only allowlisted (`.worktreeinclude`) gitignored files and physically drops every coordination/runtime-tier path even under a broad `**` glob.",
  "Classify the withheld coordination/runtime tier (the five `Tier` variants — `.doctrine/state/`, the `phases` symlink, `handover.md`, inquisition scratch, and memory caches) in `is_withheld`, and back the static `check-allowlist` smell test with `allowlist_violations` — a green result is never completeness, `select_copies` remains the guarantee.",
  "Assert HEAD-stationarity at the batch-commit boundary via `worktree branch-point-check --base B` — a ref-equality compare (`matches`) of coordination HEAD against the orchestrator's pre-spawn base, exit 1 ⇒ re-dispatch; never a merge-base computation.",
  "Carry the funnel as an `Orchestrator`-classed verb family — `fork` (create + provision + stamp + emit per-wt env, compensating rollback), `import` (the belted dispatch funnel), `land` (solo's non-squash coordination merge), `gc` (durable-patch-id-gated reap) — refused under `worker_mode`, each a pure classifier over an impure git shell.",
  "Enforce the worker-sole-writer invariant in the CLI via a disk-marker-primary, fail-closed-on-ambiguity guard: `worker_mode = (is_linked_worktree && marker_present) OR env DOCTRINE_WORKER`; a marker-absent linked worktree is refused, `DOCTRINE_WORKER` is the codex/pi worker-on-main optimisation, and an exhaustive `write_class` match bails on authored/Orchestrator/Hook-mint writes while leaving reads and the fork-side read verbs open.",
  "Capture the impure born frame for memory anchoring in the `git.rs` seam — `forget.remote.v1` remote normalization and `forget.checkout.v1` checkout-state hashing reproduced byte-for-byte — confining all git, disk, and process impurity to one shell module.",
  "Defend the tier merge-safety invariant by construction: the coordination/runtime tier's absence in the fork (not a copied-then-trusted phase sheet) is what makes worker-sole-writer free; the orchestrator pre-distills the withheld state into the worker prompt.",
]

