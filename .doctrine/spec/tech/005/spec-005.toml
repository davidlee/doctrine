id = 5
slug = "adr-entity-surface"
title = "ADR entity surface"
status = "active"
kind = "tech"
category = "governance"
c4_level = "component"
parent = "SPEC-004"
descends_from = "PRD-008"
tags = ["adr", "decision-record", "governance-kind", "status-lifecycle", "relationships-seam", "kind-surface"]
responsibilities = [
  "Define the ADR-specific `Kind` descriptor and its scaffold — the `adr-<id>.{toml,md}` fileset and `<id>-<slug>` symlink — bound onto the shared entity-engine materialiser.",
  "Fix the ADR status vocabulary (proposed, accepted, rejected, superseded, deprecated) and the default `adr list` hide-set (rejected, superseded, deprecated).",
  "Specify the ADR identity TOML fields and the reserved-but-inert `[relationships]` seam (supersedes, superseded_by, related, tags) carried from the first record.",
  "Specify the ADR prose render contract: a Context / Decision / Consequences / Verification / References body with no YAML frontmatter, metadata living in the sister TOML.",
]

# category — OPEN domain vocabulary (a taxonomy that drifts by design). Add as:
#   category = "cli"
# c4_level — closed C4 set: context | container | component | code. Add as:
#   c4_level = "container"
# descends_from — the product capability (PRD-NNN) this spec realises; tech-only,
#   single-valued, validated against the product specs. Add as:
#   descends_from = "PRD-001"
# parent — single decomposition parent (SPEC-NNN); tech-only, single-valued, the
#   tree must stay acyclic. Add as:
#   parent = "SPEC-002"
# [[source]] — code anchors this spec governs (tech-only, repeatable). Add as:
#   [[source]]
#   language = "rust"
#   identifier = "doctrine/cli"
#   module = "doctrine::cli"   # optional

[[source]]
language = "rust"
identifier = "src/adr.rs"
module = "doctrine::adr"
