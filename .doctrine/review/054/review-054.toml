title = "reconciliation review of SL-086"
# no status — a review's status is DERIVED from its findings (ADR-007 D-C8), so
# it is never stored (the storage rule forbids derived data in authored files).

[review]
facet     = "reconciliation"     # scope|design|plan|phase-plan|implementation|code-review|reconciliation
raiser    = "auditor"
responder = "implementor"

[target]                   # the outbound `reviews` edge (ADR-004): RV-NNN ──reviews──▶ <ref>
ref   = "SL-086"

[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "F-1: JSON blocked fields flat vs design's nested blocked object"
detail = """
Expected (design.md §4 JSON output shape): `{ "blocked": { "slices": [...], "backlog": [...] } }`.

Observed: `{ "blocked_slices": [...], "blocked_backlog": [...] }` — flat top-level keys instead of a nested "blocked" object.

The Status struct has blocked_slices and blocked_backlog as separate fields, and #[serde(flatten)] in StatusEnvelope flattens them to top-level keys rather than nesting under a "blocked" parent.

Evidence: src/status.rs Status struct (lines 79-86); render_json StatusEnvelope with #[serde(flatten)] (lines 222-226); design.md §4 JSON output shape example.

Impact: Agents consuming --json per the design contract would access response.blocked.slices but get undefined — must use response.blocked_slices instead. Human output correctly uses separate sections per D10."""
disposition = "design-wrong"
response = "The design.md §4 JSON output shape shows nested `blocked.slices`/`blocked.backlog` but the Status struct definition in the same design section uses flat `blocked_slices`/`blocked_backlog` fields — the design is internally inconsistent. The flat keys match the struct definition, the human output (separate sections per D10), and are simpler for agents to consume. Fix: update design.md §4 JSON output shape example to use flat `blocked_slices`/`blocked_backlog` keys consistent with the struct definition."

[[finding]]
id = "F-2"
status = "verified"
severity = "nit"
title = "F-2: Spurious double newline between Boot and Recent commits sections"
detail = 'Expected: Single newline separating Boot and Recent commits sections per design §4 example.\n\nObserved: Two newlines between "boot.md stale from commit 09d4e46" and "Recent commits". The boot_line function appends a trailing \n, and the Recent commits section started with `\n\nRecent commits\n`, producing a blank line.\n\nEvidence: src/status.rs line ~199: `parts.push("\n\nRecent commits\n".to_string());`\n\nFix: Changed to single `\nRecent commits\n` — already applied in this audit session, uncommitted.'
disposition = "fix-now"
response = 'Already fixed in this audit session. Changed `parts.push("\n\nRecent commits\n".to_string())` to `parts.push("\nRecent commits\n".to_string())` in src/status.rs. The fix is uncommitted — will be included in the audit commit.'

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "F-3: SliceCounts.blocked capped at 5 — count captured after truncation"
detail = 'Expected: SliceCounts.blocked reports the total count of blocked active slices, e.g. "2 active (8 blocked), 4 total". The blocked display is top-5 per design §4, but the summary count should report the real total.\n\nObserved: `let cb = bs.len()` is computed AFTER `bs.truncate(5)`, so if 8 slices are blocked, the summary line shows "2 active (5 blocked)" instead of "2 active (8 blocked)".\n\nEvidence: src/status.rs lines 303-305:\n```rust\nbs.sort_by(|a, b| a.id.cmp(&b.id));\nbs.truncate(5);\nlet cb = bs.len();  // ← after truncation, not before\n```\n\nFix: capture total before truncation:\n```rust\nlet cb = bs.len();  // total blocked count\nbs.truncate(5);     // top 5 for display\n```'
disposition = "fix-now"
response = "Swap the order: capture total blocked count before truncation. Trivial 2-line swap in run()."

