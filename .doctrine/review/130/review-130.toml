[[finding]]
id = "F-1"
status = "open"
severity = "blocker"
title = "ADR-001 binding tier-map unamended: new risk leaf + priority::config + facet's new risk import have no layering.toml entry"
detail = "EXPECTED: a design introducing a leaf src/risk.rs and src/priority/config.rs, and adding a risk import to the facet leaf, must require the matching entries in the BINDING tier map .doctrine/adr/001/layering.toml (consumed by 'just gate' per ADR-001 enforcement) — not lean on convention. OBSERVED: design.md §5.2/§7 D2 extract risk to a leaf and add priority::config but never mention layering.toml; layering.toml has NO 'risk' entry, NO 'priority::config' sub-classification (only 'priority::graph = engine' @108, 'priority = command' @85), and 'facet = leaf' @28 is annotated 'imports only estimate + value' — adding a risk import breaks that annotation and the gate. SL-132 (RV-121) was caught omitting exactly this. PENANCE: amend the design to require, in-slice, layering.toml edits — add risk='leaf', classify priority::config (leaf, or engine w/ rationale), update the facet entry/comment to permit the risk import — and cite ADR-001 as the forcing function."

[[finding]]
id = "F-2"
status = "open"
severity = "major"
title = "I2 'NaN-free by construction' is unsound: clamp bounds inputs finite but products overflow to inf, and OQ-2's score-base then yields NaN"
detail = "EXPECTED: if §5.5 I2 asserts no NaN reaches a comparator 'by construction', the construction must guarantee it. OBSERVED: §5.5 clamps each authored coefficient to finite non-negative (INPUTS) but never sanitizes the COMPUTED dims/total; value_dim = value×kind_weight×Σtag/midpoint and risk_dim = exposure×risk_coeff can overflow finite inputs to +inf with large authored coeffs, and OQ-2's derived consequence = score-base computes inf-inf = NaN — violating I2/VT-6 and the very rationale for D6 (total_cmp chosen to avoid NaN-as-tie). PENANCE: make the contract real — bound each authored coefficient to a sane finite max at load AND/OR sanitize every computed dimension and total with is_finite before storage/comparison; add a VT feeding near-f64::MAX coefficients proving no inf/NaN reaches mint or the survey sort."

[[finding]]
id = "F-3"
status = "open"
severity = "major"
title = "OQ-2 left open yet §5.2 commits to deriving consequence = score-base and calls it 'exact'; explain emits a field that may not be stored"
detail = "EXPECTED: explain's published contract ReasonKind::Score { base, value_dim, risk_dim, consequence, total } must have a well-defined, accurate source for every field. OBSERVED: §6 OQ-2 leaves store-vs-derive 'leaning derive' while §5.2 (lines 169-181) already commits to recovering consequence as score-base and §6 claims it 'exact (both are exact f64 from the same pass)'. False: score is computed as base + Σ(weighted deps); recovering Σ by subtracting base is subject to floating-point cancellation, NOT exact in general. PENANCE: close OQ-2 in the design — STORE consequence as its own BTreeMap<EntityKey,f64> from the post-pass (the value exists pre-summation), or strike 'consequence' from the public explain contract; drop the 'exact' claim."

[[finding]]
id = "F-4"
status = "open"
severity = "major"
title = "Config seam incomplete: build_from gains config param but the pre-scanned direct caller actionability_block_from (surface.rs:484) has no config-load path"
detail = "EXPECTED: D4 threads config through build_from; every build_from caller must obtain config. OBSERVED: §5.2/D4 describe only survey/next/explain wrappers loading config 'inside the wrapper alongside the scan', but surface.rs:484 (graph::build_from(scanned, root) — the inspect/actionability-block path, retyped in-scope via ActionabilityBlock) calls build_from directly with a pre-scanned corpus and is unaddressed. As written the design either won't compile (missing arg) or silently leaves that surface on undocumented default config. PENANCE: name the seam for EVERY build_from caller — require all callers to thread &PriorityConfig (state where the pre-scanned caller loads it) or add a dedicated pre-scanned wrapper; enumerate surface.rs:484 explicitly."

[[finding]]
id = "F-5"
status = "open"
severity = "minor"
title = "§5.1 impurity model undercounts: claims 'two impure reads (config load, scan)' but build_from also does per-entity dep_seq_for disk reads"
detail = "EXPECTED: the System Model's impurity boundary must be accurate. OBSERVED: §5.1 says 'three pure stages bracketed by two impure reads (config load, scan)', but build_from (graph.rs:153; root RETAINED @145) performs per-entity relation_graph::dep_seq_for disk reads at graph.rs:221 — a third impure seam, which D4 itself acknowledges ('build already owns the impure touches (scan, dep_seq_for)'). §5.1 and D4 contradict. PENANCE: correct §5.1 to name dep_seq_for as an existing impure read inside build_from (the pure stages being base_score + the consequence post-pass) so the impurity boundary is honest."

[[finding]]
id = "F-6"
status = "open"
severity = "minor"
title = "dispatch_config cited as precedent for silent tolerance of garbage coefficient VALUES, but it hard-errors malformed values"
detail = "EXPECTED: a cited precedent must support the borrowed behaviour. OBSERVED: §2 and §5.5/OQ-1 justify 'silent clamp' of non-finite/negative coeffs as matching 'dispatch_config's tolerant parse', but dispatch_config only defaults MISSING fields and unknown KEYS — malformed VALUES are hard errors (test unknown_harness_is_error, dispatch_config.rs ~line 90, asserts unwrap_err). The clamp-vs-reject policy is a NEW choice, not inherited precedent. PENANCE: specify PriorityConfig::load precisely — what is fatal, what defaults, what clamps, at what granularity — and present silent clamp as a deliberate new policy (advisory config), not borrowed precedent; fold OQ-1 into that contract."

[[finding]]
id = "F-7"
status = "open"
severity = "minor"
title = "Behaviour-preservation proof names backlog risk/exposure suites but not the scan per-facet-isolation contract the new risk read must preserve"
detail = "EXPECTED: §3 behaviour-preservation gate covers BOTH the risk-type extraction AND the new scan read. OBSERVED: §8 R1 / VT-1 name only the backlog risk/exposure tests; the scan seam's per-facet error isolation (a malformed present facet drops to None + Error diagnostic, siblings intact — scan.rs ~216-277) is the contract the new risk [facet] read must preserve, but no VT pins it. PENANCE: add a scan-seam VT — existing catalog/scan malformed-facet isolation cases stay green unchanged, plus a new case proving a malformed [facet] drops only risk and preserves sibling estimate/value."

[[finding]]
id = "F-8"
status = "open"
severity = "minor"
title = "D7 claims 'survey/next rows show only the single score column', but NextRow carries no score/consequence field and NEXT_COLS renders none"
detail = "EXPECTED: the design's render claims must match the view/render types. OBSERVED: D7 (line 310) says survey AND next rows show a single score column; but NextRow (view.rs:103-112) has no consequence/score field — next surfaces consequence only via its ReasonKind reason lines (render.rs:181), and NEXT_COLS (render.rs:77) has no such column. §5.2 correctly omits NextRow from the retype set, contradicting D7's 'next ... score column'. PENANCE: clarify D7 — next exposes score via its ReasonKind::Score reason line, not a row column (or, if a column is truly intended, add score:f64 to NextRow plus the NEXT_COLS change). Make the render contract self-consistent."

