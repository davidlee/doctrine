[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "Conformance registry incomplete: PHASE-01 has no recorded source-delta row"
detail = """`doctrine slice conformance 183` reports `incomplete — completed phase PHASE-01 has no recorded source-delta row`. Expected (F-2 backstop): every completed phase carries a boundary row. Observed: boundaries.toml holds PHASE-02/03/04 only. Cause (notes.md PHASE-01 "conformance-boundary note"): PHASE-01's `code_start 38ca3a76` was stamped on a lineage later discarded by parallel SL-182 landings + auto-commits; it is now orphaned (not an ancestor of HEAD), so `record_source_delta` refused the non-forward binding and skipped it. PHASE-01 ships NO Rust — it is the confirmation probe; its conformance value is the evidence in `.doctrine/backlog/risk/014/probe-h2-seatbelt/results.md`, not a git delta. History-repair is forbidden (oids are the boundary). This was consulted (David, Option 1: accept the absent binding). Question for disposition: is the absent row acceptable (evidence-conformance, not delta-conformance, for a code-free phase), or does the registry gap mask dropped work?"""
disposition = "aligned"
response = "Aligned. The registry `incomplete` signal is the documented code-free-probe boundary case, not dropped work. PHASE-01 ships no Rust — it is the confirmation probe; its conformance value is evidence (probe-h2-seatbelt/results.md Pass 3), not a source delta. `code_start 38ca3a76` was orphaned by parallel-thread history restructuring; the non-forward binding was correctly refused (oids are the immutable boundary; history-repair forbidden). PHASE-02/03/04 all carry forward-intact boundary rows (boundaries.toml verified). Consulted and accepted (David, Option 1). Rely on evidence-conformance for PHASE-01; the gap masks nothing. No change needed — but /reconcile should carry a one-line design/plan note so the anomaly reads as intentional, not lost (routed in the brief)."

[[finding]]
id = "F-2"
status = "verified"
severity = "minor"
title = "design §5.1 illustrative xcrun_db profile line is bare-regex and leaks; shipped form uses require-all"
detail = """design.md §5.1 (line 83) shows the xcrun_db re-allow as a BARE regex: `(allow file-write* (regex #"/xcrun_db[^/]*$"))` with a trailing comment "applied under a DUTMP subpath scope". Probed bare (notes.md PHASE-01 F-P3-A, results.md Pass 3), that line LEAKS — it allowed `/private/tmp/xcrun_db-*`, entirely OUTSIDE the per-user temp. The design's own prose (§5.5 EDGE F-E, lines 161-163) already requires the DUTMP scoping, so this is an illustrative-line error, not a decision change. Shipped/proven-correct form (encoded in `seatbelt_profile` + `XCRUN_DB_REGEX`): `(allow file-write* (require-all (subpath (param "DUTMP")) (regex #"/xcrun_db[^/]*$")))`. Expected: design §5.1's illustrative profile matches the shipped floor. Observed: bare regex, divergent. Remediation surface: per-slice direct edit to design.md at /reconcile (not a REV — it is a per-slice artefact, and the decision is unchanged)."""
disposition = "verified"
response = 'Verified — observation confirmed; remediation delegated to /reconcile as a per-slice direct edit (NOT a REV; design.md is a per-slice artefact and the decision is unchanged). design.md §5.1 line 83 shows the bare regex `(allow file-write* (regex #"/xcrun_db[^/]*$"))`; probed bare it leaks `/private/tmp/xcrun_db-*` (results.md Pass 3). Shipped/proven form (seatbelt_profile + XCRUN_DB_REGEX): `(allow file-write* (require-all (subpath (param "DUTMP")) (regex #"/xcrun_db[^/]*$")))`. §5.5 EDGE(F-E) prose already requires DUTMP scoping — illustrative-line error only. Reconciliation brief: design.md §5.1 profile line bare→require-all. Not a code fix; leaf/impl already correct.'

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = '§5.5/PHASE-03 EX-2 name "6 fail-closed branches (a–f)"; impl realises them through 5 typed ResolveDeny reasons (c≡e merge)'
detail = """design §5.5 and PHASE-03 EX-2 enumerate SIX fail-closed branches a–f. The impl's `ResolveDeny` enum has FIVE variants: NotAWorktree, IsMainCheckout, AmbiguousGitDirs, PolicyMissing, PolicyMalformed(String) (verified jail.rs:614). Branch c (nested-repo/submodule basename never provisioned) is mechanically identical to branch e (policy absent): both surface as `read_policy → Ok(None) ⇒ PolicyMissing`. So there are 6 *conditions* mapped to 5 *typed reasons*; every condition still denies. Expected vs observed: the criterion says "all 6 branches return Deny"; observed 6 conditions → 5 reasons, all Deny. This is NOT a scope cut — the security outcome (fail-closed Deny, no unwrapped pass-through) holds for every condition; c and e are deduplicated because their mechanism and outcome are invariant. Question for disposition: is the c≡e mechanism-merge an accepted faithful realisation of EX-2 (6 conditions covered), or does the plan text need a reconcile note that "6 conditions, 5 typed reasons"?"""
disposition = "verified"
response = 'Verified — observation confirmed; the c≡e merge is a faithful realisation of EX-2, not a scope cut. 6 fail-closed CONDITIONS (a–f) map to 5 typed ResolveDeny reasons (jail.rs:614: NotAWorktree, IsMainCheckout, AmbiguousGitDirs, PolicyMissing, PolicyMalformed) because branch c (nested-repo/submodule basename never provisioned) and branch e (policy absent) share one mechanism (read_policy→Ok(None)⇒PolicyMissing) and one invariant outcome (fail-closed Deny, no unwrapped pass-through). Every condition still denies — the security property EX-2 protects is preserved. Remediation: a per-slice reconcile note (design §5.5 / plan PHASE-03 EX-2) clarifying "6 conditions, 5 typed reasons; c and e deduplicated by shared mechanism+outcome". Direct edit, not a REV. Routed to the reconciliation brief.'

[[finding]]
id = "F-4"
status = "verified"
severity = "minor"
title = "EX-4 gate: green except unrelated cordage perf flake many_small_cycles_evict_in_linear_time (113.5s vs linear budget)"
detail = """`doctrine check gate` (2026-07-01, re-run this audit): fmt clean, clippy zero warnings, build ok, all suites pass EXCEPT `cordage::scale_cliffs::many_small_cycles_evict_in_linear_time` — 113.5s for 20k disjoint cycles vs the linear-eviction perf budget (was 67.3s at handover; this host is slower). Confirmed NOT SL-183's: (1) out of diff — `git diff 6dcf3e75..HEAD -- crates/cordage` is EMPTY; SL-183 touches only src/worktree/{jail,pretooluse}.rs + .doctrine/; (2) timing not logic — the correctness sibling on the same workload `many_small_cycles_evict_set_identical_to_global_loop` PASSED. It is a slow-host perf gate on an unrelated workspace crate (cordage), pre-existing, owned elsewhere. SL-183's own suites are green (jail 59/0, pretooluse 21/0, incl. the VT-1 parity + EX-3 degrade tests). Expected: EX-4 "gate green" for THIS slice. Observed: green modulo one known-unrelated host-timing failure. Question: record EX-4 satisfied-for-this-slice with the flake noted (do not gate closure), or is a backlog item warranted for the cordage perf budget?"""
disposition = "tolerated"
response = """Tolerated for SL-183 closure. EX-4 "gate green" is satisfied FOR THIS SLICE: the only failure is `cordage::scale_cliffs::many_small_cycles_evict_in_linear_time` (113.5s vs linear budget), which is (1) out of SL-183's diff — `git diff 6dcf3e75..HEAD -- crates/cordage` is empty; (2) timing not logic — the correctness sibling passed on the identical workload. It is a slow-host perf gate on an unrelated workspace crate, pre-existing and owned elsewhere. SL-183's own suites are green (jail 59/0, pretooluse 21/0). Do not gate SL-183 closure on it. Rationale for tolerated (not aligned): the gate is objectively RED, so this is conscious accepted drift, not "already correct" — the drift is that a full-workspace gate cannot go fully green on this host until cordage's perf budget is addressed. Captured as a backlog risk for the cordage owner — see harvest."""

[[finding]]
id = "F-5"
status = "verified"
severity = "major"
title = "EX-2 live in-situ containment: consumer proven end-to-end; auto-provision trigger on non-dispatch spawn path remains unit-test-only"
detail = """EX-2 requires the in-situ leg: under a real isolation:worktree subagent on macOS, every external write vector denied by the nested floor, worktree writable, wrapper applied via updatedInput. RESOLVED live this session (notes.md "EX-2 live battery — RESOLVED"; mem.thread.sl-183.ex2-live-battery-resolved-macos): both walls down (plugin properly installed → hook fires; Haiku subagent complied on a plain-framed probe). Both decision legs exercised LIVE through the shipped `worktree pretooluse` consumer on a nested subagent: (deny) no policy ⇒ `seatbelt-policy-missing` (F-B4 fail-closed) ⇒ Bash denied before the script ran, canaries intact; (allow-and-confine) policy provisioned ⇒ consumer resolved WRAP ⇒ materialized the 540B `<wt>/.tmp/jail.sb` ⇒ probe ran UNDER the floor: outside/`/tmp`-alias/`$HOME`/symlink-deref/python-child writes all BLOCKED (Operation not permitted), in-cwd marker WROTE; independent verifier: 6/6 canaries OK, zero stray writes. CAVEAT (the finding's edge): the live leg used the Agent-tool spawn, which takes the create-fork Passthrough path (cwd_is_arming=false), so the per-wt `jail/<name>.toml` was provisioned MANUALLY. The dispatch Fork path auto-copies `spawn/jail.toml` → `jail/<name>.toml`. So the CONSUMER (resolve→wrap→materialize→confine) is proven live, but the AUTO-PROVISION trigger on the non-dispatch spawn path stays proven only by unit test (`provision_jail_policy_copies_declaration_to_named_file`, create.rs). Expected vs observed: EX-2 met (containment live-verified from OUTSIDE via canary checksums, so subagent cooperation was not load-bearing); the residual is a spawn-path seam, not a containment gap. Question for disposition: EX-2 discharged aligned, with the provisioning-trigger caveat recorded as tolerated (or a follow-up backlog for a live auto-provision test)?"""
disposition = "aligned"
response = "Aligned. EX-2 discharged with live evidence. The containment claim is verified from OUTSIDE (canary checksums, independent verifier: 6/6 OK, zero stray writes), so subagent cooperation was never load-bearing. Both decision legs ran through the shipped `worktree pretooluse` consumer on a nested isolation:worktree subagent (deny: seatbelt-policy-missing fail-closed; allow-and-confine: 540B jail.sb materialized, all external/alias/symlink/child-proc writes BLOCKED, in-cwd marker WROTE). The provisioning-trigger caveat is a genuine residual but NOT a containment gap: the consumer (resolve→wrap→materialize→confine) is proven live end-to-end; only the auto-provision trigger on the non-dispatch Agent-tool Passthrough spawn path remains unit-test-only (provision_jail_policy_copies_declaration_to_named_file). That is a spawn-path seam. Captured as follow-up work (backlog) rather than blocking closure — see harvest. No code change in audit scope."

[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "T3a/T3b consumer-wiring were PHASE-04 scope increments filling PHASE-03 EX-3 gaps; reconcile vs plan wording"
detail = """Two load-bearing consumer-wiring gaps were discovered and fixed in PHASE-04 (both consult-approved scope increments), not PHASE-03: (T3a, b2cd1000) the shipped `worktree pretooluse` `probe_backend` never routed macOS→Seatbelt — it only produced Bwrap/Deny{bwrap-unavailable}; PHASE-03 built + unit-tested the Seatbelt jailer at the `select_jailer` leaf level but never wired the command shell's `probe_backend` to reach it, so on macOS every worktree-subagent Bash denied `bwrap-unavailable` and the jailer was dead code from the hook entry — EX-2 "through the live consumer" was physically impossible. (T3b, c5908cc6) the consumer emitted `sandbox-exec -f <wt>/.tmp/jail.sb` but nothing in prod ever wrote the profile body — `seatbelt_profile()` had zero prod call sites (tests only); every wrapped Bash would fail `sandbox-exec: .../jail.sb: No such file` before Seatbelt engaged. Root cause: parity-by-reuse didn't cover the materialization obligation (bwrap = inline argv flags, no external file; Seatbelt = `-f <disk file>`). PHASE-03's EX-3 ("select_jailer routes macOS to Seatbelt") was TRUE at the select_jailer level but the upstream probe_backend never produced a Seatbelt backend. Expected vs observed: PHASE-03 EX-3 reads as if end-to-end macOS routing was delivered in PHASE-03; observed the consumer-tier wiring + materialization landed in PHASE-04. Both fixes verified (pretooluse 21/0). Question for disposition: reconcile note that EX-3's consumer-tier reach was completed in PHASE-04 (T3a/T3b), or is this adequately captured by notes.md alone?"""
disposition = "verified"
response = 'Verified — observation confirmed; both increments (T3a b2cd1000, T3b c5908cc6) were consult-approved and are code-complete + tested (pretooluse 21/0), so no code fix in audit scope. The reconcile action is a prose truth-telling edit: PHASE-03 EX-3 ("select_jailer routes macOS to Seatbelt") was true at the leaf level but the consumer-tier reach (probe_backend cfg-split + .sb materialization) landed in PHASE-04 — because parity-by-reuse never covered the materialization obligation (bwrap inline argv vs Seatbelt disk -f). Remediation: a per-slice reconcile note (plan PHASE-03/PHASE-04 or design §5.4) recording that the consumer-tier macOS routing + profile materialization completed in PHASE-04 as T3a/T3b. Direct edit, not a REV. Routed to the reconciliation brief.'

[[finding]]
id = "F-7"
status = "verified"
severity = "minor"
title = "EX-1/VT-1 behaviour-preservation: SL-182 reused leaf fns green UNCHANGED (parity proof)"
detail = "EX-1/VT-1 is the parity gate: SL-182's reused functions (validate_policy, decide_write, pathcheck, opaque_wrap, select_jailer, resolve_target) must stay behaviour-preserved UNCHANGED, with the existing suites as proof. Verified: (1) `git diff 3a760f92..HEAD -- src/worktree/jail.rs` shows NO deletion of any reused fn signature line (additive-only: new consts block, ResolvedMac fields, seatbelt_profile/sandbox_exec_argv/resolve_inputs/seatbelt_backend/RealEnv, new tests); (2) direct run `cargo test --bin doctrine worktree::jail` = 59 passed / 0 failed, incl. validate_policy_* / decide_write_* / pathcheck_* reused-fn suites and the EX-3 degrade test `seatbelt_resolve_deny_degrades_to_bash_deny_never_wraps_or_passes` (mutation-verified per notes.md — fail-open turns it red). ADR-001 layering intact (leaf jail.rs pure; impurity in RealEnv + command tier). Expected: reused suites pass unchanged. Observed: they do. This finding records the parity discharge for the ledger."
disposition = "aligned"
response = "Aligned. Behaviour-preservation gate satisfied. Independently verified two ways: (1) `git diff 3a760f92..HEAD -- src/worktree/jail.rs` deletes no reused-fn signature (validate_policy/decide_write/pathcheck/opaque_wrap/select_jailer/resolve_target) — all SL-183 changes are additive; (2) `cargo test --bin doctrine worktree::jail` = 59 passed / 0 failed this audit, including the reused-fn suites and the mutation-verified EX-3 degrade test. ADR-001 layering held (leaf pure; impurity in RealEnv + command tier). EX-1/VT-1 discharged; no change needed."

[[finding]]
id = "F-8"
status = "verified"
severity = "nit"
title = "ISS-204 (SL-182 CHR-014 env!-bake) fixed in SL-183 context — user-sanctioned ownership deviation; possible trivial dup with SL-182 thread"
detail = """During PHASE-02 the full gate was red on a PRE-EXISTING SL-182 violation: `e2e_no_baked_paths::no_baked_paths` (CHR-014/SL-162) failed because SL-182's `pi_spawn_core_tokens` VT-7 helper baked `env!("CARGO_MANIFEST_DIR")` (introduced by SL-182 b67b6299, verified at clean detached-HEAD — not an SL-183 artifact). Captured as ISS-204 (`references SL-182 --role concerns`). The SL-182-thread fix never reached the `edge` checkout (verified: no other worktree, clean tree, main behind, gate still red). On explicit direction (David, "try now"), the swap was applied HERE (8abcaae0): `env!("CARGO_MANIFEST_DIR")` → `crate::test_support::repo_root().join("scripts/pi-spawn-confined.sh")` in `pi_spawn_core_tokens` — test-only, behaviour-identical, no jail logic touched. Deviation from the original "SL-182 owns this surface" note is deliberate and user-sanctioned. Residual: git log shows `66821afe fix(SL-182): drop compile-time CARGO_MANIFEST_DIR from VT-7 helper` also exists on this history — so the SL-182 thread ALSO landed a fix; expect the two touch the same one line (same target form). Question for disposition: confirm ISS-204 is resolved and note the possible trivial dup for /reconcile/close awareness."""
disposition = "aligned"
response = """Aligned — ISS-204 is genuinely resolved on the current tree. Verified: jail.rs:1031 `pi_spawn_core_tokens` uses `crate::test_support::repo_root().join("scripts/pi-spawn-confined.sh")` — no `env!("CARGO_MANIFEST_DIR")` remains in src/worktree/; the `no_baked_paths` guard passed in this audit's gate run. The fix was user-sanctioned (David, "try now") and behaviour-identical (test-only, no jail logic). Re the possible dup: `66821afe fix(SL-182): drop compile-time CARGO_MANIFEST_DIR` IS an ancestor of HEAD while notes.md's `8abcaae0` is not — history was restructured, but the SL-183-form fix is what landed and the tree is clean/correct, so there is no residual dup to resolve. Minor notes.md oid staleness (harvest note); no action needed for closure. ISS-204 → resolved/fixed."""

