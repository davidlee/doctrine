[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "web/map TS cutover (consequence→score) is unverifiable in the offline jail"
detail = "The JSON field rename ActionabilityNode.consequence→score broke two web consumers; the orchestrator cut them over: web/map/src/render.ts (actionability table cell+header), priority.ts (graph score badge), types.ts (added score:number), priority.css (badge class). No node_modules exist anywhere in the jail, so eslint/tsc/vite cannot run — the edits are hand-verified and type-aligned only, not compiler-checked. The dist embed is built out-of-band; CI compiles TS. Verification gap is environmental, not a code defect."
disposition = "tolerated"
response = "Accepted environmental constraint. No node_modules in the offline jail → eslint/tsc/vite cannot run on web/map. The TS cutover is a mechanical field rename, hand-verified and type-aligned (added score:number to the type, read node.score.toFixed(1)); CI compiles TS and rebuilds the dist embed out-of-band. No durable defect; left as a known verification gap."

[[finding]]
id = "F-4"
status = "verified"
severity = "nit"
title = "design §5.4 prescribes a seq-eviction subtraction that is empirically a no-op"
detail = """design §5.4 specifies "surviving seq edges = seq_overlay minus provenance().evictions()". Empirically cordage's in_edges(seq_overlay) already excludes Evict-evicted edges (provenance().evictions() still lists them). The next-sort keeps the explicit subtraction as a design-aligned safeguard (no-op today, correct if cordage's enumeration ever changes). VT-7(c) passes either way. Recorded as mem.fact.cordage.in-edges-excludes-evicted. No change required; optional design annotation."""
disposition = "aligned"
response = "Safeguard retained intentionally; behaviour correct. The subtraction is a no-op given current cordage in_edges semantics but defends the design-§5.4 contract if enumeration changes. Captured as mem.fact.cordage.in-edges-excludes-evicted. No reconcile action required; design wording already matches the (defensive) implementation."

