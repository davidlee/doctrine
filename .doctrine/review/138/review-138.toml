title = "ADR-015 ratifies dep_coeff (0,1] but code+design treat ≤0 as the disable sentinel [0,1]"
detail = 'Governance lag (RV-137 F-3, re-confirmed on the candidate). config.rs clamp_dep + tests treat dep_coeff ≤0 as DISABLE (→0.0); design §5.2/§7 say "≤0 disables leverage". ADR-015 §lines 80-81/125-127 still ratify the domain as (0,1]. Code+design are the coherent reading; the ADR wording is stale. Governance change — route to /reconcile as an ADR-015 amendment (REV): ratify [0,1] with 0 (and any clamped ≤0) the explicit disable sentinel. No code change.'
disposition = "verified"
response = "Confirmed governance lag. Routed to /reconcile: amend ADR-015 (REV) to ratify dep_coeff domain [0,1] with 0 (and clamped ≤0) the explicit disable sentinel; align design §5.2/§7 wording. No code change. Recorded in the Reconciliation Brief (governance/spec REV)."

