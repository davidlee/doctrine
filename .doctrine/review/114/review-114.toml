status = "verified"
severity = "nit"
title = "Expected: design anticipated only the toml::Value collision — Observed: line_matches_facet_symbol also excludes serde::/serde_json:: collisions for estimate::/value::"
detail = "Tier-1 line_matches_facet_symbol excludes lines containing serde::, serde_json::, or toml:: when matching the broad estimate:: / value:: substrings. Design §4 anticipated only toml::Value; the worker found serde::de::value:: etc. collide too (else revision.rs / knowledge.rs / backlog.rs false-positive). Load-bearing implementation detail, correct and consistent with design intent; design prose under-described the collision set."
disposition = "aligned"
