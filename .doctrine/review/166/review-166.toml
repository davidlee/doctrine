[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "Source-delta registry: PHASE-01 unbound at audit start (conformance reported undelivered)"
detail = "Expected: solo /execute auto-binds PHASE-01's source-delta as the phase lands, so slice conformance 157 reads the touched paths. Observed: conformance reported src/dispatch.rs + src/git.rs as UNDELIVERED, no registry row. Cause: the delta da243b3d landed on fork sl-157-phase-01 and the phase flip did not bind it to the primary-tree registry. Bootstrapped during audit per step-2 backstop (start 42c55624, end da243b3d); conformance now reads 2 conformant, 0 undeclared, 0 undelivered."
disposition = "fix-now"
response = "Repaired within audit scope: doctrine slice record-delta 157 PHASE-01 --start 42c55624 --end da243b3d. Conformance now clean (2 conformant). Process note: solo-on-fork did not auto-bind; carry as a known gap of fork-based solo execute."

[[finding]]
id = "F-2"
status = "verified"
severity = "minor"
title = "SPEC-022 advance-leg prose still describes the stripped None-leg resync"
detail = "Expected: SPEC-022 describes the not-checked-out advance as pure CAS-and-done. Observed: spec-022.md advance-leg paragraph still reads 'a not-checked-out target advances by pure update_ref_cas (with a post-CAS re-probe that resyncs a newly-checked-out ref)' — names the mechanism this slice deleted. Design section 5: strike the parenthetical via a modify REV at reconcile so the spec does not lead the code. The D4 CAS contract itself is unchanged, so no ADR-012 Revision."
disposition = "verified"
response = "Drift confirmed. Remediation delegated to /reconcile (spec must not lead code): modify REV --target SPEC-022 striking the post-CAS-resync parenthetical from the advance-leg paragraph. Logged in the Reconciliation Brief (Governance/spec REV)."

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "IMP-122 (open) hardens a mechanism this slice deleted, now obsolete"
detail = "Expected: IMP-122 (harden the None-leg post-CAS resync: re-resolve before reset --hard, untracked-collision guard) tracks live work. Observed: the slice deletes resync_worktree_hard and the post-CAS resync wholesale, dissolving R1/R3/R4 at the mechanism, so IMP-122's hardenings are moot. Resolve at reconcile: close as resolved-by-deletion, cite SL-157."
disposition = "verified"
response = "Obsolescence confirmed. Remediation delegated to /reconcile: close IMP-122 as resolved-by-deletion, citing SL-157. Logged in the Reconciliation Brief (direct edit, backlog)."

[[finding]]
