[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "Expected: design.md reflects implementation — Observed: 3 minor design amendments needed"
detail = """
Three implementation details differ from the authored design.md:
1. lastRenderedFocusId: design.md 'app.ts integration' says add . Implementation reuses existing  capture at L349 — functionally equivalent, cleaner (no extra state field). Design.md should be updated to reflect the simpler approach.
2. parseTransform(): design.md 'Pure helpers' doesn't list this function, but it was added in PHASE-02 as a solution to the stale-closure-on-re-render problem (handlers read viewport from CSS transform string each event, not from closure-captured vp). 6 unit tests. Design.md should mention this helper.
3. minK stored on wrapper dataset: design.md 'Wheel (zoom)' describes the handler using closure-captured minK. Implementation stores minK on wrapper.dataset.minK (render.ts L717) so the handler reads the current wrapper's minK on each event — correct for re-renders with different SVG sizes. Design.md's event handler section should note this pattern."""
disposition = "verified"
response = "Three minor design amendments confirmed. 1) lastRenderedFocusId simplification is correct. 2) parseTransform() is a necessary implementation detail. 3) minK-on-wrapper is correct for re-render safety. Remediation: reconciliation brief maps these to design.md sections for update."

