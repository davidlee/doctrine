Conformance verified against design.md design decisions table:
D1 — CSS transform wrapper (not SVG transform): render.ts L714 creates .graph-transform-layer div, applies style.transform. graph.css has transform-origin:0:0. SVG internals untouched.
D2 — Viewport in app state: types.ts L150 graphViewport field in AppState, state.ts initialises null, app.ts L488-490 passes initialViewport + onViewportChange.
D3 — minK fit-to-container: render.ts L705-707 computes minK = fitViewport(...).k, stores on wrapper.dataset.minK (L717). Wheel handler reads curMinK from layer.dataset.minK (L732) and clamps.
D4 — Focus change centres: app.ts L349 computes focusChanged, passed to graphPane() L489. render.ts L710-711 calls applyFocusChange() when focusChanged is true.
D5 — Same focus restores: render.ts L713 passes initialViewport through as-is when not null and not focusChanged."""
disposition = "aligned"
response = "All 5 design decisions verified conformant in source. No changes needed."

