[[finding]]
id = "F-1"
status = "verified"
severity = "blocker"
title = "Per-worker custom jail policy is impossible through a single-slot arming rendezvous (expected: keyed per worker; observed: one shared arming dir for N spawns)"
detail = """§5.3 (design.md:164-178) and objective 3 promise a *per-worker* jail policy: the orchestrator declares intent at a pre-spawn location "alongside the base file," create-fork provisions it to jail/<name>.toml, and the design asserts "no parallel-write contention; no worker TOCTOU." CONFESSED FALSE under cross-examination: `dispatch arm-spawn` writes a SINGLE shared `base` file into ONE arming dir (`src/dispatch.rs:417-430`), and `dispatch-agent/SKILL.md:30-33` explicitly sanctions "arm once, then issue N spawns from the spawn dir — all read the same B." The rendezvous is single-slot; the harness-assigned `name` does not exist until create-fork fires. A custom policy declared beside `base` is therefore shared by all N workers of a batch (last-writer-wins / all-identical), NOT per-worker. The default floor (absence ⇒ strictest, §5.3) is race-immune and ships safe; only the CUSTOM-policy promise is unbuildable. Worse than benign: a parallel batch where worker A's loosening (extra_rw/network) bleeds onto worker B is a confinement WEAKENING, not a tightening — contradicting §4's "absence can only tighten." Penance: cut per-worker custom policy from SL-182 — ship the strict default floor (no schema knobs) — OR scope custom policy to SERIAL spawns only with the arm→spawn→provision critical-section named explicitly; defer true per-worker tuning until a real per-spawn correlation token exists (candidate IDE). Either way, delete the false "no contention/no TOCTOU" claim."""
disposition = "design-wrong"
response = 'The design overpromises a per-worker custom policy the spawn topology cannot deliver. Remediation (a scope decision for the User/integration pass): EITHER (a) cut per-worker custom policy from SL-182 — ship the strict default floor only (no extra_rw/network knobs), which is race-immune and discharges the core confinement objective; OR (b) confine custom policy to SERIAL spawns and name the arm→spawn→provision critical section explicitly, documenting that parallel batches get the default floor. Recommended: (a) — it is the simplest thing that closes the RSK-014 gap; per-worker tuning becomes a follow-up IDE once a real per-spawn correlation token exists. Either way the "no parallel-write contention / no worker TOCTOU" claim in §5.3 must be struck. Coupled to F-4 (D2/scope text follows this decision). Left answered (not verified) — gates close pending the rework + User steer on (a) vs (b).'

[[finding]]
id = "F-2"
status = "verified"
severity = "blocker"
title = "Bare-PATH plugin hook exec fails OPEN on a stale/missing binary (expected: fail-closed jail; observed: non-exit-2 hook error proceeds unconfined)"
detail = 'D-reg (§5.4, design.md:186-192) registers the wall via plugin hooks.json invoking "doctrine worktree pretooluse (bare exec on PATH … no resolve_exec)". The authoritative cache is damning: hooks.md:629-643 + the Warning — "Any other exit code is a non-blocking error … Execution continues"; "only exit code 2 blocks the action." A bare `doctrine` resolving to the RO `~/.cargo/bin/doctrine` that predates this subcommand, or a command-not-found (exit 127), is a NON-BLOCKING error → the Bash/Edit/Write tool call PROCEEDS UNCONFINED — the exact RSK-014 hole this slice exists to close, reopened by the installer. This also contradicts the design itself: §5.1 (design.md:81) and D1 (design.md:254) list `resolve_exec` as a pretooluse responsibility, while §5.4 disclaims it — an internal contradiction over the single most load-bearing wire. During development of THIS slice the bare-PATH hook would invoke the stale RO binary, not the dev build under test, so V-plugin/e2e would silently test the wrong binary. Penance: the wall must fail CLOSED on exec failure — plugin materialization embeds a resolved ABSOLUTE executable (resolve_exec at install, as §5.1/D1 already claim), OR a tiny checked-in shim that `exit 2`s on exec/Not-Found. Reconcile §5.1/D1 vs §5.4 so exactly one exec-resolution story stands, and it is the fail-closed one.'
disposition = "design-wrong"
response = 'Unambiguous: the wall must fail CLOSED on exec failure, and §5.1/D1 (resolve_exec) vs §5.4 (bare PATH) must reconcile to one story. Remediation: plugin materialization embeds a resolved ABSOLUTE executable path (the resolve_exec story §5.1/D1 already assert), OR a checked-in shim that `exit 2`s on exec/command-not-found so a missing/stale binary BLOCKS rather than passes. The bare-PATH-no-resolve_exec sentence in §5.4 is the defect — delete it. Side benefit: an absolute dev-binary path also fixes the "V-plugin tests the stale RO binary" footgun. Left answered (not verified) — gates close pending the design edit.'

[[finding]]
id = "F-3"
status = "verified"
severity = "blocker"
title = "Funnel convergence rests on doc-disfavored, unverified harness teardown (expected: orchestrator imports the worktree diff; observed: harness auto-removes the worktree when the subagent finishes, no hook can block it)"
detail = """Objective 5 / §5.4 (design.md:206-213) makes ro-`.git` remove the worker's self-commit and converges the claude funnel onto a working-tree-diff import, asserting the cadence is "already claimed identical on both arms." OQ-2 (design.md:244) honestly admits the harness behaviour is unverified — but the authoritative docs lean AGAINST the design's optimism: hooks.md:2442 — WorktreeRemove "fires … when a subagent with isolation:'worktree' finishes. For git-based worktrees, Claude handles cleanup automatically with `git worktree remove`"; hooks.md:680 + :814 — WorktreeRemove has "No decision control," failures "logged in debug mode only" (the hook CANNOT block removal). So when the claude Agent worker finishes, the harness auto-removes the worktree; the uncommitted diff (commit blocked by ro-`.git`) is torn down. The "identical on both arms" premise is FALSE: on the pi arm the ORCHESTRATOR owns worktree lifecycle (`doctrine worktree fork` → import → orchestrator removes), so there is no teardown race; on the claude arm the HARNESS owns it and removes on finish. Unlike V-plugin (which has a settings.local fallback), OQ-2 has NO named fallback — if it fails, objective 5 is unachievable and the slice has no funnel. Penance: name the contingency BEFORE /plan — e.g. a doctrine WorktreeRemove/SubagentStop hook that snapshots `git diff > patch` to a path outside the worktree before the harness removes it; OR fall back to Path C (IDE-024) clone-and-cherry-pick; OR defer ro-`.git` until OQ-2 is proven. Mark OQ-2 as a lock-time accepted risk WITH a defined abort, not a bare "verify in execute.""""
disposition = "design-wrong"
response = """OQ-2 is not a mere "verify in execute" — the docs lean against it and there is no fallback, so the design must carry a named contingency before /plan. Remediation options (a design decision for the User/integration pass): (a) a doctrine WorktreeRemove (or SubagentStop) hook that snapshots `git diff` to a path OUTSIDE the worktree before the harness's auto-`git worktree remove`, becoming the orchestrator's import source — this also finally makes the cadence genuinely "identical on both arms"; (b) fall back to Path C / IDE-024 (clone + cherry-pick), accepting the topology change; (c) defer ro-`.git` until OQ-2 is empirically settled. Recommended: (a) — smallest move that preserves Path L + ro-`.git` and closes the teardown race. Strike the unqualified "already claimed identical on both arms" premise; mark OQ-2 a lock-time risk WITH a defined abort. Left answered (not verified) — gates close pending the chosen contingency."""

[[finding]]
id = "F-4"
status = "verified"
severity = "major"
title = "Stale agent_id keying survives in D2 and the slice scope (expected: one corrected keying story; observed: §5.3 says worktree-name, D2 + scope still say agent_id)"
detail = """The A7 adversarial pass (§5.3, design.md:161-178) correctly repudiates agent_id pre-spawn keying as impossible and rewrites to key by worktree NAME (jail/<name>.toml). But the repudiated model still stands unedited in two places of record: D2 in §7 (design.md:258) — "per-worker policy file keyed by `agent_id`, under … jail/" — and the slice scope's locked "Design decisions" block (`doctrine slice show SL-182`) — "Mechanism — per-worker policy file keyed by `agent_id`. … jail/<agent_id>.toml". Canon now contradicts itself: the design's own decision register (D2) and the authored scope both assert the model §5.3 proved impossible. A reader trusting D2 or the scope `show` builds the wrong thing. Penance: rewrite D2 and the scope's mechanism line to the worktree-name keying (or, if F-1's penance cuts custom policy, to "strict default floor, no per-worker file"); the two tiers must tell one story before /plan reads them."""
disposition = "design-wrong"
response = """Canon contradicts itself: D2 (§7) and the authored scope still assert the agent_id keying §5.3 proved impossible. Remediation: rewrite D2 and the scope's "Mechanism" line to match §5.3 — worktree-NAME keying — or, if F-1's penance cuts custom policy, to "strict default floor, no per-worker policy file." Mechanical once F-1's keying decision lands (hence coupled). Left answered (not verified) — rides the F-1 rework."""

[[finding]]
id = "F-5"
status = "verified"
severity = "major"
title = 'V-plugin: the proven fallback is forbidden, not planned (expected: a real contingency for an unproven registration home; observed: "do not build settings.local unless V-plugin fails")'
detail = """D-reg (§5.4/§7, design.md:182-192, 271-277) LOCKS the plugin hooks.json registration — proven by docs only for PreToolUse-in-general (plugins-reference.md:111-119), NOT for the worktree-subagent + updatedInput path the probe validated via settings.local.json (results.md:9). The design then forbids the fallback: "Do not invest in the settings.local.json install path unless V-plugin fails." That is acceptable as a bet ONLY if the fallback is a planned same-phase contingency; "do not build unless it fails" makes the reserve aspirational. Compounded by F-2: if V-plugin fails AND the bare-PATH exec fails open, the first execute step both burns a session restart and leaves the wall unbuilt with no ready fallback. Note for the record: the bet is otherwise defensible at lock — agent_id (hooks.md:595), updatedInput (hooks.md:818), and permissionDecision (hooks.md:806) are all doc-backed, and agent_id's doc ("present only when the hook fires inside a subagent call") implies hooks DO fire inside subagent calls; the residual unknown is narrowly the plugin-registration path. Penance: make D-reg conditional — V-plugin is the first phase AND that same phase lands the settings.local fallback if the plugin path does not honour updatedInput for a worktree subagent. The fallback is planned, not deferred-on-failure."""
disposition = "design-wrong"
response = 'The bet is sound but the fallback must be planned, not forbidden. Remediation: make D-reg conditional — V-plugin is the first phase AND lands the settings.local.json fallback within that same phase if the plugin path does not honour updatedInput for a worktree subagent. Replace "do not invest unless V-plugin fails" with "fallback is built in the V-plugin phase iff the plugin path fails." Note credited: the field semantics (agent_id/updatedInput/permissionDecision) are doc-backed, so the residual is narrowly the registration path. Left answered (not verified) — rides the integration pass.'

[[finding]]
id = "F-6"
status = "verified"
severity = "major"
title = "Edit/Write wall matches an undocumented tool surface (expected: every write-tool guarded by a verified stdin schema; observed: NotebookEdit/notebook_path consumed on faith)"
detail = "§5.4 (design.md:186) registers matcher `Edit|Write|NotebookEdit` and §5.2 (design.md:100) consumes `tool_input.notebook_path`. The authoritative local cache does NOT define a NotebookEdit tool or a notebook_path field: grep across hooks.md / hooks-reference.md yields only a matcher-REGEX EXAMPLE (`^Notebook matches any tool starting with Notebook`, hooks.md:187), never a tool/stdin definition. The pathcheck wall is thus extended to a write-vector whose existence, exact matcher name, and write-path field are unverified. If the real tool is named differently or carries its target path under a different key, the matcher misses it or the pathcheck reads None → an UNGUARDED write channel escaping the jail. Penance: drop NotebookEdit from SL-182's wall (Edit|Write is the proven surface), OR make V-plugin capture and pin NotebookEdit's real matcher + stdin schema before the pathcheck is wired to it. Do not guard a tool whose schema you have not read."
disposition = "design-wrong"
response = "Guarding a tool whose schema is unread is a latent jail hole. Remediation: drop NotebookEdit from the Edit/Write wall (Edit|Write is the proven, documented surface and discharges the objective), OR require V-plugin to capture and pin NotebookEdit's real matcher name + stdin write-path field before the pathcheck is wired to it. Recommended: drop it now; re-add via a follow-up once its schema is empirically read. Left answered (not verified) — rides the integration pass."

[[finding]]
id = "F-7"
status = "verified"
severity = "minor"
title = 'network=true default contradicts the fail-closed "strictest floor" principle (expected: absence can only tighten; observed: missing policy grants open egress)'
detail = """§4 (design.md:62) proclaims "The strictest jail is the safe default; absence of policy can only tighten." §5.3 (design.md:149) sets `network = true` by default, and §10 A4 (design.md:352) concedes the default does not contain egress. So a worker with NO declared policy (the floor) gets OPEN network — the floor is NOT the strictest jail, and absence does NOT only tighten: a forged-absent or unprovisioned policy yields full egress, a fail-OPEN dimension. The contradiction is in the wording, not the mechanism (the mechanism does what §5.3 says). Penance (cheap): either default `network=false` (true strictest floor; opt-in egress via extra policy), OR narrow §4's invariant to "strictest WRITE-containment floor" and state plainly that egress containment is a deliberate non-goal (consistent with OQ-6 / the non-goals). Pick one; do not let §4 keep claiming a floor the default violates."""
disposition = "design-wrong"
response = """Cheap wording reconciliation. Remediation: default `network=false` (true strictest floor; egress opt-in via policy) OR narrow §4's invariant to "strictest WRITE-containment floor" and state egress containment is a deliberate non-goal (OQ-6). Recommended: the wording narrowing — flipping to network=false may break parity with the pi core flags (which do not --unshare-net), so unless egress containment is in scope, fix the claim not the default. Left answered (not verified) — rides the integration pass."""

[[finding]]
id = "F-8"
status = "verified"
severity = "minor"
title = 'Policy-file read-only-ness rests on a false "ancestor" rationale (expected: accurate justification; observed: .doctrine/state called an ancestor of the worktree, which it is not)'
detail = """§5.3 (design.md:143-146) places the policy at `<main>/.doctrine/state/dispatch/jail/<name>.toml` and justifies its read-only-ness as "under <main>/.doctrine/state/, ancestor of the worktree, ro-bound." Geographically false: worktrees live at `<root>/.worktrees/<name>` (src/worktree/create.rs; probe results.md finding 3), so `.doctrine/state` is a SIBLING of `.worktrees/`, not an ancestor. The repo ROOT is the true ancestor (correctly used by INV-2's ancestor-rule); §5.3 conflates the two. The conclusion (the file is ro to the worker) is correct — but only because the bwrap jail `--ro-bind / /` makes EVERYTHING ro except the rw-bound worktree, not because of any ancestry. A future maintainer trusting the "ancestor" framing could misplace the file and assume it inherits ro-ness it does not. Penance: correct the rationale — ro-ness derives from the blanket `--ro-bind / /` plus the file living outside the single rw-bound worktree (and outside validated extra_rw); strike "ancestor of the worktree.""""
disposition = "design-wrong"
response = 'Conclusion right, rationale false. Remediation: strike "ancestor of the worktree"; pin the read-only guarantee to the blanket `--ro-bind / /` plus the file living outside the single rw-bound worktree and outside validated extra_rw. Trivial text fix. Left answered (not verified) — rides the integration pass.'

[[finding]]
id = "F-9"
status = "verified"
severity = "nit"
title = 'R7 "accepted residual" is defensible but under-argued (expected: the unspoofability premise stated; observed: bare "both modes carry agent_id")'
detail = """Soft-target 4 answer, for the record: R7 (design.md:298-302) accepting the orchestrator pass-through as an unconfined residual (OQ-5 deferred) IS defensible — and codex's independent pass found no chargeable fault here. The load-bearing premise is that the probe proved agent_id is harness-stamped present-iff-subagent (results.md Exp 1/3): a confined worker CANNOT shed or forge its agent_id, so the only no-agent_id context is the trusted orchestrator main thread (ADR-006 sole-writer). A phantom no-agent_id spawn would require a harness-integrity failure that equally breaks worker/orchestrator discrimination everywhere — and which OQ-5's "widest jail" would barely contain. So deferral is sound. Penance (cosmetic): add the unspoofability premise to R7's text so "accepted residual" reads as reasoned, not asserted. Not a gate."""
disposition = "aligned"
response = "R7's stance is substantively correct — verified independently (codex found nothing chargeable). The orchestrator pass-through residual is genuinely acceptable: agent_id is harness-stamped present-iff-subagent (probe Exp 1/3), so a confined worker cannot forge its absence; OQ-5 deferral is sound. No design change required to the decision; the suggested rationale sentence is optional polish for the reconcile sweep. Terminal."

[[finding]]
id = "F-10"
status = "verified"
severity = "nit"
title = '§10 undersells doc coverage of the wire fields (expected: accurate doc-vs-empirical split; observed: agent_id/updatedInput claimed "not re-derived from docs")'
detail = """§10's docs/claude cross-check (design.md:362-367) states "`updatedInput`/`agent_id` stdin remain empirically proven (probe-h1), not re-derived from docs." In fact both ARE documented in the authoritative cache: agent_id at hooks.md:595 ("Unique identifier for the subagent. Present only when the hook fires inside a subagent call"), updatedInput at hooks.md:818 ("`updatedInput` directly under `hookSpecificOutput` replaces a tool's arguments before it runs"). The probe remains the proof that these fire for a worktree subagent specifically, but the FIELDS themselves are doc-backed. Harmless over-conservatism, but it understates how de-risked the mechanism is and muddies what V-plugin actually still needs to prove (narrowly: the plugin REGISTRATION path, not the field semantics). Penance: tighten §10 to credit the doc coverage and pin V-plugin's residual to the plugin-path firing alone."""
disposition = "design-wrong"
response = "Minor factual inaccuracy in §10's cross-check. Remediation: credit that agent_id (hooks.md:595) and updatedInput (hooks.md:818) are documented; pin V-plugin's residual to the plugin REGISTRATION path firing for a worktree subagent, not the field semantics. Sweep in the reconcile pass with F-5. Left answered (not verified)."

