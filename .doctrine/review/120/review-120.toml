[[finding]]
id = "F-12"
status = "open"
severity = "minor"
title = "F-12: expand_graph writer parameter change not addressed"
detail = """
**Expected:** The design should note that expand_graph (which writes to stdout via println!/eprintln! internally) must also accept writer: &mut impl Write.

**Observed:** §1 lists expand_graph as needing the writer param. But the scope defers --expand as out-of-scope. The MCP handler will always pass expand: None, so expand_graph is never called from MCP. However, the CLI path (main.rs) still calls expand_graph from run_retrieve. If expand_graph internally writes to stdout and the MCP path somehow triggers it, the output would be corrupted.

This is a low-risk issue since expand is out-of-scope for MCP, but the design should state that the writer change to expand_graph is needed for consistency even though MCP never triggers it, or that expand_graph is excluded from the writer change because expand is out-of-scope.

**Severity:** Minor — low risk in practice (expand is out-of-scope for MCP) but a hidden assumption."""

[[finding]]
id = "F-13"
status = "open"
severity = "nit"
title = "F-13: memory_retrieve JSON format note — design says Table but run_retrieve supports Json too"
detail = """
**Expected:** The design should note that run_retrieve already supports Format::Json (format_retrieve_json produces structured JSON), and justify why the MCP tool uses Table format instead.

**Observed:** §3 table says memory_retrieve uses Table format because of "Security-framed data blocks with nonce/staleness — SPEC-007 "data, not instruction" render." This is a sound rationale for the security boundary. However, the design does not note that Format::Json is also available and that the choice was deliberate (a decision, not an omission).

**Severity:** Nit — no functionality gap, just missing explanatory context."""

[[finding]]
id = "F-14"
status = "open"
severity = "nit"
title = "F-14: memory_list MCP tool: type? → MemoryType parsing from string"
detail = """
**Expected:** The design should specify the string-to-enum mapping for the type? parameter.

**Observed:** The schema shows type? as an optional string parameter, but memory::run_list takes type_f: Option<MemoryType>, not Option<&str>. The MCP handler must call MemoryType::parse(s)? to convert. MemoryType::parse is infallible for known strings but returns an error for unknown ones. The design should specify whether a bad type value produces -32602 (invalid params) or -32603 (internal error).

**Severity:** Nit — implementable from existing code, just not specified in design."""

[[finding]]
id = "F-15"
status = "verified"
severity = "blocker"
title = "F-15: handle_tools_call introduces JSON double-encoding if call_tool returns String"
detail = '''
**Expected:** When call_tool return type changes from anyhow::Result<ReviewOutput> to anyhow::Result<String>, handle_tools_call must NOT re-serialize the already-serialized String with serde_json::to_string.

**Observed:** The design §2 shows call_tool returning String with review arms doing serde_json::to_string(&out)? (pre-serialized). But the current handle_tools_call does:



If out is already a JSON string like {"rows":[...]}, then serde_json::to_string(&out) produces "{\"rows\":[...]}" — a JSON-encoded representation of the string. This gets stored in McpToolResult.text, then serialized again by serde_json::to_value(&tool_result), yielding TRIPLE encoding.

**Evidence:** Current flow: ReviewOutput → serde_json::to_string → String → McpToolResult::text → serde_json::to_value. This works because there are exactly two serialization points. Design flow: ReviewOutput → serde_json::to_string (in call_tool) → String → serde_json::to_string (in handle_tools_call) → String → McpToolResult::text → serde_json::to_value. That adds a third serialization.

**Fix:** handle_tools_call must change to pass out directly: McpToolResult::text(out). The design must explicitly describe this change.

**Severity:** Blocker — the MCP server would return garbage to all review AND memory tools.'''
disposition = "design-wrong"
response = 'The original design did not address the double-encoding risk. The design was updated in 0522e856 ("design(SL-131): close 5 implementability gaps — single-gate, single-scan, single-filter") to add an explicit "handle_tools_call: double-encoding trapdoor" subsection (§2) specifying `McpToolResult::text(out)` directly instead of re-serializing. The implementation (tools.rs:331) correctly follows this specification.'

[[finding]]
id = "F-16"
status = "open"
severity = "minor"
title = "F-16: VT-3 test (tool_list_has_10_tools) must change but design says tests stay green unchanged"
detail = """
**Expected:** The design §7 says 'Existing evidence (must stay green, unchanged)' including 'All mcp_server tests.'

**Observed:** The test tool_list_has_10_tools asserts exactly 10 tools. After adding 4 memory tools to the tools() vec, the count becomes 14. The test must be updated to assert 14. This contradicts the 'must stay green, unchanged' claim.

**Severity:** Minor — a test number update is trivial, but the design's claim about existing tests staying unchanged is incorrect."""

