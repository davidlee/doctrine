[[finding]]
id = "F-1"
status = "verified"
severity = "major"
title = "dep_seq.rs function names in call-site table are wrong for 3 of 4 rows"
detail = """
**Expected**: The design's §2 table maps each line number to the correct enclosing function name in dep_seq.rs.

**Observed**:

| Design says | At that line | Actual enclosing function |
|---|---|---|
| 178: `set_authored_status` | `fn append(...)` at l.120 | `append` (not `set_authored_status`) |
| 246: `remove_after` IO | `fn remove(...)` at l.234 | `remove` (not `remove_after` — that's a pure fn at l.190) |
| 356: `apply_with` | `fn set_authored_status(...)` at l.344 | `set_authored_status` (not `apply_with` — no such function exists) |
| 378: `append_string_array` | `fn append_string_array(...)` at l.370 | Correct — the only accurate row |

The `set_authored_status` and `remove_after` names appear but are assigned to the wrong line numbers. The name `apply_with` is fabricated — no function of that name exists in dep_seq.rs.

This makes the table unreliable as an implementation guide. An executor following it would look at the wrong functions and either apply the transform incorrectly or miss the actual write sites.

**Recommended fix**: Rewrite the dep_seq.rs row as:
```
| `dep_seq.rs` | 178, 246, 356, 378 | `append`, `remove`, `set_authored_status`, `append_string_array` |
```
Verify the enclosing function of every line in the table against the actual source at current HEAD."""
disposition = "design-wrong"
response = "Confirmed: dep_seq.rs function names are wrong. The table mis-assigns set_authored_status (at l.356, not 178), uses the non-existent name apply_with, and confuses remove (IO wrapper at 246) with remove_after (pure fn at 190). Fix: rewrite row as 'append, remove, set_authored_status, append_string_array'."

