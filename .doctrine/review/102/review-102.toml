[[finding]]
id = "F-5"
status = "verified"
severity = "minor"
title = "VT-6 map_server/routes.rs analysis is misleading — error message quality changes"
detail = """
**Expected**: VT-6 correctly assesses whether the error-wrapper changes preserve diagnostic quality.

**Observed**: The design claims `map_server/routes.rs:412` changes are fine because `e.to_string()` is valid for both `io::Error` and `anyhow::Error`. This is technically true but misses the qualitative difference:

- `io::Error::to_string()` returns the OS-level message (e.g. "No space left on device (os error 28)")
- `anyhow::Error::to_string()` returns the *outermost* context message only (e.g. "Failed to write temp /path/.x.12345.1.tmp"), dropping the chain

The `write_atomic` error chain carries both the OS cause AND the context. `e.to_string()` on the outer `anyhow::Error` gives only the context wrapper, not the underlying OS error. The existing `io::Error::to_string()` gives only the OS error. Neither is "full chain" — but changing from `io::Error` to `anyhow::Error` changes *which* fragment the user sees. This is a behavioral change, not a transparent one as the design implies.

**Recommended fix**: VT-6 should explicitly acknowledge this and either (a) confirm via manual testing that the MapServer is configured to chain errors properly, or (b) add a note that error detail *format* changes but no existing integration test asserts on it. Consider using `{:#}` format (full chain) in the MapServer error wrapper instead of bare `to_string()`."""
disposition = "fix-now"
response = "Accepted. VT-6 should note that io::Error::to_string() and anyhow::Error::to_string() give different message fragments. The behavioral change is cosmetic (no tests assert on format) but should be documented. Fix: add explicit note."

[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "relation.rs error transform loses error source detail vs current code"
detail = """
**Expected**: VT-6 honestly assesses whether `relation.rs:784,803` error context is preserved.

**Observed**: The current code at both sites:
```rust
std::fs::write(toml_path, next).map_err(|e| {
    anyhow::anyhow!("write {} after relation append: {e}", toml_path.display())
})?;
```
The `{e}` format captures the raw `io::Error` display (OS-level). After the transform:
```rust
crate::fsutil::write_atomic(toml_path, next.as_bytes())
    .with_context(|| format!("write {} after relation append", toml_path.display()))?;
```
The OS-level error is now nested inside the `anyhow` chain, not in the outer display string. To see it you'd need `{:#}` (alternate) display. The design says "Functionally equivalent" — this is true for `Result<(), Error>` semantics but the user-facing error format CHANGES. The design correctly notes "no existing tests assert on the error message format" but doesn't explicitly state the format change.

**Recommended fix**: Acknowledge the format change explicitly: "The outer error display format changes from `write path: {io_error}` to `write path` (OS cause now nested). No tests assert on error message strings. This is a cosmetic change, not a semantic one.""""
disposition = "fix-now"
response = "Accepted. The {e} display of io::Error becomes nested anyhow context. API-contract equivalent, display format changes. Fix: document the format change."

[[finding]]
id = "F-7"
status = "verified"
severity = "major"
title = "Design does not specify whether concept_map.rs:1491/1506 are in well-scoped or unwieldy functions"
detail = """
**Expected**: The design identifies the exact scope of each `std::fs::write` site so an executor knows which function to visit.

**Observed**: The concept_map.rs functions are named descriptively ("add-edge", "add-edge-force", "remove-edge", "rename-node") but these are NOT Rust function names. The actual enclosing context for lines 1491 and 1506 is a match arm deep inside what appears to be `run_add_edge` (or a similar public shell). The write at 1491 is in the `Ok(new_dsl)` arm and 1506 is in the `Err(DuplicateEdge) if force` arm — both are inside the same match block within the same function. The design's table implies they're two different functions.

An executor who searches for `fn add_edge` (not finding it) or `fn add_edge_force` (not finding it) will be confused. The table should use actual Rust function names.

**Recommended fix**: Trace the enclosing `pub(crate) fn` for each concept_map.rs write site and use the real function names. The non-force and force paths at 1491/1506 are in the same function — they should share one row in the table (or annotate that 1506 is a force-variant arm within the same fn)."""
disposition = "design-wrong"
response = "Confirmed. The concept_map.rs names are prose descriptions, not Rust identifiers. Fix: use actual function names (run_add_edge, run_remove_edge, run_rename_node)."

[[finding]]
