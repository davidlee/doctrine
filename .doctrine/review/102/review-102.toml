[[finding]]
id = "F-11"
status = "verified"
severity = "minor"
title = "Design never states the post-change write_atomic signature — assumes reader knows it"
detail = """
**Expected**: The design clearly states what changes and what stays the same in `write_atomic`.

**Observed**: The design says to "Add an AtomicU64 counter to write_atomic. Temp name changes from `.{name}.{pid}.tmp` → `.{name}.{pid}.{counter}.tmp`" but never restates the function signature. The existing signature is:
```rust
pub(crate) fn write_atomic(path: &Path, bytes: &[u8]) -> anyhow::Result<()>
```
The design doesn't confirm this stays the same (it does, the counter change is internal). An implementor wondering "does the signature change?" must infer the answer. This is minor — the §2 transform examples show the same `write_atomic(&path, ...)` call shape — but stating it explicitly costs one line and prevents ambiguity.

**Recommended fix**: Add to §2 Leaf tier: "The public signature of `write_atomic` is unchanged — only the internal temp-file naming adds a counter.""""
disposition = "fix-now"
response = "Accepted. Cost one line, prevents ambiguity. Fix: add 'Public signature unchanged' to §2 leaf tier."

[[finding]]
id = "F-12"
status = "verified"
severity = "minor"
title = "AtomicU64 counter initialisation is implicit — no new(0) mentioned"
detail = """
**Expected**: The design specifies the complete state needed for the AtomicU64 counter.

**Observed**: The design says "a single `static NEXT: AtomicU64` that `fetch_add(1, Relaxed)`s on every call" but doesn't specify the initial value. `AtomicU64::new(0)` is the standard initialisation, and 0 is the obvious choice, but it's an unstated assumption. While this is trivial for any Rust developer, the design's precision standard demands it be stated.

**Recommended fix**: Write "`static NEXT: AtomicU64 = AtomicU64::new(0)`" in the design."""
disposition = "fix-now"
response = "Accepted. Trivial but worth stating. Fix: write static NEXT: AtomicU64 = AtomicU64::new(0)."

[[finding]]
id = "F-13"
status = "verified"
severity = "minor"
title = "VT-2 concurrent test underspecified — no assertion on temp cleanliness for loser thread"
detail = """
**Expected**: VT-2 specifies a test that comprehensively validates concurrent `write_atomic` behavior.

**Observed**: VT-2 says "Two threads write_atomic the same file — both succeed, no panic, no stray temps." This is a good start but underspecified:
1. Does "both succeed" mean both return `Ok(())`? Even if one's content is "lost" (overwritten by the later rename)? Yes — the atomic rename means the last-to-rename wins, but both calls return `Ok(())`. The test should assert this explicitly.
2. "No stray temps" — is the assertion done after both threads join? Does it check that exactly ONE file (the target) and ZERO `.tmp` files remain?
3. What about the counter — does the test verify that both threads used distinct counter values (distinct temp names)? Not strictly necessary but would increase confidence.

**Recommended fix**: Expand VT-2 to specify: (a) both threads return `Ok(())`, (b) after join, exactly one target file exists and zero `.tmp` siblings, (c) the final content is one of the two written values (last-to-rename wins, which is non-deterministic)."""
disposition = "fix-now"
response = "Accepted. VT-2 should specify assertions on both-ok, no stray temps, final content is one of the inputs. Fix: expand VT-2."

[[finding]]
id = "F-14"
status = "verified"
severity = "minor"
title = "VT-5 clippy guard verification is manual-only — no automated negative test"
detail = """
**Expected**: VT criteria are automated where possible.

**Observed**: VT-5 splits into two parts: "`just check` zero-warn" (automated) and "Manual verification: introduce a bare `std::fs::write` in production code, confirm clippy fails" (manual). The manual part is one-shot human verification. But this could be automated: a test that shells out to `cargo clippy` on a synthetic source file with a `std::fs::write` call and asserts it FAILS. Even better: write a compile-fail test (trybuild / compiletest-rs) that confirms `#[deny(clippy::disallowed_methods)]` blocks `std::fs::write` in non-test code.

The manual verification will never be re-run and provides no ongoing confidence.

**Recommended fix**: Add an automated negative test — either a compile-fail test or a `cargo clippy` invocation test that confirms `std::fs::write` in a non-test context triggers the lint failure."""
disposition = "tolerated"
response = "Acknowledged. A compile-fail test or cargo-clippy invocation test would be ideal but is disproportionate for one lint guard. The manual verification + just check gate is adequate. The guard prevents backsliding; the manual test proves it works once."

[[finding]]
id = "F-15"
status = "verified"
severity = "major"
title = "Design does not map call sites to ADR-001 tiers or state which tier each write lives in"
detail = """
**Expected**: A design that touches 9 source files across all three ADR-001 tiers (leaf/engine/command) acknowledges the layering and confirms the change doesn't violate dependency direction.

**Observed**: ADR-001 states: "Dependencies point downward only: command → engine → leaf. Never upward." The design's 18 call sites span:
- **Leaf tier**: `fsutil.rs` (the seam itself — correct, `write_atomic` lives here)
- **Engine tier**: `dep_seq.rs`, `relation.rs`, `spec.rs`, `requirement.rs`, `integrity.rs`, `concept_map.rs`, `backlog.rs`
- **Command tier**: `main.rs`, `map_server/routes.rs`

The transform replaces `std::fs::write` (stdlib) with `crate::fsutil::write_atomic` (leaf). This is correct for ALL tiers — leaf is always reachable downward. But the design never states this, never maps modules to tiers, and never confirms the new import edge `use crate::fsutil::write_atomic` in engine/command modules does not violate ADR-001.

An executor must infer tier-correctness. Worse, a reviewer has no explicit tier analysis to check.

**Recommended fix**: Add a §2.1 "Tier analysis" subsection mapping each file to its ADR-001 tier and confirming the `crate::fsutil` import is a valid downward dependency for every module."""
disposition = "fix-now"
response = "Accepted. Valid architectural concern. Fix: add §2.1 Tier analysis mapping each file to ADR-001 tier and confirming crate::fsutil import is valid downward dependency."

