[[finding]]
id = "F-18"
status = "verified"
severity = "minor"
title = "Design treats concept_map.rs:1491 and 1506 as separate writes but both are duplicate-edge handling, not distinct functions"
detail = """
**Expected**: The call-site table correctly identifies distinct production code paths.

**Observed**: concept_map.rs lines 1491 and 1506 are NOT two independent write sites — they are two arms of the SAME `match add_edge_to_dsl(...)` expression. The `Ok(new_dsl)` arm (1491) handles normal add-edge; the `Err(DuplicateEdge) if force` arm (1506) handles force-overwrite. Both write the same file with the same `set_dsl` → `std::fs::write` pattern. Counting them as two separate rows inflates the site count and implies structural independence that doesn't exist.

Conceptually this is ONE write site with TWO code paths reaching it. A future maintainer who adds a new mutation path here would need to convert only one pattern.

**Recommended fix**: Merge lines 1491 and 1506 into a single row: `concept_map.rs | 1491, 1506 | <fn_name> | add-edge (normal + force paths in same function)`. Or at minimum note that both are within the same enclosing function."""
disposition = "design-wrong"
response = "Subsumed by F-8. Lines 1491 and 1506 are two arms of the same match in the same function. Merge rows."

[[finding]]
id = "F-19"
status = "verified"
severity = "nit"
title = '§5 guarantee scope says "no fsync" but does not state the implication for power-loss during rename'
detail = """
Expected: The guarantee scope clearly distinguishes what IS guaranteed from what IS NOT, with the rationale for the gap.

Observed: §5 states "Not guaranteed: power-loss durability (no fsync)" but doesn't explain the mechanism. The risk is:
1. Temp file written to disk (may be buffered in page cache)
2. rename(old, new) — atomic on a single filesystem, but...
3. Without fsync on the temp file BEFORE the rename, a power loss after the rename could lose the temp's data blocks from the journal because the filesystem may have reordered the rename before the data write hit stable storage.

The "Not guaranteed" is honest, but a reader unfamiliar with filesystem semantics might think "rename is atomic so it's fine" — missing the pre-rename durability gap. The design's brevity here could lead an implementor to falsely believe power-loss only means "might lose the write," when actually it could mean "target becomes a zero-length or partially-written file" (the rename committed but the data blocks didn't).

This is acceptable for authored entity files (git tracks the content; no in-flight write is unrecoverable) but the design should say so.

Recommended fix: Expand: "Not guaranteed: power-loss durability (no fsync on the temp file before rename — a crash after rename could leave a zero-length or partial target since the data blocks may not have reached stable storage). This is acceptable for authored entity files (git tracks the content; no in-flight write is unrecoverable).""""
disposition = "fix-now"
response = "Accepted. The missing-fsync-after-rename risk is real but acceptable for authored files under git. Fix: expand §5 to explain the mechanism and why it is acceptable."

