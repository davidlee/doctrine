[[finding]]
id = "F-10"
status = "verified"
severity = "minor"
title = 'VT-6 says "Functionally equivalent" for relation.rs transform but format change is not equivalent'
detail = """
**Expected**: VT-6 correctly characterizes the behavioral impact of the relation.rs error wrapper change.

**Observed**: VT-6 says the `relation.rs` transform is "Functionally equivalent" — this is too broad. The `Result` type stays `anyhow::Result<()>` — so at the type level and the Error trait level, it IS functionally equivalent. But the display format changes: `{e}` (io::Error display) becomes nested context. "Functionally equivalent" conflates two axes: the API contract (yes, equivalent) and observability (no, format changes). The design later hedges with "no existing tests assert on the error message format" but this hedge comes AFTER the "Functionally equivalent" claim, not as part of it.

**Recommended fix**: Split into two statements: "API-contract equivalent — same `anyhow::Result<()>` return. Display format changes — OS error details move from outer string to nested chain. No tests assert on error message format.""""
