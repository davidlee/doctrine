detail = "ISS-003 (open, slices: SL-036): 'explain() foreign node id returns singleton chains, rustdoc says empty paths.' SL-043 reshaped paths→predecessors entirely. Observed: cone_on_overlay (query.rs) returns {node:{}} for a foreign/unknown node (predecessors empty ⇒ lone endpoint) — structural analog of the old [[n]] singleton; the new rustdoc (lib.rs:267-268) describes the predecessor cone and no longer claims 'empty paths', so ISS-003's doc-vs-behaviour framing now references a field that no longer exists. Out of SL-043 scope (complexity, not foreign-node semantics), but the surface ISS-003 cites changed — rescope ISS-003 against the predecessors() contract."
disposition = "follow-up"
response = "Out of SL-043 scope (the reshape targeted complexity, not foreign-node semantics) but the surface ISS-003 cites was changed by it. ISS-003 already exists as the owned backlog item (no new item — avoid duplication); it needs rescoping against the predecessors() contract: the doc-vs-behaviour framing references a 'paths' field that no longer exists, while the underlying foreign-node-as-lone-endpoint behaviour persists as {node:{}}. Left open, flagged for rescope."

