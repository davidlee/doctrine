[[invariant]]
text = "paths.rs imports no clap types and no command-tier modules (ADR-001 engine tier)."

[[invariant]]
text = "Exclusion filter excludes dot-prefixed files, editor temporaries (#/~/.swp), and known artifacts (.orig/.bak)."

[[invariant]]
text = "Selector logic: no selector = all files; any selector present = only selected classes; --single truncates per ref."

[[invariant]]
text = "Canonical output order: identity TOML → identity MD → other files lexicographically sorted."

[[invariant]]
text = "Output lines are root-relative, one per line, no table/JSON/headers/grouping labels."

[[invariant]]
text = "Multi-ref splats preserve input order; invalid ref yields non-zero exit and empty stdout (no partial output)."

[[invariant]]
text = "Every in-scope kind (13 total) accepts --toml/-t, --md/-m, --entity/-e, --single/-s selectors."

[[invariant]]
text = "Existing show suites for all 13 kinds stay green unchanged."

[[invariant]]
text = "concept-map show --json produces identical output to --format json."

[[risk]]
text = "ADR-001 layering.toml must register paths in the engine tier; omission would fail the architecture_layering test."

[[risk]]
text = "Each kind has its own identity file naming convention; per-kind wiring could diverge from the design's expected identity paths."
