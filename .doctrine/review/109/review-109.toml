title = "design.md code-sketch for drop_owned_hooks diverges from implemented signature"
detail = "design.md §Code-impact (L191/L216/L248) sketches `drop_owned_hooks(arr, &owned)` taking the precomputed owned (ei,hi) positions slice. Implementation (src/boot.rs:924) is `drop_owned_hooks(arr: &mut Vec<Value>, is_ours: fn(&str)->bool)` — it re-filters each entry's hooks by ownership via retain_mut rather than threading positions. Behaviourally identical (same hooks removed, same empties dropped, all entry-level keys preserved per D4/m1) and cleaner (no index threading, no descending-index surgery). Divergence is design-prose vs code only; the invariant and order-bound are unaffected."
disposition = "verified"
response = "Confirmed observation; remediation is a per-slice direct edit delegated to /reconcile — update the design.md drop_owned_hooks code-sketch (L191/L216/L248) to the implemented `(arr, is_ours: fn(&str)->bool)` signature + retain_mut filter/rebuild. Recorded in the Reconciliation Brief (per-slice direct edit). No code change: impl is behaviourally equivalent and cleaner."

