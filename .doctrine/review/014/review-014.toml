disposition = "tolerated"
response = "Consciously accepted: slice->slice lineage ('extends') is not an established doctrine relation — supersedes covers replacement, and one historical freestyle key (SL-054) is not evidence of a vocabulary gap. Prose is the correct home for an unrepresentable relation; the typed table was the defect, not its absence. Adding a label is an ADR-010 amendment, out of SL-058 scope. If slice-lineage recurs, that recurrence is the backlog trigger."

