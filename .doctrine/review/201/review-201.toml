[[finding]]
id = "F-1"
status = "open"
severity = "blocker"
title = "Fail-closed exec (D-reg/§5.4): EXPECTED the plugin hooks.json to carry a resolved absolute doctrine path; OBSERVED the chosen seam is a verbatim bare-PATH byte-copy — the preferred path ships fail-OPEN, the exact RSK-014 hole RV-200 F-2 thought it closed."
detail = """D-reg states (design.md:381-389) "register via the plugin hooks.json ... invoking a resolved absolute doctrine (fail-closed exec, RV-200 F-2 — NOT bare PATH)", and §5.4:242-255 names "the resolve_exec path already named in §5.1/D1" as the mechanism. Cross-examined against the seam, this guarantee is FALSE for the chosen path. `install_hooks_plugin_for_claude` does `PluginAssets::get("doctrine/hooks/hooks.json")` → `write_atomic` — a verbatim RustEmbed byte-copy with NO templating (src/skills.rs:1046-1049). The embedded asset hardcodes bare `doctrine boot --emit` and `doctrine worktree create-fork` (plugins/doctrine/hooks/hooks.json:7,18). `resolve_exec` (src/boot.rs:453) is invoked only by the settings.local/boot.rs bake sites and the corpus/install/status sites — NEVER by the plugin materialization. So on the PREFERRED (plugin) path the registration resolves to a bare PATH `doctrine` — and per hooks.md:629-643 only exit-2 blocks, so a stale/missing `~/.cargo/bin/doctrine` predating this subcommand runs the tool UNCONFINED. The fail-closed property holds ONLY on the settings.local FALLBACK (which does bake resolve_exec); the design's headline registration inherits the very fail-open it claims to have sealed. The design also leaves the mechanism unresolved: "absolute path OR exit-2 shim" — neither is wired, and "what writes/embeds the shim" is unanswered (a shim would be a new embedded PluginAssets file materialized by new install logic). PENANCE before /plan: decide ONE mechanism — either template the embedded hooks.json command through `resolve_exec` inside `install_hooks_plugin_for_claude` at materialization time, or embed+materialize a checked-in shim and name what invokes it — and strike the false "resolve_exec already provides this" framing. Let the false guarantee burn; the floor that holds shall remain."""

[[finding]]
id = "F-2"
status = "open"
severity = "major"
title = 'Capture-before-remove (§5.4): EXPECTED the design to commit to a hook that is awaited before teardown; OBSERVED it leads with WorktreeRemove — a fire-and-forget hook with NO decision control — while demoting SubagentStop, the only blocking-capable capture point, to a parenthetical "and/or".'
detail = """§5.4:291-302 names the capture hook as "a doctrine WorktreeRemove (and/or SubagentStop) hook", and OQ-2 (§5.4:304-310, OQ §6) gates the whole funnel on "does the WorktreeRemove hook reliably run, with the worktree still on disk, before git worktree remove completes?". The authoritative cache contradicts the choice of lead hook: WorktreeRemove has NO decision control and "Failures are logged in debug mode only" (hooks.md:680, :814, :2442) — it is a side-effect-only event; nothing in the docs states Claude AWAITS it before running `git worktree remove`, so capture on that path is inherently racy. SubagentStop, by contrast, "Prevents the subagent from stopping" (hooks.md:658) — it is blocking-capable and therefore the hook process is awaited to completion at the stop boundary; it also receives `agent_id` + `agent_transcript_path` (hooks.md:1930-1957), exactly what a capture needs. The design bets the funnel on the weaker hook and buries the live race behind the OQ-2 gate. The capture mechanism CAN be made sound — but only by COMMITTING to SubagentStop as the primary capture point (WorktreeRemove demoted to cleanup), and reframing OQ-2's abort criterion around the blocking hook. The defined-abort-to-IDE-024 keeps this from being fatal (hence major, not blocker), and the gate IS testable pre-execute (spawn one isolation:worktree subagent; a SubagentStop hook attempts `git -C <wt> diff` and writes a sentinel; observe tree-intact). PENANCE: lead with SubagentStop; state the WorktreeRemove-vs-git-remove ordering as unproven, not assumed; pin the abort test to the blocking hook."""

[[finding]]
id = "F-3"
status = "open"
severity = "major"
title = """Scope split-brain: EXPECTED slice-182.md objective 3 to mirror locked D2/D6 (worktree-name keying, per-arming, extra_rw+network); OBSERVED it still preaches the repudiated agent_id keying, "per-worker", extra_ro, and strict/loose — and RV-200 F-4's "scope doc corrected" is therefore a false attestation."""
detail = """RV-200 F-4 reconcile AND design §10:520 both attest "scope doc corrected" for the stale agent_id keying. Cross-examined, the correction is INCOMPLETE: slice-182.md objective 3 (lines 47-50) still reads "tune a run's jail (extra rw/ro binds, network, strict/loose) and correlate that config with the *specific* worker. The binding key exists (`agent_id` and/or `cwd`==worktree). The orchestrator ... declares per-worker policy". Every clause contradicts the locked design: `extra_ro` and `strict/loose` were DROPPED by D6 (design.md:390-392); `agent_id` keying was repudiated as impossible by D2/F-4 (design.md:362-370); "per-worker"/"specific worker" was corrected to per-arming granularity by F-1 (design.md:199-221). The slice's own "Design decisions (locked in /design)" block WAS updated to worktree-name/per-arming keying — so the scope doc is internally split-brained: a current decisions block atop a stale objectives block. This is not cosmetic — objective 3 states a broader product contract (per-worker concurrent tuning on the claude arm) than the locked design can build, and an attestation of completion that the artifact contradicts is itself a heresy. PENANCE before /plan: rewrite slice-182.md objective 3 to the locked schema (worktree-name key, per-arming granularity, extra_rw+network only), and make the §10/RV-200 "scope doc corrected" claim true."""

[[finding]]
id = "F-4"
status = "open"
severity = "major"
title = 'Shared-profile safety (§5.3): EXPECTED the "no differing-sibling to leak" / "must not interleave a second arming" claims to rest on an enforceable contract; OBSERVED they rest on unspecified machinery — no declared profile file, no atomic pairing with `base`, and a create-fork provision step that does not exist in code.'
detail = """§5.3:199-232 rests the F-1 reconcile on two safety claims: (a) "every worker provisions from the same declaration ... no second intent for a sibling's profile to cross-contaminate", and (b) "the arm → spawn → create-fork-provision sequence is the named critical section; it must not interleave a second arming". Both are ASSERTED, not grounded. (1) The declaration the create-fork provisioner reads is never given a path, schema, or atomicity contract with `base`. The arming seam writes only `base`, idempotently overwritten on re-arm (dispatch-agent/SKILL.md:23-25; src/dispatch.rs:200-206). The design says the orchestrator "pre-declares the intended policy to a deterministic location alongside the `base` file" but never names that file nor specifies that base+profile are written/read atomically — a B→B′ re-arm that rewrites `base` could leave a stale profile, or vice versa. (2) The provision step itself is NET-NEW and unbuilt: `classify_create` (src/worktree/create.rs:166-187) yields only `Fork`/`Passthrough` and writes nothing under `jail/` — there is no provisioning today. (3) "must not interleave" is the safe property and it IS structurally true (the claude Agent call blocks until the worker completes, and a parallel batch issued in one turn blocks until ALL complete, so the single-threaded orchestrator has no turn to re-arm mid-batch) — but the design grounds it in "discipline" / a "named critical section" rather than in the blocking-call structure that actually enforces it. The per-arming MODEL is sound (acquitted); the MACHINERY is under-specified. PENANCE: name the declaration file + its atomic pairing/lifecycle with `base` and its GC; state the create-fork provision step as net-new touch; re-ground "no second arming" in the blocking-orchestrator structure, not asserted discipline."""

[[finding]]
id = "F-5"
status = "open"
severity = "minor"
title = "Vestigial resolve_exec (§5.1/D1): EXPECTED the surgery that relocated the fail-closed-exec fix to install-time to scrub the runtime layer; OBSERVED §5.1 and D1 still list resolve_exec as a responsibility of the runtime pretooluse.rs thin shell — the wrong layer, contradicting §5.4."
detail = """§5.1:85-86 lists the `pretooluse.rs` thin shell's responsibilities as "(... bwrap-presence probe, policy-file read, resolve_exec)", and D1 (§7:358-360) says the subcommand "reuses worktree resolution + resolve_exec". But after RV-200 F-2 relocated the fail-closed-exec fix to registration/materialization time (§5.4:242-255), resolve_exec has NO runtime role in pretooluse.rs: at hook-exec the binary is already running, so `resolve_exec` (which resolves `current_exe()`, src/boot.rs:453-456) would merely re-derive the running binary's own path — useless for preventing the command-not-found/stale-binary fail-open, which occurs BEFORE pretooluse can run at all. This is leftover scar tissue from the pre-F-2 "bare exec on PATH, resolve_exec" draft that §5.4 explicitly superseded. It risks misdirecting /plan into wiring the fix in the runtime layer. This finding is the coherence twin of F-1 (same exec story). PENANCE: strike resolve_exec from §5.1's pretooluse.rs responsibility list and from D1's "reuses"; the only resolve_exec relevant to this slice is the install-time materialization named in F-1."""

