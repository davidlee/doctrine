id    = 84
slug  = "sl-105-audit-conformance-review"
title = "SL-105 audit conformance review"
# no status — a review's status is DERIVED from its findings (ADR-007 D-C8), so
# it is never stored (the storage rule forbids derived data in authored files).

[review]
facet     = "implementation"     # scope|design|plan|phase-plan|implementation|code-review|reconciliation
raiser    = "raiser"
responder = "responder"

[target]                   # the outbound `reviews` edge (ADR-004): RV-NNN ──reviews──▶ <ref>
ref   = "SL-105"

# Reconciliation outcome appended at reconcile (2026-06-19). Findings unchanged
# (F-1 stays `verified`/`acknowledged` — remediation is recorded here, not by
# mutating the finding disposition, per the reconcile skill).

[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "VA-1 pending: manual prune sweep of 15 dangling overrides"
detail = "PHASE-03 EX-5 / VA-1: Requires human verification — run 'doctrine backlog after <SRC> --prune' against all 12 affected items (IMP-095, IMP-028, IMP-023, IMP-008, IMP-033, IMP-064, IMP-044, IMP-035, IMP-037) then confirm 'doctrine backlog list' footer has zero 'overrides:' lines. All other criteria (VT-1 through VT-5 for all phases, EX-1 through EX-7) are verified: 28/28 dep_seq tests, 14/14 E2E goldens, clippy clean."
