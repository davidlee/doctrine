Expected: every phase that converts a .js → .ts file should carry a VT: 'eslint --max-warnings=0 passes (module.ts has zero warnings).' At minimum, PHASE-00 should gate on eslint config creation, and PHASE-10 (integration) should gate on full-project eslint.

Observed: 13 phases, 26 verification items (VT/VA/VH). Every VT says some form of 'tsc --noEmit passes (module.ts has zero errors).' Zero VTs mention eslint. The verification taxonomy has room — VT-1 in each phase could be split into VT-1a (tsc) and VT-1b (eslint), or a new VT added.

Risk: an LLM agent executing phase-by-phase checks every tsc VT, sees them all green, and moves on — the lint gate is never checked because it was never demanded."""
disposition = "fix-now"
