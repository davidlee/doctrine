F-5 (major): Verification gates must include eslint VTs. Concrete remediation:

For each phase that produces or modifies a .ts file (PHASE-00 through PHASE-10), add a VT:
  VT-N: 'eslint . --max-warnings=0 passes (module.ts has zero warnings).'

Specifically:
- PHASE-00: VT-4 (eslint on scaffold — no .ts content yet, config exists)
- PHASE-01 through PHASE-09: add VT-Nb ('eslint passes on <module>.ts')
- PHASE-10: VT-1 should read 'eslint . --max-warnings=0 passes (all .ts files, zero warnings)' alongside the existing tsc VT

The plan.md Sequencing section should note that each phase verifies both tsc --noEmit AND eslint --max-warnings=0 before deleting the .js original."""

[[finding]]
