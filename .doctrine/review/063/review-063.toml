[[finding]]
id = "F-1"
status = "verified"
severity = "blocker"
title = "ESLint entirely absent from plan — no typed lint gate exists for the TypeScript migration"
detail = """
Expected: the plan must specify an ESLint configuration with typescript-eslint strictTypeChecked + stylisticTypeChecked rules, added as a devDependency in PHASE-00 (scaffold), with verification items asserting eslint --max-warnings=0 passes at each phase gate. Every leaf-to-root conversion phase should carry a VT: eslint passes with zero warnings.

Observed: The plan's 13 phases (PHASE-00 through PHASE-12) mention tsc --noEmit 13 times, vite/vite.config.ts 7 times, bun 5 times, and cargo 12 times. ESLint appears zero times. The word 'lint' does not appear in plan.toml or plan.md. No phase adds eslint, typescript-eslint, @eslint/js, or globals. No verification item gates on eslint. The scaffold phase (PHASE-00) lists devDeps: vite + typescript only — no eslint packages.

Evidence: plan.toml — 13 phases, 0 mentions of 'eslint' or 'lint'. plan.md — same. design.md — mentions tsc --noEmit 8 times, never eslint. The verification chain is tsc --noEmit → bun run dev/bun run build → just gate → manual smoke. Every step in this chain is blind to: any-widening, unsafe-* member access, floating promises, misused promises, import/export drift, stale globals, innerHTML writes, JSX creep, and switch exhaustiveness — all failure modes LLMs routinely introduce in TS migrations.

This is a blocker: without a lint gate, the plan permits code that compiles but carries silent architectural corruption past every verification checkpoint."""
disposition = "fix-now"
response = """
F-1 (blocker): Plan must be revised to include ESLint in the verification chain. Concrete remediation:

1. Add to plan.md §Sequencing: a note that PHASE-00 scaffold MUST include eslint.config.js creation with typescript-eslint strictTypeChecked + stylisticTypeChecked rules.
2. Add to plan.toml PHASE-00: 
   - EN criteria: add 'EN-3: eslint.config.js design locked (ruleset specified in user-provided config).'
   - EX criteria: add 'EX-9: eslint.config.js exists with JS legacy block + TS strict block (per user specification).'
   - VT: add 'VT-4: eslint . --max-warnings=0 passes (legacy .js files pass their block; empty src/ passes TS block).'
3. Add eslint, typescript-eslint, @eslint/js, globals to PHASE-00 devDependencies list.
4. Add eslint VT to every conversion phase (PHASE-01 through PHASE-10): 'VT-N: eslint --max-warnings=0 passes (module.ts has zero warnings).'
5. Define eslint.config.js as specified by user: flat config, js.configs.recommended + tseslint.configs.strictTypeChecked + tseslint.configs.stylisticTypeChecked, per-file overrides for legacy .js and new .ts.
6. Reference the full user-provided config as the canonical eslint ruleset.

The config must include all LLM-damage-containment rules: no-explicit-any, no-unsafe-*, no-floating-promises, no-misused-promises, switch-exhaustiveness-check, strict-boolean-expressions, consistent-type-imports, await-thenable, require-await, return-await, and reportUnusedDisableDirectives: error. Plus restricted-syntax bans for innerHTML/outerHTML/insertAdjacentHTML/eval/new Function/JSXElement/window.* assignment, and no-restricted-globals for bare event."""

[[finding]]
id = "F-2"
status = "verified"
severity = "blocker"
title = "tsconfig insufficiently hardened — missing noUncheckedIndexedAccess, verbatimModuleSyntax, exactOptionalPropertyTypes, noImplicitOverride, noImplicitReturns, useUnknownInCatchVariables, skipLibCheck: false"
detail = """
Expected: tsconfig.json must include noUncheckedIndexedAccess: true, verbatimModuleSyntax: true, exactOptionalPropertyTypes: true, noImplicitOverride: true, noImplicitReturns: true, useUnknownInCatchVariables: true, skipLibCheck: false — in addition to strict: true, moduleResolution: bundler, target: ES2020. These close holes that strict alone does not cover.

Observed: The design says 'strict, moduleResolution bundler, target es2020.' The plan inherits this by reference and never specifies the tsconfig. Even the design's phrasing is the minimum — it omits noUncheckedIndexedAccess (protects against undefined reads on sparse arrays/Records), verbatimModuleSyntax (prevents import elision side-effects), exactOptionalPropertyTypes (prevents undefined-vs-missing confusion), noImplicitOverride (catches missing override on subclass methods), noImplicitReturns (catches code paths that fall off), useUnknownInCatchVariables (catches typed catch clauses that shouldn't compile), and skipLibCheck: false (validates vendor type declarations, not just our own).

Risk without these: (1) Record<> access with noUncheckedIndexedAccess off → T[K] typed as T[K], not T[K]|undefined — silent undefined propagation; (2) verbatimModuleSyntax off → import { type Foo } elided silently, side-effect imports lost; (3) exactOptionalPropertyTypes off → { x?: string } accepts { x: undefined }; (4) skipLibCheck: true (TypeScript default when project references used) → vendor type errors hidden.

Blocker: these are not style preferences; they are correctness gates that prevent entire classes of runtime errors from reaching production."""
disposition = "fix-now"
response = """
F-2 (blocker): Plan must specify the full tsconfig.json compilerOptions set. Concrete remediation:

Add to plan.toml PHASE-00 EX-2: specify the exact tsconfig.json content — not just 'strict, moduleResolution bundler, target es2020.' The minimum hardening set:

{
  compilerOptions: {
    target: 'ES2020',
    module: 'ESNext',
    moduleResolution: 'bundler',
    lib: ['ES2020', 'DOM', 'DOM.Iterable'],
    strict: true,
    noImplicitOverride: true,
    noUncheckedIndexedAccess: true,
    exactOptionalPropertyTypes: true,
    noImplicitReturns: true,
    noFallthroughCasesInSwitch: true,
    noUnusedLocals: true,
    noUnusedParameters: true,
    useUnknownInCatchVariables: true,
    verbatimModuleSyntax: true,
    isolatedModules: true,
    allowJs: false,
    checkJs: false,
    skipLibCheck: false
  },
  include: ['src/**/*.ts', 'vite.config.ts']
}

Design.md should also be updated to reference this full set rather than the abbreviated 'strict, moduleResolution bundler, target es2020.' (Or the plan can carry the detail; the plan's authority over implementation detail is established.)"""

[[finding]]
id = "F-3"
status = "verified"
severity = "major"
title = "package.json scripts undefined — missing lint gate in build chain"
detail = """
Expected: package.json scripts must define:
- "lint": "eslint . --max-warnings=0"
- "typecheck": "tsc --noEmit"
- "build": "bun run typecheck && bun run lint && vite build"
- "dev": "vite"

This chains typecheck → lint → build so a single 'bun run build' gates on both correctness checks before producing output. 'bun run lint' must be usable standalone for fast inner-loop feedback.

Observed: The plan references 'bun run build' and 'bun run dev' but never defines the scripts. PHASE-00 exit criteria say 'package.json exists with correct dependencies and scripts' but 'scripts' is never specified. The current package.json at web/map/ (if it exists) has no scripts section defined.

Risk: without explicit script definitions, an implementer writes 'build: vite build' and the lint/typecheck gates are never run."""
disposition = "fix-now"
response = """
F-3 (major): Plan must specify package.json scripts explicitly. Concrete remediation:

Add to plan.toml PHASE-00 exit criteria EX-1 (or a new EX): specify the scripts section:

{
  scripts: {
    lint: 'eslint . --max-warnings=0',
    typecheck: 'tsc --noEmit',
    build: 'bun run typecheck && bun run lint && vite build',
    dev: 'vite'
  }
}

The 'build' script MUST chain typecheck → lint → vite build (lint before build, not after). The 'lint' script MUST use --max-warnings=0 so warnings are errors. Update plan.md PHASE-00 description to note the script chain."""

