[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "Stale design-target selectors: .agents/skills/… vs actual plugins/doctrine/skills/…"
detail = "Expected: slice conformance shows the two edited SKILLs as conformant. Observed: `slice conformance 156` reports 2 undelivered (`.agents/skills/dispatch-subprocess/SKILL.md`, `.agents/skills/worktree/SKILL.md`) and the actual edits as undeclared (`plugins/doctrine/skills/dispatch-subprocess/SKILL.md`, `plugins/doctrine/skills/worktree/SKILL.md`). Root cause: the design-target selectors (and design.md §5.2 prose) cite the pre-SL-152 path `.agents/skills/…`, which no longer exists; the repo migrated skills to `plugins/doctrine/skills/…`. The edits themselves are correct and design-anticipated (§5.2 + EAP-4 name both SKILLs). This is a selector/prose path-drift artifact, not a code defect — it accounts for 4 of the conformance algebra cells."
disposition = "verified"
response = "Observation confirmed; remediation delegated to /reconcile (per-slice direct edit). The edits are correct and design-anticipated — only the design-target selectors + design.md §5.2 prose carry the stale pre-SL-152 `.agents/skills/…` path. Reconciliation brief → Per-slice: update the two SKILL selector paths to `plugins/doctrine/skills/…` so conformance reads conformant. No code change."

[[finding]]
id = "F-2"
status = "verified"
severity = "minor"
title = "EX-3 memory-triage paths undeclared in design-target selectors"
detail = "Expected: the EX-3 memory-triage deliverables fall inside a design-target selector. Observed: 11 `.doctrine/memory/items/…` edits (10 supersede + successor + orientation coherence fix) plus `.doctrine/slice/156/notes.md` appear as undeclared in `slice conformance 156`. The work is correct and matches plan EX-3 / design §5.2 scope-item-2 + OQ-3; the design-target selectors simply did not enumerate `.doctrine/memory/items/`. notes.md is expected-undeclared (authored progress narrative). Selector-coverage gap, not scope creep."
disposition = "verified"
response = "Observation confirmed; same selector-hygiene class as F-1, delegated to /reconcile (per-slice direct edit). The EX-3 triage is correct per plan; the design-target selectors omit `.doctrine/memory/items/`. Reconciliation brief → Per-slice: extend selectors to cover the memory-triage path (or accept as authored-progress noise). notes.md remains expected-undeclared. No code change."

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "PHASE-04 committed successor memory uid dir without its key-alias symlink"
detail = "Expected: the successor memory `mem.fact.build.in-tree-per-worktree-target` (uid mem_019f026cffd27a43b8db3cf6728130b5, recorded in PHASE-04 commit 70e6d3d7) carries a key-alias symlink under `.doctrine/memory/items/`, like every other item. Observed: 70e6d3d7 committed only the uid dir (memory.toml + memory.md); the `mem.fact.build.in-tree-per-worktree-target -> mem_019f026…` alias was left untracked. Without it, `memory show`/`retrieve` by key would miss the successor. Remediated during audit land: committed the alias on the fork before merge (so it landed in 79b1ee21)."
disposition = "fix-now"
response = "Fixed within audit scope: committed the missing `mem.fact.build.in-tree-per-worktree-target -> mem_019f026…` key-alias symlink on the fork before the land, so it merged to edge in 79b1ee21. `memory show`/`retrieve` by key now resolve the successor. Verified present and tracked post-merge."

[[finding]]
id = "F-4"
status = "verified"
severity = "major"
title = "Close gate deferred: REV-011 (ADR-008 D-B1/D-B5) apply + VT-1/VT-2/VH-1 post-relaunch"
detail = "Expected: the slice's substantive acceptance — final `<wt>/target` semantics on both arms (VT-1/VT-2) and the ADR-008 mechanism amendment (REV-011) — is discharged. Observed (correctly, by design R5/§8): the flake `set-env` change is launch-time and inert in this session (jail has no nix, `mem.fact.jail.nix-absent-no-flake-eval`); CARGO_TARGET_DIR is still the shared jail export in-session (confirmed: =/home/david/.cargo/doctrine-target-jail). In-session proof is the `.env_remove` simulation + the fork's recorded green gate (PHASE-03: 2589 unit + all worktree suites green, clippy clean). VH-1 (final semantics post jail-relaunch) + REV-011 (proposed; approve+apply revising ADR-008 D-B1 mechanism + D-B5) are reconcile/close work. Routed to the reconciliation brief, NOT raised as an RV blocker (a blocker would refuse the audit→reconcile transition the brief itself requires)."
disposition = "verified"
response = "Observation confirmed and correct by design (R5/§8). Remediation delegated to /reconcile + /close. Reconciliation brief → Governance/spec (REV): approve+apply REV-011 (revises ADR-008 D-B1 mechanism + D-B5 — the flake removal IS the mechanism; POL-002 the forcing function). VH-1 (final `<wt>/target` semantics, both arms) discharges post jail-relaunch at reconcile/close — not in-session (flake set-env is launch-time; nix absent in jail). In-session evidence: `.env_remove` simulation + fork's recorded green gate. Deliberately NOT an RV blocker so audit→reconcile stays open."

