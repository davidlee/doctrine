title = "Conformance: 3 undeclared touch-paths missing from design-target selectors"
detail = """
`doctrine slice conformance 164` reports 3 undeclared paths:
- `install/boot-footer.md` — PHASE-03 boot footer update
- `src/boot.rs` — PHASE-01 added `&mut io::stdout()` to 4 `run_record` call sites (2619, 2876, 2965, 3122)
- `src/retrieve.rs` — PHASE-01 added `&mut io::stdout()` to `run_record` call site (2945)

All three are legitimate touches documented in the design's impact table. The design-target selectors should be updated to include them."""
disposition = "fix-now"
response = "Add `install/boot-footer.md`, `src/boot.rs`, and `src/retrieve.rs` to the slice's design-target selectors. All three were documented in the design's impact table — the selectors lagged."

