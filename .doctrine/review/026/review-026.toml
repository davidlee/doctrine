id    = 26
slug  = "sl-040-code-review-rv-review-ledger-kind-and-review-verb-family"
title = "SL-040 code-review: RV review-ledger kind and review verb family"
# no status — a review's status is DERIVED from its findings (ADR-007 D-C8), so
# it is never stored (the storage rule forbids derived data in authored files).

[review]
facet     = "code-review"     # scope|design|plan|phase-plan|implementation|code-review|reconciliation
raiser    = "code-review agent (claude)"
responder = "SL-040 author"

[target]                   # the outbound `reviews` edge (ADR-004): RV-NNN ──reviews──▶ <ref>
ref   = "SL-040"

[[finding]]
id = "F-1"
status = "verified"
severity = "blocker"
title = "F-1: DRY loss — ten sha256 call sites across review.rs vs one sha256_hex in contentset.rs"
detail = "The design (D3) says sha2 duplication is trivial and accepted at two call sites. In practice there are ten sha256 calls in review.rs via `crate::git::sha256` plus `contentset::sha256_hex`. These are not the same function. `git.rs` is an impure seam; `contentset.rs` is a pure leaf. The duplication means: (a) altering the hash algorithm would require touching ten call sites across three files, (b) the pure leaf and the impure shell each own a hasher for the same algorithm, (c) the naming is inconsistent (`sha256` vs `sha256_hex`). Recommend hoisting a `pub(crate) fn sha256(bytes: &[u8]) -> String` into a crate-internal one-liner (or exposing `contentset::sha256_hex` as `pub(crate)` under a better name) and having `git.rs` delegate to it."
disposition = "aligned"
response = "Blocker grade overcounts. Two hash impls exist, not ten: git::sha256 (impure seam) and contentset::sha256_hex. The second is a DELIBERATE D3/ADR-001 decision — comment at contentset.rs:154-155: 'Owned directly (D3) so the leaf does not depend on the impure git.rs seam.' Hoisting a shared sha256 into git.rs and having the pure leaf delegate would invert ADR-001 layering (pure leaf → impure shell), the exact coupling D3 avoided. review.rs has 4 production call sites (1219/1264/1275/1863), all delegating to the single git::sha256 — DRY-correct; the 'ten' figure counted comments + test sites. Residual naming unification (sha256 vs sha256_hex) and any genuine consolidation tracked by IMP-025 (promote content-hashed-path-set to a shared primitive). Not a gating defect; SL-040 is done."

[[finding]]
id = "F-2"
status = "verified"
severity = "major"
title = "F-3: parse_finding_status defaults unknown values to Open — silent data loss"
detail = """`parse_finding_status` treats any unrecognized status string (e.g. `"verfied"` — a typo) as `Open`. This is used by `ReviewDoc::finding_states()` (show/list/status), `finding_status_of` (the verb gate), and `doc_unresolved_blockers` (close-gate). A hand-edited toml with a typo produces zero diagnostics: the review stays Active forever with no indication something is wrong. The write path can never produce garbage (controlled by `apply_transition`), but the read path silently accepts it. Recommend: either hard-error on unknown status with a clear diagnostic, or at minimum emit a stderr warning. The conservative-read stance is correct in intent (don't silently close the review) but wrong in execution (erase evidence of corruption)."""
disposition = "follow-up"
response = "Real but minor; routed to CHR-001 (extended). Unreachable from the write path — apply_transition only emits vocab statuses; only a hand-edited toml typo reaches the _ => Open arm. The default-Open is the SAFE direction: a corrupted review stays Active, never silently closes (the close-gate errs toward not-done). The missing diagnostic is the actual gap. Same unknown-enum-read fail-safe class as CHR-001's F-4 (close-gate unknown severity), different site (the general read path). CHR-001 now carries this as the read-path sibling — fix alongside: warn/hard-error on out-of-vocab status."

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "F-5: Baton counters (rounds, contests) have no upper bound, silently wrap at u32::MAX"
detail = "`rounds` is `prior.rounds + 1` on every turn, `contests` increments per contest verb, both u32. They wrap silently. At review scale this is academic, but it's worth noting: a review with 4 billion turns has bigger problems. More importantly, `contests` counts ALL contest turns across ALL findings — you can't tell which finding was contested how many times. That data lives only in the lossy handoff log. Recommend: cap at u32::MAX (saturating) or note that these are observability-only and wrapping is acceptable. Consider a per-finding contest counter if durable tracking is ever needed."
disposition = "tolerated"
response = "Observability-only, wrap accepted (as the finding itself offers). rounds/contests are u32 baton telemetry; wrapping needs ~4e9 turns. contests aggregates across findings by design (per-finding durable tracking is not a requirement of the baton model, D10 — handoff chatter is ephemeral). No per-finding counter warranted. Conscious tolerate."

[[finding]]
id = "F-4"
status = "verified"
severity = "major"
title = "F-2: with_turn closures receive raw FindingRow strings, then re-parse to enums (double scan)"
detail = "Every verb closure receives `existing: &[FindingRow]` (raw strings for status/severity). The closure calls `finding_status_of(existing, id)` which does a linear scan + `parse_finding_status`. The per-turn baton reconciliation also calls `finding_states_of(&doc)` for the same parse. Both are O(n). The pure core already has `FindingState` — closures should receive the pre-parsed form, not raw strings. Additionally, `doc_unresolved_blockers` calls `Severity::parse` — a third redundant string→enum conversion. Recommend: `with_turn` pre-parses status+severity into `Vec<FindingState>` (or richer struct) and passes that to the closure. The per-finding gate becomes a hash-lookup or index-access, not a linear scan."
disposition = "follow-up"
response = "Real design improvement; tracked as IMP-068. with_turn closures take raw FindingRow strings and re-parse via finding_status_of (linear scan + parse_finding_status), the baton reconcile re-parses via finding_states_of, and doc_unresolved_blockers does a third string->enum via Severity::parse. Pre-parsing status+severity into Vec<FindingState> once inside with_turn and passing that down kills all three re-scans. Not fix-now: at single-digit finding counts the O(n) re-scan is invisible, and SL-040 is shipped — owned cleanup, not a correctness gate."

