[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "F-7: review.rs is 3498 lines housing three distinct subsystems"
detail = "The file houses: (1) pure core enums + `can()` + `derived_status` + render (~200 lines), (2) authored readers + `new`/`show`/`list` (~200 lines), (3) verb family + `with_turn` + lock/CAS + baton (~500 lines), (4) warm-cache + `prime` + staleness (~400 lines), (5) ~1000 lines of tests. The warm-cache subsystem (D9, D-C10) is conceptually separate from the verb family — they share only `state_dir` and `LockGuard`. The design notes mention a possible `review_state.rs` split. Recommend extracting `review_cache.rs` for the warm-cache subsystem. Defer to post-SL-040 follow-up; IMP-025 touches this area."
disposition = "follow-up"
response = "Agreed; tracked as IMP-068 (and the finding itself defers post-SL-040). 3498-line file; the warm-cache subsystem (D9/D-C10) shares only state_dir + LockGuard with the verb family — clean extraction seam to review_cache.rs. Overlaps the IMP-025 area. Defer to the next pass touching this file."

[[finding]]
id = "F-7"
status = "verified"
severity = "minor"
title = "F-6: run_raiser_transition writes handoff note to baton OUTSIDE the lock (race)"
detail = "`run_raiser_transition` calls `with_turn` (the lock is released at scope end), then reads the baton, appends the handoff note, and writes it — all outside the lock. Between `with_turn` returning and this write, another invocation could acquire the lock, write a new baton, and release. Then this handoff write overwrites that baton, losing the other invocation's handoff note and potentially its counters. The design (D10) says handoff chatter is ephemeral and lossy, so this is arguably by design. But it is an unguarded race on the baton file. Recommend folding the handoff note into the `with_turn` closure (pass it through and append to baton inside step 7, under the lock)."
disposition = "follow-up"
response = "Confirmed; exact match to CHR-001 F-1 (baton-note lock scope), already owned. run_raiser_transition appends the handoff note via read_baton/write_baton after with_turn drops the lock — an unlocked RMW outside the lock+CAS. Self-heals via the next entry-CAS (baton regenerable, D-C2), so impact is cosmetic, but it breaks the every-baton-write-under-the-lock invariant. CHR-001 fix: fold the note write into the with_turn closure."

[[finding]]
id = "F-8"
status = "withdrawn"
severity = "minor"
title = "F-7: review.rs is 3498 lines housing three distinct subsystems"
detail = "The file houses: (1) pure core enums + `can()` + `derived_status` + render (~200 lines), (2) authored readers + `new`/`show`/`list` (~200 lines), (3) verb family + `with_turn` + lock/CAS + baton (~500 lines), (4) warm-cache + `prime` + staleness (~400 lines), (5) ~1000 lines of tests. The warm-cache subsystem (D9, D-C10) is conceptually separate from the verb family — they share only `state_dir` and `LockGuard`. The design notes mention a possible `review_state.rs` split. Recommend extracting `review_cache.rs` for the warm-cache subsystem. Defer to post-SL-040 follow-up; IMP-025 touches this area."

[[finding]]
id = "F-9"
status = "verified"
severity = "nit"
title = "F-8: cache_staleness calls dedup on three disjoint, already-sorted vecs"
detail = "`cache_staleness` concatenates `drift.changed`, `drift.removed`, `drift.added`, then calls `sort()` then `dedup()`. The three vecs from `ContentSet::diff` are already individually path-sorted (BTreeMap walk) and disjoint by construction (every path lands in exactly one drift class). `dedup` is dead code for this consumer — no path can appear in two classes. Recommend: remove `dedup` and replace with an assertion that the three classes are disjoint (documents the invariant). Or keep `dedup` but add a comment explaining why it is there."
disposition = "follow-up"
response = "Confirmed dead; tracked as IMP-068. The three drift classes from ContentSet::diff (changed/removed/added) are disjoint by construction — every path lands in exactly one class — so dedup after sort can never fire. Harmless (one extra pass over a tiny vec), hence not fix-now on shipped code, but worth removing + asserting disjointness when the area is next touched."

[[finding]]
id = "F-10"
status = "verified"
severity = "minor"
title = "F-4: derived_status scans findings up to three times"
detail = "`derived_status` does: (1) empty check, (2) `.any()` for Open|Contested, (3) `.any()` for Answered, (4) fallthrough to Done. In the worst case (all terminal), the vec is walked twice before falling through. A single-pass fold would be simpler and faster. Micro-optimisation for findings that rarely exceed single digits, but the triple-scan pattern suggests the author was not thinking in single-pass terms — a habit that could propagate to more expensive callers. Recommend a single-pass fold."
disposition = "follow-up"
response = "Tracked as IMP-068 (low priority). derived_status does two .any() passes + fallthrough; a single-pass fold is marginally faster. At single-digit finding counts the perf delta is nil, and the early-return form is arguably more readable than a fold — so this is hygiene, not a fix. Bundled with the other review.rs micro-cleanups."

