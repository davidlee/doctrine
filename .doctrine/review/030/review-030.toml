[[finding]]
id = "F-1"
status = "verified"
severity = "blocker"
title = "stage-1 prepare-review projects review/* + phase/* onto LIVE trunk tip, not the run's pinned base B"
detail = "design.md §4.2/§4.3 specify parent = trunk_base_B (the run's integration base); dispatch.rs:115 resolves git::trunk_commit(root) = LIVE trunk tip at sync time and parents both B (review/<slice>) and C (phase/<slice>-NN) on it. The ledger (journal/boundaries/orthogonal) records no run-base, so projection cannot use the pinned fork-point even in principle. Consequence (codex blocker, confirmed): if trunk advances between 'coordinate' and 'sync' (foreign writer on main — the coordination worktree isolates the working tree, NOT the trunk ref), the per-phase cut and review bundle are reparented onto the moved trunk → 'git diff parent...phase-NN' is no longer exactly phase NN's code delta (foreign trunk deltas leak in). The design's moved-trunk safety net ('integrate --trunk reports non-ff and refuses', §3 / IMP-043) does NOT cover this: it only fires for a move AFTER stage-1; a move before stage-1 is silently absorbed, and integrate's ff-check then passes spuriously because the projected tip already descends from the moved trunk. Candidate fixes: project off git merge-base(dispatch/<slice>, trunk) [pinned fork-point, no new state] OR record base B at coordinate-time and project off it, and refuse stage-1 when the recorded base != current trunk unless an explicit re-anchor is invoked. Disposition deferred to user — bears on closeability."
disposition = "fix-now"
response = "Project stage-1 B + C off git merge-base(refs/heads/dispatch/<slice>, trunk) — the pinned fork-point (run base B), no new ledger state — instead of git::trunk_commit() (live tip). Keep trunk_commit() only at integrate's actual trunk push under CAS. This aligns the code with design §4.2/§4.3 trunk_base_B, makes per-phase diffs exact regardless of mid-run trunk movement, and restores the integrate-refuses-moved-trunk net (a pre-stage-1 move is no longer silently absorbed). Add a trunk-moved-during-run e2e (project off pinned B; assert phase-NN diff excludes the foreign trunk delta; assert integrate reports non-ff). Remediation deferred to a /handover-driven pass (User-ruled) before /close; blocker stays OPEN, holding the close-gate, until the fix lands and the raiser verifies."

[[finding]]
id = "F-2"
status = "verified"
severity = "major"
title = "OQ-D Orchestrator-verb fence rests on marker-ABSENCE; an unstamped process can invoke coordinate/sync/record-boundary"
detail = "codex major: the worker-mode fence (write_class Orchestrator + marker/DOCTRINE_WORKER refusal) refuses a marker-PRESENT caller but cannot distinguish the legit coordination tree from an UNSTAMPED worker or an arbitrary process pointing -p at the repo (both run marker_absent). So Orchestrator verbs are invocable without positive orchestrator identity. CORRECTION to codex: the impersonation tests it claimed missing DO exist (tests/e2e_dispatch_sync.rs:324 VT-4 prepare-review+integrate; tests/e2e_worktree_coordinate.rs:273 VT-2 coordinate) and the verb-class restriction IS implemented. The residual codex describes is the DOCUMENTED, consciously-accepted v1 limitation: design §2 'marker-absence is NOT a positive coordination identity (RV-023 F-2)', §6/§7 'the D2b fence is defence-in-depth NOT a coverage proof; OQ-D's real close is the positive coordination marker = IMP-065'. notes PHASE-07 carries it as the named residual. Not a new gap."
disposition = "tolerated"
response = "Consciously-accepted v1 residual, not a new gap. The verb-class restriction (marker-absence fence) and impersonation tests (e2e_dispatch_sync VT-4, e2e_worktree_coordinate VT-2) are the OQ-D plan obligations and ARE delivered. design §2/§6/§7 explicitly disclaim that absence proves identity and pin the real close to the positive coordination marker = IMP-065 (open, tracked). The standing risk (unstamped process invokes Orchestrator verbs) is the documented D2b residual under the R-5 import belt + IMP-052 post-spawn check + env-worker catch + bwrap-no-push defence-in-depth. Accepted for v1; close is IMP-065."

[[finding]]
id = "F-3"
status = "verified"
severity = "minor"
title = "runtime phase-sheet rollup diverges from notes: slice list shows 2/8, notes record all 8 phases complete"
detail = "doctrine slice list derives SL-064 = 2/8 complete from the runtime phase tree (.doctrine/state/slice/064/phases): only phase-01 + phase-08 are flipped 'completed'; phase-02..07 read 'planned'. notes.md records PHASE-02..07 all completed with commits + evidence. Cause: phases 02-07 were driven via solo /execute inside the dispatch/064 coordination worktree (notes PHASE-02), whose gitignored runtime sheets were flipped there and died with the removed worktree; the root sheets were never updated. SL-009 rollup divergence. Reconcile the sheets to reflect reality before the audit→reconcile lifecycle move (the rollup ⚠ would otherwise flag at close)."
disposition = "fix-now"
response = "Reconcile the root runtime phase sheets (phase-02..07 → completed) so the slice list rollup matches the notes/commit reality before the audit→reconcile lifecycle move. Pure runtime-tier edit; no authored-file change. Done at /close reconcile (currently held behind F-1)."

[[finding]]
id = "F-4"
status = "verified"
severity = "major"
title = "[user-F1] commit_journal hardcodes 'journal: prepare-review' for BOTH stages — integrate writes a misleading recovery-artefact message"
detail = "dispatch.rs:489 commit_journal() always passes 'journal: prepare-review' to commit_tree; called from prepare_review (139,170) AND integrate (241,281). An integrate-only run stamps 'journal: prepare-review' onto dispatch/<slice> — the coordination branch is the durable recovery artefact (ADR-012 D4), so the stage is no longer distinguishable from the branch log alone. Fix: thread a &str msg param; pass 'journal: prepare-review' stage-1, 'journal: integrate' stage-2."
disposition = "fix-now"
response = "Thread a &str message param through commit_journal; pass 'journal: prepare-review' from stage-1 sites, 'journal: integrate' from stage-2. Cheap; improves the durable recovery artefact's stage-distinguishability. Remediate before close (close held behind F-1)."

[[finding]]
id = "F-5"
status = "verified"
severity = "minor"
title = "[user-F2] ScratchIndex leaves cross-PID crash debris in .git/; doc overclaims 'cleared up front'"
detail = "git.rs ScratchIndex::new only remove_file()s the SAME-pid path (fresh anyway); a crashed prior run's doctrine-filter-index.<other-pid> is never swept and accumulates in the git dir. The doc comment claims 'a leftover from a crashed run is cleared up front' — true only same-pid, so the comment overclaims and 'throwaway GIT_INDEX_FILE' is a lie across crashes. Fix: read_dir(git_dir) sweep of doctrine-filter-index.* on new() (cheap, no new dep — tempfile is dev-only, unusable in prod), and correct the doc comment."
disposition = "fix-now"
response = "Sweep doctrine-filter-index.* in the git dir on ScratchIndex::new (read_dir + filter + unlink — no new dep; tempfile is dev-only) and correct the overclaiming doc comment. Remediate before close."

[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "[user-F3] plan_baseref install is a full parse-serialize of settings.local.json (normalizes formatting; two sequential atomic writes)"
detail = "boot.rs plan_baseref round-trips settings.local.json through serde_json to_string_pretty — valid JSON with custom formatting/key-order is silently normalized (PrintedFallback only covers MALFORMED json). Plus hook-merge + baseRef are two ordered write_atomic calls (notes line 796 acknowledges the two-write ordering, not the formatting-normalization surface). User assessment: low risk — the file is machine-written and the hook merge normalizes identically. Standing risk only for a hand-formatted settings file."
disposition = "tolerated"
response = "Low risk, consciously accepted. settings.local.json is machine-written; the hook-merge install normalizes identically, so the install path is internally consistent. Normalization only bites a hand-formatted file — not a supported posture. The two-ordered-writes surface is noted in notes.md:796. No code change; standing risk accepted for v1."

[[finding]]
id = "F-7"
status = "verified"
severity = "minor"
title = "[user-F4] integrate duplicates prepare_review's journal-commit → apply → journal-commit orchestration"
detail = "The commit-intent-before-mutate cycle is structurally identical in prepare_review and integrate; only plan-step and apply-step (update_ref_cas creation vs replay_ref idempotent) differ. Any bug in the commit-before-mutate ordering / recovery contract must be fixed twice. User: not a blocker for v1; a with_journaled_projection(root, coord_ref, slice3, plan_fn, apply_fn) closure-taking extraction would collapse both."
disposition = "follow-up"
response = "Maintainability, not correctness — explicitly v1-out by the reviewer. Captured as IMP-075 (with_journaled_projection extraction). The two stages already share commit_journal/read_ledger/JournalRow; the closure-taking orchestrator collapse is a clean follow-up, not a close-blocker."

[[finding]]
id = "F-8"
status = "verified"
severity = "minor"
title = "[user-F5] phase_chain_tip returns highest-NN phase ref regardless of journal status — failed projection yields a confusing 'no code units' error"
detail = "phase_chain_tip max_by_key over NN ignores LedgerStatus; if PHASE-NN's projection Failed, plan_trunk_row resolve_commit's a non-existent ref and surfaces 'integrate --trunk: no phase/064-NN code units to integrate' — conflating 'no phases at all' with 'phase projection failed'. Fix: filter to status==Verified, or distinguish the two error conditions in plan_trunk_row's context."
disposition = "fix-now"
response = "phase_chain_tip should filter to status==Verified (a failed phase projection must not be treated as the chain tip), and/or plan_trunk_row should distinguish 'no phase rows' from 'phase ref unresolved'. Remediate before close."

[[finding]]
id = "F-9"
status = "verified"
severity = "minor"
title = "[user-F6] read_path_at — the load-bearing object-db ledger-read seam — has no dedicated unit test"
detail = "git.rs read_path_at (cat-file -p <ref>:<path>) is the fix for the PHASE-04 std::fs::read red-state and is the sole new git primitive without a git::tests unit test (filter_tree/tree_with_file/commit_tree/update_ref_cas/replay_ref/is_ancestor all have one). Exercised by every e2e, but a unit test (present path → Some, absent → None) would match the established discipline."
disposition = "fix-now"
response = "Add a git::tests unit test for read_path_at (present path → Some, absent → None), matching the discipline of every other new primitive. Remediate before close."

[[finding]]
id = "F-10"
status = "verified"
severity = "nit"
title = "[user-F7] projection_row sets source_oid = planned_new_oid (always equal for trunk/edge direct-projection rows)"
detail = "projection_row clones planned into both source_oid and planned_new_oid — identical for trunk/edge (the source IS the planned ref); replay recomputes identity → converges no-op (correct). But two equal fields is a conceptual wart vs the prepare-review rows where source_oid (dispatch tip) and commit_oid (synth) differ. Consider Option<String> or a doc note that equality is intentional for direct-projection rows."
disposition = "tolerated"
response = "Intentional equality for direct-projection (trunk/edge) rows: the source IS the planned ref, replay recomputes identity → no-op (correct). Accept the wart; the fix-now batch will add a one-line doc note on projection_row that equality is intentional for direct-projection rows. No behaviour change."

