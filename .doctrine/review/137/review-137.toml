[[finding]]
id = "F-1"
status = "verified"
severity = "major"
title = "SCC leverage not DP'd in component topo order — seq-perturbed levels drop a dependent's leverage"
detail = "src/priority/graph.rs:465-503 (design 272-288,365-370). Component leverage is computed when the FIRST member is hit in reverse graph.ordered() order, but the design requires DP over the CONDENSED component graph in reverse topological order. Seq-induced levels can place an SCC member after an external dependent of another member. Shape: A<->B needs-SCC; D needs A; E needs D; B after D (seq). Cordage withholds intra-SCC dep edges, keeps A->D->E and D->B(seq); order A,D,B,E -> reverse E,B,D,A. Component {A,B} computed at B BEFORE D's leverage is resolved, so leverage_by_node.get(D).unwrap_or(0.0) drops D's recursive leverage. Violates 'each leverage(D) already resolved' + 'DP components in reverse topological order'."
disposition = "valid — code-wrong (fix on dispatch/133 before PHASE-05)"
response = "Confirmed against impl. Reverse graph.ordered() is NOT reverse-topo of the CONDENSED graph; a seq edge perturbing an SCC member's level can place it before an external dep-dependent, dropping that dependent's resolved leverage. Fix: build the component DAG (nodes=components from provenance().cycles()|dep_overlay + singletons; edges=inter-component dep edges), topo-sort it, DP components in reverse topo order. Add a VT for the F-1 shape (A<->B SCC; D needs A; E needs D; B after D)."

[[finding]]
id = "F-2"
status = "verified"
severity = "major"
title = "Multi-member SCC external dependents not deduplicated — counted once per member, not once per component"
detail = "src/priority/graph.rs:484-492 (design 285-288,584-588). Design: an external dependent is counted ONCE for the component. Impl iterates every member's out_edges(dep_overlay) and sums directly. Shape: A<->B SCC; D needs A AND D needs B -> component {A,B} adds base(D)+leverage(D) TWICE. Contradicts the condensation contract and VT-8 wording."
disposition = "valid — code-wrong (fix on dispatch/133 before PHASE-05)"
response = "Confirmed. Per-member out_edges summation double-counts a D that needs >1 member. Fix folds into F-1: collect UNIQUE external dependent nodes across all members into a set, sum base(D)+leverage(D) once per D. Add a VT: D needs A AND B (one SCC) -> counted once."

[[finding]]
id = "F-3"
status = "verified"
severity = "major"
title = "dep_coeff domain: ADR-015 ratifies (0,1] but code+design treat <=0 as disable (0.0)"
detail = "src/priority/config.rs:128,135,163-169 + tests 282-290; ADR-015 80-81,125-127; design 504-512. ADR ratifies dep_coeff in (0,1], but impl/tests clamp <=0 to 0.0 and design says '<=0 disables leverage'. Durable policy and executable behaviour disagree. Resolve: either ADR/design ratify [0,1] with 0 as explicit disable sentinel, OR code clamps <=0 back into (0,1]."
disposition = "valid — design-wrong (amend ADR-015 + design; no code change)"
response = "Code+design semantics are coherent (<=0 disables leverage); ADR-015 wording '(0,1]' lags. Amend ADR-015 to ratify the domain as [0,1] with 0 (and any clamped <=0) the explicit DISABLE sentinel; align design 5.2/7 wording. Governance edit — apply as part of reconcile (REV) at audit, or fold the wording fix in now with the F-1/F-2 commit. No executable change."

[[finding]]
id = "F-4"
status = "verified"
severity = "minor"
title = "coefficients.value applied in code but omitted from design+ADR value_dim formula"
detail = "src/priority/graph.rs:70-83; design 128; ADR-015 38-43,131-132. Impl applies coefficients.value in value_dim; design+ADR formulas omit it. Impl is the coherent reading (ADR separately discusses global value-vs-risk weights). Fix the formulas so future readers don't 'correct' the code into wrong behaviour."
disposition = "valid — design-wrong (fix formulas; code correct)"
response = "Matches the symmetric pin from phase-plan. Add coefficients.value to design 5.1 line 128 and the ADR-015 value_dim formula. Doc-only."

