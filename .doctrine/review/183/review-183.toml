[[finding]]
id = "F-1"
status = "verified"
severity = "major"
title = "ProseCite candidate-token grammar undefined; existing whole-token primitive defeats the 3-part exclusion"
detail = "Expected: 5.5 specifies the candidate-token grammar so 'exclude any token with a second dash+suffix' is implementable and test-pinned. Observed: 5.5 enumerates exclusion CLASSES but never the grammar that PRODUCES candidates. The only existing tokenizer, integrity::line_cites (integrity.rs:623), matches a known needle with alphanumeric-only boundaries — dash is NOT a boundary (before_ok/after_ok test is_ascii_alphanumeric) — so DEC-005 is a whole-token match INSIDE DEC-005-C (the trailing dash passes after_ok). A naive [A-Z]+dash[0-9]+ inversion likewise extracts the 2-part DEC-005 / SL-1000 prefix and the skip-3-part rule never fires. The rule is only implementable if the scanner first recognizes the MAXIMAL hyphenated token and excludes it BEFORE the 2-part match. Empirical corpus: 519x DEC-005-C, 462x DEC-010-06, plus thousands of SL-NNN-word compounds. Also unspecified: fenced code blocks span lines, but the existing scanner is line-by-line (scan_danglers, integrity.rs:596) — skipping triple-backtick fences needs cross-line state the primitive lacks. Penance: define the candidate grammar + fence-state handling in 5.5; pin with unit tests against DEC-005-C, DEC-010-06, SL-NNN-word, and a fenced block."
disposition = "design-wrong"
response = "Design defect, reconciled in design.md 5.5. Specified a new ProseCite scanner that recognises the maximal hyphenated token [A-Z]{2,}-[0-9]+(-[A-Za-z0-9]+)* before 2-part/3-part classification, plus cross-line fence state; pinned the test obligations (DEC-005-C, DEC-010-06, SL-NNN-word, fenced block). The pass-1 'reuse scan_danglers' framing is replaced with an explicit new-scanner requirement."

[[finding]]
id = "F-2"
status = "verified"
severity = "major"
title = "ProseCite false-positive class unmodeled: illustrative/example ids in committed non-disposable prose"
detail = "Expected: the exclusion set covers — or the design consciously accepts + documents — every false-positive class present in the LIVE corpus. Observed: the set (code-span / SENTINEL / doc-local / 3-part) omits the largest empirical FP class: illustrative/placeholder 2-part ids in committed, non-disposable .md. Probed against disk (prefix-to-dir, lstat), these resolve to NOTHING, yet ProseCite (scans .doctrine/**/*.md, skips only handover+state via is_disposable_prose) would flag each as dangling EVERY run: POL-123 in the SHIPPED reference doc .doctrine/glossary.md; SL-999 in 9 files incl. 6 slice design.md (090/099/136/050/072/092); STD-002 + STD-003 in slice/033/audit.md; SPEC-110 + SPEC-200 across slice/015 design+notes+audit+inquisition.md plus a committed memory body (memory/items/mem_019e97df.../memory.md); REQ-999, REQ-1234, CM-999, CHR-003. Advisory severity bounds CI impact, but a doctor crying wolf on ~20+ legitimate examples per run actively undermines the is-the-corpus-sound signal it exists to give. Penance: scope the scan (name the trees), add an illustrative-example exclusion, or consciously accept + DOCUMENT the noise in 5.5/8."
disposition = "design-wrong"
response = "Reconciled: design.md 5.5 now models the illustrative-example FP class with the empirical evidence, D11 narrows the scan scope (skip audit/inquisition/notes/research process-exhaust), and R8 records the residual durable-body example noise as an accepted v1 limitation. Advisory severity bounds CI impact."

[[finding]]
id = "F-3"
status = "verified"
severity = "major"
title = "R1/5.5/9 misstate the byte-exact safety net for native re-points — it does not exist"
detail = "Expected: the goldens R1 names as 'the proof' of byte-exact native re-point actually pin byte-exact output for #1 id-integrity and #4 memory. Observed: (a) validate's tests (tests/e2e_integrity.rs) assert via SUBSTRING .contains — .contains(corpus clean) line 95, .contains(dir 003 declares id 045) line 109, .contains(scanned SL) line 97 — never a byte-exact assert_eq! or snapshot on stdout. A native re-point could re-order, re-space, or re-title the summary and still pass. (b) memory validate has NO output golden at all: the sole memory_validate test reference (tests/e2e_mcp_server.rs:209) is an MCP tool-REGISTRY presence check (names.contains), not an output golden. Therefore 9's claim that existing memory validate goldens stay green unchanged guards a golden that does not exist, and R1's existing-goldens-are-the-proof is unfounded for BOTH native sources. The behaviour-preservation gate (AGENTS.md) is unguarded exactly where the design leans on it. Penance: author true byte-exact goldens for #1 and #4 FIRST (red) as a precondition of the native re-point — or drop the re-point and keep the legacy render untouched (adapter). Correct R1, 5.5, 9 to state the actual current verification basis."
disposition = "design-wrong"
response = "Reconciled: R1, 5.5 behaviour-preservation, 9, and new D12 now state the true verification basis — validate is substring-asserted, memory validate has no output golden — and gate the #1/#4 native re-point on authoring byte-exact goldens FIRST (red), else ship adapter'd. The behaviour-preservation gate is now real rather than assumed."

[[finding]]
id = "F-4"
status = "verified"
severity = "minor"
title = "3-part exclusion rationale empirically false; silent false-negative unowned"
detail = "Expected: the 5.5/F1 rationale matches the corpus, and accepted false-negatives are documented. Observed: 5.5/F1 frames 3-part tokens as 'external the external decision register decision-log citations (DEC-005-C)'. The corpus is in fact dominated by KIND-NNN-englishword compound adjectives whose leading 2-part is a REAL entity ref: SL-048-style (184x), IMP-006-gated (184x), SL-007-populated (138x), ADR-006-references (92x), RSK-003-primary (92x), REQ-082-AC3 (46x). Blanket-skipping 3-part is the right mechanical call, but (a) the stated REASON is wrong/incomplete — it covers only the DEC decision-log minority — and (b) it silently makes a dangling SL-999-style / REQ-999-AC3 invisible, an accepted false-negative the design never states. Penance: correct the rationale to the real shape distribution and explicitly own the false-negative."
disposition = "design-wrong"
response = "Reconciled: 5.5 gate-1 rationale corrected to the empirical shape distribution (KIND-NNN-word compound adjectives dominate, not DEC decision-log cites) and explicitly owns the dangling-3-part false-negative as consciously accepted for an advisory check."

[[finding]]
id = "F-5"
status = "verified"
severity = "minor"
title = "is_disposable_prose scope mismatched to ProseCite's purpose"
detail = "Expected: ProseCite scans the prose tier where a dangling cite is actually actionable. Observed: ProseCite reuses integrity::is_disposable_prose (integrity.rs:609), which skips ONLY handover.md + .doctrine/state/. That predicate was authored for reseat. It does NOT skip audit.md, inquisition.md, notes.md, research/*.md, or committed memory bodies — process-exhaust and historical prose dense with hypothetical and reseated/removed ids (these are precisely the F-2 false-positive locations: slice/033/audit.md, slice/015/inquisition.md, a memory body). The reseat use-case and the doctor use-case may want different scopes. Penance: decide whether ProseCite's scan scope should diverge from reseat's, state it in 5.3/5.5, and pin it with a test."
disposition = "design-wrong"
response = "Reconciled via D11: ProseCite composes an extra skip-set on top of is_disposable_prose rather than reusing reseat's scope; reseat keeps its narrower predicate. Scope divergence stated in 5.5/D11, test obligation noted."

[[finding]]
id = "F-6"
status = "verified"
severity = "nit"
title = "done-but-open 'open' predicate undefined"
detail = "Expected: 5.5 defines which backlog statuses count as 'open' for the done-but-open check. Observed: 5.5 says 'flag an OPEN item iff it has >=1 linked slice and every linked slice terminal' but never defines the item-open predicate. The >=1-slice guard, is_transition_terminal (lifecycle.rs:42, done+abandoned), and targets_for(item, Slices) (relation.rs:877) are all confirmed present and the vacuity reasoning is sound — only the item-open side is unspecified. Plan-level detail, but name it so the check cannot flag a closed/abandoned backlog item. Penance: state the open-item predicate in 5.5."
disposition = "design-wrong"
response = "Reconciled: 5.5 now defines the open-item predicate (!is_transition_terminal(item.status)) so a closed/abandoned backlog item is never flagged. Underlying primitives confirmed present (lifecycle.rs:42, relation.rs:877)."

[[finding]]
id = "F-7"
status = "verified"
severity = "major"
title = "Check #6 RawLabel seam is fiction — names a nonexistent type and the wrong API (external/codex)"
detail = "Expected: the source seam named for check #6 RawLabel exists and exposes raw labels. Observed (verified): RelationLabel (src/relation.rs:45) has NO Raw variant; the real carrier is CatalogEdgeLabel::Raw(String) (src/catalog/hydrate.rs:46, for pre-migration/free-text/memory edges). relation_graph::outbound_for / tier1_edges DROP off-table rows (relation_graph.rs:331-332), and a Raw label on a numbered edge is treated as catalog corruption -> panic (relation_graph.rs:378-380). So design 2 ('relation_graph carries RelationLabel::Raw(String)'), 5.2 #6 seam ('relation_graph Raw labels via outbound_for'), and 5.4 raw_label_findings are all mis-specified. IMP-141 clarifies the 173 raw edges (156 related, 17 descends_from) are catalog-graph Raw() labels that 'resolve the same way' (valid, not illegal) -> sourced from the catalog hydrate/graph path, NOT relation_graph::outbound_for, and disjoint from #2's IllegalRows (R7 holds). This is exactly the access-path the pass-1 open-question flagged for P05; the answer is negative for outbound_for. Penance: re-specify #6 against CatalogEdgeLabel::Raw via the catalog graph; correct 2, 5.2, 5.4; keep R7's disjointness test."
disposition = "design-wrong"
response = "Verified true against source. Reconciled: design 2/5.2 #6/5.4 now name CatalogEdgeLabel::Raw via the catalog graph and explicitly reject RelationLabel::Raw + outbound_for. IMP-141's 173 edges confirmed catalog raw labels that resolve identically -> R7 disjointness preserved. Answers the P05 open question negatively for outbound_for."

[[finding]]
id = "F-8"
status = "verified"
severity = "major"
title = "D12 contradicts 5.2 v1-path and the phase sketch on #1/#4 native vs adapter (external/codex)"
detail = "Expected: the new D12 golden-first gate is consistent with the rest of the design. Observed: 5.2 table marks #1 IdIntegrity and #4 MemoryHealth as 'native' in v1, but D12 (added in pass 2) says a native re-point is admissible ONLY after byte-exact goldens land, else the source ships adapter'd; and the 9 phase sketch schedules 'wire id-integrity native' (P02) BEFORE the golden/black-box phase (P04). Internal contradiction, not mere plan detail. Penance: make 5.2's #1/#4 v1 path conditional (adapter initially; native only after the D12 golden precondition), and reorder the phase sketch so byte-exact golden authoring precedes any native re-point. State it explicitly."
disposition = "design-wrong"
response = "Verified self-inflicted by the D12 pass-2 edit. Reconciled: 5.2 #1/#4 v1 path is now 'adapter -> native after D12'; v1-native declaration satisfied by the four new checks; phase sketch reordered (P05 authors byte-exact goldens, THEN re-points native)."

[[finding]]
id = "F-9"
status = "verified"
severity = "major"
title = "D11 forgot the review ledger tree — re-imports the same example noise it tried to suppress (external/codex)"
detail = "Expected: D11's process-exhaust scan-skip covers ALL the historical/adversarial exhaust tier. Observed: D11 skips audit.md/inquisition.md/notes.md/research/** but NOT .doctrine/review/**. Review ledgers are the same class and are dense with placeholder example ids — ironically THIS review: .doctrine/review/183/review-183.md cites POL-123, and review-183.toml records SL-999, SPEC-110, REQ-1234 as examples. As specified (scan .doctrine/**/*.md), ProseCite re-imports review-ledger example noise through a door D11 left open. Penance: add .doctrine/review/** to the ProseCite skip-set in 5.5/D11/R8 (review-NNN.md prose is process-exhaust, not durable canon)."
disposition = "design-wrong"
response = "Verified — review-183 itself proves the noise. Reconciled: .doctrine/review/** added to the D11 ProseCite skip-set in 5.5/D11. Review ledgers are adversarial exhaust, not durable canon."

[[finding]]
id = "F-10"
status = "verified"
severity = "major"
title = "#7 TomlParse double-reports malformed numbered-entity TOML already covered by #1, with conflicting severity (external/codex)"
detail = "Expected: #7 TomlParse adds ONE new warning class without duplicating #1. Observed: malformed numbered-entity TOML is ALREADY an Error finding in id_integrity #1 — scan_kind pushes '{PREFIX}-{id}: TOML parse failed: {e}' (src/integrity.rs:299, surfaced via id_integrity_findings). scan_entities independently emits CatalogDiagnostic{severity:Error} on the same failed entity read (src/catalog/scan.rs:191-209), which #7 consumes. So one broken entity becomes both IdIntegrity/Error AND TomlParse/Warning — incoherent duplicate with conflicting severity. Penance: scope #7 to the surfaces #1 does NOT cover — facet TOML (estimate/value/risk, scan.rs:323) and the plan.toml probe — and exclude/dedup the entity-level catalog parse diagnostics that overlap #1. State the scoping in 5.2/5.3."
disposition = "design-wrong"
response = "Verified: integrity.rs:299 (#1 Error) and scan.rs:191 (CatalogDiagnostic Error) both fire on a malformed entity toml. Reconciled: 5.2 #7/5.3/D6 scope TomlParse to facet TOML + plan.toml only; entity-toml parse errors are #1's, deduped out of #7."

[[finding]]
id = "F-11"
status = "verified"
severity = "minor"
title = "D8 cites the wrong check number for the superset pin (external/codex)"
detail = "Expected: D8, the rationale pin for the doctor-superset-of-validate invariant, names the correct check. Observed: 5.2 defines #2 = RelationIntegrity and #8 = ProseCite, but D8 says 'add check #8 RelationIntegrity'. Wrong number on the load-bearing decision. Penance: correct D8 prose to '#2 RelationIntegrity'."
disposition = "design-wrong"
response = "Verified typo on a load-bearing decision. Reconciled: D8 and the 4 'hence check #N' reference now say #2 RelationIntegrity."

