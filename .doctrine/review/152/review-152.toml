[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "PHASE-03 structural deviations from design §5.2 (config module, prompt seam, config projection) — code correct, design prose stale"
detail = """
Design §5.2/EX-2 names three structures the impl realises differently — all layering-driven (ADR-001), behaviour-preserving, and documented in reserve.rs's module doc (lines 11-17):
(a) Config reader: §5.2 says "[reservation] ... consumed by a reservation_config module". Impl folds ReservationConfig + parse/load into `reserve` itself (no separate module) — R9: one already-classified engine module, one layering.toml entry instead of two.
(b) D8 prompt: §5.2/EX-2 says "reuses install::prompt_confirm + tty". Impl injects a `PromptFn = fn(&str)->Result<bool>` from the command tier (caller passes install::prompt_confirm); `reserve` (engine) never imports `install` (command) — avoids an upward layering edge (pure/imperative split). Capability reused exactly as designed; only the wiring respects ADR-001.
(c) [reservation] projection: §5.2 says "parsed via the shared reader". Impl reuses the shared file-read seam (dtoml::read_doctrine_toml_text) but projects via reserve's own parse_reservation_config/ReservationDoc, keeping [reservation] OFF dtoml::DoctrineToml — putting Reach/ReservationConfig (engine types) on DoctrineToml (leaf) would force a leaf→engine import. Matches §5.2's own "never eagerly validated in dtoml::parse" intent (estimation lazy-projection precedent).
Expected: design §5.2 literal text. Observed: three layering-faithful refinements. Evidence: src/reserve.rs:11-17,63-103,228-349; architecture_layering test green; full suite 2874/0."""
disposition = "design-wrong"
response = """Code is correct and superior; design.md §5.2 prose is now stale and should be amended to match the as-built (per-slice direct edit at /reconcile). All three deviations are layering-driven (ADR-001), behaviour-preserving, and more faithful to §5.2's own deeper intents (R9 "avoid extra layering.toml entries"; "never eagerly validated in dtoml::parse") than the literal text. No code change. Routed to Reconciliation Brief → Per-slice (direct edit): update §5.2/EX-2 to record (a) reservation config folded into `reserve` (no separate reservation_config module), (b) D8 prompt injected as a PromptFn fn-pointer from the command tier (no engine→command import), (c) [reservation] projected in `reserve` off dtoml::DoctrineToml via the shared file-read seam."""

[[finding]]
id = "F-2"
status = "verified"
severity = "minor"
title = "PHASE-05 git::resolve_remote non-repo → Ok(None) short-circuit — contract-correct, in-scope (not scope creep)"
detail = """PHASE-05's diff carries more than the literal default flip: git::resolve_remote gained a non-repo short-circuit (`rev-parse --is-inside-work-tree` != true ⇒ Ok(None)) before `git remote`, which would otherwise hard-error "not a git repository". Assessment: contract-correct and necessary, not scope creep. (1) resolve_remote is net-new in this slice; its only consumers are SL-148 code (reserve::configured_remote, commands/reservation.rs survey) — NOT shared machinery, so no behaviour-preservation risk to other callers. (2) The non-repo→None posture mirrors `capture`'s existing `--is-inside-work-tree` handling (consistent). (3) It is required by the default-flip: with reach=auto default, every entity-creation UNIT test runs in a bare TempDir (non-repo); without the short-circuit, default auto would call `git remote` in a non-repo and hard-error the whole suite. This is exactly §5.4's "auto + no remote configured ⇒ LocalFs" degradation reaching a non-repo root — a latent PHASE-03 gap (resolve_remote only exercised under git-repo substrates / explicit reach there) surfaced when auto became default (PHASE-05 R4 "sweeps the suite"). Expected vs observed: design §5.4 already specifies this degradation; the code now honours it for the non-repo case. Evidence: src/git.rs resolve_remote; test reserve::vt2_default_auto_in_a_non_git_dir_degrades_to_localfs ... ok."""
disposition = "aligned"
response = """Contract-correct and in-scope; not scope creep, no design change. resolve_remote is net-new with sole SL-148 consumers (no shared-machinery behaviour risk), the non-repo→None posture mirrors `capture`, and the short-circuit is required for the PHASE-05 default-flip not to hard-error the unit suite (bare-TempDir non-repo roots). It realises design §5.4's already-specified "auto + no remote configured ⇒ LocalFs" for the non-repo case — a latent PHASE-03 gap surfaced by auto-as-default (R4 suite sweep). Proven by vt2_default_auto_in_a_non_git_dir_degrades_to_localfs and the full green suite."""

[[finding]]
id = "F-3"
status = "verified"
severity = "blocker"
title = "VH-1: human acceptance of shipping reach=auto by default (cross-team reach on-by-default) — open /close gate"
detail = "PHASE-05 VH-1 requires human acceptance that doctrine ships reach=auto by default before close. This is the one verification criterion an agent cannot self-attest. The change (D5): with no [reservation] section, reach defaults to auto — cross-clone coordination engages whenever a remote is reachable; degrades to single-tree LocalFs (one-time stderr signal) when no remote is configured or, for a configured-but-failing remote, fail-closes unless the operator opts in (D8). Reversibility: the flip is a single default value (Reach::default() = Auto) — trivially revertable to Local. Behaviour gate: stdout byte-identical (degradation signal is stderr-only, one-time); full suite 2874/0 after the flip; back-compat proven (no-[reservation]+no-remote ⇒ byte-identical to pre-slice HEAD). Raised as blocker because VH-1 explicitly gates close; held open pending the User's acceptance. Evidence: src/reserve.rs:39-54 (Reach default), tests vt2_default_auto_in_a_non_git_dir / PHASE-05 stderr-only signal observed in suite output."
disposition = "aligned"
response = "VH-1 satisfied: the User (david.lee@inlight.com.au) accepted shipping reach=auto by default on 2026-06-24 — cross-team reservation on-by-default, degrading to single-tree LocalFs with a one-time stderr signal when no remote is configured, fail-closed on a configured-but-failing remote (operator opt-in), stdout byte-identical, single revertable default. Human gate cleared; the close-gate blocker is resolved."

[[finding]]
