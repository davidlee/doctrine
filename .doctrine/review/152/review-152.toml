status = "verified"
severity = "minor"
title = "Inherited e2e_memory_sync::sync_produces_all_shipped_dirs failure is SL-143/base-staleness, NOT SL-148 — resolved on current main"
detail = """Investigated the inherited failure (29→28 masters) flagged against SL-148's gate. Root cause confirmed: it is SL-143/memory-corpus, surfacing only via review/148's stale base (review/148 = 2148f662 + bundle; 2148f662 predates main's b928dd1d "fix(SL-143): repair relation-row contiguity and valid backlog labels"). SL-148 touches zero memory-corpus / shipped-master files (bundle is 18 src/ files, pure code). Integration evidence: cherry-picking the bundle onto CURRENT main (which carries the SL-143 fix) and running the full doctrine suite ⇒ `e2e_memory_sync::sync_produces_all_shipped_dirs ... ok`, 2874 passed / 0 failed (incl. the 3 previously-flagged e2e_relation_migration_storage, now also green on current main). The edge→main promotion already landed resolves it; it does not taint SL-148. Expected vs observed: SL-148's own delta is green at integration; the failure was a base-staleness artifact, not a regression."""
disposition = "aligned"
response = "Not SL-148's defect. Confirmed the e2e_memory_sync failure is SL-143/base-staleness (review/148 based on 2148f662, predating main's b928dd1d SL-143 fix); SL-148 touches no memory-corpus files. Integration gate (bundle cherry-picked onto current main) is fully green — sync_produces_all_shipped_dirs ok, 2874 passed / 0 failed, including the 3 formerly-flagged e2e_relation_migration_storage. The landed edge→main promotion resolves it; no taint on SL-148's gate. No action."

[[finding]]
id = "F-5"
status = "verified"
severity = "minor"
title = "Load-bearing distributed-CAS + porcelain classification (R1/R2) independently verified — no defects"
detail = '''R1 (distributed CAS correctness) / R2 (classification) are the slice's load-bearing risks; recording the independent adversarial pass as audit evidence. Adversarial code review of git.rs push_ref_cas/classify_push_porcelain + reserve GitRef::claim found no correctness defects: (1) push by oid under --force-with-lease=<ref>:ZERO_OID; classification is machine-stable via git push --porcelain — ONLY the explicit lease/create-CAS rejection ('!' flag + "stale info") maps to RefCas::Moved; transport/auth/hook/namespace-policy rejections return a hard CaptureError surfacing the remote reason (never Moved, never silent retry); no English-stderr parsing on the decision path. (2) commit_empty_tree_as builds a DANGLING empty-tree (4b825dc…/EMPTY_TREE_OID) commit with GIT_AUTHOR_*/GIT_COMMITTER_* set explicitly from the resolved holder (not ambient git config); resolve_holder safe-defaults, never errors. (3) for_each_ref uses splitn(5,'\t') (subject not split); malformed refs filtered, not panicked. Empirical proof: vt1_two_clones_racing_the_same_id_do_not_collide passes (exactly one create-push lands, loser re-fetches→recomputes→lands next id, one ref per id, I1). Disposition: aligned — the mechanism is sound.'''
disposition = "aligned"
response = "Mechanism sound; no defects. Independent adversarial review of the CAS/classification path found no correctness issues, and vt1_two_clones_racing empirically proves collision-freedom (I1): exactly one create-push lands, the loser re-fetches/recomputes/lands the next id, one ref per id. Porcelain classification is machine-stable (only lease/create-CAS rejection → Moved; all else hard-errors). R1/R2 closed by evidence. No action."

[[finding]]
id = "F-6"
status = "verified"
severity = "nit"
title = 'layering.toml reserve comment "→ entity only (out=1)" is stale — reserve also imports git + dtoml since PHASE-03'
detail = 'The ADR-001 layering.toml entry `reserve = "engine"` carries the inline comment "claim-backend selection seam; → entity only (out=1)". That was accurate for the PHASE-01 stub (imported only entity::{Claim,LocalFs}) but PHASE-03 added imports of `git` and `dtoml` (both leaf, valid downward engine→leaf edges). The classification (engine) and the enforced architecture_layering test remain correct/green — only the human-readable comment undercounts the out-edges (should be → entity/git/dtoml, out=3). Cosmetic authored-doc drift in an ADR-001 file; no behaviour or gate impact. Evidence: .doctrine/adr/001/layering.toml; src/reserve.rs use-statements (entity, git, dtoml).'
disposition = "tolerated"
response = 'Cosmetic authored-doc drift in an ADR-001 file (layering.toml comment), no behaviour/gate impact — the classification and enforced layering test are correct/green. Tolerated through audit close; routed to Reconciliation Brief → Governance/spec as an optional comment correction (reserve out-edges: entity/git/dtoml, out=3, not "entity only/out=1"). Audit does not write the governance file itself; /reconcile owns that surface.'

