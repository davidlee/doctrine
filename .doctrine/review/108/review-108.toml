[[finding]]
id = "F-4"
status = "verified"
severity = "nit"
title = "run_verify_worker resolves HEAD twice (head_resolved gather + head_is_branch_tip match) — a redundant rev-parse"
detail = "src/worktree.rs run_verify_worker: 'git rev-parse --verify HEAD' runs once for head_resolved and again inside the head_is_branch_tip Some(branch) arm. Harmless (cheap, same worktree) and faithful to the design §5.2 pseudocode, but the second read could reuse the first. Trivial."
disposition = "tolerated"
response = "Tolerated. The redundant rev-parse is negligible (two cheap reads on the same worktree, no correctness effect) and faithful to design §5.2's pseudocode; not worth a deviation from the locked design at audit time. Could be folded into a future micro-cleanup if run_verify_worker is touched again."

