title = "SPEC-022 REQ-316 contradicts REQ-317 — normative gate widening needs a Revision at reconcile"
detail = "design.md §2/D4 + slice-165.md headline: REQ-316 ('Source provenance' — candidate create refuses any --source that is not a Verified journal row, no candidate exception) forbids exactly what REQ-317 mandates (source the close_target from refs/heads/candidate/<N>/<label>, the repaired candidate). The landed code conforms to REQ-317 (controlling intent) and widens REQ-316's gate. Per ADR-013 + design D4/Q3-A a normative FR gate-widening routes through a Revision (REV) + external review, NOT a quiet direct spec edit. This is the slice's known governance obligation. Observation confirmed; remediation is reconcile's job (author REV narrowing REQ-316 to admit the traced candidate-source exception; conformance-link SL-165 -> REQ-316/317). Carries OQ-2 (exact REQ-316 wording, settled at REV authoring) and OQ-3 (REQ-317 process-owner note, likely no change — IMP-130's mandate)."
disposition = "verified"
response = "Confirmed governance obligation; routes to the reconciliation brief, NOT an audit write. SPEC-022 REQ-316 must be narrowed (REV at reconcile) to admit the traced candidate-source close_target exception that REQ-317 mandates and the landed gate implements; conformance-link SL-165 -> REQ-316/REQ-317. Audit does not touch spec/governance — /reconcile authors the REV + external review (ADR-013, design D4/Q3-A)."

