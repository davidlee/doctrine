[[finding]]
id = "F-1"
status = "verified"
severity = "blocker"
title = "/design skill already has requirements pass at state 3 — SL-098 proposes inserting it as sub-step 4a against a stale skill revision"
detail = """
## Expected vs Observed

The design should acknowledge the current state of the skill it proposes to amend. Before adding a "sub-step 4a" requirements pass, it should read the actual /design skill to determine what already exists.

SL-098 S3 states: "New sub-step 4a, inserted between Present design (4) and Write design doc (5)." It describes: survey decisions for implied requirements, capture statement/kind/home, present to user, then write Implied Requirements to design.md.

But the actual /design skill (.agents/skills/design/SKILL.md) already has: state 3 in the state machine (Requirements pass between Collect decisions and Propose 2-3 approaches), a Requirements pass process section with implied-requirement discovery and plan.toml targets, and the guardrail "Do not skip the requirements pass."

The design adds something that already exists — but at a DIFFERENT position. This is a conflict, not a refinement. If moving the pass is the intent, the design must state that explicitly and justify the move.

## Evidence

.doctrine/slice/098/design.md S3 lines 17-41: proposes sub-step 4a
.agents/skills/design/SKILL.md: state 3 requirements pass already exists
.agents/skills/design/SKILL.md lines 73-89: Implied Requirements section already defined"""
disposition = "design-wrong"
response = """
The design is stale against the current /design skill. The skill already has a requirements pass (state 3) with implied-requirement discovery and Implied Requirements output. The design proposes adding this as "sub-step 4a" — a different position in the state machine — without acknowledging the existing capability.

Penance: rewrite SL-098 §3 to reflect one of two choices:
(a) If moving the requirements pass from state 3 to between states 4-5 is intentional: state that clearly, justify why requirements should be surveyed AFTER design presentation rather than BEFORE it, and show the state machine change.
(b) If the requirements pass is already sufficient: drop SL-098 §3 (the /design section) and note that the current skill already covers it. Spend the saved complexity on the /plan and /reconcile changes that are genuinely new.

Either path requires re-reading the current skill files before rewriting.

Verification: after the design is amended, confirm /design skill SKILL.md already has the requirements pass, and the design.md either acknowledges this or drops the duplicate."""

[[finding]]
id = "F-2"
status = "verified"
severity = "blocker"
title = "REQ-DNN handle is structured metadata dressed as prose — violates entity-model.md storage rule"
detail = """
## Expected

The REQ-DNN structure — handle, statement, kind, provisional home hint, and ancestor decision reference — should live in a TOML facet alongside design.md, just as every other queryable, tooling-reachable datum in the entity model does. The design should either: (a) define a design-level TOML facet for implied requirements, or (b) acknowledge the tradeoff explicitly and argue why the violation is justified despite the storage rule.

## Observed

SL-098 S2 defines REQ-DNN as "a local handle scoped to a single design" that is "not registered anywhere" — prose only. The design invokes the storage rule (entity-model.md:50-52, :58-61) to argue compatibility: "An LLM reading design.md for implied requirements is the same class of operation as an LLM reading ADR-003."

This equivalence is false. ADR-003 is genuinely narrative reasoning — a decision, context, and consequences. REQ-DNN is structured metadata: handle (D01), statement, kind (quality/functional), home hint (spec kind + C4 level), ancestor decision (§N). It travels across FIVE skills (/design, /plan, /audit, /reconcile, /close) and must not be lost — the close deadlock gate exists precisely because the chain is fragile. This is not narrative reasoning; it is structured data that demands machine-assisted tracking.

The entity-model.md storage rule is absolute: "anything the tooling must read or query lives in TOML, never prose." The REQ-DNN handle is not tooling-read today — but the entire design depends on reliable inter-skill handoff of structured data. If it is structured enough to be reliably found by every skill, it deserves a TOML home. If it is not structured enough, the deadlock gate will fire constantly.

## Evidence

- .doctrine/slice/098/design.md S2 lines 9-13: REQ-DNN definition
- doc/entity-model.md lines 40-52: storage rule, "tooling must never parse prose structure"
- .doctrine/slice/098/design.md S7: close deadlock gate — proof the chain is fragile"""
disposition = "design-wrong"
response = """
The REQ-DNN handle is structured metadata masquerading as prose. The design argument — "LLM reading ADR-003 is the same class of operation" — is specious. ADR-003 is narrative reasoning; REQ-DNN is a structured tuple (handle, statement, kind, home, ancestor) that must survive 5-skill handoff.

Penance: define a design-level TOML facet for implied requirements. Minimal shape:
  [[implied_req]]
  handle = "D01"
  statement = "Every write must produce an immutable audit record"
  kind = "quality"
  home_hint = { spec_kind = "tech", c4_level = "container" }
  descends_from = "Decision §4"

This keeps REQ-DNN discoverable, queryable, and traversable — making the close deadlock gate trivial (tooling reads TOML, not prose). The design.md "Implied Requirements" section becomes derived prose rendered from the TOML facet (honouring the storage rule in both directions).

If the counter-argument is "but tooling does not read this today," the response is: the deadlock gate at close (§7) demands reliable tracking. Prose-only tracking with a deadlock gate is building a gate on sand.

Verification: show the TOML facet shape in the revised design, and demonstrate that the close deadlock gate can resolve REQ-DNN handles by reading a TOML facet rather than parsing prose."""

[[finding]]
id = "F-3"
status = "verified"
severity = "major"
title = "plan.toml [requirements] as 'author-facing only' dead fields corrupts the storage tier model"
detail = """
## Expected

The storage rule (entity-model.md) says: "anything the tooling must read or query lives in TOML, never prose." The corollary: anything that is author-facing only (never tooling-read) belongs in prose, never TOML. If the [requirements] section is never consumed by tooling, it should live in plan.md — not in plan.toml as structural dead weight.

Alternatively, if requirements tracking IS valuable enough to deserve structured storage, then tooling SHOULD read it — making it live data, not dead fields.

## Observed

SL-098 S4 note on enforcement: "plan.toml [requirements] is author-facing and never consumed by tooling (the Plan parser only models phases)." The design acknowledges these are dead fields but still places them in TOML.

This creates a two-tier system: some TOML fields are live (consumed by tooling), others are dead (author-facing only). An agent or human cannot tell which is which without consulting the design doc. This is a corruption of the storage tier model — structured fields in a tooling-owned format that tooling ignores.

If the intent is author-facing documentation of requirement-to-phase mapping, plan.md prose is the correct home. If the intent is structured tracking, the plan parser should be extended to read [requirements] and materialize the cross-reference — making the data live.

## Evidence

- .doctrine/slice/098/design.md S4 lines 67-69: "author-facing and never consumed by tooling"
- doc/entity-model.md lines 40-52: storage rule
- .agents/skills/plan/SKILL.md: "specs / requirements stay empty in v1""""
disposition = "design-wrong"
response = """
Dead structured fields in TOML corrupt the storage tier model. The design acknowledges [requirements] is "never consumed by tooling" yet places it in the tooling-owned format.

Penance: choose one:
(a) Move requirement-to-phase mapping to plan.md prose (author-facing → prose tier). The verification mapping becomes a narrative table or list in plan.md.
(b) Make [requirements] live: extend the plan parser to read it, and add a command (e.g. doctrine slice requirements SL-NNN) that renders the cross-reference. This turns dead fields into living structure.

Option (a) is simpler and consistent with the design philosophy ("no new code"). Option (b) is the long-term correct answer but adds scope. The design should pick one and commit.

Verification: plan.toml [requirements] either (a) does not exist (moved to plan.md) and the /plan skill instruction is updated, or (b) is read by tooling and a show/list verb renders it."""

[[finding]]
id = "F-4"
status = "verified"
severity = "major"
title = "Altitude assessment is an open question — but the orphan placement workflow depends on it"
detail = """
## Expected

A workflow that depends on correct altitude decisions should either (a) ship with the decision framework it needs, or (b) define a fallback that works without it, or (c) explicitly gate on the framework being built first (a dependency slice).

## Observed

SL-098 S6a acknowledges: "A full altitude decision framework (criteria for product vs tech, C4-level assignment rules) does not yet exist." It says "for now the reconcile agent relies on the existing spec c4_level/descends_from as reference points and on domain reasoning." It calls this "deferred work" for a future /spec-tech or ADR.

But the entire orphan placement workflow (S6a-S6f) — determining spec home, negotiating wording, multi-spec placement, authoring REV rows — depends on altitude decisions being made correctly. "Domain reasoning" by an agent is not a substitute for a decision framework when the consequence is requirement misplacement.

The design proceeds as if the open question is minor, but it is load-bearing. If a requirement is placed in a product spec when it belongs in a tech spec (or vice versa), the downstream consequences ripple through every subsequent slice that reads that spec.

## Evidence

- .doctrine/slice/098/design.md S6a lines 108-110: altitude assessment acknowledged as deferred
- .doctrine/slice/098/design.md S6: entire orphan placement workflow depends on altitude decisions"""
disposition = "design-wrong"
response = """
The orphan placement workflow depends on a decision framework that does not exist. "Domain reasoning by agent" is not a substitute for altitude placement rules when the consequence is requirement misplacement across product vs tech specs at the wrong C4 level.

Penance: add a guardrail to SL-098 §6a. When the reconcile agent cannot determine altitude with confidence (no existing spec at the right level, ambiguous product-vs-tech boundary, no nearby C4 reference points), the agent MUST /consult rather than improvise. The design should also note that a future altitude-framework slice (or /spec-tech amendment) is a soft dependency — the workflow functions with the guardrail, but the guardrail fires more often than desirable until the framework exists.

Additionally, the altitude assessment open question (§6a) should be promoted from an inline note to a formal dependency: either a backlog item (RSK or IMP) or an explicit reference to a future slice.

Verification: the revised §6a has an explicit /consult guardrail for ambiguous altitude, and the open question is recorded as a backlog item with a cross-reference."""

[[finding]]
id = "F-5"
status = "verified"
severity = "major"
title = "/plan skill says [requirements] stays empty in v1 — design wants to fill it, never addresses the contradiction"
detail = """
## Expected

A design that proposes filling [requirements] in plan.toml should acknowledge the current skill instruction that says to leave it empty, and either (a) revise the skill instruction as part of the same design, or (b) explain why the instruction is outdated and the change is justified.

## Observed

The current /plan skill (.agents/skills/plan/SKILL.md, step 4 bullet 4) states: "specs / requirements stay empty in v1 (no registry yet). When a slice does carry relations, they are written with doctrine link (not typed keys here)."

SL-098 S4 proposes: "Populate [requirements].targets with all REQ-D handles + any canonical REQs the design cites." And: "Populate per-phase requirements with the handles each phase verification discharges."

The design S8 (skill file changes table) lists /plan as receiving "Sub-step 2a (verification mapping), populate [requirements] in plan.toml" — but never acknowledges that the current skill explicitly says to leave it empty. A design that contradicts the skill it amends without acknowledging the contradiction is incomplete.

## Evidence

- .agents/skills/plan/SKILL.md step 4 bullet 4: "stay empty in v1"
- .doctrine/slice/098/design.md S4: proposes filling [requirements]
- .doctrine/slice/098/design.md S8: skill changes table lists /plan"""
disposition = "design-wrong"
response = """
The design contradicts the current /plan skill without acknowledgment. A design that amends a skill must first read it.

Penance: SL-098 §4 must:
(a) Acknowledge the current /plan instruction ("specs / requirements stay empty in v1") explicitly.
(b) Explain that this design changes that instruction — the [requirements] section graduates from "empty placeholder" to "populated with REQ-D handles." The skill edit (table §8) must include updating step 4 bullet 4.
(c) If F-3 penance is accepted (move to plan.md prose), update the /plan skill instruction to reflect the new location.

Verification: /plan skill SKILL.md step 4 no longer says "stay empty in v1" and instead describes when and how to populate [requirements] (or where to find the mapping if moved to plan.md)."""

[[finding]]
id = "F-6"
status = "verified"
severity = "minor"
title = "Orphan section in reconciliation brief — integration with existing brief shape undefined"
detail = """
## Expected

The design should show how the proposed "### Orphaned requirements" section integrates with the existing reconciliation brief shape defined in the /audit skill.

## Observed

SL-098 S5 proposes adding an "### Orphaned requirements (REV introduce)" section to the reconciliation brief. The proposed shape:

    ### Orphaned requirements (REV introduce)
    - REQ-D01: "Audit trail retention" — quality, likely tech spec at container level.

The current /audit skill (step 5) defines the reconciliation brief template with two sections:

    ### Per-slice (direct edit)
    ### Governance/spec (REV)

The orphan section is a third category: it belongs under REV (orphans are always placed via REV), but it has a different structure (REQ-DNN → candidate spec, rather than "ADR-006 SD5 is wrong → REV modify"). The design does not specify whether orphans are a subsection of "Governance/spec (REV)" or a peer section — and whether the current two-section shape is preserved or modified.

This matters because /reconcile consumes the brief shape — ambiguity in the brief format risks misinterpretation.

## Evidence

- .doctrine/slice/098/design.md S5 lines 83-86: proposed orphan section shape
- .agents/skills/audit/SKILL.md step 5: existing reconciliation brief template with two sections"""
disposition = "design-wrong"
response = """
The orphan section placement in the reconciliation brief is ambiguous. The /reconcile skill consumes a brief with two sections ("Per-slice" and "Governance/spec"); orphans are a third category that sits within the REV surface but has a distinct structure.

Penance: clarify in SL-098 §5 whether the orphan section is:
(a) A subsection of "Governance/spec (REV)" — i.e., a nested "### Orphaned requirements" under "## Governance/spec (REV)".
(b) A peer section — making the brief three sections: "Per-slice (direct edit)", "Governance/spec (REV)", "Orphaned requirements (REV introduce)".

Recommendation: option (a) is cleaner — orphans are always REV-introduce items, so they belong under the REV section as a structured sub-category. Show the updated template shape.

Verification: the /audit skill reconciliation brief template in SL-098 §5 shows the orphan section in its final position relative to the existing sections."""

[[finding]]
id = "F-7"
status = "verified"
severity = "minor"
title = "Walkthrough scenarios not verified against current skill state — assume pre-landed amendments"
detail = """
## Expected

Walkthrough scenarios that serve as verification targets should exercise the design as it will be implemented against the ACTUAL current state of the skills — not against the post-amendment state the design intends to produce.

## Observed

The walkthrough scenarios (S11a, S11b) describe the full flow: design agent runs requirements pass → writes Implied Requirements → plan agent reads REQ-DNN handles → populates plan.toml → audit surveys orphans → reconcile places them → close checks deadlock.

But the current /design skill already has a requirements pass! If run against today skills:
- The /design skill would run requirements pass at state 3 (not between states 4-5)
- The /plan skill would refuse to fill [requirements] ("stay empty in v1")
- The /audit skill has no orphan survey step
- The /reconcile skill has no orphan placement step
- The /close skill has no orphan deadlock gate

The walkthrough scenarios assume ALL proposed amendments are in place. They do not serve as verification targets for incremental implementation — they cannot be run after any single skill edit.

A set of incremental walkthroughs (one per skill change) would be more useful as verification targets.

## Evidence

- .doctrine/slice/098/design.md S11: walkthrough scenarios
- .agents/skills/design/SKILL.md: current state with existing requirements pass
- .agents/skills/plan/SKILL.md: current state with [requirements] empty instruction"""
disposition = "design-wrong"
response = """
The walkthrough scenarios assume a post-amendment state — they cannot serve as verification targets during incremental implementation. An implementer working through PHASE-01 (editing /design) cannot run scenario §11a because it depends on /plan, /audit, /reconcile, and /close changes that have not landed yet.

Penance: restructure §11 into:
(a) Per-skill incremental walkthroughs: "After editing /design, this scenario should work" (only /design changes assumed), "After editing /plan, this scenario should work" (/design + /plan changes), etc.
(b) The existing end-to-end scenarios remain as final integration tests but are explicitly labeled as "post-all-phases" verification targets.

Alternatively, if the design intends all skill edits to land in a single phase (which is plausible — these are all prose edits to skill files), state that explicitly and note that the walkthroughs assume the full set of amendments are in place. Either way, the dependency should be explicit.

Verification: walkthrough scenarios have explicit phase-dependency labels, or the design states they assume all amendments are landed."""

[[finding]]
id = "F-8"
status = "verified"
severity = "nit"
title = "Design references entity-model.md line numbers — fragile anchors that will rot"
detail = """
## Expected

Cross-references to source documents should use section identifiers or stable anchors, not line numbers that rot with every edit.

## Observed

SL-098 S2 line 13: "compatible with the storage rule (entity-model.md:50-52, :58-61)." Line-number references in a living document are fragile — the next edit to entity-model.md will shift these lines and make the reference misleading to a future reader. The design should reference sections or quoted passages instead.

## Evidence

- .doctrine/slice/098/design.md S2 line 13: entity-model.md:50-52, :58-61
- doc/entity-model.md: actively edited document"""
disposition = "fix-now"
response = '''
Line-number references are fragile — the next edit to entity-model.md shifts them and the reference becomes misleading. Replace with the canonical section identifier or a short quoted passage.

Penance: change "entity-model.md:50-52, :58-61" to "entity-model.md § The storage rule" and/or quote the relevant sentence: "anything the tooling must read or query lives in TOML, never prose." Also check for any other line-number references in the design (none visible on quick scan).

Verification: search design.md for ":\d\d" patterns — none should remain. All cross-references use section names or quoted text.'''

