SL-095 design R2 states: 'If SL-097 lands first, SL-095 adds POL/STD arms + StorageTarget to the already-extracted [src/supersede.rs]. If SL-095 lands first, SL-097 extracts the policy code (including SL-095's POL/STD arms) to src/supersede.rs.'

