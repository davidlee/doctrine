- Which phases (if any) are independent and can proceed before SL-097's extraction work
- Whether SL-095 temporarily houses the supersede_policy in main.rs or creates src/supersede.rs directly
- A gate phase that verifies coexistence works in both merge orders

Expected: plan.toml + plan.md with explicit phases covering the dependency window.

Observed: No plan. R2 is a design-level acknowledgement, not an execution plan."""
disposition = "must-fix"
