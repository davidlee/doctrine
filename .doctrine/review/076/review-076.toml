[[finding]]
id = "F-5"
status = "verified"
severity = "major"
title = "Read/write disconnect window: PHASE-02 switches readers to [[relation]] but PHASE-03 is when the verb writes there"
detail = """
PHASE-02 drops  from  and switches / to read from  (tier1_edges/read_block). But the  verb still uses  to write to the typed  array — PHASE-03 is when the write path switches to .

Between PHASE-02 commit and PHASE-03 commit, a  would:
1. WRITE the edge to the typed  array (via )
2. But the  struct no longer has  — nothing deserializes it
3.  reads from  — where nothing was written
4. Net result: the supersede edge is invisible

The plan acknowledges 'all supersedes arrays are empty — no data loss risk' for the corpus migration, but this is about EXISTING data, not the operational window.

Expected: Either (a) PHASE-02 and PHASE-03 are a single atomic phase, or (b) the plan documents the invariants for the gap window (no supersede operations, or the gap is acceptable because no real-world supersede runs between phases), or (c) PHASE-02 keeps the typed supersedes write path working until PHASE-03 switches it.

Observed: Plan separates read migration (PHASE-02) from write migration (PHASE-03) but doesn't acknowledge the operational gap."""
disposition = "must-fix"
response = """
The gap between PHASE-02 (readers on [[relation]]) and PHASE-03 (verb writes to [[relation]]) is real but narrow. The simplest fix: add one sentence to PHASE-02's exit criteria or PHASE-03's entrance criteria stating 'no supersede operations shall be run between PHASE-02 and PHASE-03 commits — the write path still targets the typed array while readers have already migrated.'

Alternative: merge PHASE-02 and PHASE-03 into a single phase. The structural refactoring and verb extension are logically separable but the read/write coupling makes separate commits fragile.

Either approach closes the gap. The current plan has the phases sequenced correctly (readers first, then writers — no stale-read risk), but the operational gap between commits must be acknowledged."""

