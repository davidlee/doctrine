title = "D1: Related + GovernedBy create ambiguous dual-label Slice→Policy pairs"
detail = """
The new RELATION_RULES row is:

    sources: &[SLICE, ISS, IMP, CHR, RSK, IDE],
    label: RelationLabel::Related,
    target: TargetSpec::AnyNumbered,

 includes ALL numbered kinds, including ADR/POL/STD. But slices already connect to governance via  (sources: &[SLICE, PRD, SPEC, CM, ASM, DEC, QUE, CON], label: GovernedBy, target: GOV). This means  and  are BOTH valid for the same (source, target) pair, using different labels with different semantics.

Expected: Either the Related row's target excludes GOV (TargetSpec::Kinds with non-GOV kinds), or the design explicitly acknowledges the overlap, distinguishes the semantics ('governed_by' = strong governance claim, 'related' = weak association), and documents when to use which.

Observed: No discussion of the overlap. A user writing  creates a semantically weaker edge alongside the existing  — confusing for graph navigation and inbound rendering (both show up under )."""
disposition = "will-follow-up"
response = "Acknowledged: GovernedBy (strong governance claim) and Related (weak association) can coexist for the same Slice→Policy pair. This is defensible — they have different semantics and inbound rendering shows both. The penance: add one sentence to D1 acknowledging the overlap and stating when to use each. If  is never the right choice (GovernedBy is strictly better for governance entities), narrow the target set to exclude GOV. Either approach closes the ambiguity."

