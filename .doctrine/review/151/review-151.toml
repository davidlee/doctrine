severity = "minor"
title = "VT-01/EX-05-6: shipped memory count confirmed at 28 UUID dirs (32 human-readable keys)"
detail = "`doctrine memory find --glob 'shipped/*'` returns 0 matches (shipped memories have empty `scope.globs`). Filesystem count: 28 UUID directories under `.doctrine/memory/shipped/` after sync, representing 32 human-readable keys (some symlinks share UUID targets). The 32 human-readable dirs under `memory/` are correct: 29 original - 1 deleted (cli-command-map) + 4 new (rec, rfc, concept-map, work-intake-membership) = 32."
disposition = "aligned"
response = "Confirmed. 28 UUID dirs under .doctrine/memory/shipped/, 32 human-readable key-named dirs under memory/. The --glob filter returns 0 because shipped memories have empty scope.globs — this is expected behavior, not a bug. The 32-key count is verified by filesystem enumeration."

