[[finding]]
id = "F-1"
status = "verified"
severity = "minor"
title = "e2e_relation_migration_storage: 3 pre-existing test failures independent of memory corpus changes"
detail = """
The `just check` gate fails with 3 pre-existing tests in `tests/e2e_relation_migration_storage.rs`:
1. `slice_corpus_relationships_table_holds_only_dep_seq_keys` — SL-143's own `slice-143.toml` uses `tracked_by` relation label not in allowed dep_seq set.
2. `relation_rows_of_one_label_are_contiguous` — `slice-143.toml` has `governed_by` rows interleaved with `tracked_by`.
3. `backlog_corpus_keeps_dep_seq_typed_migrates_cross_kind_axes` — `backlog-021.toml` has `related` as a typed key.

These failures are orthogonal to the memory corpus changes — they concern SL-143's authored `.doctrine/` state (the `tracked_by` label in slice-143.toml, and `backlog-021.toml` relation types). Verified these exist on `main` as well (the coordination base `53849577` already has them). The memory corpus work (PHASE-01 through PHASE-04) does not touch `.doctrine/slice/143/` or `.doctrine/backlog/` files."""
disposition = "tolerated"
response = "Pre-existing on main. The 3 e2e_relation_migration_storage failures concern SL-143's own authored state (tracked_by label in slice-143.toml) and backlog-021.toml relation types — both orthogonal to the memory corpus work. The memory corpus changes (memory/* directory) do not touch these files. Fixing these test failures is out of scope for SL-143; they predate the slice."

