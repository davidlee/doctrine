# Implementation plan for SL-143 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-143"

[specs]
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

[[phase]]
id        = "PHASE-01"
name      = "Audit shipped memory corpus"
objective = "Produce a per-memory findings ledger covering currency, completeness, wikilink validity, TOML false-positive wikilinks, D5 CLI-verb-enumeration violations, ADR-002 evergreen compliance, and POL-002 platform independence."

entrance_criteria = [
  { id = "EN-01-1", text = "Design locked: design.md committed with D1-D11 decisions" },
  { id = "EN-01-2", text = "Preflight findings available: .doctrine/state/sl-143-preflight-*.md" },
]

exit_criteria = [
  { id = "EX-01-1", text = "Per-memory findings ledger written to .doctrine/state/sl-143-phase-01-ledger.md" },
  { id = "EX-01-2", text = "Every shipped memory (29 current) has ≥1 finding entry (can be 'no issues found')" },
  { id = "EX-01-3", text = "cli-command-map staleness documented with full verb diff (≥14 missing, 1 dead: claude)" },
  { id = "EX-01-4", text = "POL-002 violations flagged using concrete signature checklist: (SL-NNN), edge/main, just gate, just check, jail, bwrap, CARGO_TARGET_DIR, fix(SL-/doc(SL-/plan(SL-)" },
  { id = "EX-01-5", text = "Wikilink graph validated: broken links, orphans, TOML-table [[...]] false-positives documented corpus-wide" },
  { id = "EX-01-6", text = "Entity kind + CLI verb coverage gaps enumerated per memory" },
  { id = "EX-01-7", text = "D5 audit: every memory that enumerates CLI verbs, subcommands, or flags inline is flagged with file:line references" },
]

verification = [
  { id = "VA-01-1", expects = "Ledger file exists and covers all 29 current shipped memories" },
  { id = "VA-01-2", expects = "cli-command-map verb diff: ≥14 missing, 1 dead (claude)" },
  { id = "VA-01-3", expects = "Ledger is agent-readable — findings are actionable with severity assigned" },
  { id = "VA-01-4", expects = "POL-002 checklist applied to all 29 memories; every signature match documented" },
  { id = "VA-01-5", expects = "D5-flagged memories enumerated with file:line references for PHASE-02 remediation" },
]

specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Update corpus content for currency and structural changes"
objective = "Execute per-memory fixes from the PHASE-01 ledger. Delete cli-command-map. Create REC, RFC, CM signposts. Promote work-intake-membership. Enforce D5 on surviving memories. Remediate POL-002 violations."

entrance_criteria = [
  { id = "EN-02-1", text = "PHASE-01 ledger available with all findings documented" },
]

exit_criteria = [
  { id = "EX-02-1", text = "All 27 existing non-overview memories reviewed and updated for currency" },
  { id = "EX-02-2", text = "Updated date set to 2026-06-24 on every memory touched" },
  { id = "EX-02-3", text = "Commands scope in TOML metadata refreshed per memory" },
  { id = "EX-02-4", text = "mem.signpost.doctrine.cli-command-map directory deleted" },
  { id = "EX-02-5", text = "mem.signpost.doctrine.rec created: REC kind signpost (what it is, which verbs, where files live)" },
  { id = "EX-02-6", text = "mem.signpost.doctrine.rfc created: RFC kind signpost" },
  { id = "EX-02-7", text = "mem.signpost.doctrine.concept-map created: CM kind signpost" },
  { id = "EX-02-8", text = "mem.concept.backlog.work-intake-membership promoted per D9: new shipped memory under memory/ with repo=\"\", anchor_kind=none; local original retired via doctrine memory record --retire" },
  { id = "EX-02-9", text = "All inbound wikilinks to cli-command-map replaced with links to overview or relevant signposts" },
  { id = "EX-02-10", text = "POL-002 violations from PHASE-01 ledger remediated (incl. conventions memory commit-scoping: (SL-NNN) → generic (scope): … examples)" },
  { id = "EX-02-11", text = "No memory body references claude as a CLI verb" },
  { id = "EX-02-12", text = "ADR-002 evergreen compliance maintained throughout" },
  { id = "EX-02-13", text = "D5 enforced on surviving memories: all D5-flagged memories from PHASE-01 ledger have inline CLI verb enumerations removed; replaced with pointers to doctrine --help" },
]

verification = [
  { id = "VA-02-1", expects = "Exactly 32 shipped memory directories under memory/ (29 - 1 deleted + 4 added)" },
  { id = "VA-02-2", expects = "cli-command-map key absent from corpus" },
  { id = "VA-02-3", expects = "rec, rfc, concept-map signposts exist with non-empty bodies" },
  { id = "VA-02-4", expects = "work-intake-membership has repo=\"\" and anchor_kind=none" },
  { id = "VA-02-5", expects = "No memory references the claude verb" },
  { id = "VA-02-6", expects = "All updated dates ≥ 2026-06-24 on changed memories" },
  { id = "VA-02-7", expects = "No D5-flagged memory body still enumerates CLI verbs, subcommands, or flags inline" },
]

specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Rewrite overview as the PULL hub"
objective = "Rewrite mem.signpost.doctrine.overview as a self-contained briefing with mental model, when-to-retrieve-what table covering all 31 non-overview memories, key conventions, and quick-links. Written against the complete post-PHASE-02 corpus."

entrance_criteria = [
  { id = "EN-03-1", text = "PHASE-02 content update complete: all structural changes applied, final corpus shape known" },
  { id = "EN-03-2", text = "Design D1 and D5 decisions clear: what the overview contains and that CLI enumeration stays in binary" },
]

exit_criteria = [
  { id = "EX-03-1", text = "memory/mem.signpost.doctrine.overview/memory.md rewritten with sections: pillars, mental model, when-to-retrieve-what table, conventions, quick-links" },
  { id = "EX-03-2", text = "When-to-retrieve-what table has one row per shipped memory (excluding overview, 31 rows), situation-keyed" },
  { id = "EX-03-3", text = "Memory body ≤ ~100 lines (table is ~33 lines; other sections concise — pillars and mental model 10-15 lines each, conventions 5-8 lines, quick-links 3-4 lines)" },
  { id = "EX-03-4", text = "memory.toml updated: updated date, commands scope refreshed" },
  { id = "EX-03-5", text = "No CLI verb enumeration in body — points to doctrine --help per D5" },
  { id = "EX-03-6", text = "ADR-002 compliant: repo=\"\", anchor_kind=none, no repo-specific detail" },
  { id = "EX-03-7", text = "POL-002 compliant: no host-convention references" },
  { id = "EX-03-8", text = "Table includes rows for rec, rfc, concept-map signposts and promoted work-intake-membership; no row for deleted cli-command-map" },
]

verification = [
  { id = "VA-03-1", expects = "Overview body contains all five required sections" },
  { id = "VA-03-2", expects = "When-to-retrieve-what table covers all 31 non-overview shipped memory keys" },
  { id = "VA-03-3", expects = "Body references doctrine --help, never enumerates verb subcommands or flags" },
  { id = "VA-03-4", expects = "No references to just gate, just check, edge/main, (SL-NNN), jail, bwrap, or other host conventions" },
  { id = "VA-03-5", expects = "Body length ≤ ~100 lines" },
]

specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Reachability pass and skill references"
objective = "Verify every shipped memory reachable from overview within ≤3 hops. Overview has ≥1 inbound wikilink. Add skill references per D11 pre-assignment table. Fix wikilink web orphans and broken references."

entrance_criteria = [
  { id = "EN-04-1", text = "PHASE-02 content updates complete (all memories current, new signposts exist)" },
  { id = "EN-04-2", text = "PHASE-03 overview written (root of reachability graph)" },
]

exit_criteria = [
  { id = "EX-04-1", text = "Every shipped memory reachable from overview within ≤3 hops" },
  { id = "EX-04-2", text = "Overview has ≥1 inbound wikilink from another shipped memory (orphan resolved)" },
  { id = "EX-04-3", text = "Overview differentiated as starting point in boot digest Memory section (D1)" },
  { id = "EX-04-4", text = "Every concept/fact/pattern memory pointed-at by its pre-assigned skill or boot digest per D11 mapping (12 memories assigned)" },
  { id = "EX-04-5", text = "Broken wikilinks fixed or removed" },
  { id = "EX-04-6", text = "[[relation]] TOML-table references in relating-entities normalised to backtick formatting" },
  { id = "EX-04-7", text = "New signposts (rec, rfc, concept-map) linked into wikilink web" },
  { id = "EX-04-8", text = "Work-intake-membership linked from backlog signpost" },
]

verification = [
  { id = "VA-04-1", expects = "Walk the wikilink graph: all 32 memories ≤3 hops from overview" },
  { id = "VA-04-2", expects = "Overview has ≥1 inbound wikilink (check: grep 'mem.signpost.doctrine.overview' memory/*/memory.md)" },
  { id = "VA-04-3", expects = "Boot digest lists overview first or marks it as starting point" },
  { id = "VA-04-4", expects = "No bare [[relation]] wikilinks in any shipped memory body" },
  { id = "VA-04-5", expects = "Each D11-assigned skill references its assigned memory (grep check per skill)" },
]

specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Re-embed, re-sync, and gate"
objective = "Pre-check build tooling, then re-embed the updated memory corpus into the binary, sync to shipped/, refresh installed skills, and pass the gate."

entrance_criteria = [
  { id = "EN-05-1", text = "PHASE-02 content updates complete" },
  { id = "EN-05-2", text = "PHASE-03 overview written" },
  { id = "EN-05-3", text = "PHASE-04 reachability verified" },
]

exit_criteria = [
  { id = "EX-05-1", text = "Pre-checks passed: memory/ directory structure verified (32 human-readable key-named dirs, no symlinks); doctrine memory sync available on current binary" },
  { id = "EX-05-2", text = "touch src/corpus.rs && cargo build succeeds (note: jail CARGO_TARGET_DIR → ~/.cargo/doctrine-target-jail)" },
  { id = "EX-05-3", text = "doctrine memory sync materialises all 32 shipped memories" },
  { id = "EX-05-4", text = "doctrine claude install refreshes installed skills with new memory references" },
  { id = "EX-05-5", text = "just gate passes (zero warnings)" },
  { id = "EX-05-6", text = "doctrine memory find --glob 'shipped/*' returns exactly 32 entries" },
  { id = "EX-05-7", text = "doctrine memory show mem.signpost.doctrine.overview returns the rewritten body" },
  { id = "EX-05-8", text = "doctrine memory show mem.signpost.doctrine.cli-command-map fails (key absent)" },
  { id = "EX-05-9", text = "No stale UUID-duplicate directories under memory/ after sync" },
  { id = "EX-05-10", text = "Design VT-11 (D5): no surviving memory body enumerates CLI verbs inline" },
  { id = "EX-05-11", text = "Design VT-12 (POL-002): no shipped memory contains a violation signature" },
  { id = "EX-05-12", text = "Design VT-13 (ADR-005): every concept/fact/pattern memory reachable via skill or boot" },
]

verification = [
  { id = "VA-05-1", expects = "cargo build exits 0 after touch src/corpus.rs" },
  { id = "VA-05-2", expects = "just gate exits 0 with zero clippy warnings" },
  { id = "VA-05-3", expects = "doctrine memory find --glob 'shipped/*' returns 32 entries" },
  { id = "VA-05-4", expects = "doctrine memory show mem.signpost.doctrine.overview returns the rewritten body with all five sections" },
  { id = "VA-05-5", expects = "doctrine memory show mem.signpost.doctrine.cli-command-map fails (key absent)" },
  { id = "VA-05-6", expects = "memory/ contains exactly 32 human-readable key-named directories (no stale UUID duplicates)" },
]

specs        = []
requirements = []

