# Implementation plan for SL-116 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-116"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Folder skeleton + foundation files"
objective = """
Convert src/worktree.rs into the worktree/ folder and extract the lowest-coupling
concerns — shared.rs, allowlist.rs (pure leaf, D4), marker.rs, and the cfg-test
test_helpers.rs — leaving every remaining concern body in mod.rs. Establish
shared.rs FIRST so its 4 cross-machine pub(super) helpers exist before the
machines that consume them move (PHASE-02/03). Land the ADR-001 layering
sub-classification the moment the umbrella becomes mixed. End green.
"""
entrance_criteria = [
  { id = "EN-1", text = "SL-116 design.md is locked (RV-131 done, all 5 findings disposed) and slice status is ready." },
  { id = "EN-2", text = "Tree is green on edge: `just gate` passes before any extraction (clean baseline for the behaviour-preservation gate)." },
]
exit_criteria = [
  { id = "EX-1", text = "src/worktree.rs no longer exists as a file; src/worktree/mod.rs holds the unextracted remainder (provision/import/land/coordinate/gc/fork/subagent bodies + WorktreeCommand/dispatch/root). `mod worktree;` in main.rs:71 unchanged." },
  { id = "EX-2", text = "shared.rs, allowlist.rs, marker.rs, test_helpers.rs exist per the §Target layout map, each owning exactly its mapped items at its mapped visibility." },
  { id = "EX-3", text = "allowlist.rs holds ONLY the pure core (Tier/WITHHELD/DERIVED_RUNTIME/parse_allowlist/is_withheld/select_copies/allowlist_violations/glob_matches/MATCH_OPTS + their private helpers, D4); the impure read_allowlist + ALLOWLIST_FILE remain in mod.rs (they relocate to provision.rs in PHASE-02), so allowlist.rs imports std/leaf only." },
  { id = "EX-4", text = "shared.rs's cross-machine helpers (resolve_common_dir, resolve_commit, gather_tree_clean, gather_fork_worktree) are widened private→pub(super), never pub(crate); all other moved items keep their mapped visibility." },
  { id = "EX-5", text = ".doctrine/adr/001/layering.toml carries extractor-generated worktree sub-classification for the new files (worktree::allowlist=leaf; shared/marker = engine iff imports stay inward), generated by the authoritative extractor, not by cohesion labels." },
]
verification = [
  { id = "VT-1", expects = "`just gate` green — fmt, clippy zero-warn (dead_code denied), lint-js, full test suite, build. The behaviour-preservation gate: the relocated allowlist/marker tests pass with byte-unchanged bodies." },
  { id = "VT-2", expects = "`cargo test --test architecture_layering architecture_layering_gate` green with the new worktree::<file> entries present (MixedUmbrella + tangle ratchet hold; tangle actual <= baseline)." },
  { id = "VT-3", expects = "`every_runtime_gitignore_glob_is_classified` green — DERIVED_RUNTIME still reachable, riding allowlist.rs tests (const + guard co-located)." },
  { id = "VA-1", expects = "Agent confirms the §Target layout item→home→visibility map is honoured exactly for the 4 PHASE-01 files (no orphan, no mis-homed item, no over-widen) by diffing extracted items against the design map." },
  { id = "VA-2", expects = "Agent confirms layering.toml entries were produced by `cargo test --test architecture_layering dump_real_graph -- --nocapture --ignored` (classified by actual imports), not hand-labelled." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Lifecycle disk machines + subagent"
objective = """
Extract the disk-lifecycle machines provision/import/land/gc/fork and the
subagent concern (D7) into their own files per the §Target layout map. Relocate
the impure read_allowlist + ALLOWLIST_FILE into provision.rs as file-private (D4).
Widen fork's 3 cross-machine helpers (project_env_contract, rollback_fork,
remove_worktree_dir) to pub(super) before coordinate (PHASE-03) consumes them.
Each machine carries its own #[cfg(test)] mod tests with byte-unchanged bodies;
machine-specific test helpers ride their machine (D2). End green.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: worktree/ folder exists with mod.rs + shared/allowlist/marker/test_helpers; tree green." },
]
exit_criteria = [
  { id = "EX-1", text = "provision.rs, import.rs, land.rs, gc.rs, fork.rs, subagent.rs exist per the §Target layout map, each owning exactly its mapped items at its mapped visibility; mod.rs retains only coordinate's body plus WorktreeCommand/dispatch/root + re-export scaffold." },
  { id = "EX-2", text = "read_allowlist + ALLOWLIST_FILE live in provision.rs, file-private (D4), consumed only by run_provision + run_check_allowlist; no widen needed." },
  { id = "EX-3", text = "fork's cross-machine helpers (project_env_contract, rollback_fork, remove_worktree_dir) are pub(super); single-machine helpers (verify_sibling_worktree/enumerate_candidates in provision; gc_target_dir/reap_targets/gather_landed in gc; SubagentPayload/cwd_shares_repo/primary_worktree in subagent; DOCTRINE_PREFIX/CLAUDE_PREFIX in import) stay private." },
  { id = "EX-4", text = "Each machine's tests and machine-specific helpers (fork_state→land, gc_state→gc, gitignore_representative/classified→allowlist already done, commit_slice_plan→coordinate stays in mod.rs until PHASE-03) are co-located; bodies and assertions byte-identical." },
  { id = "EX-5", text = "layering.toml extended with worktree::<file> entries for the 6 new files (engine iff imports inward), extractor-generated." },
]
verification = [
  { id = "VT-1", expects = "`just gate` green — the behaviour-preservation gate: all relocated machine tests pass with byte-unchanged bodies; clippy zero-warn; build clean." },
  { id = "VT-2", expects = "`cargo test --test architecture_layering architecture_layering_gate` green with the 6 new entries (tangle ratchet: actual <= baseline per tier; engine baseline=0 still holds)." },
  { id = "VA-1", expects = "Agent confirms the four at-risk cross-machine tests (RV-131 F-4 spot-check) reach only co-located private symbols or pub(super) helpers: primary_worktree_resolves (subagent, same file), rollback_fork_retracts (fork pub(super)), base_has_slice_plan_tracks + coordinate_refuses_create (coordinate — still in mod.rs this phase, exercised there)." },
  { id = "VA-2", expects = "Agent diffs extracted items against the §Target layout map for the 6 files: no orphan, no mis-homed item, no over-widen (pub(super) only the 3 fork helpers)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "coordinate.rs extraction + re-export finalisation + closure proof"
objective = """
Extract the final concern, coordinate.rs (command-tier — D3/D5): CoordOutcome
(re-homed from the allowlist region, D5), CoordAction/CoordRefusal, classify_coordinate,
base_has_slice_plan (coordinate-only private), coordinate, run_coordinate,
run_branch_point_check. mod.rs is left as the command surface only: WorktreeCommand
+ dispatch + root() + the 8-symbol pub(crate) use re-export checklist. Record the
truthful worktree::coordinate=command layering entry (the slice::run_phases upward
edge, Non-Goal). Prove the public surface: all 8 caller files compile untouched.
End green — the full behaviour-preservation gate is the slice's correctness proof.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete: all disk machines + subagent extracted; fork's pub(super) helpers exist; tree green." },
]
exit_criteria = [
  { id = "EX-1", text = "coordinate.rs exists per the §Target layout map; CoordOutcome relocated from the old allowlist region (D5); base_has_slice_plan is file-private (sole caller coordinate); run_branch_point_check homed here." },
  { id = "EX-2", text = "mod.rs contains only WorktreeCommand[X], dispatch[X], root(), and the pub(crate) use re-export of the 8 externally-consumed symbols: WorktreeCommand, dispatch, DISPATCH_WORKER_AGENT_TYPE, DUAL_CAUSE, is_linked_worktree, resolve_mode, env_worker_set, coordinate. gather_tree_clean is NOT re-exported (F-1: internal)." },
  { id = "EX-3", text = "All 12 production files of the §Target layout exist; no top-level production item from the original worktree.rs is orphaned (the 42-item map is fully discharged)." },
  { id = "EX-4", text = "layering.toml carries worktree::coordinate=command with its slice upward edge accepted/baselined as today (the edge is neither fixed nor worsened — Non-Goal)." },
]
verification = [
  { id = "VT-1", expects = "`just gate` green: full `cargo test` (the 46 relocated tests pass, bodies byte-unchanged — behaviour-preservation gate); clippy zero-warn; build clean." },
  { id = "VT-2", expects = "The 8 caller files (main.rs, boot.rs, review.rs, commands/guard.rs, commands/cli.rs, memory.rs, git.rs, dispatch.rs) compile UNCHANGED → public surface preserved (the re-export proof; a missed symbol breaks build)." },
  { id = "VT-3", expects = "`cargo test --test architecture_layering architecture_layering_gate` green with worktree::coordinate=command; MixedUmbrella + tangle ratchet hold." },
  { id = "VA-1", expects = "Agent verifies the exhaustive 42-item map is fully discharged: every original top-level item lives in exactly one file at its mapped visibility, src/worktree.rs is gone, src/worktree/ holds the 12 files, `mod worktree;` (main.rs:71) untouched." },
  { id = "VH-1", expects = "Human confirms the public surface and partition match design intent and the split is purely mechanical (no behaviour/state-machine/allowlist-semantics change) before close." },
]
specs        = []
requirements = []
