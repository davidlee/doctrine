# Implementation plan for SL-063 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-063"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.
[[phase]]
id        = "PHASE-01"
name      = "Inode-gated codex detection"
objective = """
Replace the coarse `!claude` existence guard in `resolve_harnesses` auto-detect
(boot.rs:399) with the inode-gated alias-suppression of design §3.1: detect codex
when `.codex/` exists, or when AGENTS.md exists and is NOT merely Claude's
inode-alias (suppressed only when Claude is detected AND AGENTS.md resolves to
CLAUDE.md's inode via `resolve_target`). A repo with `.claude/` and a
separate-inode AGENTS.md wires both harnesses; this repo's symlinked AGENTS.md
stays Claude-only. No signature change, no new helper — reuse `resolve_target`.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md is locked: OQ-1/OQ-2 closed, adversarial review applied (alias-suppression gated on Claude-detected)." },
  { id = "EN-2", text = "`resolve_harnesses` (boot.rs:390) and `resolve_target` inode helper (boot.rs:451-467) confirmed at the cited seams against a fresh dev build." },
]
exit_criteria = [
  { id = "EX-1", text = "`resolve_harnesses` auto-detect implements §3.1: `!claude` guard deleted; codex detected unless AGENTS.md is Claude's inode-alias (gated on `claude` detected). Explicit `--agent` path unchanged." },
  { id = "EX-2", text = "`resolve_harnesses_auto_detects_by_marker` rewritten + extended to the six §5 cases, including the bug-encoding fixture (old line-1679 regular-AGENTS.md-asserts-[Claude]) replaced by the symlink split." },
  { id = "EX-3", text = "Behaviour-preservation suites pass UNCHANGED: `import_targets_is_one_file_per_harness`, `ensure_boot_import_dedups_same_inode_to_one_write`, and existing install/refresh tests." },
]
verification = [
  { id = "VT-1", expects = "`.claude/` + separate-inode AGENTS.md (real distinct file) → resolve_harnesses == [Claude, Codex]. The fix." },
  { id = "VT-2", expects = "`.claude/` + AGENTS.md symlink→CLAUDE.md (real std::os::unix::fs::symlink) → [Claude]. This repo's behaviour, inode-equality branch." },
  { id = "VT-3", expects = "CLAUDE↔AGENTS symlink pair, no `.claude/` → [Codex]. Adversarial edge: alias-suppression gated on Claude-detected." },
  { id = "VT-4", expects = "Retained cases green: bare AGENTS.md no `.claude/` → [Codex]; `.codex/` + `.claude/` → [Claude, Codex]; neither marker → error." },
  { id = "VT-5", expects = "Behaviour-preservation suites (EX-3) green with no edits — the write seam and one-file rule are untouched." },
  { id = "VA-1", expects = "`just gate` green; `cargo clippy` zero warnings (no `as`/HashSet/indexing-slicing introduced)." },
]
specs             = []
requirements      = []
