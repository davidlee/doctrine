# STRUCTURAL relations are uniform `[[relation]]` rows, never a typed
# `[relationships]` axis (SL-048 "the cut"). Slices carry no typed STRUCTURAL
# relation axes — the `[relationships]` table above holds only the dep/seq payload
# (`needs`/`after`, SL-060). Author a structural edge with the `doctrine link` verb
