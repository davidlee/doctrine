  { id = "VH-1", expects = "dev-server: node-cell pencil, edit-all OFF → renames just that row's endpoint; ON → renames the label everywhere; relation pencil OFF → relabels that one edge; ON → relabels every edge sharing the rel; plain node click highlights; ✕ always deletes; add-edge form sits below the hover area; no edit buttons on non-CM entities" },
