# Implementation plan for SL-110 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-110"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "relabel_edge backend mutation"
objective = """
Add the `relabel_edge` concept-map mutation: pure `relabel_edge_in_dsl` in
`src/concept_map.rs` plus the `MutationAction::RelabelEdge` route variant + apply
arm in `src/map_server/routes.rs`. The DSL transform matches the target line by
label (like `remove_edge_from_dsl`), rewrites only its `rel` segment, and guards
new duplicates by DERIVED KEY (not the label check `add_edge_to_dsl` uses), with
an `old_rel == new_rel` no-op short-circuit. Fully isolated from the frontend;
unblocks PHASE-04 (item 4). Design §"Item 4 / Backend: relabel_edge mutation".
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked (2 codex passes integrated); relabel_edge spec is §Item 4 Backend" },
  { id = "EN-2", text = "existing concept_map.rs mutation suite green (behaviour-preservation baseline)" },
]
exit_criteria = [
  { id = "EX-1", text = "relabel_edge_in_dsl rewrites the rel segment of the label-matched line; other lines byte-unchanged" },
  { id = "EX-2", text = "duplicate guard is key-based: rejects when (derive_node_key(source), new_rel, derive_node_key(target)) exists on another line, incl. a different label spelling of the same key" },
  { id = "EX-3", text = "old_rel == new_rel (trimmed) returns the DSL unchanged; empty source/rel/target → EmptyField; no label-matched line → EdgeNotFound" },
  { id = "EX-4", text = "MutationAction::RelabelEdge variant + apply arm wired; reuses EmptyField/EdgeNotFound/DuplicateEdge, no new error variants" },
  { id = "EX-5", text = "existing concept_map.rs + routes.rs mutation tests still green unchanged" },
]
verification = [
  { id = "VT-1", expects = "relabel-persists: relabel A>old>B → A>new>B, surrounding lines unchanged (200)" },
  { id = "VT-2", expects = "DuplicateEdge by key-collision: target (from_key,new_rel,to_key) exists under a different label spelling → DuplicateEdge{line}" },
  { id = "VT-3", expects = "no-op: old_rel == new_rel returns original DSL; EdgeNotFound (404) and EmptyField (400) cases" },
  { id = "VT-4", expects = "routes.rs handler test: relabel_edge action deserialises (old/new aliases) + applies through the server seam" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "view-mode funnel + toggle sync (items 5, 1)"
objective = """
Make focus selection drive view mode and zoom through the universal funnel, and
make the toggle button track the result. Add pure `focusTransition(current, node,
isActionabilityMember, currentPriorityZoomId)` (wrapping `requiredMode` off
`node.kind`) in `model.ts`; apply it as a `focusChanged`-gated derive in
`renderView` (after route parse sets `state.focusId`, before the highlight),
build `actionabilityNodeIds` from `state.actionabilityView`, trivialise `goto` to
`setFocus`, and drop the manual in-graph `priorityZoomId` set. Then item 1: unify
the toggle class on the BEM `.view-btn--active` form (priority.css + index.html
seed) and extract `highlightViewButtons(mode)`, called once early in `renderView`
(past the edge-detail early return). Design §Item 5, §Item 1, D1/D2.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; Item 5 funnel + Item 1 class-unify specs present" },
  { id = "EN-2", text = "existing web/map vitest suites (model/router/viewport/priority/dot) green (baseline)" },
]
exit_criteria = [
  { id = "EX-1", text = "focusTransition is pure (no DOM/clock/rng/disk), returns concrete {viewMode, priorityZoomId} for every row incl. the echo case" },
  { id = "EX-2", text = "renderView runs the derive only when focusChanged; toggle-button click / depth change do not change focusId so the derive is skipped (Actionability toggle stays live with a CM focused)" },
  { id = "EX-3", text = "left-pane / table-row / deep-link / back-button picks all reach the derive via hashchange; CM pick → semantic; actionability member pick → zoom; non-member → priorityZoomId cleared" },
  { id = "EX-4", text = "goto reduced to setFocus(id, depth); manual in-graph priorityZoomId assignment removed" },
  { id = "EX-5", text = "CSS-styled class == code-toggled class (.view-btn--active); no remaining reference to bare .view-btn.active; highlightViewButtons hoisted before any early return, late L536-540 block deleted" },
]
verification = [
  { id = "VT-1", expects = "model.test.ts focusTransition table: CM→{semantic,null}; actionability+member→{actionability,id}; actionability+non-member→{actionability,null}; semantic+non-CM→{current, currentPriorityZoomId}; undefined node→safe" },
  { id = "VT-2", expects = "highlightViewButtons toggles view-btn--active for the matching data-view; class survives a render that takes the edge-detail early return" },
  { id = "VH-1", expects = "manual dev-server: focus a CM in actionability → switches to semantic; click Actionability toggle while CM focused → stays actionability (toggle not dead); left-pane pick of an actionable item zooms the priority graph; picking a non-member clears a prior zoom" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "actionability node hover tooltip (item 2)"
objective = """
Give actionability-graph nodes a styled hover tooltip matching the details pane.
Extract + export `hoverDetailHtml(node)` from `hoverPane` in `render.ts`, escaping
EVERY interpolated field (id/title/kindLabel/status — closes the latent raw
injection where only title was escaped); `hoverPane` delegates to it. Append one
absolutely-positioned `.priority-tooltip` element in `priority.ts` `renderGraph`,
driven from the existing per-node mouseenter/mousemove/mouseleave listeners.
Style via reused `hover-detail-*` rules. Catalog/actionability only — the CM
hover (`renderCmHoverPane`) stays separate. Design §Item 2, D3.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; Item 2 hoverDetailHtml spec present" },
  { id = "EN-2", text = "existing render/priority vitest suites green (baseline)" },
]
exit_criteria = [
  { id = "EX-1", text = "hoverDetailHtml exported, pure, escapes all four fields; hoverPane delegates to it (no forked markup)" },
  { id = "EX-2", text = "actionability node hover shows the tooltip with pane-equivalent content; positioned near the cursor; hidden on mouseleave" },
  { id = "EX-3", text = "CM hover path (renderCmHoverPane) untouched; only catalog/actionability nodes feed hoverDetailHtml" },
]
verification = [
  { id = "VT-1", expects = "render unit test: hoverDetailHtml output contains id/title/kindLabel/status AND escapes unsafe chars in each field (regression for the old raw injection)" },
  { id = "VH-1", expects = "manual dev-server: hovering an actionability node shows the styled tooltip tracking the cursor; matches the details-pane content; clears on leave" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "concept-map cell-select + Edit this / Edit all (item 4 frontend)"
objective = """
Split CM editing into a select gesture + two scoped buttons, consuming the
PHASE-01 backend. Click a cell → select that field (node cell also cmFocus-es the
node); no inline input on click. `cmSelectedField` carries the clicked LABEL for
both kinds (node `{key,label}`, rel `{from_label,rel,to_label}`) — mutations are
label-based. `editingField` drives a single-input render arm independent of the
existing `editing` (edit-all) flag. "Edit this" commits one field (node →
rename_node by old_label; rel → relabel_edge); "Edit all" is today's global mode,
unchanged. Wire buttons + handleRelabelEdge in `app.ts`; state/types additions;
concept-map.css affordances. Design §Item 4, D4.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: relabel_edge mutation available through the server seam" },
  { id = "EN-2", text = "design.md locked; Item 4 select/Edit-this/Edit-all + label-based identity spec present" },
]
exit_criteria = [
  { id = "EX-1", text = "clicking a cell selects that field (node cell also cmFocus-es); no inline input appears on click" },
  { id = "EX-2", text = "cmSelectedField carries labels for both kinds; Edit this submits node rename by old_label, rel relabel by from_label/old_rel/to_label" },
  { id = "EX-3", text = "single-field edit renders one input via editingField without entering edit-all (no remove ✕, no add-edge form); Edit all behaviour byte-unchanged" },
  { id = "EX-4", text = "Edit this disabled when nothing is selected; Enter commits, Esc cancels" },
]
verification = [
  { id = "VT-1", expects = "any extractable pure bit (e.g. selected-field → render-arm decision, or cmSelectedField construction from a clicked CmEdge cell) unit-tested" },
  { id = "VH-1", expects = "manual dev-server: select a node cell + Edit this → renames that label everywhere; select a relation + Edit this → relabels just that edge; Edit all still shows the full edit surface; ambiguous same-key/different-label cells resolve to the clicked label" },
]
specs        = []
requirements = []

