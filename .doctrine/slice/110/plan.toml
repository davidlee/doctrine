[[phase]]
id        = "PHASE-08"
name      = "focusTransition D2 reversal — non-member → Semantic (item 5 rework)"
objective = """
Reverse D2 per RV-098 F-5. Simplify `focusTransition` in `model.ts` to
`(current, focusId, isActionabilityMember, currentPriorityZoomId)` — DROP the
`requiredMode` inner and the `node` argument (the only use was its id, == focusId;
the CM-forces-semantic case is subsumed by the non-member→semantic row since a CM
is never an actionability member). New table: actionability+member →
`{actionability, focusId}`; actionability+non-member → `{semantic, null}` (the
reversal); semantic → `{semantic, currentPriorityZoomId}` (echo). The `renderView`
focusChanged-gated derive (PHASE-02) now passes `state.focusId`, not the node.
Update `model.test.ts` to the reversed contract — its own tests change by design;
no other vitest suite changes. Design §Item 5, D2 (reversed).
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md Revision 2 locked; §Item 5 + D2 (reversed) table present; RV-098 F-5 open" },
  { id = "EN-2", text = "PHASE-02 shipped the focusChanged-gated derive + the original focusTransition contract (baseline this supersedes)" },
  { id = "EN-3", text = "existing model.test.ts green on candidate/110/review-001 (baseline)" },
]
exit_criteria = [
  { id = "EX-1", text = "focusTransition signature is (current, focusId, isActionabilityMember, currentPriorityZoomId); requiredMode + node dropped; pure (no DOM/clock/rng/disk)" },
  { id = "EX-2", text = "table: actionability+member → {actionability, focusId}; actionability+non-member → {semantic, null}; semantic → {semantic, currentPriorityZoomId}; null focusId is safe" },
  { id = "EX-3", text = "renderView derive passes state.focusId (not the node); membership from actionabilityNodeIds; the focusChanged gate is preserved (Actionability toggle stays live with a CM focused)" },
  { id = "EX-4", text = "model.test.ts table updated to the reversed contract; no other web/map vitest suite changes" },
]
verification = [
  { id = "VT-1", expects = "model.test.ts focusTransition table: member→{actionability,focusId}; non-member→{semantic,null} (the reversal); semantic→{semantic,currentPriorityZoomId} echo; null focusId safe" },
