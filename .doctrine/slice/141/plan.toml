  # Agent verification (requires a real doctrine repo)
  { id = "VA-1", expects = "Agent check: `doctrine search \"scope\"` returns ranked results from entity bodies containing 'scope'." },
  { id = "VA-2", expects = "Agent check: `doctrine search \"scope\" --kinds adr` returns only ADR results." },
  { id = "VA-3", expects = "Agent check: `doctrine search \"scope\" --format json` emits valid JSON array." },
  { id = "VA-4", expects = "Agent check: `doctrine search \"scope\" --context` shows snippet context with matched terms visible." },
  { id = "VA-5", expects = "Agent check: `doctrine search \"scope\" --with req` includes requirements in results." },
  { id = "VA-6", expects = "Agent check: `doctrine search \"scope\" --no adr` excludes ADRs from results." },
  { id = "VA-7", expects = "Agent check: `doctrine search \"asdfnonexistent\"` returns zero results." },
