  { id = "VT-8", expects = "Unit test: snippet with no matching query tokens returns empty string." },

  # BM25 integration tests (uses test fixture — seed_* helpers in catalog)
  { id = "VT-9", expects = "Unit test: search over seeded entities (seed_slice with .md body containing 'auth') returns non-empty results for 'auth'." },
  { id = "VT-10", expects = "Unit test: search with kind filter restricts to matching kind only." },
  { id = "VT-11", expects = "Unit test: search with empty corpus or all score-0 results returns empty Vec (no 0-score leakage, no crash)." },

