# Implementation plan for SL-022 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-022"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (doc/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "At-rest fields & render"
objective = """
Add the two outbound scalar fields (`descends_from`, `parent`) to the `Spec`
struct and render them outbound-only, kind-gated to tech — the at-rest half of
the spine (design §5.1, §5.2). No registry, edges, or integrity yet. The
mechanical `None, None` test-constructor edits (no `Default`) land here; existing
parse/render output is unchanged because the new lines are `Some`-gated.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md is locked — self-review + inquisition pass resolved, no open deviation (inquisition.md §3)." },
  { id = "EN-2", text = "SL-015 spec/registry suites are green at HEAD (behaviour-preservation baseline)." },
]
exit_criteria = [
  { id = "EX-1", text = "`Spec` gains `descends_from: Option<String>` and `parent: Option<String>`, both `#[serde(default)]`; absent → None, present → Some (product + unfilled tech specs parse unchanged)." },
  { id = "EX-2", text = "`render()` emits, kind-gated to tech and only when Some, `descends from: <ref>` then `parent: <ref>` in order c4 → descends → parent → responsibilities → sources; no children line; a product spec omits both lines." },
  { id = "EX-3", text = "`install/templates/spec-tech.toml` documents `descends_from` and `parent` in the scaffold comment block (mirrors c4_level / [[source]]); the re-embedded scaffold emits them." },
  { id = "EX-4", text = "Every existing `spec.rs` test passes; the only edit to them is the mechanical `descends_from: None, parent: None` added to `Spec { … }` constructors. No assertion changes value." },
]
verification = [
  { id = "VT-1", expects = "parse tests: `parent`/`descends_from` present → Some, absent → None (Layer B)." },
  { id = "VT-2", expects = "render tests: tech emits both lines in order; product with `descends_from` omits the line; no children line; empty-field tech omits (existing render assertions still hold)." },
  { id = "VT-3", expects = "the SL-015 `spec.rs` suite is green with only the mechanical `None, None` constructor additions." },
  { id = "VA-1", expects = "`doctrine spec new --tech` (or scaffold read) shows the new comment lines — rust-embed re-embed confirmed after a clean build." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Registry edges, product set & FK / subject-kind checks"
objective = """
Extend the registry with a `product_specs` id set and `parents` / `descents`
edge collections (each edge carrying `on_product`), harvested by a NEW per-spec
`spec-NNN.toml` read+parse in `build_registry` (it parses no spec today — only the
edge tables; design §5.3, Charge I). BOTH arms harvest BOTH fields so a product
carrying a tech-only field is seen, not dropped (codex F5b). Add the HARD checks:
`descent_findings` and `parent_findings` — `on_product` → invalid-kind (tech-only
field on a product), else clean / invalid-kind / dangling by target membership;
and rewrite `dangling_interaction_targets` to split invalid-kind from dangling
(REQ-084 — an intended contract move, PRD-012 §6). No graph walk yet, no second-
parent carrier yet. Own the widened `build_registry` error surface.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: the two fields parse and render." },
]
exit_criteria = [
  { id = "EX-1", text = "`Registry` gains `product_specs: BTreeSet<String>`, `parents: Vec<ParentEdge { spec, parent, on_product }>`, `descents: Vec<DescentEdge { spec, target, on_product }>`; `build_registry` parses each `spec-NNN.toml` (both arms, both fields), sets `on_product = (subtype == Product)`, inserts product ids, and pushes edges with refs canonicalised via `resolve_spec_ref`." },
  { id = "EX-2", text = "`descent_findings`: `on_product` → invalid-kind (descends_from is tech-only); else tech descent target ∈ product_specs → clean, ∈ tech_specs → invalid-kind, ∈ neither → dangling (REQ-082, codex F5)." },
  { id = "EX-3", text = "`parent_findings`: `on_product` → invalid-kind (parent is tech-only, codex F5b); else parent ∈ tech_specs → clean, ∈ product_specs → invalid-kind, ∈ neither → dangling, excluding the self case (REQ-083)." },
  { id = "EX-4", text = "`dangling_interaction_targets` rewritten: product target → invalid-kind, neither → dangling (REQ-084); the old dangling-only behaviour is replaced." },
  { id = "EX-5", text = "The existing SL-015 checks keep their behaviour except the deliberate REQ-084 rewrite; the only existing-test edit is the mechanical `clean()` `Registry { … }` literal gaining the new fields (or `..Default::default()`) — codex F6b, a disclosed non-behavioural edit." },
]
verification = [
  { id = "VT-1", expects = "Layer A descent: clean (tech→product); dangling; invalid-kind (tech→tech target); invalid-kind on product subject (codex F5) — distinct messages." },
  { id = "VT-2", expects = "Layer A parent: clean (tech→tech); dangling; invalid-kind (tech→product target); invalid-kind on product subject (codex F5b); self case excluded (owned by PHASE-03)." },
  { id = "VT-3", expects = "Layer A interaction: invalid-kind (rewriting `non_tech_interaction_target_is_flagged_tech_only`) and dangling, asserting the two are distinct messages." },
  { id = "VT-4", expects = "Layer C(i): `build_registry` over a well-formed temp corpus collects product ids + parent/descent edges with correct `on_product`. Layer C(iv): an otherwise-malformed `spec-NNN.toml` now surfaces a parse error through validate where before it was invisible (error-surface widening)." },
  { id = "VT-5", expects = "the SL-015 `registry.rs` suite is green with only the mechanical `clean()` literal edit; no assertion changes value." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Decomposition integrity (REQ-087)"
objective = """
Enforce the single-parent acyclic tree. `self_parent` is the sole reporter of
A→A. `parent_cycle` walks the child→parent map keeping an ordered path + first-seen
index, recovers the cycle SLICE on revisit (not the tail that fed it), and emits
ONE finding per cycle — only when the start node is the slice's least id (codex
F3, correct dedup for a tail feeding a ring). The `second_parent` finding is born
by CLASSIFYING the `toml::from_str` error (duplicate-key / wrong-type at `parent`)
— not a raw line-scan, which would false-hit the scaffold's commented example
(codex F2) — and carried via a new `Registry.build_findings` field (codex F1, the
carrier `validate` reads); `validate` surfaces it, `run_validate` exits non-zero
(literal REQ-087 AC1 + AC3; §5.2, §6a).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete: parent edges and product set are collected; FK / subject-kind checks pass." },
]
exit_criteria = [
  { id = "EX-1", text = "`self_parent` reports A→A exactly once; `parent_cycle` skips self-loops, recovers the cycle slice via ordered-path + first-seen index, and reports each cycle exactly once (start == slice's least id), terminating cleanly at a root or a dangling parent — correct even when a non-cycle tail feeds the ring (codex F3)." },
  { id = "EX-2", text = "`Registry` gains `build_findings: Vec<BuildFinding { spec, message }>`; `build_registry` classifies a duplicate-key / wrong-type-at-`parent` parse error into a named `second_parent` finding pushed there (any other parse error propagates as `Failed to parse`); `validate(scope)` aggregates `build_findings` (scope-filtered) into its hard set — no raw line-scan (codex F1/F2)." },
  { id = "EX-3", text = "`run_validate` exits non-zero on a second-parent corpus, proven end-to-end here; self-parent and cycle add to `validate`'s hard list and ride the existing non-zero bail (the full CLI sweep over every decomposition violation is PHASE-04) — REQ-087 AC3." },
]
verification = [
  { id = "VT-1", expects = "Layer A: self-parent → one finding; cycle-2, cycle-3, AND a tail-fed-cycle (`T→A→B→A`) each asserting the finding COUNT is exactly one (codex F3 — guards the dedup, not mere existence); a clean chain-to-root yields no finding." },
  { id = "VT-2", expects = "Layer C(ii): a duplicate-`parent` corpus AND an array-`parent` corpus each → the named `build_findings` second-parent entry surfaced by `validate` and a non-zero `run_validate` exit, asserted end-to-end (not at `toml::from_str` level)." },
  { id = "VT-3", expects = "Layer C(iii): a freshly-scaffolded tech spec carrying the commented `# parent = …` example does NOT trip the second-parent finding (codex F2 regression)." },
  { id = "VT-4", expects = "A→A yields exactly one finding total across `self_parent` + `parent_cycle` (no double-report)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Cross-cutting validation sweep & closure"
objective = """
No severity tier (dropped, codex F5 — `validate` stays hard-only, signature
unchanged). This phase is the end-to-end gate: a single crafted corpus exercising
EVERY hard violation through the `doctrine spec validate` CLI, proving non-zero
exit on each and zero on a clean corpus (the findings-list cases — self-parent,
cycle, FK / subject-kind — that PHASE-03 left to the existing bail). Then land
closure: `just check`, clippy zero, storage-rule and scaffold-comment checks. The
template comment work (REQ-082 AC3 review-only check) is confirmed here.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 complete: all hard checks (FK, subject-kind, self-parent, cycle, second-parent) return findings; the build_findings carrier is wired into validate." },
]
exit_criteria = [
  { id = "EX-1", text = "`doctrine spec validate` exits non-zero on each crafted hard violation — dangling/invalid-kind/product-subject descent, dangling/invalid-kind/product-subject parent, self-parent, cycle, second-parent, dangling/invalid-kind interaction — and exits zero on a clean corpus. `validate`'s signature is unchanged (no warnings tier)." },
  { id = "EX-2", text = "REQ-082 AC3 (no restate) is confirmed satisfied-by-construction (the field stores only an id; no prose field exists) — a review check (VA), not a code gate; recorded in audit." },
  { id = "EX-3", text = "`just check` is green and `cargo clippy` reports zero warnings (string-build and BTree-only collection bans honoured); the storage rule holds (no derived data — children, reverse view — persisted)." },
]
verification = [
  { id = "VT-1", expects = "end-to-end CLI sweep: each crafted hard violation → non-zero `doctrine spec validate`; a clean corpus → zero. Covers the self-parent / cycle / FK / subject-kind cases at the CLI level (PHASE-03 proved second-parent end-to-end)." },
  { id = "VA-1", expects = "`just check` green and clippy zero warnings, confirmed in the closing run; the re-embedded `spec-tech.toml` scaffold emits the `descends_from` / `parent` comments (rust-embed footgun cleared)." },
  { id = "VA-2", expects = "REQ-082 AC3 reviewed: no `descends_from` author can restate product intent (id-only field, no prose slot)." },
]
specs        = []
requirements = []
