[[phase]]
id        = "PHASE-01"
name      = "Refactor worktree::coordinate + dispatch setup"
objective = """
Extract a pure-core `fn coordinate()` from `run_coordinate` returning a \
`CoordOutcome` with the dispatch ref tip and trunk base. Build `dispatch setup` \
on it: read plan.toml, gate on non-empty phase list, call `coordinate`, emit \
the env contract on stdout. Wire the clap variant in main.rs."""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked â€” design Â§2 (dispatch setup) is settled; CoordOutcome struct shape defined; env contract format (`KEY=value` lines) specified." },
  { id = "EN-2", text = "Green baseline: `just gate` clean at phase start; existing worktree and dispatch tests pass unchanged." },
]
exit_criteria = [
  { id = "EX-1", text = "`worktree::coordinate(root, slice, dir)` extracted from `run_coordinate`, returns `CoordOutcome { dispatch_tip, trunk_base }`. `run_coordinate` wraps it with CLI I/O (behavior unchanged â€” existing integration tests still green)." },
  { id = "EX-2", text = "`dispatch setup` plan-gate: reads plan.toml via `Plan::parse`, refuses missing file or zero phases with a clear error message." },
  { id = "EX-3", text = "`dispatch setup` emits env contract (coordination_dir, base, slice, dispatch_ref, trunk_base) on stdout; human status on stderr." },
  { id = "EX-4", text = "`dispatch setup` refuses live coordination worktree (`coordination-live`) and resumes a branch with no live worktree â€” both via `coordinate()` delegation." },
]
verification = [
  { id = "VT-1", expects = "`dispatch setup --slice 85 --dir <tmp>` on a slice with a plan creates the coordination worktree, prints env contract with all five KEY=value lines, exits 0." },
  { id = "VT-2", expects = "`dispatch setup` on a slice with no plan.toml exits non-zero with message containing 'no plan'." },
  { id = "VT-3", expects = "`dispatch setup` on a slice with an empty phase list exits non-zero with message about empty plan." },
  { id = "VT-4", expects = "`dispatch setup` twice on the same slice: second invocation exits non-zero with 'coordination-live'." },
  { id = "VT-5", expects = "`dispatch setup` with a coordination branch but no live worktree resumes (reattaches), prints env contract, exits 0." },
  { id = "VT-6", expects = "Existing worktree coordinate integration tests stay green â€” `run_coordinate` behavior unchanged by the extraction." },
]
specs             = []
requirements      = []

[[phase]]
id        = "PHASE-02"
name      = "dispatch plan-next"
objective = """
Build the `dispatch plan-next` verb: read plan.toml for ordered phase list, \
read runtime phase sheets for status, compute `next` (all consecutive \
non-completed non-blocked phases from the first one), render human table or \
JSON. Introduce the shared `render_phase_table` helper that PHASE-03 reuses."""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete â€” plan.toml parsing path exists (reused from `setup`'s plan gate); `Plan::parse` and runtime state module are the data sources." },
  { id = "EN-2", text = "design Â§3 (dispatch plan-next) settled: `next` definition (consecutive non-completed non-blocked, in_progress gates), JSON schema." },
]
exit_criteria = [
  { id = "EX-1", text = "`dispatch plan-next` prints ordered phase table (id, status, name) for every phase in plan.toml, sourcing status from `state/slice/<N>/phases/phase-NN.toml`. Absent tracking file â†’ `pending`." },
  { id = "EX-2", text = "`next` returns all consecutive non-completed non-blocked phases from the first one. An `in_progress` phase gates subsequent `pending` phases. All remaining blocked â†’ `next` empty with explicit message." },
  { id = "EX-3", text = "`--json` output is valid JSON with `phases` array (id, name, status per phase) and `next` array." },
  { id = "EX-4", text = "Shared `render_phase_table` helper factored out â€” designed so PHASE-03 can reuse it without fork." },
]
verification = [
  { id = "VT-1", expects = "`dispatch plan-next --slice 85` with phases [completed, completed, blocked, pending] prints correct statuses and `next: PHASE-04`." },
  { id = "VT-2", expects = "`dispatch plan-next --slice 85` with an `in_progress` phase PHASE-03 and `pending` PHASE-04 â†’ `next: [PHASE-03]` (gated by in_progress)." },
  { id = "VT-3", expects = "`dispatch plan-next --slice 85` with all remaining phases blocked â†’ `next: (none â€” all remaining phases are blocked)` and exits 0." },
  { id = "VT-4", expects = "`dispatch plan-next --slice 85` with no plan.toml exits non-zero." },
  { id = "VT-5", expects = "`dispatch plan-next --slice 85 --json` emits valid JSON, `phases` array matches plan order, `next` is a JSON array." },
]
specs             = []
requirements      = []

[[phase]]
id        = "PHASE-03"
name      = "dispatch status"
objective = """
Build the `dispatch status` verb: coordination state (ref tip, live worktree \
path), trunk drift (merge-base ancestor check), phase table via shared \
renderer, sync state (review/phase refs), candidate summary. Human table or \
JSON output."""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete â€” shared `render_phase_table` exists; phase rollup logic available." },
  { id = "EN-2", text = "design Â§4 (dispatch status) settled: trunk drift via merge-base ancestor check, sync state from ref existence, candidate summary from `read_candidates`." },
]
exit_criteria = [
  { id = "EX-1", text = "`dispatch status` prints coordination state: dispatch ref tip (abbreviated), worktree path or `(removed)`." },
  { id = "EX-2", text = "`dispatch status` prints trunk drift: `stable` or `moved (N commits ahead of fork-point)`. Recomputes fork-point each invocation." },
  { id = "EX-3", text = "`dispatch status` prints phase table via shared renderer (same as `plan-next`)." },
  { id = "EX-4", text = "`dispatch status` prints sync state: `not yet run`, `prepared â€” review/<N>, N phase cuts`, or `integrated`." },
  { id = "EX-5", text = "`dispatch status` prints candidate summary: count + admitted count, or `0`. Does not duplicate `candidate status` detail." },
  { id = "EX-6", text = "`dispatch status` prints `next` guidance: next phase(s) or `(all phases completed â€” â€¦)` with context-appropriate advice." },
]
verification = [
  { id = "VT-1", expects = "`dispatch status --slice 85` fresh after setup prints coordination state with live worktree, all phases `pending`, `sync: not yet run`, exits 0." },
  { id = "VT-2", expects = "`dispatch status --slice 85` after sync prints `sync: prepared â€” review/085` and phase cut count." },
  { id = "VT-3", expects = "`dispatch status --slice 85` with a moved trunk prints `trunk: moved (N commits ahead of fork-point)` (N â‰Ą 1)." },
  { id = "VT-4", expects = "`dispatch status --slice 85` with all phases completed prints appropriate `next` guidance mentioning `--prepare-review`." },
  { id = "VT-5", expects = "`dispatch status --slice 85` with coordination worktree removed prints `coord: (removed)` and still resolves dispatch ref tip." },
  { id = "VT-6", expects = "`dispatch status --slice 85 --json` emits valid JSON with all sections (coordination, phases, sync, candidates, next)." },
]
specs             = []
requirements      = []

