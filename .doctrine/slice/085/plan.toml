name      = "Skill shrinkage"
objective = """
Shrink the three dispatch skill files to their post-CLI-verb forms. \
`dispatch/SKILL.md` â†’ ~40 lines (when to use, setupâ†’spawnâ†’funnelâ†’plan-next \
loop, conclude, red flags). `dispatch-agent/SKILL.md` â†’ ~25 lines (claude spawn \
template, verify-worker, boundary recording, red flags). \
`dispatch-subprocess/SKILL.md` â†’ ~20 lines (codex/pi spawn template, env \
contract, confined profile). Re-install and re-embed."""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01..03 complete â€” all three new verbs exist and are tested. The skills can reference `dispatch setup`, `dispatch plan-next`, `dispatch status`." },
]
exit_criteria = [
  { id = "EX-1", text = "`dispatch/SKILL.md` â‰¤ ~45 lines. Retains: when to use, outer loop, funnel cadence, handover, conclude, red flags. Removes: coordination setup internals, phase ordering logic, per-arm fork details (delegated to arm skills), candidate lifecycle prose (CLI-owned)." },
  { id = "EX-2", text = "`dispatch-agent/SKILL.md` â‰¤ ~30 lines. Retains: spawn template (`Agent` tool, subagent_type, isolation), verify-worker, boundary recording note, red flags." },
  { id = "EX-3", text = "`dispatch-subprocess/SKILL.md` â‰¤ ~25 lines. Retains: fork invocation, `env -C` / bwrap spawn, env contract sourcing, red flags." },
  { id = "EX-4", text = "Skills re-installed via `doctrine install` and re-embedded (`touch src/skills.rs && cargo build`)." },
  { id = "EX-5", text = "References to `dispatch import` purged from all three skills (the verb was dropped from scope)." },
  { id = "EX-6", text = "Embedded skill text matches edited plugin source â€” integration test verifies line count within target range and key prose present." },
]
verification = [
  { id = "VA-1", expects = "Agent review: each skill is self-contained for its role â€” the router describes the outer loop without restating arm mechanics; the arm skills describe spawn mechanics without restating the funnel. No 'dispatch import' references remain." },
  { id = "VT-1", expects = "`just gate` green â€” skill changes are prose-only, no code impact, but the re-embed and rebuild must not break compilation or existing tests. Embedded skill text matches edited plugin source." },
]
specs             = []
requirements      = []
