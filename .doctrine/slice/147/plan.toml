# Implementation plan for SL-147 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-147"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

[[phase]]
id        = "PHASE-01"
name      = "Selector schema + batch CLI"
objective = "Mint the authored [[selector]] tier on SliceDoc (path|glob + intent {scope-relevant, design-target} + optional note) and the batch-first `slice selector` CLI. Foundational authored surface; no consumers yet (design D1/D2/D3)."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked (RV-148 passed); SliceDoc serde + commands wiring understood." },
]
exit_criteria = [
  { id = "EX-1", text = "Selector { selector, intent: SelectorIntent, note: Option<String> } + #[serde(default)] selectors: Vec<Selector> on SliceDoc round-trip through slice-NNN.toml; existing slices (no [[selector]]) deserialize as empty (no migration)." },
  { id = "EX-2", text = "`slice selector add <SL> --intent <I> <glob>...` is variadic and upserts by selector string (re-add updates intent/note); `slice selector note <SL> <glob> <text>`, `list`, and variadic `rm` work." },
  { id = "EX-3", text = "SelectorIntent serde is kebab-case and rejects unknown intent values with a clear error." },
]
verification = [
  { id = "VT-1", expects = "Unit/integration: batch add (N selectors, one --intent), upsert semantics, note override, rm (variadic), TOML round-trip." },
  { id = "VT-2", expects = "Unknown --intent value is rejected; empty/absent [[selector]] table deserializes to an empty Vec." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Recorded-delta registry + write guard"
objective = "Build the arm-neutral recorded source-delta registry: extract BoundaryRow to a leaf module, write/read .doctrine/state/slice/<NNN>/boundaries.toml resolved against the PRIMARY working tree (reuse worktree::subagent::primary_worktree), guarded at write by an ancestor + non-merge check (design D5/D7, F-5/F-6)."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; ledger::BoundaryRow and worktree::subagent::primary_worktree located." },
]
exit_criteria = [
  { id = "EX-1", text = "BoundaryRow lives in a leaf module imported by both `ledger` and `state` (ADR-001, no engine↔engine cycle); it is a pure relocation — existing ledger/dispatch suites pass unchanged (behaviour-preservation gate)." },
  { id = "EX-2", text = "state::record_source_delta appends a row and a reader returns rows, both resolving the registry path via the reused primary_worktree resolver (one shared file across worktrees)." },
  { id = "EX-3", text = "The writer refuses an under-constrained range: code_start_oid must be an ancestor of code_end_oid and the recorded range must be non-merge (--first-parent / reject merge code_end); bare-repo / not-a-repo surfaces a clean named error, not a panic." },
]
verification = [
  { id = "VT-1", expects = "Guard tests: non-ancestor range rejected; merge-commit code_end rejected; valid ancestor/non-merge pair accepted and persisted." },
  { id = "VT-2", expects = "Registry round-trip; resolution from a linked worktree targets the primary tree's file (resolver call-site test)." },
  { id = "VA-1", expects = "Agent confirms the BoundaryRow move changed no ledger/dispatch behaviour — existing suites green and unedited where they assert that behaviour." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Pure algebra + conformance verb"
objective = "Compute the killer consumer: a pure set-algebra module (per-path ordered event-set + net()) and the `slice conformance` verb, with glob_matches lifted to a shared leaf and a completeness check that fails closed on partial coverage (design D6, F-2/F-3/F-7)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 (selectors) and PHASE-02 (registry reader) complete." },
]
exit_criteria = [
  { id = "EX-1", text = "Pure module computes {conformant (carrying the matched selector), undeclared (carrying net() verb), undelivered} over (design-target selectors, actual event-sets); glob_matches lifted to a shared leaf and consumed here. net() rule: trailing D ⇒ removed; A w/o trailing D ⇒ added; else modified." },
  { id = "EX-2", text = "`slice conformance <SL>` shell: read design-target selectors + the registry, invoke the completeness check against the slice's COMPLETED phases (one row per landed phase, explicit zero-delta allowed), then emit the algebra; mismatch ⇒ `incomplete` naming the gap; empty registry ⇒ `unavailable`. Never a clean diff from partial coverage. The completeness check is AUTHORED at state.rs altitude (D7) — it reads the phase sheets via state.rs's existing sheet access; the conformance shell only invokes it. No phase-sheet reading in the command/conformance layer." },
]
verification = [
  { id = "VT-1", expects = "Pure: net() over A→M, A→D, M→M, M→D→A; algebra cells incl. matched-selector reporting; glob vs literal matching." },
  { id = "VT-2", expects = "Degrade: empty registry → unavailable; recorded-rows-vs-completed-phases mismatch (missing / extra / unrecorded-completed) → incomplete naming the gap." },
  { id = "VT-3", expects = "`slice conformance` integration over a fixture slice + synthetic ranges asserts the three cells and the matched selector per conformant path." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Solo binding + record-delta (dispatch funnel recorder, both arms, + manual)"
objective = "Wire registry capture across all arms onto the PHASE-02 writer+guard, mutually exclusive: (1) the SOLO `slice phase` binding — deterministic, no off-critical-path call, SKIPPED in a dispatch coordination context; (2) `slice record-delta` (resolves refs→oids, guard, upsert) serving BOTH the dispatch funnel recorder (orchestrator-issued at the record beat on claude AND codex/pi, B→B+1) and the manual/bootstrap escape hatch. Solo binding and dispatch recorder never both record a phase; all three arms (solo, claude-dispatch, codex/pi-dispatch) covered (design D5; OQ-conf-1 resolved by construction; POL-002)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete (registry writer + guard)." },
]
exit_criteria = [
  { id = "EX-1", text = "SOLO binding (the happy path): `slice phase <SL> <P> --status in_progress` stamps code_start_oid=HEAD into the phase sheet; `--status completed` captures code_end_oid=HEAD, applies the PHASE-02 guard, and UPSERTS the phase's boundary row (reopen re-captures; start==end ⇒ explicit zero-delta row). A git/bare-repo failure degrades to no-row with a clean named message and NEVER blocks the phase-status transition itself — F-2 then catches the completed-but-unrecorded phase. OQ-conf-1 dissolves: no ref to choose, only HEAD at two lifecycle moments." },
  { id = "EX-2", text = "ARM DISCRIMINATION (dispatch-compat): the solo binding fires ONLY outside a dispatch coordination context. It detects that context via a doctrine-owned signal (`dispatch/<N>` coordination branch / coordination-worktree role — NOT a host convention, POL-002-clean) and SKIPS capture there, so the dispatch beat is the sole recorder and HEAD==coordination-B is never mistaken for a phase delta. The gate keys on dispatch-coordination, NOT on linked-worktree (a solo `/worktree` fork still captures). Verified premise: dispatch does not call `slice phase` today — the guard is belt-and-braces, enforced not assumed." },
  { id = "EX-3", text = "`doctrine slice record-delta <SL> --phase <P> --start <ref> --end <ref>` resolves refs → oids, applies the F-6 guard, and upserts one row per phase into the arm-neutral registry (resolved to the primary tree via primary_worktree even when run from a linked/coordination worktree). This ONE verb serves two callers: the dispatch funnel (EX-4) and the manual escape hatch (corrected range / bootstrap a slice predating the binding)." },
  { id = "EX-4", text = "DISPATCH on BOTH arms (claude + codex/pi): the funnel record beat (step 8) calls `slice record-delta <SL> --phase <P> --start B --end B+1` — the coordination boundary the orchestrator already holds. Arm-agnostic because both arms run the shared funnel and produce the same per-phase B→B+1; codex/pi is covered with NO claude-only gate. The existing claude-arm committed `.doctrine/dispatch/<N>/boundaries.toml` (the `phase/<N>` ref-cut input, ledger.rs) is a SEPARATE artifact — untouched. Existing dispatch suites stay green." },
]
verification = [
  { id = "VT-1", expects = "Solo binding: in_progress→completed writes the boundary row deterministically; reopen updates it (upsert by phase); a no-commit phase writes a zero-delta row; a git-unavailable transition still COMPLETES (degrades to no-row, no panic, no block)." },
  { id = "VT-2", expects = "Arm mutual-exclusion: a `slice phase --status completed` issued in a SIMULATED dispatch coordination context writes ZERO rows from the binding (skipped); a solo-context completion writes exactly one." },
  { id = "VT-3", expects = "record-delta: happy path (row upserted into the arm-neutral registry) and guard rejection (non-ancestor / merge) exercised via the CLI; registry resolves to the primary tree when the verb runs from a linked worktree." },
  { id = "VA-1", expects = "Dispatch funnel records via record-delta on BOTH arms — verified against a claude-arm AND a codex/pi-arm dispatch fixture (each yields one arm-neutral row per phase). Only the orchestrator writes (sole-writer); the existing committed claude-arm boundaries.toml is untouched." },
  { id = "VA-2", expects = "POL-002 conformance: the slice-delta is computed only from recorded oids and doctrine-owned signals (dispatch-context detection keys on `dispatch/<N>`, doctrine's own branch) — no (SL-NNN) or other host-convention grep anywhere in the path." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Burn domain_map + re-point staleness"
objective = "Retire the dead domain_map authored input and prose tier; re-point review prime/status staleness onto the selector list with a glob→fileset resolution step, scoped to slice-backed RVs (design D4, F-4). Independent of the conformance path; the review suite is the behaviour-preservation gate."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete (selector source exists)." },
  { id = "EN-2", text = "The shared glob_matches leaf (PHASE-03 EX-1) exists. The glob→fileset re-point (EX-2) consumes the lifted leaf — it must NOT re-implement matching (no parallel impl). Under serial execution P3 precedes P5; declared here so the dependency is not lost if order changes." },
]
exit_criteria = [
  { id = "EX-1", text = "Removed: CacheNote (invariant/risk), CacheArea.purpose, validate_domain_map's prose checks, run_prime's domain_map.toml parse/arg. Cache slimmed to { paths, hashes }." },
  { id = "EX-2", text = "run_prime resolves the RV target → slice selectors → glob→fileset → hash → cache; a non-slice RV target (or zero selectors) fails with a named message, never a silent-empty cache or panic." },
  { id = "EX-3", text = "review status staleness COMPUTATION (the pure diff) is behaviour-preserved; only its input fixtures migrate from domain_map.toml to the selector source." },
]
verification = [
  { id = "VT-1", expects = "Staleness computation tests green with the selector source; a glob selector resolves to a fileset before hashing; literal paths still work." },
  { id = "VT-2", expects = "run_prime against a phase/backlog RV target fails with the named message (asserted), not a panic or silent-empty cache." },
  { id = "VA-1", expects = "Call-graph confirmation: zero remaining readers/writers of the burned prose tier." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-06"
name      = "Skill wiring + dogfood"
objective = "Thread selectors / record-delta / conformance into the lifecycle skills and prove value on a concrete target (design D8, F-8)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01..05 complete." },
]
exit_criteria = [
  { id = "EX-1", text = "/slice seeds coarse scope-relevant selectors; /design adds design-target selectors; /execute needs NO new off-path step — phase completion auto-records the boundary via the PHASE-04 `slice phase` binding (document in the skill, do not add a separate call); the /dispatch funnel record beat calls `slice record-delta --start B --end B+1` on BOTH arms (remove the claude-only restriction from the dispatch skills for the arm-neutral write; the existing claude-arm committed boundaries.toml stays as-is); /audit runs slice conformance and reads the algebra." },
  { id = "EX-2", text = "Dogfood on the deterministic path: SL-147's own post-binding phases (PHASE-04 onward) auto-record as they complete; run `slice conformance SL-147` and capture the output. The pre-binding phases (PHASE-01..03) carry no rows — either bootstrap them via record-delta for a full self-diff, or let conformance report `incomplete` for them (a live demonstration of the F-2 backstop). Either way the captured signal is real, never a false-clean diff." },
  { id = "EX-3", text = "Fully-clean proof (optional, belt-and-suspenders): a separate forward slice cut after SL-147, run end-to-end so EVERY phase auto-records via the binding — no bootstrap, no manual call, the non-circular proof (design F-8)." },
]
verification = [
  { id = "VT-1", expects = "Every command shape referenced by the edited skills resolves (no dangling verb/flag) — checked against the CLI." },
  { id = "VH-1", expects = "Human confirms the conformance output surfaces conformance signal an auditor would otherwise hand-hunt (the prove-value verdict for RFC-004's killer consumer)." },
]
specs        = []
requirements = []
