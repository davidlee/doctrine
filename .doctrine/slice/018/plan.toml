# Implementation plan for SL-018 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-018"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion and
# verification ids (EN-/EX-/VT-) are local to their phase and equally immutable.

# ---------------------------------------------------------------------------
[[phase]]
id        = "PHASE-01"
name      = "Sanction the class: ADR + memory-spec amendment (the GATE)"
objective = """
Amend scripture BEFORE a master is authored or a line of admission/staleness code \
is written (design D10, Charge II) — the corpus is spec-violating (memory-spec \
§306: "unanchored permitted only for unscoped") and the `repo=""` admission path \
unblessed until the class is sanctioned. Allocate the next ADR via `doctrine adr \
new` (lands ADR-002; ADR-001 is the only extant record) blessing the \
**global / unanchored / path-scoped / derived** memory class: `repo=""` (admitted \
in every partition — repo-id is the cross-repo filter, so a real id self-excludes), \
`anchor_kind=none` (asserts nothing about client git), native entity, second \
indexer scan root. The ADR MUST also define the **fourth staleness disposition** \
(Charge IV): the global/unanchored/derived class is **evergreen / reference-grade**, \
exempt from the days-since-`reviewed` decay, rendering an explicit non-decaying \
`reference` state rather than a decaying `stale` (bumping `reviewed` at sync would \
break the idempotent diff that makes the M1 hook cheap — so exemption, not \
re-stamping). Amend `doc/memory-spec.md`: the anchoring section (§295-308) gains \
the carve-out sanctioning scoped+unanchored for this class; the retrieval section \
(§326-368) records the `repo=""` admission; the staleness model gains the \
evergreen disposition. This phase is **scripture only** — NO master, NO code, NO \
test code. It exists so every downstream phase has canon to ride. Set the ADR \
status to accepted (`doctrine adr status`).
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked through inquisition round 2 (D1-D10, all 12 charges dispositioned in inquisition.md Part VI); HEAD `just check` green (behaviour-preservation baseline)" },
  { id = "EN-2", text = "memory-spec.md §295-368 (anchoring + retrieval + staleness) read; the §306 contradiction and the days-since-reviewed decay path located" },
]
exit_criteria = [
  { id = "EX-1", text = "ADR-002 allocated via `doctrine adr new`, status `accepted` via `doctrine adr status`; it blesses the global/unanchored/path-scoped/derived class (repo=\"\", anchor_kind=none, native entity, 2nd scan root) AND the evergreen/reference-grade staleness disposition (decay-exempt)" },
  { id = "EX-2", text = "doc/memory-spec.md amended: anchoring carve-out (scoped+unanchored sanctioned for this class, reconciling §306), retrieval admission (repo=\"\" admitted in every partition), and the 4th staleness disposition (evergreen reference, non-decaying) — all three present and internally consistent" },
  { id = "EX-3", text = "no master authored, no source touched, no test added in this phase (gate is scripture-only); `just check` still green at phase end" },
]
verification = [
  { id = "VT-1", expects = "`doctrine adr list` shows ADR-002 accepted; the ADR text names the class's four properties (global/unanchored/path-scoped/derived) and the evergreen staleness exemption explicitly" },
  { id = "VT-2", expects = "a read of the memory-spec diff confirms it sanctions the repo=\"\"/anchor=none admission path and defines the non-decaying `reference` state for the class — no longer contradicting the corpus the later phases author" },
  { id = "VT-3", expects = "`git diff --stat` for the phase touches only the ADR tree and doc/memory-spec.md (no src/, no memory/, no tests/) — the gate did not leak into code" },
]
specs        = []
requirements = []

# ---------------------------------------------------------------------------
[[phase]]
id        = "PHASE-02"
name      = "Retrieval reach for the global class: collect_all, body fallback, admission golden, evergreen staleness"
objective = """
Make the retrieval/index surface correctly COMPOSE, READ, ADMIT, and AGE the \
global/derived class — fixture-tested, no embed or real corpus needed yet. \
Preserve the leaf (gate, design §5.2): `collect_memories(items_root)` \
(`memory.rs:1069`) stays byte-for-byte — existing tests call it directly \
(`memory.rs:2896-2900`). Add the composite `collect_all(root)` over it: union the \
capture root (`items/`) and the shipped root (`.doctrine/memory/shipped/`), dedup \
by uid with **items/ winning** (committed capture outranks a shipped default; the \
dropped duplicate is logged at `find` debug, not an error), shipped-absent ⇒ \
identical to `collect_memories(items)`. Switch the three callers to it: \
`retrieve.rs:633` (find+retrieve), `memory.rs:1092` (run_list), `memory.rs:1109` \
(list_rows → boot via `boot.rs:127`) — so shipped memories surface in \
find/retrieve/list **and the boot snapshot** (the orientation reach). Fix \
`read_body` (`retrieve.rs:780`, items_root-only): try the capture root, fall back \
to the shipped root (a shipped uid is absent from `items/`). Pin the **required \
admission golden** (Charge IX / R3): the `base_filter` global hatch \
(`retrieve.rs:174`, repo="" admitted) is DORMANT today — zero `repo=""` memories \
exist in production, so there is no lived baseline; a mandatory golden asserts \
base_filter admits AND scope-match surfaces a `repo=""`/anchor=none memory in an \
arbitrary client partition (extend the existing B20 test). Implement the **evergreen \
staleness** disposition gated by PHASE-01: the staleness fn (`retrieve.rs` \
~309-319/:361) special-cases `repo=""`+anchor=none+no verified_sha to render the \
non-decaying `reference` state, never a decaying `stale`. The whole phase rides \
synthetic shipped/ fixtures; the SL-005/007/008 suites stay green UNCHANGED.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: ADR-002 accepted, memory-spec amendment defines the class + evergreen staleness disposition (the code here is gated by that sanction); HEAD green" },
  { id = "EN-2", text = "the leaf and its direct test callers re-confirmed at `memory.rs:1069` / `:2896-2900`; the three callers (`retrieve.rs:633`, `memory.rs:1092`, `:1109`) and `base_filter` (`retrieve.rs:174`) / `read_body` (`retrieve.rs:780`) / staleness fn located" },
]
exit_criteria = [
  { id = "EX-1", text = "`collect_memories` signature UNCHANGED; new `collect_all(root)` unions items/+shipped/, dedups by uid (items wins), shipped-absent ⇒ equals `collect_memories(items)`; the three callers (retrieve, run_list, list_rows) switched to it" },
  { id = "EX-2", text = "`read_body` falls back capture-root → shipped-root; a shipped memory's body renders through `retrieve`/`find`" },
  { id = "EX-3", text = "required admission golden lands: `base_filter` admits + scope-match surfaces a `repo=\"\"`/anchor=none memory in an arbitrary client partition (the newly-lit dormant hatch is pinned, not assumed)" },
  { id = "EX-4", text = "evergreen staleness disposition implemented: a `repo=\"\"`, anchor=none, no-`verified_sha` memory renders the non-decaying `reference` state, never a decaying `stale`; no crash on the unattested-but-scoped path" },
  { id = "EX-5", text = "behaviour-preservation gate held: SL-005/007/008 memory suites pass UNCHANGED; `just check` / `cargo clippy` zero-warning (bins+lib)" },
]
verification = [
  { id = "VT-1", expects = "collect_all unit tests: union, items/-wins dedup on uid collision, shipped-root-absent equals `collect_memories(items)`; the existing direct-`collect_memories` tests are untouched and green (gate proof)" },
  { id = "VT-2", expects = "read_body fallback test: a uid present only under shipped/ resolves its body; list_rows/boot include a synthetic shipped memory once a shipped root exists" },
  { id = "VT-3", expects = "the required golden: base_filter admits the repo=\"\" shipped memory in a foreign partition AND scope-match surfaces it on a path hit; a scope-MISS does not surface it (no dilution of focused queries)" },
  { id = "VT-4", expects = "staleness test: the global/unanchored/derived class renders `reference` (non-decaying) across an arbitrary elapsed `reviewed` gap; a normal anchored memory still decays (the special-case is scoped to the class)" },
]
