[[phase]]
id        = "PHASE-05"
name      = "Author the corpus: triage 86 → skeleton → masters → E2E (the content phase)"
objective = """
The content phase — the slice may NOT go green on plumbing alone with an empty \
corpus (Charge XII). **Triage** all 86 spec-driver shipped memories into a \
disposition table: (a) directly transferable (rewrite for doctrine), (b) \
topic-applicable (doctrine authors fresh), (c) inapplicable — spec-driver-internal \
/ stack-specific (Python/Typer/Textual/pylint) AND **doctrine-repo dev gotchas** \
(rust/clippy/cargo — those stay in doctrine's own `items/`, not for downstream \
drivers; design D7). **Author** the doctrine orientation corpus (~12-18 masters, \
NOT 86) via `record --global`, covering every OQ-A skeleton topic: `signpost` \
(overview · file-map/layout · lifecycle-start route→slice→design→plan→phase→audit \
→close · skill/route map · CLI command map — the latter authored as `signpost`, \
NOT `reference`, Charge VIII); `concept` (storage model + storage rule · entity \
engine · memory model: capture vs this shipped corpus · the routing gate); \
`pattern` (the core loop · conventions: conventional commits, pure/imperative \
split, behaviour-preservation gate, immutable PHASE/EN-EX-VT ids · TDD \
red/green/refactor); `fact` (CLI-is-source-of-truth · authored vs runtime vs \
derived tiers). Audience = the downstream agent DRIVING doctrine, not the doctrine \
contributor (D7). Each master carries the scope floor (≥1 path/glob/command), \
`repo=""`/anchor=none, and seeds `reviewed` to the authoring date (OQ-D: moot for \
staleness under the evergreen exemption, but seeded for the recency tiebreak, sort \
key #8 — stable across syncs). The corpus points TOWARD boot/skills/`doc/*`, never \
restates them (D-principle 4 / scope OQ-3). master-lint green over the WHOLE real \
corpus; the now-non-empty embed ships through `memory sync`; E2E confirms the reach.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-04 complete: `record --global` + master-lint exist; PHASE-01 amendment sanctions the class (so authoring is in-bounds); HEAD green" },
  { id = "EN-2", text = "spec-driver's 86 shipped memories accessible for triage; the OQ-A skeleton topics (design §6) in hand as the coverage target" },
]
exit_criteria = [
  { id = "EX-1", text = "a triage table dispositions ALL 86 spec-driver memories into transferable / topic-applicable / inapplicable, with the drop rationale for the inapplicable set (spec-driver-internal, stack-specific, doctrine-dev gotchas)" },
  { id = "EX-2", text = "the doctrine orientation corpus is authored under `memory/` (committed) covering every OQ-A skeleton topic — **every skeleton topic has ≥1 master**; each carries `repo=\"\"`/anchor=none, ≥1 path/glob/command scope, a valid `memory_type` ≠ `reference`, and `reviewed` seeded to the authoring date" },
  { id = "EX-3", text = "master-lint passes over the WHOLE real corpus (schema + INVs + scope floor + type); the corpus orients toward boot/skills/doc rather than restating them (no parallel implementation)" },
  { id = "EX-4", text = "the populated embed ships: `memory sync` into a fresh repo lands the corpus in shipped/ (gitignored); `retrieve --path-scope <p>` surfaces a shipped master; the boot snapshot Memory section lists shipped masters; `just check` green" },
]
verification = [
  { id = "VT-1", expects = "the triage table has 86 rows, each dispositioned; a spot-check confirms drops are spec-driver-internal/stack-specific/doctrine-dev, and kept topics map to the skeleton" },
  { id = "VT-2", expects = "a coverage assertion: every OQ-A skeleton topic resolves to ≥1 authored master; master-lint is green over the full corpus (the slice does not pass on a trivial/empty corpus)" },
  { id = "VT-3", expects = "E2E: fresh repo → `memory sync` → shipped/ populated + gitignored → `retrieve --path-scope` surfaces a shipped master, its body renders (read_body fallback), and it shows the non-decaying `reference` staleness; boot snapshot lists it; a foreign items/ file is untouched (mind stale-CARGO_BIN_EXE — rebuild before e2e)" },
]
