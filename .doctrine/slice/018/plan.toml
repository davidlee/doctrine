[[phase]]
id        = "PHASE-04"
name      = "Master authoring path + validation: `record --global` mode + master-lint"
objective = """
Give the corpus a sanctioned way to be authored and a gate that keeps it honest — \
the tooling PHASE-05 will use, landed and proven against fixtures first. \
**Authoring path** (Charge VII, design §5.3): a `doctrine memory record --global` \
mode that reuses the existing uid-mint + schema validation but writes a \
`repo=""`, `anchor_kind=none` master into the **repo-root `memory/`** tree, \
bypassing the repo-anchor write gate (`memory.rs:753`, which bails on \
repo-non-empty + unanchored) **by explicit intent** — `--global` is the declared \
escape hatch, not a relaxation of the gate for the normal path. (The earlier \
"uuid v7" requirement is dropped as unenforced decoration — `is_uid` \
(`memory.rs:484`) accepts any `mem_<32hex>`.) **master-lint** (Charges VII/VIII/X): \
a test/validation pass asserting every embedded master satisfies the class \
invariants — `repo=""` AND `anchor_kind=none` (INV); a **valid `memory_type` ≠ \
`reference`** (the enum is `concept|fact|pattern|signpost|system|thread`; \
`MemoryType::parse` (`memory.rs:68`) BAILS on `reference`, so an authored \
`reference` master would hard-error collect_all/sync — references are authored as \
`signpost`, and the lint **forbids the `reference` literal**); and the **scope \
floor** (Charge X) — **≥1 of `paths`/`globs`/`commands`** (never tag-only, whose \
retrievability is spec-ambiguous per memory-spec §299/§333; broad memories take a \
coarse scope, e.g. overview→`commands=["doctrine"]`, file-map→`paths=[".doctrine/"]`). \
**OQ-C** (sync autorun): `doctrine install` PRINTS A HINT to run `memory sync`; it \
does NOT orchestrate it (skills parity, verb stays standalone). master-lint runs \
green against fixture masters this phase; it becomes load-bearing over the real \
corpus in PHASE-05.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 complete: the embed + `memory/` tree + sync verb exist, so `record --global` has a target to write into and a path to ship through; HEAD green" },
  { id = "EN-2", text = "the write gate (`memory.rs:753`), uid-mint + schema validation in `record`, `MemoryType::parse` (`memory.rs:68`), `is_uid` (`memory.rs:484`), and the install hint surface located" },
]
exit_criteria = [
  { id = "EX-1", text = "`doctrine memory record --global` mints a `repo=\"\"`/`anchor_kind=none` master into repo-root `memory/`, reusing the existing uid-mint + schema validation, bypassing the repo-anchor gate by explicit intent (the normal-path gate is unchanged)" },
  { id = "EX-2", text = "master-lint asserts, per embedded master: the INV signature (`repo=\"\"`, `anchor_kind=none`); a valid `memory_type` and that it is NOT the `reference` literal; the scope floor (≥1 path/glob/command, never tag-only)" },
  { id = "EX-3", text = "OQ-C resolved: `doctrine install` prints a hint to run `memory sync` (no orchestration); the verb stays standalone (skills parity)" },
  { id = "EX-4", text = "`just check` green; SL-005/007/008 suites still unchanged & green (record's normal path untouched)" },
]
verification = [
  { id = "VT-1", expects = "`record --global` test: produces a master with `repo=\"\"`/anchor=none under `memory/`; the normal (non-global) `record` still requires + derives a non-empty repo and an anchor (gate intact for the default path)" },
  { id = "VT-2", expects = "master-lint catches each violation on a planted bad fixture: a non-empty repo; a present anchor; a `reference` literal type; a tag-only (no path/glob/command) scope — each fails the lint with a clear signal" },
  { id = "VT-3", expects = "install-hint test: `doctrine install` output references `memory sync`; install does not itself run sync (no shipped/ written by install alone)" },
]
specs        = []
requirements = []

