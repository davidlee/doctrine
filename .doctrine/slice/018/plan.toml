# ---------------------------------------------------------------------------
[[phase]]
id        = "PHASE-03"
name      = "The sync mechanism: embed + pure materializer + `memory sync` verb + hook + gitignore"
objective = """
Build the write path that lands the embedded masters into the gitignored \
`.doctrine/memory/shipped/` — the skills-precedent materialize pattern (design D4/ \
D5/D6), NOT folded into install/boot. New `#[derive(RustEmbed)] #[folder="memory/"]` \
(`CorpusAssets`), parallel to `install/`'s and `plugins/`'s embeds; `memory/` is \
repo-root and committed (outside `.doctrine/*`, no negation needed — F2). It may \
be EMPTY this phase (RustEmbed embeds zero files ⇒ sync no-ops) — the real corpus \
is PHASE-05; tests here drive synthetic assets + temp dirs. **Pure materializer** \
(ADR-001): `plan_corpus(assets) -> Vec<MaterialisedFile>` computes the idempotent \
diff — new / changed / prune / unchanged — from embedded assets vs the on-disk \
shipped state; identical input ⇒ all-unchanged, zero writes; it NEVER references \
`items/`. **Impure shell**: `sync_corpus(root, plan)` writes the plan and reports \
a `SyncReport`. **Bounded prune** (Charge III): remove ONLY a shipped/ dir that \
parses as a memory AND bears the INV signature (`repo=""`, `anchor_kind=none`) AND \
whose uid is absent from the embedded set; a foreign file or unparseable dir is \
left UNTOUCHED and surfaced in `--dry-run`. **Safety**: the target is always \
`<validated-root>/.doctrine/memory/shipped`, computed from `root::find`, never a \
user path; sync never touches `items/`. **No-root no-op** (Charge XI): outside a \
doctrine repo `root::find` errors ⇒ `memory sync` exits clean, writes nothing (so \
the M1 hook is harmless in foreign repos). Command shell: `memory sync` \
[`--dry-run` prints the plan and exits | `--yes` no prompt] + **`memory sync \
install`** wiring a **separate** SessionStart hook (OQ-E: separate entry, not \
chained onto boot's — cohesion; degrades to the clean no-op in non-doctrine repos), \
mirroring `boot install`. **Gitignore both surfaces** (Charge F3, the inverted \
authored-entity-wiring trap): doctrine's own `.gitignore` adds \
`.doctrine/memory/shipped/` beside the `index|embeddings|state/*` re-ignores \
(L33-35, under the `!.doctrine/memory/` negation at L17, else committed-by-default \
here); the client `install/manifest.toml` `[gitignore].entries += \
".doctrine/memory/shipped/"` for the denylist model.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete: collect_all reads the shipped root, so a sync'd corpus is immediately retrievable; HEAD green" },
  { id = "EN-2", text = "the skills embed/materialize precedent re-read (`src/skills.rs:24` `#[folder=\"plugins/\"]`, `:287` classify_link); `boot install`'s hook-wiring mechanism (settings.json / SessionStart) located; `.gitignore` L17/33-35 and `install/manifest.toml` `[gitignore]` located" },
]
exit_criteria = [
  { id = "EX-1", text = "`CorpusAssets` RustEmbed over repo-root `memory/` compiles (empty tree tolerated, embeds zero files); `memory/` is committed (no gitignore negation needed)" },
  { id = "EX-2", text = "`plan_corpus` (pure) emits the new/changed/prune/unchanged diff; idempotent (identical input ⇒ zero writes); never references `items/`. `sync_corpus` (impure) applies it and reports" },
  { id = "EX-3", text = "bounded prune: only INV-signatured (`repo=\"\"`/anchor=none) orphan masters are removed; a foreign file AND an unparseable dir under shipped/ are left untouched (and shown in `--dry-run`)" },
  { id = "EX-4", text = "`memory sync` [`--dry-run` | `--yes`] works; `memory sync install` wires a separate SessionStart entry idempotently; no-root invocation exits clean writing nothing" },
  { id = "EX-5", text = "gitignore wired on both surfaces: doctrine's `.gitignore` ignores `.doctrine/memory/shipped/`; `install/manifest.toml` appends it to `[gitignore].entries`; `just check` green" },
]
verification = [
  { id = "VT-1", expects = "plan_corpus unit tests: new/changed/prune/unchanged from synthetic assets vs on-disk state; idempotency (identical ⇒ all-unchanged, zero writes); removed master ⇒ prune; the plan never names an items/ path" },
  { id = "VT-2", expects = "bounded-prune test: a planted foreign file and an unparseable dir under shipped/ survive a sync; only the INV-signatured orphan is pruned (skills' ours-vs-foreign discipline, made stateless by the INV signature)" },
  { id = "VT-3", expects = "no-root no-op test: `memory sync` outside a doctrine repo exits 0 and writes nothing; `memory sync install` hook-install test mirrors boot's (idempotent, separate entry)" },
  { id = "VT-4", expects = "gitignore-wiring tests: a doctrine-repo check asserts `.doctrine/memory/shipped/` is ignored here; a fresh-install check asserts the manifest adds it to the client denylist; E2E: sync into a temp repo populates shipped/, gitignored (mind stale-CARGO_BIN_EXE — rebuild before e2e)" },
]
specs        = []
requirements = []

