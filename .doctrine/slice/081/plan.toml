[[phase]]
id        = "PHASE-08"
name      = "Integration wiring and final gate"
objective = "Wire scan_catalog to call scan_memory_entities; run full test suite; verify just gate passes; confirm memory nodes appear in production catalog graph."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 through PHASE-07 all complete and green" },
  { id = "EN-2", text = "Design §10 (scan_catalog entry point) locked" },
]
exit_criteria = [
  { id = "EX-1", text = "scan_catalog(root) calls scan_memory_entities and passes result to from_scanned." },
  { id = "EX-2", text = "cargo test passes — all existing suites green, all new tests green." },
  { id = "EX-3", text = "cargo clippy zero warnings." },
  { id = "EX-4", text = "just gate passes." },
  { id = "EX-5", text = "Production catalog graph includes memory nodes (≥30 items + shipped) with kind_label=\"MEM\"." },
  { id = "EX-6", text = "doctrine map serve --open shows memory nodes in browser graph without JS errors." },
]
verification = [
