[[phase]]
id        = "PHASE-01"
name      = "ledger: trunk-integration query"
objective = """
Add the cycle-free integration query to `ledger` (leaf): a tree-read journal
accessor and the three-state `trunk_integration` resolver. This is the whole
mechanism (design Â§3.1) minus the gate wiring â€” self-contained, leaf-only, fully
unit-tested. The existing `dispatch::run_show_journal_trunk_oid` is refactored to
consume the new shared tree-read (DRY, design Â§3.3) so no parallel journal-read
survives.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; OQ-1/OQ-2 resolved (D1 self-describing row, D2 fail-closed)." },
  { id = "EN-2", text = "ledger is tier=leaf with out=0 (layering.toml); adding crate::git is a leafâ†’leaf edge, git âˆŒ ledger (no cycle)." },
]
exit_criteria = [
  { id = "EX-1", text = "`ledger::read_journal_at_ref(root, slice) -> Result<Option<Journal>>` tree-reads journal.toml from refs/heads/dispatch/<slice:03> via git::read_path_at (None when the dispatch ref or path is absent)." },
  { id = "EX-2", text = "`ledger::TrunkIntegration { NotDispatched, Integrated, Blocked(String) }` and `ledger::trunk_integration(root, slice, trunk_ref: &str) -> Result<TrunkIntegration>` implement the REVISED design Â§3.1 order: explicit dispatch-ref probe; absent ref OR empty journal (zero rows) => NotDispatched (RV-codex F2); trunk row by EXACT target_ref == trunk_ref (RV-codex F1/F4, not namespace elimination); empty-oid guard; is_ancestor test. Query stays mechanical/ref-agnostic â€” caller supplies trunk_ref (RV-codex F6)." },
  { id = "EX-3", text = "dispatch::run_show_journal_trunk_oid consumes read_journal_at_ref; the bespoke read_ledger::<Journal> trunk-oid path is gone. Behaviour unchanged (its existing tests stay green)." },
  { id = "EX-4", text = "`just check` (or gate) green: clippy zero-warnings, ADR-001 fitness gate passes with no new accepted_violation and leaf tangle_baseline=0." },
]
verification = [
  { id = "VT-1", expects = "trunk_integration truth table from a git fixture (dispatch ref + committed journal.toml): NotDispatched (no ref), NotDispatched (ref present, journal empty/zero rows â€” RV-codex F2), Integrated (planned_oid ancestor-of-trunk), Blocked(planned tip not on trunk), Blocked(no trunk row when journal has rows), Blocked(journal unreadable), Blocked(trunk row has no planned oid)." },
  { id = "VT-1b", expects = "journal with BOTH a refs/heads/main trunk row and a refs/heads/edge row â†’ exact-match selects the trunk row and resolves on it; no ambiguity / false refuse (RV-codex F1 regression)." },
  { id = "VT-2", expects = "read_journal_at_ref returns None for an absent dispatch ref and for a present ref missing journal.toml; Some(parsed) for a committed journal." },
  { id = "VT-3", expects = "show-journal-trunk-oid behaviour preserved post-refactor â€” its existing dispatch test(s) pass unchanged (behaviour-preservation gate)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "slice: close-integration gate wiring"
objective = """
Wire `ledger::trunk_integration` into `slice::run_status` as the third reverse
close-gate (design Â§3.2), firing only on the reconcile â†’ done crossing, composing
with the existing blocker + drift gates. NotDispatched | Integrated pass; Blocked
refuses with the reason token and the recovery instruction. Behavioural tests
cover the pass/refuse paths, the edge-only firing, and gate composition.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: trunk_integration available and unit-green." },
]
exit_criteria = [
  { id = "EX-1", text = "run_status defines `const TRUNK_REF = \"refs/heads/main\"` and, on from==reconcile && to==done, calls trunk_integration(&root, id, TRUNK_REF); Blocked(reason) bails with `slice <ID> â†’ done: refused â€” dispatched code not integrated to trunk: {reason} (â€¦retry)`; NotDispatched|Integrated proceed to set_slice_status. Trunk ref + refusal copy owned by the shell, not the leaf (RV-codex F6)." },
  { id = "EX-2", text = "The gate is sited after the drift gate; sliceâ†’ledger is the only new edge (commandâ†’leaf); no sliceâ†”dispatch edge introduced." },
  { id = "EX-3", text = "`just gate` green: clippy zero-warnings; ADR-001 fitness gate passes (no new accepted_violation, no tangle growth)." },
]
verification = [
  { id = "VT-1", expects = "not-dispatched slice (no dispatch ref) â†’ reconcileâ†’done succeeds." },
  { id = "VT-1b", expects = "dispatch ref present but journal empty (zero rows) â†’ reconcileâ†’done succeeds (RV-codex F2)." },
  { id = "VT-2", expects = "dispatched slice with planned_oid ancestor-of-trunk â†’ reconcileâ†’done succeeds." },
  { id = "VT-3", expects = "dispatched slice with planned_oid not on trunk â†’ reconcileâ†’done refused, error carries the reason token + retry guidance." },
  { id = "VT-4", expects = "dispatched slice (journal has rows) whose journal has no refs/heads/main trunk row â†’ reconcileâ†’done refused (fail-closed)." },
  { id = "VT-5", expects = "the gate fires ONLY on reconcileâ†’done â€” an unintegrated dispatched slice on auditâ†’reconcile is not refused by this gate." },
  { id = "VT-6", expects = "composition â€” an unintegrated slice that also carries an unresolved blocker is refused (either gate independently suffices)." },
]
