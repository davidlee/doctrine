# Implementation plan for SL-178 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-178"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# Phase order is LANDING order (design §9: P2 → {P1, P3}). The design's P-labels
# are doc-local; the durable ids below are execution order, so the master ships
# first (R5/POL-002 — the binary error and skill must not point at an unshipped
# key). Mapping: PHASE-01 ≙ design P2, PHASE-02 ≙ design P1, PHASE-03 ≙ design P3.

[[phase]]
id        = "PHASE-01"
name      = "Ship the recipe master"
objective = """
Author the close-drift-discharge recipe as a shipped global-orientation master \
under memory/ via the sanctioned `doctrine memory record --global` verb, with \
the body scrubbed of host-project-local state, and supersede the local capture \
mem_019f075f. This phase lands first: PHASE-02/03 reference the shipped key and \
must not release ahead of it (design R5, POL-002). (design §5.4, D3, P2)
"""
entrance_criteria = [
  { id = "EN-1", text = "Local capture mem_019f075f exists under .doctrine/memory/items/ (the body source); no memory/mem_…close-drift master shipped yet." },
]
exit_criteria = [
  { id = "EX-1", text = "A master exists under memory/<new-uid>/ with INV signature (scope.repo=\"\", anchor.kind=none, memory_type=pattern, key=mem.pattern.doctrine.close-drift-discharge-rec) + scope floor (paths .doctrine/slice/,.doctrine/rec/ + commands), and a mem.<key> alias symlink." },
  { id = "EX-2", text = "The master body is scrubbed per design §5.4: F-1 local-memory cross-ref mem_019ec912 genericized to prose; F-2 host backlog id ISS-006 replaced with prose; the SL-165 worked example RETAINED but re-framed as an explicit Doctrine-development illustration." },
  { id = "EX-3", text = "Local capture mem_019f075f marked superseded --by <new-uid>; `memory sync` (dev binary) regenerates .doctrine/memory/shipped/ and `memory find` discovers the master." },
  { id = "EX-4", text = "This slice's prose reference re-pointed at the new uid (SL-165 PIR / IMP-202 / RFC-011 historical refs left — still resolve via memory show)." },
]
verification = [
  { id = "VT-1", expects = "Test asserts the shipped master with key mem.pattern.doctrine.close-drift-discharge-rec is embedded + INV/scope-floor clean (discoverable post-sync). (design VT-2)", test_file = "src/corpus.rs", keywords = ["close-drift-discharge-rec"] },
  { id = "VA-1", expects = "Agent greps the promoted master body memory/<uid>/memory.md: no local memory uids, no ISS-/SL-/REC-/REQ- refs save the explicitly-framed worked example (design VA-2 body portion, R6 exit gate)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Richer close-gate drift error"
objective = """
Enrich the `slice status <id> done` close-gate refusal: change `undischarged_drift` \
to return a named struct carrying each REQ's authored status, add the recipe-key \
const, and rewrite the bail copy to name each flagged REQ + authored status, the \
condensed 3-clause accept-REC predicate, and the shipped-memory pointer. Behaviour \
(refuse/pass) preserved; only payload + return type change. (design §5.2 Fix 1, D1, P1)
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 landed — the master ships the key mem.pattern.doctrine.close-drift-discharge-rec (R5/POL-002: the binary error must not name an unshipped key)." },
]
exit_criteria = [
  { id = "EX-1", text = "`undischarged_drift` returns Vec<UndischargedReq{ req, authored: ReqStatus }> (authored already loaded at the existing load site); gate predicate stays !is_empty()." },
  { id = "EX-2", text = "Module-top const CLOSE_DRIFT_RECIPE_MEMORY = \"mem.pattern.doctrine.close-drift-discharge-rec\" (STD-001 single source); error pointer line uses the const, not a literal." },
  { id = "EX-3", text = "Bail copy names each undischarged REQ with `authored: <status>`, the condensed (a)(b)(c) accept-REC clauses, and `doctrine memory show <key>`." },
  { id = "EX-4", text = "Existing drift-gate cases (vt1_covered_req_residual_drift_refuses_close, vt2_declared_extra_req_blocks_on_residual_drift, vt2_reconciled_req_blocks_on_residual_drift, helper expect_close_refused) updated for the new return type + payload; refuse/pass behaviour unchanged." },
]
verification = [
  { id = "VT-1", expects = "Drift-gate test asserts (on SUBSTRINGS, never the exact multi-line copy — design F-3/F-4): each undischarged req id, `authored:` + the status token, `accept`, and the memory key const. (design VT-1)", test_file = "src/slice.rs", keywords = ["UndischargedReq", "authored:", "CLOSE_DRIFT_RECIPE_MEMORY"] },
  { id = "VA-1", expects = "Agent greps error literals in src/ for host-project-local state (.doctrine/memory/items/, local uids, host backlog/slice ids): none present (design VA-2 src portion)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Document recipe in /close skill"
objective = """
Add a drift-discharge subsection to the /close skill: the condensed a/b/c clauses, \
the `rec new --move accept …` line, and a pointer `doctrine memory show \
mem.pattern.doctrine.close-drift-discharge-rec`. No worked example duplicated — it \
lives in the master (single source, ADR-005). (design §5.2 Fix 2, P3)
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 landed — the master ships the key the skill pointer names (R5/POL-002)." },
]
exit_criteria = [
  { id = "EX-1", text = ".agents/skills/close/SKILL.md (authored source) carries a drift-discharge subsection near the existing drift mention: condensed a/b/c, the rec-new accept line, and the `memory show <key>` pointer." },
  { id = "EX-2", text = "No worked example duplicated into the skill (single source = master)." },
]
verification = [
  { id = "VA-1", expects = "Agent confirms the /close skill carries the drift-discharge subsection pointing at the memory key. (design VA-1)" },
  { id = "VA-2", expects = "Agent greps the shipped skill for host-project-local state (local memory uids / host ids): none present (design VA-2 skill portion)." },
]
specs        = []
requirements = []
