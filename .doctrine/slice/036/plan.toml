objective = "Deliver explain(n) — role-agnostic structured paths per overlay with F47 chain termination (root OR degraded-post-arity-SCC entry; SCC members are endpoints only; in-SCC node → [[n]]) and endpoint-filtered evictions (F26) — then close the slice-wide verification net: edge-insertion-permutation determinism, naive-oracle SCC/topo property tests, and the forbidden-vocabulary denylist scan (F24/REQ-077/REQ-079)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-04 complete: every public surface (order, channels, traversal, provenance) exists for explain to assemble and the net to pin" },
]
exit_criteria = [
  { id = "EX-1", text = "Explanation per §5.4: {node, order_key, paths: BTreeMap<OverlayId, Vec<Vec<NodeId>>>, evicted} — no String prose, no role fields (F13); chains end at a root or the first node of a degraded post-arity SCC, never walk through SCC members; finite + deterministic on cyclic Reject views (F47)" },
  { id = "EX-2", text = "Explanation.evicted = evictions with n as src or dst (F26)" },
  { id = "EX-3", text = "Property tests: SCC + topo order against a naive independent oracle (F24/R1); edge-insertion-order permutation → byte-identical outputs" },
  { id = "EX-4", text = "Denylist scan over crates/cordage/** (code, docs, tests) rejects the SPEC-001 Appendix B forbidden vocabulary; wired into the suite, not a manual step" },
  { id = "EX-5", text = "plain cargo clippy zero warnings; just check green; full suite green — slice ready for /audit" },
]
verification = [
  { id = "VT-1", expects = "§9 explain on cycles row (F47): Reject a↔b + a→x → explain(x) chain ends at a; explain(a) paths = [[a]]; terminates, deterministic, cycle via Provenance.cycles" },
  { id = "VT-2", expects = "explain evictions endpoint filter (F26): eviction with n as src and as dst both appear; unrelated evictions absent" },
  { id = "VT-3", expects = "§9 determinism+ row (F24): edge-insertion-order permutation → byte-identical order_key/Channel/Provenance/Explanation; SCC/topo property-tested vs naive oracle" },
  { id = "VT-4", expects = "§9 REQ-077 determinism row, full: build twice → identical order_key + Provenance + contributor traces" },
  { id = "VT-5", expects = "§9 REQ-079 boundary row, final proof: no doctrine dep in Cargo.toml; whole suite passes on structural identifiers only; denylist scan green over code, docs, tests" },
