# Implementation plan for SL-078 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-078"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.
[[phase]]
id        = "PHASE-01"
name      = "Spec sweep + supersede recovery test"
objective = "Sweep SPEC-010 and REQ-177 for stale skills install/list references; add e2e test for torn-state supersede recovery."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked and approved" },
  { id = "EN-2", text = "plan.md and plan.toml authored and consistent" },
]
exit_criteria = [
  { id = "EX-1", text = "no `skills install`, `skills list`, or `doctrine skills` in `doctrine spec show SPEC-010` output" },
  { id = "EX-2", text = "REQ-177 title/slug/H1 reflect `claude install`" },
  { id = "EX-3", text = "`cargo test -- supersede_recovery` passes" },
  { id = "EX-4", text = "`just check` zero warnings" },
]
verification = [
  { id = "VT-1", expects = "`doctrine spec show SPEC-010` renders no stale skill references" },
  { id = "VT-2", expects = "`doctrine requirement show REQ-177` title is `Surface claude install…`" },
  { id = "VT-3", expects = "`cargo test -- supersede_recovery` — torn-state e2e test passes" },
  { id = "VT-4", expects = "`just check` — clippy zero warnings" },
]
specs             = ["SPEC-010"]
requirements      = ["REQ-177"]
