# Implementation plan for SL-127 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-127"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# Phase order & dependency (see plan.md): 01 (git.rs), 02 (worktree.rs),
# 03 (dispatch.rs core) are file-disjoint — parallelisable. 04 and 05 both
# depend on 03 (the trunk_drift helper / refresh-base verb). Verification is
# test-first (VT) throughout; VA only where a test cannot judge (skill prose,
# governance-deferral).

[[phase]]
id        = "PHASE-01"
name      = "Freshest-descendant trunk ladder"
objective = """
Replace trunk_ladder's first-resolves implicit selection with a freshest-descendant
left-fold so a stale origin/HEAD that is an ancestor of local main is overtaken,
without regressing below the most-preferred resolvable ref. Stance A (design §2.2a):
freshness default, explicit DOCTRINE_TRUNK_REF still short-circuits and still hard-
errors on a bad ref. Pure git.rs change; helps all ladder callers (incl. minting).
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md LOCKED (it is); git.rs is_ancestor/merge_base primitives present (git.rs:954/994)." },
]
exit_criteria = [
  { id = "EX-1", text = "New git.rs helper freshest_descendant(root, &[sha]) folds candidates: start at first, advance to a later candidate iff is_ancestor(pick, candidate); diverged/older candidates kept, never regressed." },
  { id = "EX-2", text = "trunk_ladder implicit arm peels [origin/HEAD, main, master] in order, de-dups shas, returns freshest_descendant(set); explicit DOCTRINE_TRUNK_REF short-circuit and bad-explicit hard-error unchanged; no-trunk still Ok(None)." },
  { id = "EX-3", text = "No env prefix needed: a repo with origin/HEAD an ancestor of (behind) main selects main." },
]
verification = [
  { id = "VT-1", expects = "origin/HEAD ancestor-of main → main selected; chain origin<main<master → master; diverged most-preferred kept (origin diverged from main → origin); single candidate → itself; empty → None." },
  { id = "VT-2", expects = "explicit DOCTRINE_TRUNK_REF wins over a fresher implicit candidate; unpeelable explicit ref hard-errors (existing trunk_ladder_explicit_* stay green)." },
  { id = "VT-3", expects = "Minting fallout (codex C8): mixed origin/HEAD(behind)/main(ahead) repo — trunk_entity_ids reads ids off the ahead ref (collision-safer); no e2e_trunk_minting expectation silently regresses." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Plan-presence refuse-gate at coordinate (Create)"
objective = """
Add a plan-presence pre-flight to worktree::coordinate's Create path: before the
git worktree add -b fork, assert the chosen trunk base's tree carries the dispatched
slice's plan.toml; absent ⇒ bail early with the DOCTRINE_TRUNK_REF hint. Gating
before the fork (design F6) also sidesteps RSK-010's rollback-touches-session-tree
edge for the base-staleness cause. Create-only; Resume out of scope (codex C3).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 ladder behaviour available (the gate backstops a diverged pick the fold cannot resolve)." },
]
exit_criteria = [
  { id = "EX-1", text = "coordinate Create path, after resolving trunk and BEFORE worktree add -b, runs an ls-tree check for .doctrine/slice/<NNN>/plan.toml on the trunk commit (reuse the trunk_entity_ids tree-read idiom)." },
  { id = "EX-2", text = "Absent plan.toml ⇒ bail! naming the chosen base + DOCTRINE_TRUNK_REF hint; no worktree created, no rollback entered." },
  { id = "EX-3", text = "Resume path unchanged (explicitly out of scope); present plan.toml ⇒ proceeds as today." },
]
verification = [
  { id = "VT-1", expects = "Create with a trunk base lacking slice/<NNN>/plan.toml ⇒ early bail with hint, and NO worktree dir created (assert filesystem + no rollback)." },
  { id = "VT-2", expects = "Create with a trunk base carrying plan.toml ⇒ proceeds to fork+run_phases; no env prefix." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "trunk_drift extract + refresh-base verb"
objective = """
Axis-2 core. Extract a shared trunk_drift(root, tip) -> Drift{fork_point, ahead}
helper from run_status (behaviour-preserving). Add the dispatch refresh-base --slice
verb: a real git merge of trunk into dispatch/<NNN> in the LIVE coordination worktree
(design §3.2, codex C4) — not object-db. Guards: refuse unrelated histories
(merge_base None, C7), no-op when already fresh, refuse a dirty/absent coord worktree.
Clean merge commits + advances dispatch/<NNN>; conflict leaves markers + MERGE_HEAD,
reports paths, halts (report-never-auto-resolve). No trunk write. CLI wiring.
"""
entrance_criteria = [
  { id = "EN-1", text = "run_status drift computation present (dispatch.rs:1819); merge primitives present; coordination worktree lifecycle (worktree coordinate) available." },
]
exit_criteria = [
  { id = "EX-1", text = "trunk_drift/Drift extracted; run_status refactored to call it; existing status tests (incl. dispatch_status_moved_trunk) stay green unchanged." },
  { id = "EX-2", text = "refresh-base verb registered (dispatch refresh-base --slice N) and resolves the live coord worktree on dispatch/<NNN>; refuses with a setup/resume hint if absent, refuses a dirty coord tree before merging." },
  { id = "EX-3", text = "merge_base(dispatch,trunk) None ⇒ refuse before merge; trunk ancestor-of dispatch ⇒ 'already fresh' no-op exit 0; else git merge --no-ff trunk in the coord tree." },
  { id = "EX-4", text = "Clean ⇒ merge committed on dispatch/<NNN> (first parent dispatch_tip, second trunk_tip); ref advanced; no trunk ref written." },
  { id = "EX-5", text = "Conflict ⇒ coord worktree left with conflict markers + MERGE_HEAD; verb reports conflicting paths and halts non-zero; dispatch ref NOT advanced past the pre-merge tip." },
]
verification = [
  { id = "VT-1", expects = "trunk_drift unit: fork_point=merge_base(tip,trunk), ahead=count(fork_point..trunk); ahead==0 when trunk is ancestor of tip." },
  { id = "VT-2", expects = "refresh-base clean (reproduce SL-122): trunk advances past fork with a same-block rewrite; verb merges clean, advances dispatch/<NNN>; a following candidate create admits." },
  { id = "VT-3", expects = "refresh-base conflict: genuinely-conflicting trunk merge ⇒ reports paths + halts, MERGE_HEAD present in coord tree, dispatch ref unadvanced." },
  { id = "VT-4", expects = "Guards: unrelated histories ⇒ refuse no-merge; already-fresh ⇒ no-op exit 0; dirty coord tree ⇒ refuse; no coord worktree ⇒ refuse with hint." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Diagnostics — candidate-create hint + RefreshBase guidance"
objective = """
Surface drift at the sites where it bites. (a) candidate_create's conflict arm
APPENDS a diagnostic hint (never a cause verdict, codex C5) when trunk_drift on the
SOURCE shows ahead>0: 'trunk advanced N past this source — may be base divergence;
try refresh-base'. (b) run_status next_guidance emits a RefreshBase step, ordered
ahead of PrepareReview/candidate-create, iff trunk_drift(review_tip).ahead>0
(computed fact, codex C6). Diagnostic-only — no change to abort/no-durable-state.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 landed: trunk_drift helper and refresh-base verb exist to point at." },
]
exit_criteria = [
  { id = "EX-1", text = "candidate_create MergeTree::Conflict arm consults trunk_drift(source_oid); ahead>0 ⇒ appends the base-divergence hint to the existing message; ahead==0 ⇒ message unchanged; no change to the no-row/ref/worktree guarantee." },
  { id = "EX-2", text = "run_status next_guidance gains a RefreshBase variant fired iff trunk_drift(review_tip).ahead>0 (review_tip = review/<NNN>, else dispatch tip pre-prepare), ordered before PrepareReview/candidate-create." },
]
verification = [
  { id = "VT-1", expects = "candidate_create conflict with source-drift ahead>0 ⇒ message contains the refresh-base hint; ahead==0 ⇒ message byte-identical to today's content-conflict text." },
  { id = "VT-2", expects = "run_status with all phases complete + review bundle stale past trunk ⇒ RefreshBase guidance present and ordered first; fresh bundle ⇒ guidance absent." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Skills: route to refresh-base, retire the env-prefix ritual"
objective = """
Wire the new capability into the dispatch skills and remove the now-obsolete
DOCTRINE_TRUNK_REF=main workaround. /dispatch (+ -subprocess / -agent) reference
refresh-base for mid-drive base freshness and the status-surfaced drift; the
'prefix every command with DOCTRINE_TRUNK_REF=main' ritual is deleted (the ladder
fix + plan gate make it unnecessary). Doc-only; no mechanism in prose (ADR-011).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 landed (refresh-base exists); PHASE-01/02 landed (env prefix genuinely unnecessary)." },
]
exit_criteria = [
  { id = "EX-1", text = "dispatch skills reference `dispatch refresh-base` as the mid-drive base-staleness remedy and point at `dispatch status` drift for visibility." },
  { id = "EX-2", text = "Every DOCTRINE_TRUNK_REF=main env-prefix instruction removed from the dispatch/worktree skills (grep-clean)." },
]
verification = [
  { id = "VT-1", expects = "grep across plugins/doctrine/skills/dispatch* and worktree finds no `DOCTRINE_TRUNK_REF=main` prefix instruction." },
  { id = "VA-1", expects = "Agent check: the dispatch skill's freshness guidance routes to the refresh-base verb (a CLI verb, not a prose git-merge ritual) — ADR-011 conformance." },
]
specs        = []
requirements = []
