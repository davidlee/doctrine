]
exit_criteria = [
  { id = "EX-1", text = "call_tool returns anyhow::Result<String>; 10 review arms wrapped with .map(|o| serde_json::to_string(&o)?)" },
  { id = "EX-2", text = "handle_tools_call Ok arm uses McpToolResult::text(out) directly — no re-serialization (double-encoding guard)" },
  { id = "EX-3", text = "ExtractFields gains opt_bool_field(name) -> Option<bool>" },
  { id = "EX-4", text = "parse_memory_type, parse_status, parse_lifespan helpers added — wrap errors with invalid arguments: prefix" },
  { id = "EX-5", text = "14 tool definitions in tools() vec: 10 existing review + 4 new memory (memory_find, memory_retrieve, memory_show, memory_list)" },
  { id = "EX-6", text = "tool_list_has_10_tools updated to 14; tool_list_names includes all 4 new names" },
]
verification = [
  { id = "VT-1", expects = "all 10 review MCP tools produce byte-identical JSON after call_tool→String refactor" },
  { id = "VT-2", expects = "review MCP response content[0].text parses as JSON object, NOT a quoted string (double-encoding trapdoor guard)" },
  { id = "VT-3", expects = "tool_list_has_10_tools → tool_list_has_14_tools; tool_list_names includes memory_find/retrieve/show/list" },
  { id = "VT-4", expects = "cargo clippy zero warnings on mcp_server module" },
]
