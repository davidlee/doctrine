[[phase]]
id        = "PHASE-01"
name      = "Writer abstraction"
objective = "Add `writer: &mut impl Write` param to all five memory run_* functions, replace stdout writes, wire CLI call sites. Existing tests stay green with byte-identical output."
entrance_criteria = [
  { id = "EN-1", text = "design.md §1 and §6 are approved and coherent" },
]
exit_criteria = [
  { id = "EX-1", text = "run_find, run_retrieve, expand_graph (retrieve.rs) accept writer: &mut impl Write as first param" },
  { id = "EX-2", text = "run_show, run_list (memory.rs) accept writer: &mut impl Write as first param" },
  { id = "EX-3", text = "All write!(io::stdout(), …) and related stdout writes replaced with write!(writer, …)" },
  { id = "EX-4", text = "CLI call sites in main.rs pass &mut io::stdout() as first arg" },
  { id = "EX-5", text = "run_find rejects limit=0; run_retrieve rejects limit=0 and caps at RETRIEVE_LIMIT_MAX (20). run_find does NOT cap — CLI --limit 9999 passes through." },
  { id = "EX-6", text = "all existing tests pass — byte-identical output (no behavioural change)" },
]
verification = [
  { id = "VT-1", expects = "retrieve::run_find(&mut Vec<u8>, …) writes expected JSON to buffer" },
  { id = "VT-2", expects = "retrieve::run_retrieve(&mut Vec<u8>, …) writes framed blocks to buffer" },
  { id = "VT-3", expects = "memory::run_show(&mut Vec<u8>, …) writes expected JSON to buffer" },
  { id = "VT-4", expects = "memory::run_list(&mut Vec<u8>, …) writes expected output to buffer" },
  { id = "VT-5", expects = "CLI doctrine memory find/retrieve/show/list produce byte-identical output" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Structured helpers and visibility bumps"
objective = "Add check_retrievable, retrieve_reference, find_for_mcp, filtered_list, list_for_mcp, backlink_rows_for. Bump private functions to pub(crate). No MCP wiring yet — helpers are inert."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete — writer params in place, all tests green" },
]
exit_criteria = [
  { id = "EX-1", text = "check_retrievable(m, part, include_draft, min_trust, today) added to retrieve.rs — applies base_filter → thread_expiry → held_back in order" },
  { id = "EX-2", text = "retrieve_reference(writer, root, reference, include_draft, min_trust) added — resolve → check_retrievable → staleness → render_show" },
  { id = "EX-3", text = "find_for_mcp(…) added — reuses load_query→query, returns FindForMcp { rows, total } with key/held_back_on_retrieve fields" },
  { id = "EX-4", text = "filtered_list(root, type_f, filter) added — shared helper for list_rows and list_for_mcp, reusing listing::retain" },
  { id = "EX-5", text = "list_for_mcp(root, …, limit: usize) added — validate_statuses → listing::build → filtered_list → paginate → ListForMcp" },
  { id = "EX-6", text = "backlink_rows_for(root, all: &[Memory], uid) added — factored from run_backlinks, accepts pre-collected memories. run_backlinks delegates to it internally." },
  { id = "EX-7", text = "list_rows internally delegates to filtered_list (no behaviour change)" },
  { id = "EX-8", text = "Visibility bumps: holdback_floor, held_back, staleness, git_facts (retrieve.rs); resolve_memory_from_all (memory.rs) → pub(crate)" },
  { id = "EX-9", text = "BacklinkRow struct and fields → pub(crate)" },
]
verification = [
  { id = "VT-1", expects = "check_retrievable correctly blocks: wrong workspace, wrong repo, quarantined, retracted, archived, superseded, draft, expired thread, held-back memory" },
  { id = "VT-2", expects = "check_retrievable admits: active memory in same workspace/repo, verified thread, high-trust memory" },
  { id = "VT-3", expects = "retrieve_reference writes security-framed block for valid reference" },
  { id = "VT-4", expects = "retrieve_reference errors on: quarantined/retracted/draft(no include_draft)/held-back/expired-thread memory" },
  { id = "VT-5", expects = "find_for_mcp returns rows with key field, held_back_on_retrieve computed correctly" },
  { id = "VT-6", expects = "filtered_list applies substr (key+title), status, tag filters identically to list_rows" },
  { id = "VT-7", expects = "list_for_mcp with limit=50 returns at most 50 rows; limit=0 returns all" },
  { id = "VT-8", expects = "backlink_rows_for returns wikilink + relation backlinks with method provenance" },
  { id = "VT-9", expects = "all PHASE-01 tests still green; list_rows behaviour unchanged" },
]
specs        = []
requirements = []

