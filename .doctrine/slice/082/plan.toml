# Implementation plan for SL-082 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-082"

[specs]
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

[[phase]]
id        = "PHASE-01"
name      = "Update source code references"
objective = "Repoint every `doc/` reference in `src/` per design §3.1 (S1–S10). Change test fixtures, corpus config, doc comments, and string literals. Source tests must pass with updated path expectations."
entrance_criteria = [
  { id = "EN-1", text = "Design §3.1 reference map locked; all 10 source citations mapped" },
]
exit_criteria = [
  { id = "EX-1", text = "S1: `src/boot.rs` test fixtures updated from `\"point at doc/spec.md\"` → `\"point at .doctrine/spec/tech/\"`" },
  { id = "EX-2", text = "S2–S3: `src/corpus.rs` corpus config + test string-replace updated to `.doctrine/spec/tech/`" },
  { id = "EX-3", text = "S4–S7: `src/coverage.rs` doc comment + test fixtures updated; tests pass with new path expectations" },
  { id = "EX-4", text = "S8: `src/install.rs` comment updated (historical note preserved)" },
  { id = "EX-5", text = "S9: `src/memory.rs` test path updated" },
  { id = "EX-6", text = "S10: `src/spec.rs` doc comment updated to cite SPEC-004" },
  { id = "EX-7", text = "`just check` green — no compile errors or test failures from path changes" },
]
verification = [
  { id = "VT-1", expects = "`rg 'doc/' src/` returns zero hits for legacy `doc/` paths; `\"legacy doc/\"` in install.rs comment acceptable" },
  { id = "VT-2", expects = "`just check` green; no test failures in changed files" },
  { id = "VA-1", expects = "Every reference in design §3.1 has a corresponding edit; no S1–S10 missed" },
]
specs             = []
requirements      = []

[[phase]]
id        = "PHASE-02"
name      = "Update skill references"
objective = "Repoint or delete every `doc/` reference in `plugins/doctrine/skills/` per design §3.2 (K1–K11). Delete the `doc/*` mental model from skill prose — redirect agents to the entity surface (`.doctrine/spec/tech/`, `.doctrine/adr/`, `doctrine spec new`, `doctrine adr new`). Include `SKILL.compact.md`."
entrance_criteria = [
  { id = "EN-1", text = "Design §3.2 reference map locked; all 11 skill citations mapped" },
]
exit_criteria = [
  { id = "EX-1", text = "K1: `canon/SKILL.md:18` — `doc/*` replaced with `.doctrine/spec/tech/` + `.doctrine/adr/`" },
  { id = "EX-2", text = "K2–K4: `slice/SKILL.md` — three `doc/*` refs removed/replaced; `author under` redirected to `doctrine spec new` / `adr new`" },
  { id = "EX-3", text = "K5: `route/SKILL.md:36` — routing table entry updated" },
  { id = "EX-4", text = "K6–K7: `audit/SKILL.md` — two refs updated" },
  { id = "EX-5", text = "K8: `inquisition/SKILL.md:58` — authority list expanded to include tech + product specs" },
  { id = "EX-6", text = "K9: `preflight/SKILL.md:90` — updated" },
  { id = "EX-7", text = "K10: `record-memory/SKILL.md:82` — redirected from `doc/*` to spec/ADR" },
  { id = "EX-8", text = "K11: `design/SKILL.compact.md:22` — updated" },
  { id = "EX-9", text = "`retrieve-memory/SKILL.md` and `design/SKILL.md` unchanged (false positive + already clean)" },
  { id = "EX-10", text = "`doctrine claude install` succeeds; installed copies match source" },
]
verification = [
  { id = "VT-1", expects = "`rg 'doc/\\*' plugins/doctrine/skills/` returns zero hits (escaped for literal `doc/*`)" },
  { id = "VT-2", expects = "`rg 'doc/' plugins/doctrine/skills/retrieve-memory/SKILL.md` still matches — `file/doc/ADR` is unchanged (false positive)" },
  { id = "VA-1", expects = "No skill still says 'evergreen specs under doc/*' or 'author under doc/*'" },
  { id = "VA-2", expects = "Every reference in design §3.2 has a corresponding edit; no K1–K11 missed" },
]
specs             = []
requirements      = []

[[phase]]
id        = "PHASE-03"
name      = "Update install templates"
objective = "Repoint or remove `doc/` references in `install/glossary.md` and `install/governance.md` per design §3.3 (I1–I3). Remove the `doc/*` glossary section entirely; update governance pointer; remove stale HTML comment."
entrance_criteria = [
  { id = "EN-1", text = "Design §3.3 reference map locked; all 3 install citations mapped" },
]
exit_criteria = [
  { id = "EX-1", text = "I1: `install/glossary.md` — `### \\`doc/*\\`` section removed" },
  { id = "EX-2", text = "I2: `install/governance.md:9` — pointer updated to `.doctrine/spec/tech/` + `.doctrine/adr/`" },
  { id = "EX-3", text = "I3: `install/governance.md:20` — stale `<!-- Architecture spec: doc/architecture.md -->` comment removed" },
]
verification = [
  { id = "VT-1", expects = "`rg 'doc/' install/` returns zero hits" },
  { id = "VA-1", expects = "Glossary no longer has a `doc/*` entry; governance correctly points at entity surface" },
]
specs             = []
requirements      = []

