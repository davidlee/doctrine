[[phase]]
id        = "PHASE-05"
name      = "Remove `doc/` directory and final verification"
objective = "Delete the `doc/` directory from the repo. Run the full verification sweep: `rg` for residual `doc/` references, `just check` for build/test integrity, `doctrine claude install` for skill propagation. Commit the removal and all reference updates."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 through PHASE-04 complete; all references repointed or removed" },
  { id = "EN-2", text = "No `doc/` references remain in source, skills, install, or memory" },
]
exit_criteria = [
  { id = "EX-1", text = "`git rm -r doc/` succeeds; `doc/` does not exist in working tree" },
  { id = "EX-2", text = "`rg 'doc/'` across repo (excluding `.doctrine/memory/shipped/`, `target/`, `.git/`) returns zero legacy hits" },
  { id = "EX-3", text = "`just check` green — no build errors or test failures" },
  { id = "EX-4", text = "`doctrine claude install` succeeds; installed skills match source" },
  { id = "EX-5", text = "All changes committed in one or more conventional commits" },
]
verification = [
  { id = "VT-1", expects = "`doc/` absent from working tree; `git status` shows deletion staged" },
  { id = "VT-2", expects = "`rg 'doc/' src/ plugins/doctrine/skills/ install/ .doctrine/memory/items/` — zero hits for legacy refs" },
  { id = "VT-3", expects = "`just check` exits 0" },
  { id = "VT-4", expects = "`doctrine claude install` exits 0" },
  { id = "VA-1", expects = "CLAUDE.md and AGENTS.md confirmed clean (SL-084 cross-check); no `doc/` leakage" },
]
