id        = "PHASE-04"
name      = "Update memory records"
objective = "Update 6 memory records per design §3.4 (M1–M6). Replace `doc/*` paths in `memory.toml` scope fields with `.doctrine/spec/tech/NNN/` directories. Update prose refs in `memory.md` bodies. No semantics changed — scope-only updates."
entrance_criteria = [
  { id = "EN-1", text = "Design §3.4 reference map locked; all 6 memory citations mapped to tech spec dirs" },
]
exit_criteria = [
  { id = "EX-1", text = "M1: `mem_019ea25af18d...` (backlog work-intake) — paths updated to SPEC-004" },
  { id = "EX-2", text = "M2: `mem_019e95a9926b...` (forgettable backend) — paths updated to SPEC-007" },
  { id = "EX-3", text = "M3: `mem_019ea298bcee...` (canonical change loop) — paths updated to SPEC-014" },
  { id = "EX-4", text = "M4: `mem_019e97df317d...` (spec composition) — prose ref updated to SPEC-004" },
  { id = "EX-5", text = "M5: `mem_019ea298bcee...` (md body) — prose ref updated to SPEC-014" },
  { id = "EX-6", text = "M6: `mem_019e95a99276...` (governance surface) — prose refs ×2 updated" },
]
verification = [
  { id = "VA-1", expects = "Every `doc/*` reference in memory records replaced per design §3.4" },
  { id = "VT-1", expects = "Memory `paths` fields resolve to existing tech spec directories" },
  { id = "VT-2", expects = "`rg 'doc/' .doctrine/memory/items/` returns zero hits" },
]
