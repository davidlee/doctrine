# Implementation plan for SL-136 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-136"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Shared write leaf"
objective = "Hoist a generic root-level, edit-preserving set-merge tag write core (apply_tags_set) and the lenient filter-fold (fold_filter_tag) into tag.rs, plus the TAGGABLE prefix const; make backlog delegate. Behaviour-preserving (design §5.2, §5.4, D4/D5)."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; slice at plan. tag::normalize_tag already exists as the write chokepoint (SL-100)." },
]
exit_criteria = [
  { id = "EX-1", text = "tag::apply_tags_set (root-level set-merge: absent→empty, sorted union∖removes, set-equality no-op guard with no seed/no stamp, insert-if-missing, updated stamped only if key present) lives in tag.rs." },
  { id = "EX-2", text = "tag::fold_filter_tag (lenient trim+lowercase, no reject) hoisted from backlog into tag.rs." },
  { id = "EX-3", text = "tag::TAGGABLE prefix const present (slice, ADR/POL/STD/RFC, ISS/IMP/CHR/RSK/IDE, ASM/DEC/QUE/CON, PRD/SPEC, REQ)." },
  { id = "EX-4", text = "backlog::apply_tags / run_tag / list-filter delegate to tag::*; the stale F-1 corruption comments in BOTH backlog::apply_tags and dep_seq::apply_status corrected to cite CHR-019 (root insert is safe; the status-path bail is kept as over-conservative-but-harmless per D4 scoping — behaviour unchanged); no parallel write path remains." },
]
verification = [
  { id = "VT-1", expects = "tag.rs units: insert-if-missing seeds; no-op guard compares as SETS on an unsorted store (no spurious write/stamp); set algebra stores sorted union/diff; updated stamped-if-present, skipped-if-absent; clear-on-untagged is a clean no-op; fold_filter_tag lenient." },
  { id = "VT-2", expects = "D4 root-insert safety is already locked by the committed spike CHR-019 (tests/spike_chr019_root_tag_insert.rs, 7 tests over the LIVE corpus + worst-case fixtures — RV-129 F-1, premise FALSE). No new probe to author; the spike stays green as the VT-2 seed." },
  { id = "VT-3", expects = "Behaviour-preservation: the existing backlog tag suite stays green; the one backlog test asserting the F-1 bail is rewritten to assert self-heal." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Generic verb"
objective = "Add the cross-kind `doctrine tag set <ID> <TAGS...> [-d/--remove …]` and `doctrine tag clear <ID>` verb, gated by the TAGGABLE set, via commands/tag.rs + Command::Tag (design §5.1–5.2, D2/D3)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 landed green: apply_tags_set + fold_filter_tag + TAGGABLE live in tag.rs." },
]
exit_criteria = [
  { id = "EX-1", text = "commands/tag.rs + Command::Tag wired: ref resolved via integrity::parse_canonical_ref, existence guarded (ensure_ref_resolves), adds/removes normalised via normalize_tag, add∩remove overlap rejected, set requires ≥1 add-or-remove (A5)." },
  { id = "EX-2", text = "TAGGABLE membership gate: an excluded kind (CM/RV/REC/REV) is refused with an IMP-144 pointer; storage stays uniform root (no per-kind location dispatch)." },
  { id = "EX-3", text = "clear = read current tags → pass as removes (no dedicated leaf path); write_atomic only when changed; prints `Tagged <ID>: …` / `(none)`." },
]
verification = [
  { id = "VT-1", expects = "set/clear round-trip on real scaffolds across taggable kinds (slice/adr/knowledge/spec/REQ); add+remove merge; clear empties; re-clear no-ops." },
  { id = "VT-2", expects = "overlap reject; empty-set `set` errors (A5); an excluded kind (e.g. CM-1) is refused with the IMP-144 pointer; a memory/non-numbered ref fails with a friendly redirect, never a panic." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Templates + Meta + full read-surface parity"
objective = "Seed templates, add Meta.tags, and wire full read-surface parity — list-filter + show + json — for the Meta/spec-mediated kinds (slice, spec/PRD/SPEC, REQ), plus centralise the filter-fold (design §5.3, §5.4 list-fix, D2 full-parity rule). Governance/RFC parity lands atomically with the storage move in PHASE-04 — there is no root `tags` to read on a gov entity until then."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 verb landed: tags can be written to taggable entities." },
]
exit_criteria = [
  { id = "EX-1", text = "Root `tags = []` seeded in the slice + requirement templates (backlog/knowledge/spec already seeded). meta::Meta gains `#[serde(default)] tags: Vec<String>`; the 5 Meta struct-literal sites fixed (A2)." },
  { id = "EX-2", text = "List filter: slice::key() + spec::key() populate FilterFields.tags (REQ's req_key already does); the lenient --tag filter-fold centralised in listing::build, backlog's pre-fold removed. (governance::key() deferred to PHASE-04 with the storage move.)" },
  { id = "EX-3", text = "Full parity render: show table tag-row + show-json `tags` field for slice/spec/REQ; `tags` added to ReqJsonRow (spec.rs:~1556) AND to show_json's member req object (spec.rs:~1167) — RV-129 F-5: ADDITIVE (both REQ JSON sites drop tags today), so parity asserts tag PRESENCE, not 'unchanged'. No surface left write-only. (gov/RFC render → PHASE-04.)" },
]
verification = [
  { id = "VT-1", expects = "slice + spec (PRD/SPEC) + REQ `list --tag` match case-insensitively; Meta tags default absent→empty, present→read. (governance list --tag → PHASE-04.)" },
  { id = "VT-2", expects = "Full-parity test for slice/spec/REQ: one written tag is visible on ALL THREE surfaces — list --tag filter, show table, and --json; assert none is write-only (REQ JSON asserts presence per F-5). gov/RFC parity asserted in PHASE-04 VT-3." },
  { id = "VT-3", expects = "Behaviour-preservation: existing list/show suites across kinds stay green." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Governance/RFC migration + read parity + REV obligation"
objective = "Move governance/RFC tags from typed [relationships] to root in corpus + templates + struct, complete the gov/RFC three-surface read parity (key/show/json) atomically with the move, update all goldens/guards, restore RFC-002's tags, and flag the spec-amendment Revision (design §5.3 gov parity, §5.4 migration, D1/D6)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 landed: Meta/spec read parity (slice/spec/REQ) is green and the verb writes root `tags`. Gov entities still carry typed [relationships].tags — this phase builds their root read path and moves the storage together." },
]
exit_criteria = [
  { id = "EX-1", text = "`[relationships].tags` stripped from the ~28 ADR/POL/RFC corpus files + the 4 adr/policy/standard/rfc templates; Relationships drops typed `tags`, Doc gains root `tags` (#[serde(default)], A4); the `show` TABLE render repointed root-ward (governance.rs ~L313-320)." },
  { id = "EX-2", text = "show-json needs NO builder change — serde `to_value(doc)` renders root `tags` automatically once storage is root (RV-129 F-2 root-expose); the supersedes/related splice is NOT extended to tags (pure relocation, nothing to reconstruct)." },
  { id = "EX-3", text = "Goldens/guards updated: e2e_adr/standard/catalog goldens (root nesting), adr.rs:322, policy.rs:295, standard.rs:302 (drop `tags` from the typed-axis loop); e2e_relation_migration_storage tags-stay-typed + assert_governance_shape guards inverted to assert root, and governance_files() extended to scan `rfc`; relation_graph.rs ADR fixtures (:1300,:1662-1668) repointed root-ward." },
  { id = "EX-4", text = "governance::key().tags wired (was hardcoded Vec::new(), governance.rs:98) so ADR/POL/STD/RFC `list --tag` matches — completing the gov/RFC three-surface parity (list+show+json) atomic with the storage move." },
  { id = "EX-5", text = "RFC-002's live tags (program, consumption-surfaces, estimate, value, scoring) restored via one `doctrine tag set RFC-002 …` after the verb lands." },
]
verification = [
  { id = "VT-1", expects = "Residue grep SCOPED to install/templates + the committed corpus (.doctrine/{adr,policy,standard,rfc}/**), NEVER the gitignored derived .doctrine/templates (RV-129 F-3) — finds no residual `[relationships].tags`; PAIRED with the golden/compile gates (grep is blind to serde/loop-var reads). governance `show` renders root tags; the migration-guard asserts tags-at-root; full `just gate` green." },
  { id = "VT-2", expects = "RFC-002 round-trips root-side: its restored tags read back via show/list/json (asserted)." },
  { id = "VT-3", expects = "gov/RFC full-parity (§5.3): a tag written via `doctrine tag set` to an ADR/POL/STD/RFC is visible on ALL THREE surfaces — list --tag, show table, and --json (serde root) — asserted per kind; no surface write-only." },
  { id = "VA-1", expects = "The D6 REV obligation — one Revision amending SPEC-005 D2, SPEC-016, and SPEC-018 §relations to root-level — is recorded in design D6 + scope and carried forward; verified authored at /reconcile before /close (not closeable while the corpus is non-canonical against the specs). D7 (RV-129 F-6): VA-1 stays a SOFT agent-checked gate by deliberate decision, not a hard PHASE-04→reconcile gate — the post-PHASE-04 canon gap is the expected intermediate state of a governance-changing slice." },
]
specs        = []
requirements = []
