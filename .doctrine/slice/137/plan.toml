# Implementation plan for SL-137 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-137"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Pure projection engine (relation_query.rs)"
objective = """
New engine-tier module `src/relation_query.rs` — pure projection+filter+render \
over `&Catalog`, no clock/rng/git/disk (design §5.1–§5.4). Carries the shared \
axis helpers (`target_state`, `target_display`, `source_kind`), the `ListFilter`, \
the `RelationRow`/`CensusRow` types, the two projections (`project_list`, \
`project_census`), and the two renders over the `listing` spine (`Column`, \
`render_columns`, `json_envelope`). All behaviour is unit-tested over a seeded \
`Catalog` (`catalog::test_helpers`/`from_scanned`). Pure — this phase wires no \
command and touches no `catalog`/`relation`/`listing` internals.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md is locked post-RV-139; §5.2 interfaces and §5.4 dynamics are the build contract." },
  { id = "EN-2", text = "`Catalog`/`CatalogEdge`/`CatalogEdgeLabel`/`EdgeTarget`/`CatalogKey` exist and are read-only inputs (no edits to catalog)." },
]
exit_criteria = [
  { id = "EX-1", text = "`relation_query.rs` exists and is module-registered; it imports only catalog (engine) + listing/relation (leaf) — no command-tier import (ADR-001, design §3)." },
  { id = "EX-2", text = "`project_list` AND-composes all active axes (include_memory gate, --label, --source-kind, --target, --unresolved) and sorts (label, source canonical, target) (design §5.4, F4c)." },
  { id = "EX-3", text = "`project_census` groups by label with the resolution breakdown; invariant `count == resolved + unresolved + free_text` holds; sort (count desc, label asc)." },
  { id = "EX-4", text = "`target_display` matches memory targets by UID; `--target` canonical-normalises a parseable ref else verbatim (design §5.4/D6, F3)." },
  { id = "EX-5", text = "render emits the table columns and the `json_envelope` shapes; empty rows → empty string; `gate` green, no behaviour-preservation regression." },
]
verification = [
  { id = "VT-1", expects = "target_state/target_display over all three EdgeTarget variants (design VT-1)." },
  { id = "VT-2", expects = "source_kind: Numbered→prefix, Memory→\"MEM\" (design VT-2)." },
  { id = "VT-3", expects = "project_list filters --label/--target/--source-kind(incl MEM) AND-compose; a four-axis case (+ --unresolved, include_memory on) narrows to the single row (design VT-3, F4b)." },
  { id = "VT-4", expects = "include_memory gate: default excludes Raw/memory edges; flag admits them; --source-kind MEM without --include-memory → empty (design VT-4, F4a)." },
  { id = "VT-5", expects = "--unresolved keeps only state ≠ Resolved (design VT-5)." },
  { id = "VT-6", expects = "list sort (label, source, target); the target tie-breaker orders duplicate (label,source) rows stably; empty → empty string (design VT-6, F4c)." },
  { id = "VT-7", expects = "census breakdown: count == resolved+unresolved+free_text; drift all-free_text; sort (count desc, label asc) (design VT-7)." },
  { id = "VT-8", expects = "census include_memory honoured — raw labels only with the flag (design VT-8)." },
  { id = "VT-9", expects = "JSON shapes: list {source,label,target,state}; census {label,count,resolved,unresolved,free_text} under json_envelope (design VT-9)." },
  { id = "VT-12", expects = "--target ADR-1 matches stored ADR-001 resolved edge; a resolved memory target matches by UID not authored alias (design VT-12, D6/F3)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Command shell + CLI registration + diagnostics policy"
objective = """
Wire the engine to the CLI (design §5.1, §5.4). Add `RelationCommand{List,Census}` \
plus `run_relation_list`/`run_relation_census` to `src/commands/relation.rs` beside \
link/unlink; register a top-level `Relation` subcommand in `src/commands/cli.rs` (D1, \
link/unlink stay top-level). The shell does root::find → scan_catalog → diagnostics \
policy → resolve `RenderOpts` (color via tty, term width) → project → render → stdout. \
Diagnostics policy (F1, corrected §5.4): print only Severity::Error per-row; suppress \
classification Warning/Info (recoverable via --unresolved/census); count edge-dropping \
Warnings and, when any fired, print one bounded summary line to stderr. End-to-end \
black-box golden over a fixture corpus.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: relation_query.rs projections + renders exist and are green." },
]
exit_criteria = [
  { id = "EX-1", text = "`doctrine relation list [--include-memory] [--label] [--target] [--source-kind] [--unresolved] [--format|--json]` and `doctrine relation census [--include-memory] [--format|--json]` are registered and wired (design §5.2)." },
  { id = "EX-2", text = "Diagnostics: only Severity::Error reaches stderr per-row; an edge-dropping Warning emits exactly one bounded summary line; classification Warning/Info emit none (design §5.4 F1)." },
  { id = "EX-3", text = "RenderOpts (color, term width) resolved in the shell, not the engine (design §5.4 F2); link/unlink remain top-level and unchanged (D1)." },
  { id = "EX-4", text = "`gate` green; existing catalog/relation/listing suites pass unchanged (behaviour preservation)." },
]
verification = [
  { id = "VT-10", expects = "e2e black-box CLI golden: relation list/census wire end-to-end on a fixture corpus (clap registration + shell smoke) (design VT-10)." },
  { id = "VT-11", expects = "diagnostics: malformed-entity fixture emits an Error line; a dangling-ref (classification Warning) edge adds NO per-row line; an empty-field memory relation row emits the single 'N edge(s) dropped' summary line (design VT-11, F1)." },
]
specs        = []
requirements = []
