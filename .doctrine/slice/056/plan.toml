# ── Code: the agnostic trust core first, then each Orchestrator verb, then the
# claude-specific spawn path, then the install surface, then the bwrap spike,
# then the prose carriers. write_class is EXHAUSTIVE (no wildcard) — each new
# verb-Command is classified in the phase that introduces it; PHASE-05 lands the
# WriteClass enum + guard + classifies the marker/status verbs and the existing
# surface (behaviour-preserving), later phases classify their own new verbs. ──

[[phase]]
id        = "PHASE-05"
name      = "Trust core — disk marker, worker-mode guard, status verb"
objective = """
The harness-agnostic keystone all the verbs ride (design §3/§5/§11; O3 mechanism).
Pure leaf + thin shell, ADR-001 layering, pure/imperative split.
**Pure:** `marker_path`, `marker_present`, `describe_mode(is_linked,
marker_present, env_set) -> StatusLine` — the **single** source for both the human
status line and the `--assert` exit (no `classify_writable` twin).
**Shell:** `write_marker`/`remove_marker`; `worker_mode(root) =
(is_linked_worktree && marker_present) OR env DOCTRINE_WORKER` (third
`is_linked_worktree` consumer). **Guard in `run()`** before dispatching a
write-classed OR Orchestrator/Hook-mint Command. Grow `write_class` (exhaustive,
no wildcard) with the **WriteClass enum** gaining `Orchestrator`/`Hook-mint`
discrimination; classify the **existing** surface behaviour-preservingly and the
**new** `marker --clear` (bespoke 5th class — never refused by the marker
conjunct) and **`worktree status [--assert]`** (`Read`-classed: charge-4
observability + charge-3 stale-marker gate in one verb). The env-leg refusal on a
non-linked tree carries the **named dual-cause** message (§3). **Delete vs
history:** `run_marker_arm`/`run_marker_disarm`, `arm_path`, the lease/single-slot
apparatus (obviated by the per-worktree-creation hook).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 green: ADR-006 D2a (marker-primary) + the Orchestrator class are accepted governance — this phase mechanises them (the trust core depends on the ADR-006 amendment, NOT on the SPEC-012 rewrite/PHASE-04)." },
  { id = "EN-2", text = "`is_linked_worktree` exists (memory squash-warn + RV-verb refusal are the prior two consumers); the marker tier `.doctrine/state/dispatch/worker` inherits the withheld-tier exclusions (confirm in the is_withheld test)." },
]
exit_criteria = [
  { id = "EX-1", text = "`worker_mode` resolves the marker as PRIMARY (linked worktree + marker ⇒ refuse) with env as the codex/pi worker-on-main catch; a marked linked worktree refuses authoring + status-transition writes via run() (the Orchestrator/Hook-mint verbs are classified and refusal-tested in their introducing phases — they do not exist yet here); solo (neither signal) writes freely (D6a)." },
  { id = "EX-2", text = "`worktree status` prints the resolved mode + cause for all four signal states; `worktree status --assert` derives its `stale-marker` non-zero exit from the SAME describe_mode (no parallel implementation), naming the `marker --clear --operator` remedy; clean direct-writer entry → exit 0." },
  { id = "EX-3", text = "`marker --clear --operator` removes the marker with a loud receipt; refused if DOCTRINE_WORKER set, if cwd is not the marker's tree root, and (in a linked worktree) without `--operator` — NEVER refused by the marker conjunct itself (self-brick rejected)." },
  { id = "EX-4", text = "`write_class` stays exhaustive (no wildcard — a future unclassified verb is a compile error); the arm/disarm/lease apparatus is deleted; clippy zero, just check green." },
]
verification = [
  { id = "VT-1", expects = "worker-mode guard invariant test DRIVES run() (not a pure helper): (a) linked worktree + marker → authoring/status-transition refused (PRIMARY); (b) DOCTRINE_WORKER on the coordination root → refused (env optim); (c) worktree without marker, no env (solo) → allowed; (d) non-worktree tempdir, no env → allowed. Tests unset DOCTRINE_WORKER and run outside a marked worktree." },
  { id = "VT-2", expects = "`worktree status` four-state golden (force_no_tty): no-signal → writes allowed; marker-only → refused signal: marker; env-only → refused signal: env; both → refused signal: both." },
  { id = "VT-3", expects = "`status --assert` gate: clean linked-worktree entry → exit 0; stale marker in a linked worktree → non-zero `stale-marker` naming the remedy; exit 0 after `marker --clear --operator`; the human line and the --assert exit read one describe_mode and never disagree." },
  { id = "VT-4", expects = "`marker --clear` self-brick cure: a stale marker → writes + Orchestrator verbs refused; `marker --clear --operator` (env unset) restores from within the CLI; refused when DOCTRINE_WORKER set / outside the marker's tree / bare in a linked worktree (accident-fence)." },
  { id = "VT-5", expects = "the env-leg refusal on a NON-linked tree carries the named dual-cause message (worker-on-main OR leak), for authoring AND funnel verbs — never a bare 'worker refused'." },
  { id = "VT-6", expects = "behaviour-preservation: the old DOCTRINE_WORKER-only guard tests are REWRITTEN to the marker (the migration legitimately changes the trigger); select_copies/provision, branch-point-check, is_withheld/allowlist, git.rs born-frame capture stay green UNCHANGED." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-06"
name      = "`fork` verb + per-worktree env contract (O2 + O6)"
objective = """
The codex/pi orchestrator-owned fork, ADR-006 D9 compliance (not amendment) — and
the per-worktree env framework primitive it carries (design §4a/§8/§11; O2+O6).
`run_fork --base <B> --branch <name> --dir <path> [--worker]` does, atomically per
a **compensating-cleanup rollback (NOT a transaction — git mutations are not
atomic):** (1) `git worktree add -b <branch> <dir> <B>` (refuse if dir/branch
exist or B is not a commit; dir unique-per-branch, outside repo or gitignored
in-repo); (2) `doctrine worktree provision <dir>` (sole copier, withheld
excluded); (3) if `--worker`: `write_marker` **before** any spawn window (solo
omits it); (4) emit the **per-worktree env contract** on stdout (`KEY=value`/line;
human status to stderr). The contract is *generalisable* — the project declares
its per-wt env; doctrine-the-repo's project-local consumer is
`CARGO_TARGET_DIR=<jail-root>/wt/<branch>` via pure `target_dir_for_branch` (NOT a
framework primitive). Any failure after step 1 → best-effort rollback (`git
worktree remove --force` + `git branch -D` + reap dir); a rollback that itself
fails **names the leftover and exits non-zero**. `fork` is **Orchestrator**-classed
(refused under worker_mode). The rollback core is reused by `create-fork`
(PHASE-10).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-05 green: `write_marker` + the worker-mode guard exist; fork --worker is the marker's codex/pi writer and `fork` joins the Orchestrator class." },
]
exit_criteria = [
  { id = "EX-1", text = "`fork` creates the worktree (`git worktree add -b` syntax pinned), provisions it, writes the marker before any spawn window under `--worker` (omitted for solo), and emits the per-wt env contract on stdout with human status on stderr." },
  { id = "EX-2", text = "compensating cleanup: a post-`add` provision/marker failure rolls back (worktree+branch reaped — assert no leftover, not merely 'unspawned') and exits non-zero; a half-failed rollback exits non-zero with a distinct token NAMING the dir+branch left; a pre-`add` failure leaves no fork." },
  { id = "EX-3", text = "`target_dir_for_branch` is pure (branch name → `wt/<branch>` path); the env contract is project-declared, not baked in the flake (ADR-008 D-B5); `fork` is refused under worker_mode (Orchestrator); clippy zero, just check green." },
]
verification = [
  { id = "VT-1", expects = "fork goldens (force_no_tty): env contract on stdout, status on stderr, marker written under --worker, `git worktree add -b <branch> <dir> <B>` syntax pinned; dir/branch-exists and B-not-a-commit refusals." },
  { id = "VT-2", expects = "compensating cleanup: forced provision failure → non-zero AND `git worktree list`/`git branch` show NO leftover; a half-failed rollback → distinct non-zero token naming the dir+branch; a pre-marker failure leaves no unmarked fork." },
  { id = "VT-3", expects = "D5 (codex/pi): two parallel worktree builds incur no cargo-lock contention and each spawns its correct CARGO_BIN_EXE under its per-wt CARGO_TARGET_DIR (claude shares the jail-wide target — §5.1 rituals are the proof there, not isolation)." },
  { id = "VT-4", expects = "`fork` Orchestrator-class refusal DRIVES run(): from a marked fork AND from an env-set process, `fork` is refused (the first member of the exhaustive Orchestrator set proven in its introducing phase — §12; PHASE-09 VT-4 asserts the full set once all four verbs exist)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-07"
name      = "`import` verb + the governance/config belt (O4)"
objective = """
Collapse the dispatch funnel's deterministic, judgment-free steps into one
fail-closed, golden-testable verb (design §7a/§7b/§11; O4, R1 load-bearing belt).
`run_import --base <B> --fork <branch>` at the coordination root, **v1
stationary-head only**, each step a hard refusal (no auto-merge):
(1) precond — `HEAD == B` (`branch-point-check` ref-equality) **and** tree clean
(`git status --porcelain --untracked-files=no`-empty — untracked excluded
deliberately); `HEAD != B` → `head-moved`, dirty → `tree-unclean`;
(2) `S^ == B` single-non-merge else `multi-commit`;
(3) **belt** — reject if the `B..S` **name-only, tracked-files-only** diff touches
`.doctrine/` (→ `doctrine-touch`) or `.claude/` (→ `claude-touch`; honest scope —
`.claude/` is gitignored, so this leg catches only a force-added path, parity with
the `.doctrine/` leg);
(4) `git apply --3way --index` **non-committing** (orchestrator commits separately,
ADR-006 D7; under both preconds the patch cannot conflict ⇒ `apply-conflict` is
not a v1 refusal). **No runtime receipt** — gc derives landed-ness from durable git
(§8.1). Pure `classify_import(diff, base, head) -> Result<Apply, Refusal>`;
imperative shell drives git+apply. **Orchestrator**-classed.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-05 green: the worker-mode guard + Orchestrator class exist; `branch-point-check` (HEAD==B ref-equality) is the existing precond reused, not reimplemented." },
]
exit_criteria = [
  { id = "EX-1", text = "`import` happy path applies a single non-merge fork commit via `git apply --3way --index` non-committing under HEAD==B + clean tree; the orchestrator commits separately (no receipt stamped)." },
  { id = "EX-2", text = "the v1 refusal set is exhaustive and each fails closed: {head-moved, tree-unclean, multi-commit, doctrine-touch, claude-touch}; the belt diff is name-only + tracked-files-only; untracked files do not false-`tree-unclean`." },
  { id = "EX-3", text = "`classify_import` is pure (no git/disk); the belt is shared prefix-matching over both tiers; `import` is refused under worker_mode (Orchestrator); clippy zero, just check green." },
]
verification = [
  { id = "VT-1", expects = "import invariant test DRIVES the write seam (run(), not classify_import alone — the belt is the load-bearing protection, R1): happy apply leaves the coordination tree with the delta staged, un-committed." },
  { id = "VT-2", expects = "each refusal golden (force_no_tty): head-moved (HEAD != B), tree-unclean (dirty tracked), multi-commit (S^ != B), doctrine-touch (a `.doctrine/` path in B..S), claude-touch (a FORCE-ADDED `.claude/` path in B..S, charge-5)." },
  { id = "VT-3", expects = "untracked scratch/memory/withheld sheets do NOT trip tree-unclean (the deliberate --untracked-files=no scoping)." },
  { id = "VT-4", expects = "`import` Orchestrator-class refusal DRIVES run(): from a marked fork AND from an env-set process, `import` is refused (§12 exhaustive-set member; full set asserted at PHASE-09 VT-4)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-08"
name      = "`land` verb — solo's non-squash coordination merge (O5b)"
objective = """
Solo `/execute`'s analog of `import` (design §6/§11; O5b, round-4 Charge α).
`run_land --fork <branch>` at the coordination root, **solo-only**, lands a
multi-commit isolated-worktree TDD branch with ancestry preserved:
(1) precond — tree clean (same scoping as import) else `tree-unclean`; HEAD is the
coordination branch; `<branch>` exists else `no-such-fork`; its **live linked
worktree** does NOT bear the worker marker else `dispatch-fork` (a marker-bearing
fork must funnel through the belted `import`); **and `<branch>` must HAVE a live
linked worktree** (the marker is uncommitted/unreachable once the worktree is gone)
else `worktree-gone` (the marker guard is an honest live-worktree accident-fence,
not a universal provenance proof);
(2) `git merge --no-ff <branch>` — **never `--squash`** (the verb cannot express
one; squash is structurally uncertifiable by gc, §8.1);
(3) on conflict → **`git merge --abort` FIRST** (restore the clean tree), then
refuse `merge-conflict`; the abort is mid-merge-guarded (MERGE_HEAD present) —
reached with no merge in progress → `inconsistent-merge-state`; abort failure →
distinct `wedged-merge` naming MERGE_HEAD + unmerged paths + that the tree is not
clean. Pure `classify_land(tree_status, head, fork_state) -> Result<Merge,
Refusal>`; reuses the tree-clean check shared with `import` (no parallel impl).
**Orchestrator**-classed.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-07 green: the tree-clean precond helper exists in `import` and is shared by `land` (no parallel implementation); the worker-marker predicate from PHASE-05 backs the `dispatch-fork` guard." },
