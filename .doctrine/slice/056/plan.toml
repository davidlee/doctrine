objective = """
Consolidate the Claude-surface installer (design §9/§11; O8 install leg, SR-3, χ).
**Rename `skills install` → `claude install`** keeping `skills install` as a
**hidden deprecated alias** dispatching the same handler (no flag-day break);
extend it to install, for the Claude surface: **skills** (unchanged), **agents**
(symlink `install/agents/claude/*.md` into `.claude/agents/`), and the
**WorktreeCreate hook** (SubagentStart on the fallback ladder) — a `HookSpec`
(`src/boot.rs`) merged into `.claude/settings.local.json` via the **existing merge
core** (same machinery as the SessionStart boot/sync hooks), command = the §4b one
line (`doctrine worktree create-fork`). The merge **preserves pre-existing entries
and writes only the hooks key** — must not collide with Claude's own
permission-grant persistence (the `permissions` key). Update the `Write(...)` audit
label + goldens; **sweep docs** that say "skills install" and update the
`[[mem.pattern.distribution.skill-refresh-command]]` memory. `claude install` (+
the hidden alias) joins the **`write`** class (charge-5 — a worker must not
reconfigure its own harness; ADR-006 D2 uniformly, NOT ride-back).
"""
