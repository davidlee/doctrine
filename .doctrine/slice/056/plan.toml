[[phase]]
id        = "PHASE-09"
name      = "`gc` verb — idempotent reaper + two-leg landed oracle (O5)"
objective = """
Reap spent worktrees in one idempotent act (design §8/§8.1/§8.2/§11; O5, answers
IMP-041 + D-B1 disk hygiene). `run_gc --fork <branch> [--superseded-head <SHA>]
[--force] [--dry-run]`, **Orchestrator**-classed, forced ordering (worktree before
branch — `git branch -D` refuses a checked-out branch): (1) `git worktree remove`
(removes the marker); (2) `git branch -D`; (3) reap the `wt/<branch>` target dir
(closes the §8 disk loop); (4) stderr-warn that `env!(CARGO_MANIFEST_DIR)`-baked
test binaries need recompile.
**The landed oracle — durable patch-id, NO receipt:** delete only when provably
landed via `git cherry <coordination-HEAD> <fork-branch>`, **two legs union** —
ancestry (`land` route, fork tip is an ancestor) OR every listed commit is `-`
(`import` route, ancestry severed but patches landed). A squash-merge is
structurally uncertifiable → **named refusal** ("re-land via `worktree land`
(--no-ff), or `--force`"). `--superseded-head <SHA>` reaps iff SHA == current head
(a TOCTOU movement-guard, not a landing proof) — kills the `--force` reflex for the
common re-dispatch case. **Idempotent state machine:** pure `classify_gc(state) ->
GcPlan` over `{branch_exists, worktree_present, target_present, landed_verdict?}`;
branch-gone ⇒ already-certified (deletion is the certificate); skip absent steps;
every destructive step honest on failure (`git worktree prune` folds a stale admin
entry).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-07 + PHASE-08 green: both landing routes exist — `import` (ancestry severed, patch-id leg) and `land` (ancestry preserved, ancestor leg) — so the two-leg oracle has both customers to certify." },
]
exit_criteria = [
  { id = "EX-1", text = "`gc` reaps worktree+branch+target in the forced order (worktree first), warns about stale baked test binaries, and deletes ONLY on a positive two-leg `git cherry` verdict (ancestry OR all-`-` patch-id)." },
  { id = "EX-2", text = "a squash-merged fork trips neither leg → named refusal pointing at `worktree land --no-ff` / `--force`; `--superseded-head <SHA>` reaps iff SHA == current head; `--dry-run`/bare `gc` prints the per-fork verdict so the operator never `--force`s blind." },
  { id = "EX-3", text = "`classify_gc` is pure + idempotent: a rerun after a crash between any two destructive steps completes or names its leftover; branch-gone ⇒ already-certified, the only residue is the target dir reaped from the branch NAME alone; clippy zero, just check green." },
]
verification = [
  { id = "VT-1", expects = "gc goldens: worktree+branch+target reaped; two-leg oracle (ancestor leg for a landed `land`, all-`-` patch-id leg for a landed `import`); a non-ancestor tip with any `+` refuses unless --superseded-head/--force." },
  { id = "VT-2", expects = "squash-merge → named refusal (re-land via `worktree land`/--force); `--superseded-head` honesty (reaps iff SHA == current head; a wrong/lost SHA only costs a --force, the safe side); `--dry-run` prints the verdict." },
  { id = "VT-3", expects = "idempotent rerun (round-7 Charge ξ): inject/simulate failure after EACH destructive step → rerun completes or names a non-zero leftover; include branch-gone/target-present (reap T from the branch name alone) and the gc-own-ordering case (W removed before B)." },
  { id = "VT-4", expects = "EXHAUSTIVE Orchestrator-class refusal (round-7 Charge π — the slice's load-bearing trust guarantee, now that all four verbs exist): from a marked fork AND from an env-set process, EACH of `fork`/`import`/`land`/`gc` is refused — drive run(). `marker --clear` is kept OUT of this class (its bespoke refusal rules are PHASE-05 VT-4). This is the single phase that owns the complete set." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-10"
name      = "claude spawn path — `create-fork` hook handler + stamp-subagent + agent def"
objective = """
The claude WorktreeCreate handler that mirrors codex/pi `fork --worker` on
create+provision+mark — one trusted act, fail-closed (design §4b/§5/§9/§11; SR-1).
Disposition the σ else-branch per the PHASE-02 matcher result.
`run_create_fork` reads the WorktreeCreate payload JSON on **stdin** (a TRUST
BOUNDARY) and `classify_create(payload) -> ForkWorker | PlainCreate | Refuse`
(**three-valued, never two** — a malformed/missing payload classifies to `Refuse`,
NEVER silently to `PlainCreate`, ψ), gated on `payload.agent_type ==
DISPATCH_WORKER_AGENT_TYPE` (a **single binary const**, τ — not a literal in four
files). On the match: git-add + provision + `write_marker` with **§4a's
compensating rollback** (ρ — reuses `run_fork`'s rollback core; half-failed
rollback → distinct `orphan-leftover` naming dir+branch) then prints the worktree
path. Else (no matcher): **create+provision a serviceable default** by doctrine's
own conventions (σ — same core, marker omitted; a benign subagent still gets
`.worktreeinclude` provisioning) and print the path — **DELETED if PHASE-02's
matcher greened**. Bad-payload refusals fail creation fail-closed (ψ):
`bad-payload`/`missing-agent-type`/`missing-cwd`/`bad-dir`. Plus a thinner
`run_stamp_subagent` (`marker --stamp-subagent`, SubagentStart fallback — stamps an
already-created worktree). **`create-fork` + `marker --stamp-subagent` =
Hook-mint** class (refused under worker_mode; the legit hook runs at the
coordination root where worker_mode is false — same rule, not a carve-out). New
**`install/agents/claude/dispatch-worker.md`** (name pinned to the const, τ).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 green: the O3 spike fixes whether agent_type propagates (else the SubagentStart fallback is primary) and whether a matcher deletes the σ else-branch — this phase implements that disposition." },
  { id = "EN-2", text = "PHASE-06 green: `run_fork`'s compensating-rollback core exists and is reused by `create-fork` (one cleanup implementation, two callers); `write_marker` from PHASE-05 mints the marker." },
]
exit_criteria = [
  { id = "EX-1", text = "`create-fork` on `agent_type == DISPATCH_WORKER_AGENT_TYPE` does git-add+provision+write_marker (with the ρ rollback) and prints the worktree path; classify_create is three-valued (a malformed/missing payload → Refuse, NEVER PlainCreate, ψ)." },
  { id = "EX-2", text = "the else-branch disposition matches PHASE-02: matcher-green → branch DELETED (benign worktrees fall back to Claude default); no-matcher → serviceable-default create+provision (marker omitted), worktree valid+usable+provisioned, no byte-equality with Claude's native layout." },
  { id = "EX-3", text = "bad-payload refusals fail creation (ψ): bad-payload / missing-agent-type (REFUSES, never silently benign) / missing-cwd / bad-dir, each a distinct non-zero exit; `marker --stamp-subagent` stamps an already-created worktree; both verbs are Hook-mint (refused under worker_mode, exempt for the legit coordination-root hook); clippy zero, just check green." },
]
verification = [
  { id = "VT-1", expects = "classify_create gate golden: dispatch agent_type → git-add+provision+marker+path-on-stdout; other agent_type → create+provision (σ same core, marker omitted), worktree provisioned+valid+usable, path printed, NO marker; reads agent_type/derives <dir> from the PAYLOAD, not the hook's process cwd (SR-4)." },
  { id = "VT-2", expects = "create-fork orphan cleanup (ρ — the orphan must be GONE): a forced provision/marker failure after `git worktree add` → non-zero AND worktree+branch reaped (assert `git worktree list`/`git branch` show no leftover); a half-failed rollback → distinct `orphan-leftover` naming dir+branch; a pre-`add` failure leaves no fork." },
  { id = "VT-3", expects = "bad-payload refusals (ψ, fail-closed): malformed JSON → bad-payload; missing agent_type → missing-agent-type (assert it does NOT silently replicate-default); missing/empty cwd → missing-cwd; underivable/escaping <dir> → bad-dir; each fails creation (no worktree born)." },
  { id = "VT-4", expects = "dispatch-worker drift test (τ — REDS on mismatch): the installed agent-def `name` and the /dispatch-agent skill's subagent_type both resolve to DISPATCH_WORKER_AGENT_TYPE; a divergent literal reds the test." },
  { id = "VT-5", expects = "Hook-mint refusal: from a marked fork AND an env-set process, create-fork and marker --stamp-subagent are each refused (drive run()); invoked at the coordination root (worker_mode false) they run — the legit-hook exemption is the same rule, proven." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-11"
