objective = """
Rewrite SPEC-012 (`draft`; all-pending FRs ⇒ cheap now), downstream of every ADR
decision (design §10/G4). Its container philosophy — "the funnel is a discipline,
not enforced code" — is the exact sentence the thesis attacks.
Reframe **Overview + Concerns** (the funnel is now enforced CLI mechanism);
**rewrite D3** from "fails open at the env boundary" to the **fail-closed
marker-primary guard**; add a **D for the verb family**; add **FRs** (fork verb,
import verb, land verb, gc verb, marker guard, per-wt env contract). State the
**achievable altitude per harness**, the **quiescence constraint** (§7c), the
**solo non-squash-land constraint** (§6/§8.1), and the **belt's honest scope**
(§7b — `.claude/` leg contains only force-add injection).
"""
entrance_criteria = [
