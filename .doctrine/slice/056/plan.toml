[[phase]]
id        = "PHASE-12"
name      = "O7 — D6 nested-bwrap spike (codex/pi-only, timeboxed)"
objective = """
Spike OS-level worker confinement (design §4c/§10/§11, ADR-008 D-B3; O7, OQ-2) —
**codex/pi-only** (needs a subprocess to wrap; claude's `Agent` tool is not one).
Feasibility gate is **unprivileged userns creation inside the jail** — the outer
bwrap may seccomp-block `clone(CLONE_NEWUSER)`. The one-liner empirical probe is
`bwrap --unshare-user --ro-bind / / true` run **in-jail**. If it works → a
`dispatch-worker` bwrap profile (rw only worktree+target; `bubblewrap` is
pre-staged in `jailPkgs`) that discharges ADR-006 D2b at the OS floor and
**ro-binds the marker only — NEVER `.claude/settings.local.json`** (which must stay
writable for the harness's permission-grant persistence, §9). If too costly →
**back out** to D-B1 + the D2a CLI guard (PHASE-05) and leave D2b formally
deferred. Symmetric with the SubagentStart fail-open back-out. No flake change for
the probe itself; the bwrap profile lands only if the spike greens. macOS analog
is IMP-045 (out of scope).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-06 green: the per-worktree env contract (O6) exists — the bwrap profile confines rw to the worktree + its per-wt target dir, so O7 depends on O6." },
  { id = "EN-2", text = "`bubblewrap` is pre-staged in `jailPkgs`; the feasibility question (OQ-2) is empirical, probed at spike time, not analysable up front." },
]
exit_criteria = [
  { id = "EX-1", text = "the in-jail userns probe (`bwrap --unshare-user --ro-bind / / true`) result is recorded — a clear land/back-out decision, not left ambiguous." },
  { id = "EX-2", text = "LAND: a `dispatch-worker` bwrap profile confines rw to worktree+target, ro-binds the marker only (never settings.local.json), and discharges D2b at the OS floor — OR BACK-OUT: D2b is formally deferred to D-B1 + the D2a CLI guard, recorded symmetrically with the SubagentStart back-out." },
]
verification = [
  { id = "VA-1", expects = "the OQ-2 probe result is durable (memory + notes); the land/back-out decision is explicit and, on back-out, D2b's deferral is recorded — never silently dropped." },
  { id = "VT-1", expects = "IF LANDED: an out-of-tree write from the worker process is OS-denied and the confined worker cannot `rm` its ro-bound marker (D6 conformance). (Skipped, recorded as N/A, if the spike backs out.)" },
]
