# Implementation plan for SL-056 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-056"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

# ── Governance first (decisions govern): G1+G3 → O3 spike → G2 → G4 ──
# (design §10; slice §Sequencing). Then the agnostic code core, the verbs, the
# claude spawn path, the install surface, the bwrap spike, and finally the prose
# carriers that *call* the shipped mechanism.

[[phase]]
id        = "PHASE-01"
name      = "G1+G3 — ADR-008 accept + the new spawn-interface ADR"
objective = """
The governance gate (design §10). Two authored deliverables, no code.
**G1 — ADR-008 revise → accept:** fold the research §5.1 false-green/false-red
evidence cluster (it validates D-B1 empirically); record **D-B2 as a standing
structural fact** (the flake ro-binds `~/.cargo/bin/doctrine` ⇒ in-jail `cargo
install` is impossible ⇒ no install race); **re-scope D-B3's spike around the
nested-userns feasibility question (OQ-2)**, not cost. Acceptance is the IMP-004
gate (A1: IMP-003 resolved ⇒ actionable now).
**G3 — the spawn-interface ADR (new — id allocated by `doctrine adr new`; cite
that canonical id once minted, do NOT pre-guess "ADR-011"):** the harness-agnostic
**contract** (orchestrator owns fork-or-mark + provision + per-wt env *emission*;
worker identity is the disk marker) + a **per-harness capability / altitude
table**. The fail-closed claude cell is **two-valued and O3-spike-contingent (φ)**
— it stays `proposed` until PHASE-02 greens; the σ all-isolated-subagent
intermediation blast radius is confessed. References ADR-006; does not yet amend
it (that is G2, post-spike).
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md is locked (9 adversarial passes; §10 governance sequence is the build target); slice §Sequencing orders G1+G3 first." },
  { id = "EN-2", text = "ADR-008 is `proposed` (absent from the boot accepted list) and IMP-004's precondition (IMP-003) is resolved (A1)." },
]
exit_criteria = [
  { id = "EX-1", text = "ADR-008 is `accepted`: it folds the §5.1 evidence, records D-B2 (no in-jail install race), and re-scopes D-B3 around the OQ-2 userns question; its toml status reflects acceptance." },
  { id = "EX-2", text = "the new spawn-interface ADR exists (id via `doctrine adr new`), stating the agnostic contract + the per-harness altitude table; the φ fail-closed claude cell and the env/spike claims are marked `proposed` (not asserted) pending the O3 gate." },
  { id = "EX-3", text = "the per-harness table shows codex/pi (env-arm + per-wt env + bwrap under D6) vs claude (Agent + WorktreeCreate-hook, marker-only, base-pinning a confessed residual); no harness-specific command (`claude -p`) is a required element." },
]
verification = [
  { id = "VA-1", expects = "ADR-008 reads as accepted with the §5.1 fold, the D-B2 standing fact, and the D-B3 re-scope around OQ-2 — confirmed against design §10/G1." },
  { id = "VA-2", expects = "the spawn-interface ADR states the contract + altitude table with the φ two-valued claude cell `proposed` and the σ blast-radius confession (design §10/G3); cited by its minted canonical id, not a guessed number." },
  { id = "VH-1", expects = "design owner accepts the ADR-008 transition and the new ADR's draft (governance acceptance gate)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "O3 spike — claude marker-via-WorktreeCreate (THE gate)"
objective = """
The empirical gate the claude path and G2 turn on (design §4b/§9/§12, OQ-1).
Probe, with a **named `dispatch-worker` subagent** (the earlier probe used an
*unnamed* one, so its `agent_type` absence was expected, not a refutation):
(1) does `agent_type` **reliably propagate** through the WorktreeCreate payload;
(2) does a **custom WorktreeCreate hook replace default creation** (path-on-stdout
honoured, non-zero exit fails creation) and fire **before** the worker;
(3) the **payload shape** — crucially whether it exposes any **base/parent-commit
field** (charge-2: if yes, a hook-time `base-moved` pre-refusal becomes possible;
if no, the session-HEAD residual stands);
(4) **HARD GATING (σ):** can a WorktreeCreate **matcher** scope the hook to
`dispatch-worker`? — matcher GREEN deletes the replicate-default else-branch and
its blast radius; matcher RED mandates the serviceable-default else-branch;
(5) **two concurrent** dispatch-worker creations each get their own
create+provision+stamp (no shared slot);
(6) exercise the **fallback ladder** if `agent_type` is absent from WorktreeCreate
→ SubagentStart-stamp (probe-confirmed to carry `agent_type`, accepting the
fail-open created-but-unstamped window) → prompt-enforced. Record every answer as
a **spike result** that feeds G2 (PHASE-03), the φ ADR cell, and `create-fork`
(PHASE-10). Per-harness: a claude green does **not** bless codex/pi env propagation.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 green: the spawn-interface ADR names the φ two-valued altitude and the σ matcher question this spike resolves." },
  { id = "EN-2", text = "the spike runs under a claude harness able to spawn an Agent (isolation: worktree) with a custom dispatch-worker subagent_type and a temporary WorktreeCreate hook." },
]
exit_criteria = [
  { id = "EX-1", text = "recorded gate result: whether a NAMED dispatch-worker subagent propagates `agent_type` through WorktreeCreate, whether the custom hook replaces default creation (path-on-stdout + non-zero-fails-creation) and fires before the worker, and the observed payload shape." },
  { id = "EX-2", text = "recorded σ matcher answer (matcher available → else-branch DELETED; no matcher → serviceable-default else-branch kept) and the charge-2 base/parent-field answer (present → hook-time base-moved check possible; absent → session-HEAD residual stands)." },
  { id = "EX-3", text = "recorded concurrency result (two file-disjoint creations each stamped independently) and, if agent_type is absent, the chosen fallback rung (SubagentStart-stamp / prompt-enforced) with its altitude confessed." },
]
verification = [
  { id = "VA-1", expects = "the spike result is durable (recorded to memory + notes) and answers all of: agent_type propagation, hook-replaces-creation, payload shape, base/parent field (charge-2), matcher availability (σ), concurrency, fallback rung." },
  { id = "VA-2", expects = "the result is wired forward: it firms the φ cell in the spawn-interface ADR and selects the create-fork else-branch disposition (delete vs serviceable-default) for PHASE-10." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "G2 — ADR-006 amendments (post-spike) + firm the φ ADR cell"
objective = """
Amend the **accepted** ADR-006, now that the O3 spike validates the claude path
(design §10/G2 — spike-first by construction). Targeted edits, not a rewrite; the
withheld-tier D1/D4/D9 invariants are preserved.
(a) **D5/D9 creation-ladder:** for **codex/pi** demote harness-native creation to
opportunistic/never-depended (base-pinning + subprocess spawn supersede it, citing
SL-050/051); for **claude** **promote a custom WorktreeCreate hook** as the
create+provision+stamp handler (it *replaces* default git creation → fail-closed),
with SubagentStart-stamp as the named fallback (per the PHASE-02 outcome).
(b) **D2a mechanism:** replace the `DOCTRINE_WORKER=1` self-arm with the
**disk-marker-primary** signal (agnostic); env is a codex/pi *optimisation* that
additionally catches worker-on-main; introduce the **`Orchestrator` verb class**.
State the per-harness enforcement altitude (marker floor everywhere; env + bwrap
codex/pi-only; claude worker-on-main = deferred D2b residual).
Also **firm the spawn-interface ADR's φ cells** to the spike outcome (fail-closed
if O3 green, else the SubagentStart fail-open row shown, not hidden).
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 green: the O3 spike result fixes the claude WorktreeCreate path (agent_type propagation, matcher disposition, fallback rung) that this amendment encodes." },
  { id = "EN-2", text = "ADR-006 is accepted and the spawn-interface ADR (PHASE-01) carries the φ cells this phase firms." },
]
exit_criteria = [
  { id = "EX-1", text = "ADR-006 D5/D9 amended: codex/pi native creation demoted; claude custom WorktreeCreate hook promoted as the fail-closed create+provision+stamp handler with SubagentStart fallback named." },
  { id = "EX-2", text = "ADR-006 D2a amended: disk-marker-primary signal (agnostic), env demoted to a codex/pi optimisation, the Orchestrator verb class introduced, the per-harness altitude stated; the withheld-tier D1/D4/D9 invariants are textually preserved." },
  { id = "EX-3", text = "the spawn-interface ADR's φ cells are firmed to the PHASE-02 outcome (fail-closed cell promoted from `proposed` iff O3 greened; otherwise the SubagentStart fail-open row is the shown altitude)." },
]
verification = [
  { id = "VA-1", expects = "ADR-006's amendments are scoped to D5/D9 + D2a + the Orchestrator class; a diff shows the withheld-tier invariants untouched (behaviour-preserving governance)." },
  { id = "VA-2", expects = "the marker is primary and env is an optimisation everywhere the amended ADR speaks of worker identity (no residual self-arm-as-identity language)." },
  { id = "VH-1", expects = "design owner accepts the ADR-006 amendments and the firmed φ cells." },
]
