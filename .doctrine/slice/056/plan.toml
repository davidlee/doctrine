name      = "O8 — skill prose calls the verbs + `/dispatch-*` harness router"
objective = """
Last, because the prose carriers describe the now-shipped mechanism (design
§11/slice §Sequencing; O8). Rewrite `plugins/doctrine/skills/{worktree,dispatch,
execute}/SKILL.md` to **call** the verbs, not restate the rituals (the token +
agnostic payoff — worktree 347 / dispatch 312 lines shrink). Add the
**harness-routing split:** `/dispatch` becomes a thin **router** that detects the
harness capability profile and hands off to **`/dispatch-subprocess`** (codex/pi:
`fork` verb + subprocess spawn binding worker cwd via `env -C "$D"` / bwrap
`--chdir` + env-arm + per-wt env + bwrap if PHASE-12 landed) or
**`/dispatch-agent`** (claude: `Agent` tool spawning `subagent_type:
dispatch-worker` — the literal **pinned to `DISPATCH_WORKER_AGENT_TYPE`**, τ +
WorktreeCreate-hook marker, **concurrent-safe**, no env/bwrap). Router input: the
agent's harness self-belief **cross-checked against env-marker detection**; routes
only when detection **agrees**, else refuses **naming the cause** (never a blind
spawn). One identical CLI cadence, two ~2-line spawn templates. Distinct from
SL-055's audience-homing split (Non-Goals). Re-embed ritual
