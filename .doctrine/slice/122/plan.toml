# Implementation plan for SL-122 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-122"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "RFC kind foundation"
objective = "Introduce RFC as a registered first-class authored kind: mint and show round-trip, tree committable, engine suites green. (design §1 'beyond the relation layer', §3, §5 D1)"
entrance_criteria = [
  { id = "EN-1", text = "design.md locked: §3 naming (.doctrine/rfc singular), §5 D1 (governance-neutral kind-is-data), Affected Surface enumerates the hand-maintained registration surfaces." },
]
exit_criteria = [
  { id = "EX-1", text = "`doctrine rfc new` mints RFC-001 and scaffolds rfc-001.toml + rfc-001.md under .doctrine/rfc/ from templates." },
  { id = "EX-2", text = "`doctrine rfc show RFC-001` synthesises both tiers (structured TOML + prose MD), mirroring adr/rec show." },
  { id = "EX-3", text = "RFC added to integrity::KINDS (hand table); generic id ops validate/reseat cover RFC ids." },
  { id = "EX-4", text = "Authored-tree wiring landed: install/manifest.toml [dirs].create includes .doctrine/rfc and .gitignore carries !.doctrine/rfc/ — the tree is git-committable, not silently ignored." },
  { id = "EX-5", text = "Existing entity-engine suites pass unchanged (behaviour-preservation gate)." },
]
verification = [
  { id = "VT-1", expects = "mint→show round-trip test: rfc new writes both tier files; rfc show renders structured + prose tiers." },
  { id = "VT-2", expects = "integrity test: a well-formed RFC id validates; a malformed/missing one is rejected; reseat handles RFC." },
  { id = "VT-3", expects = "`git check-ignore .doctrine/rfc/rfc-001.toml` reports NOT ignored (the negation actually admits the tree)." },
  { id = "VA-1", expects = "agent confirms install/manifest.toml + .gitignore edits match design §4 wiring exactly and the full engine suite is green." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Lifecycle + catalog list"
objective = "RFC carries the minimal status machine (open → resolved|withdrawn), a CLI transition verb, and `rfc list` with open-by-default visibility. (design §2)"
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: RFC mints, shows, and is KINDS-registered." },
]
exit_criteria = [
  { id = "EX-1", text = "RFC_STATUSES = {open, resolved, withdrawn}; a newly minted RFC defaults to open; RFC reads via the status-bearing path (not REC's status-less meta::read_id)." },
  { id = "EX-2", text = "`doctrine rfc status <id> <state>` transitions among the known set and rejects unknown/illegal states (status moves via CLI, not hand-edit)." },
  { id = "EX-3", text = "`doctrine rfc list` shows open only by default; `--status` reveals resolved/withdrawn and validates its values against RFC_STATUSES." },
]
verification = [
  { id = "VT-1", expects = "status test: open→resolved and open→withdrawn persist; an unknown state is rejected." },
  { id = "VT-2", expects = "list test: default output hides resolved/withdrawn; `--status resolved` surfaces them." },
  { id = "VT-3", expects = "list test: `--status <bogus>` errors against RFC_STATUSES rather than silently returning nothing." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Relations: RFC own edges + REV→RFC precursor"
objective = "RFC participates as a relation source via the existing related/AnyNumbered rule (catalog scan routed); REV→RFC `originates_from` is authored revision-owned (TypedVerbOnly), derived inbound 'precursor of' on RFC. (design §1 Decisions 1 & 2)"
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete: RFC is a numbered, KINDS-registered kind." },
]
exit_criteria = [
  { id = "EX-1", text = "RFC added to the `related` (AnyNumbered) rule's sources; `doctrine link RFC-NNN related <entity>` round-trips and the reciprocal renders as derived inbound on the target." },
  { id = "EX-2", text = "catalog::scan::outbound_for routes RFC by prefix — RFC outbound edges are non-empty in release (no degraded empty-edge path)." },
  { id = "EX-3", text = "New `originates_from` rule row: sources &[REV], target Kinds(&[RFC]), Tier::Typed, LinkPolicy::TypedVerbOnly, inbound_name 'precursor of'." },
  { id = "EX-4", text = "A revision verb/flag authors the edge (`revision new --originates-from RFC-NNN` and/or `revision originates-from <rev> <rfc>`); generic `doctrine link … originates_from …` is refused, naming the typed verb." },
  { id = "EX-5", text = "`inspect RFC-NNN` shows 'precursor of: REV-NNN' as pure derived render — no reverse edge stored on the RFC (ADR-004 clean)." },
]
verification = [
  { id = "VT-1", expects = "RFC `related`→entity round-trips; the target's derived inbound lists the RFC." },
  { id = "VT-2", expects = "the revision verb/flag authors `originates_from`; inspect RFC shows 'precursor of: REV-NNN'." },
  { id = "VT-3", expects = "generic `link … originates_from …` is refused with the TypedVerbOnly message (REV discipline not bypassable)." },
  { id = "VT-4", expects = "catalog scan test: an RFC with a `related` edge yields non-empty outbound_for(RFC) (prefix dispatch wired)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "doctrine status surface"
objective = "`doctrine status` surfaces RFC awareness (count + unresolved titles, capped) without governance flavour; boot governance sections stay RFC-free. (design §4)"
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 complete: RFC status set exists and open RFCs are queryable." },
]
exit_criteria = [
  { id = "EX-1", text = "`doctrine status` shows a count line under Work: `rfcs: N open, M total`." },
  { id = "EX-2", text = "status lists unresolved (open-only) RFC titles, most-recent first, capped at 10 with a `+K more` overflow marker; resolved/withdrawn drop off the list." },
  { id = "EX-3", text = "Open RFCs do NOT flip empty-state: a repo with only open RFCs still reports 'No active work' (empty-state stays keyed on slices + open backlog)." },
  { id = "EX-4", text = "The serialized status envelope is extended with the RFC data; RFC is NOT added to boot_sequence GovRows — boot snapshot governance sections are unchanged." },
]
verification = [
  { id = "VT-1", expects = "status render test: count line present; >10 open RFCs render exactly 10 titles + '+K more'." },
  { id = "VT-2", expects = "empty-state test: only-open-RFCs repo still renders 'No active work'." },
  { id = "VT-3", expects = "boot test: boot snapshot has no RFC section and existing boot output is byte-unchanged (boot_sequence untouched)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Governing ADR"
objective = "Author and accept the governing ADR: D1 (RFC as governance-neutral first-class kind) + D2 (precursor-to-change-axis, revision-owned originates_from), explicitly amending ADR-013. (design §5)"
entrance_criteria = [
  { id = "EN-1", text = "PHASES 01–03 implemented: the as-built RFC kind and the REV→RFC edge exist to reference accurately." },
]
exit_criteria = [
  { id = "EX-1", text = "ADR authored asserting D1 (governance-neutral first-class kind, absent from governance surfaces) and D2 (RFC precursor to REV via outcome-neutral, revision-owned originates_from)." },
  { id = "EX-2", text = "The ADR's prose body states the amendment to ADR-013 (the new REV outbound edge) and carries a governance `related` link to ADR-013 — NOT supersedes (ADR-013 stays accepted)." },
  { id = "EX-3", text = "ADR status accepted; it appears in boot's Accepted ADRs section." },
]
verification = [
  { id = "VA-1", expects = "agent confirms the ADR asserts exactly D1+D2, claims NO governance position for RFC itself, and frames D2 as an ADR-013 amendment via `related` + prose (not supersedes)." },
  { id = "VH-1", expects = "human accepts the ADR's content and scope, then sets status accepted." },
]
specs        = []
requirements = []
