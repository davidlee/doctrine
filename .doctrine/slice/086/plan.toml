# Implementation plan for SL-086 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-086"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# PHASE-01: Extract FindRetrieveArgs + add --json/--format to memory find (IMP-092).
# This establishes the shared args struct pattern and wires JSON rendering for find.
# It is the simplest of the three IMPs touching the memory command surface,
# so it goes first to establish the args struct that PHASE-02 extends.
[[phase]]
id        = "PHASE-01"
name      = "FindRetrieveArgs extraction + --json on memory find"
objective = "Extract shared scope/filter/pagination/format fields into a FindRetrieveArgs struct flattened by both Find and Retrieve variants; add --format/--json to memory find with JSON rendering via the shared listing::json_envelope."

entrance_criteria = [
  { id = "EN-1", text = "design.md §3 is approved and locked" },
  { id = "EN-2", text = "main branch is clean (no uncommitted changes)" },
]
exit_criteria = [
  { id = "EX-1", text = "FindRetrieveArgs struct exists, flattened by Find and Retrieve" },
  { id = "EX-2", text = "memory find --json outputs valid JSON with kind: 'memory_find'" },
  { id = "EX-3", text = "memory find --format table produces existing output unchanged" },
  { id = "EX-4", text = "cargo clippy zero warnings; just check passes" },
]
verification = [
  { id = "VT-1", expects = "memory find --json output is valid JSON, rows match table columns" },
  { id = "VT-2", expects = "memory find --format bogus errors cleanly" },
  { id = "VT-3", expects = "existing find table output is byte-identical post-refactor" },
]
specs             = []
requirements      = []

# PHASE-02: Positional query + pagination + truncation notice (IMP-090 + IMP-091).
# Depends on the args struct from PHASE-01. Adds query positional arg (mutually
# exclusive with --query), --offset/--page flags, and truncation notice.
[[phase]]
id        = "PHASE-02"
name      = "Positional query, pagination, and truncation notice"
objective = "Add positional query to memory find; add --offset/--page to both find and retrieve; emit truncation notice when --limit truncates results."

entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 is completed (FindRetrieveArgs exists, --json wired)" },
  { id = "EN-2", text = "design.md §1 and §2 are approved and locked" },
]
exit_criteria = [
  { id = "EX-1", text = "memory find cli works (positional query)" },
  { id = "EX-2", text = "positional query + --query together errors cleanly" },
  { id = "EX-3", text = "--offset/--page work on both find and retrieve" },
  { id = "EX-4", text = "--page 0 errors; --offset + --page mutually exclusive" },
  { id = "EX-5", text = "truncation notice appears when --limit < total results (table mode only)" },
  { id = "EX-6", text = "truncation notice is absent under --json" },
  { id = "EX-7", text = "cargo clippy zero warnings; just check passes" },
]
verification = [
  { id = "VT-1", expects = "golden: memory find cli output equals memory find --query cli" },
  { id = "VT-2", expects = "positional + --query together errors with descriptive message" },
  { id = "VT-3", expects = "--page 2 --limit 5 shows results 6-10; notice says '--page 3 for next'" },
  { id = "VT-4", expects = "retrieve --json output has correct array length, no trailing notice text" },
  { id = "VT-5", expects = "offset >= total emits appropriate notice (no results at this offset)" },
  { id = "VT-6", expects = "memory find without --limit shows all results (unlimited default, D14)" },
  { id = "VT-7", expects = "--limit 0 errors cleanly" },
  { id = "VT-8", expects = "--page 2 alone does not error despite offset default_value (clap conflicts_with + default interaction, F-6)" },
]
specs             = []
requirements      = []

# PHASE-03: doctrine status dashboard (IMP-093). Greenfield — independent of
# phases 01-02, can run in parallel if file-disjoint (new module src/status.rs
# vs changes to src/main.rs + src/retrieve.rs). New command, new module.
[[phase]]
id        = "PHASE-03"
name      = "doctrine status dashboard"
objective = "Add doctrine status [--json] command: active slices, backlog summary, blocked items, boot staleness, recent commits. 10-20 lines human output; structured JSON."

entrance_criteria = [
  { id = "EN-1", text = "design.md §4 is approved and locked" },
]
exit_criteria = [
  { id = "EX-1", text = "doctrine status prints all sections on a non-empty repo" },
  { id = "EX-2", text = "doctrine status --json outputs valid JSON with kind: 'status'" },
  { id = "EX-3", text = "empty/no-repo state shows 'No active work.'" },
  { id = "EX-4", text = "blocked items section reflects actual dep/seq needs edges" },
  { id = "EX-5", text = "boot staleness correctly classifies fresh/stale/missing" },
  { id = "EX-6", text = "cargo clippy zero warnings; just check passes" },
]
verification = [
  { id = "VT-1", expects = "golden: status output on test corpus matches expected sections" },
  { id = "VT-2", expects = "status --json output parseable, contains expected top-level keys" },
  { id = "VT-3", expects = "empty corpus shows 'No active work.'" },
  { id = "VA-1", expects = "blocked items respect hard needs edges only (not soft after)" },
]
specs             = []
requirements      = []
