# Implementation plan for SL-150 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-150"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Taxonomy + family-grouped human help"
objective = """
Introduce the FAMILIES taxonomy (8 families, Family{key,members,suppress_verbs})
+ the SPINE const in cli.rs; the drift-guard test that partitions the clap tree;
and the family-grouped `doctrine --help` — one underlying comfy-table with
full-width family-heading bands injected into the line stream (distinct bg,
edge-to-edge, blank band line above/below, color-gated). The full-width-band
primitive + row-start probe are lifted from search.rs into shared listing
helpers (DRY); search refactors onto them, behaviour-stable. Design §5.2–§5.4.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked (slice in plan); §2 seams confirmed in cli.rs / listing.rs / search.rs" },
]
exit_criteria = [
  { id = "EX-1", text = "FAMILIES (8 families; Family{key,members,suppress_verbs}) + SPINE = {new,list,show,paths} exist in cli.rs; all 44 visible commands classified" },
  { id = "EX-2", text = "drift-guard test asserts the three partition invariants: no duplicate member (collision map), no phantom (every member a real visible command), no orphan (every visible non-help command in a family)" },
  { id = "EX-3", text = "full-width-band primitive (pad-to-term_width + paint, color-gated) and is_table_row_start lifted into listing.rs; search.rs::write_context_snippet refactored onto them" },
  { id = "EX-4", text = "listing::render_grouped renders one table + injected full-width heading bands (distinct bg, edge-to-edge, blank line above/below); render_top_level_help calls it; family/member order = FAMILIES-declared (INV-4)" },
  { id = "EX-5", text = "color gating honoured: force_no_tty / piped output drops band paint to plain text + blank lines" },
]
verification = [
  { id = "VT-1", expects = "drift-guard test green — all three partition assertions pass over Cli::command()" },
  { id = "VT-2", expects = "human `--help` golden (black-box CARGO_BIN_EXE_doctrine, force_no_tty, byte-exact): family order, banded grouping, shared column alignment (D8)" },
  { id = "VT-3", expects = "search.rs existing --context snippet tests green UNCHANGED (behaviour-preservation across the DRY lift)" },
  { id = "VA-1", expects = "color-on smoke: band paint + full-width pad present (escape codes), heading bands span edge-to-edge with blank band lines above/below" },
  { id = "VT-4", expects = "`just gate` green — clippy zero warnings, fmt clean" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Boot-map projection + --boot-map + CommandMap section"
objective = """
Add render_boot_map() (dense plain-text projection reusing the PHASE-01
taxonomy), the `doctrine --help --boot-map` interactive flag, and the
SourceKind::CommandMap boot section inserted after "Routing & Process". Pin boot
determinism and the deterministic ordering invariant. Design §5.2–§5.5, §7 D3/D5.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete — FAMILIES/SPINE + drift test landed and green" },
]
exit_criteria = [
  { id = "EX-1", text = "render_boot_map() emits the dense map: spine legend; family header lines (all members, bare); per-command sub-line iff distinctive verbs (verbs − SPINE) AND family.suppress_verbs == false; infra header-only; leaves header-only" },
  { id = "EX-2", text = "`doctrine --help --boot-map` invokes render_boot_map() (main.rs intercept); --boot-map takes precedence over --commands when both passed" },
  { id = "EX-3", text = "SourceKind::CommandMap added; boot_sequence inserts (\"Commands\", CommandMap) immediately after \"Routing & Process\" (before Governance); produce() arm wired, pure + infallible" },
  { id = "EX-4", text = "INV-4 deterministic ordering: families + members in FAMILIES order; verbs in clap derive order; render_boot_map is a pure fn (no clock/rng/disk/tty)" },
]
verification = [
  { id = "VT-1", expects = "boot-map golden (`--help --boot-map`, byte-exact): spine line present, header+sub-line rule, infra suppression (D7), leaf handling (no sub-line)" },
  { id = "VT-2", expects = "boot byte-stability: `doctrine boot` twice ⇒ identical; `boot --check` clean with CommandMap section present" },
  { id = "VT-3", expects = "boot ordering test: CommandMap immediately after \"Routing & Process\" and before \"Governance\"; existing adjacency tests (policies==adrs+1, ExecPath-last) still green" },
  { id = "VT-4", expects = "produce(CommandMap) arm unit test: body == render_boot_map() output" },
  { id = "VT-5", expects = "`just gate` green — clippy zero warnings, fmt clean" },
]
specs        = []
requirements = []
