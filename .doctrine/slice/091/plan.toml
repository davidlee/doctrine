objective = "Remove any remaining stale files. Record durable memory for the new dev workflow. Commit final state."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-11 exits green: Rust integration verified, all tests pass." }
]
exit_criteria = [
  { id = "EX-1", text = "No stale .js files remain in web/map/ (only src/*.ts, public/, index.html, test.html, package.json, tsconfig.json, vite.config.ts)." },
