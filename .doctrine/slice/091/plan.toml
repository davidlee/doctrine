# Implementation plan for SL-091 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-091"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# Phase 00: scaffold — project config, types, empty src/, updated index.html.
# No TS files compile yet. Sets up the build toolchain.
[[phase]]
id        = "PHASE-00"
name      = "Scaffold project config and type definitions"
objective = "Create package.json, tsconfig.json, vite.config.ts, src/types.ts, move style.css to src/, update index.html to load a single module script. No TS files compile yet — just the skeleton."
entrance_criteria = [
  { id = "EN-1", text = "Design locked and committed; no unresolved design questions." },
  { id = "EN-2", text = "Existing web/map/ JS source files are committed and unchanged." }
]
exit_criteria = [
  { id = "EX-1", text = "package.json exists with correct dependencies and scripts." },
  { id = "EX-2", text = "tsconfig.json exists (strict, moduleResolution bundler, target es2020)." },
  { id = "EX-3", text = "vite.config.ts exists with proxy /api → localhost:8080 and publicDir: public." },
  { id = "EX-4", text = "src/types.ts exists with all interfaces from the design." },
  { id = "EX-5", text = "src/style.css exists (moved from web/map/style.css)." },
  { id = "EX-6", text = "web/map/public/vendor/github-markdown.css exists (moved from web/map/vendor/)." },
  { id = "EX-7", text = "index.html updated: single <script type=\"module\" src=\"/src/app.ts\">, old <script> tags removed. CSS link stays." },
  { id = "EX-8", text = "bun install succeeds." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (with empty src/app.ts stub that imports nothing)." },
  { id = "VT-2", expects = "bun run dev starts Vite without errors (app.ts just renders placeholder)." },
  { id = "VT-3", expects = "existing map server integration tests pass (no Rust changes yet)." }
]
specs        = []
requirements = []

# Phase 01: router.ts — pure string parsing, no DOM, no deps beyond types.ts.
[[phase]]
id        = "PHASE-01"
name      = "Convert router.js → src/router.ts"
objective = "Convert router.js to TypeScript with exact parity. Pure function module — no DOM, no state dependency. Export parseHash, buildHash, setFocus, setEdge."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-00 exits green: scaffold exists, tsc passes on empty app.ts, Vite starts." }
]
exit_criteria = [
  { id = "EX-1", text = "src/router.ts exists with all functions exported." },
  { id = "EX-2", text = "Functions have correct TypeScript signatures matching the design." },
  { id = "EX-3", text = "web/map/router.js deleted." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (router.ts has zero errors)." },
  { id = "VT-2", expects = "Existing router.js tests in test.html still pass (old .js file loaded)." },
  { id = "VA-1", expects = "Agent verifies parseHash returns correct Route for #/focus/SL-001, #/focus/SL-001?depth=2, #/edge/e_abc, empty hash." },
  { id = "VA-2", expects = "Agent verifies buildHash produces correct hash strings for focus and edge views with depth." }
]
specs        = []
requirements = []

# Phase 02: api.ts — HTTP layer, no DOM, only fetch + types.
[[phase]]
id        = "PHASE-02"
name      = "Convert api.js → src/api.ts"
objective = "Convert api.js to TypeScript. ApiError class with typed constructor. All fetch functions return typed Promises."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 exits green: router.ts compiled and verified." }
]
exit_criteria = [
  { id = "EX-1", text = "src/api.ts exists with ApiError class and all fetch functions exported." },
  { id = "EX-2", text = "All functions have correct Promise<T> return types." },
  { id = "EX-3", text = "web/map/api.js deleted." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (api.ts has zero errors)." },
  { id = "VA-1", expects = "Agent verifies ApiError constructor and prototype chain correct." },
  { id = "VA-2", expects = "Agent verifies fetchGraph returns Promise<RawGraph> shape matches types.ts." }
]
specs        = []
requirements = []

# Phase 03: dot.ts — pure text generation, DOT helpers + style constants.
[[phase]]
id        = "PHASE-03"
name      = "Convert dot.js → src/dot.ts"
objective = "Convert dot.js to TypeScript. Exports dotQuote, graphToDot, cmGraphToDot, NODE_STYLES, EDGE_STYLES. Pure text generation — no DOM."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-02 exits green: api.ts compiled and verified." }
]
exit_criteria = [
  { id = "EX-1", text = "src/dot.ts exists with all exports." },
  { id = "EX-2", text = "NODE_STYLES and EDGE_STYLES typed as Record<string, ...>." },
  { id = "EX-3", text = "web/map/dot.js deleted." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (dot.ts has zero errors)." },
  { id = "VA-1", expects = "Agent verifies graphToDot output for a simple 2-node neighbourhood matches expected DOT string (node attributes, edge, rankdir)." },
  { id = "VA-2", expects = "Agent verifies cmGraphToDot output for a simple 2-node CM matches expected DOT string." }
]
specs        = []
requirements = []

# Phase 04: svg.ts — SVG DOM manipulation, no state dependency.
[[phase]]
id        = "PHASE-04"
name      = "Convert svg.js → src/svg.ts"
objective = "Convert svg.js to TypeScript. Exports injectHitRects, wireHandlers, applyFocusHighlight, dimLegend. All take explicit SVGElement params — no state dependency."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 exits green: dot.ts compiled and verified." }
]
exit_criteria = [
  { id = "EX-1", text = "src/svg.ts exists with all exports." },
  { id = "EX-2", text = "SvgHandlerOpts type defined in this module." },
  { id = "EX-3", text = "web/map/svg.js deleted." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (svg.ts has zero errors)." },
  { id = "VA-1", expects = "Agent verifies injectHitRects adds hit-rect elements to node groups in a sample SVG document." },
  { id = "VA-2", expects = "Agent verifies wireHandlers attaches click/hover listeners to node groups." }
]
specs        = []
requirements = []

# Phase 05: model.ts — state singleton + pure functions for graph normalization.
[[phase]]
id        = "PHASE-05"
name      = "Convert model.js → src/model.ts"
objective = "Convert model.js to TypeScript. Export the state singleton and all pure functions: normalizeGraph, normalizeConceptMap, findFocus, resolveFocus, neighbourhood, cmNeighbourhood, searchFilter, kindOrder, compareNodes, compareEdgesBySource, encodePart, pascalToSnake, buildNodeLabelList, buildRelLabelList, setActionabilityView."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-04 exits green: svg.ts compiled and verified." }
]
exit_criteria = [
  { id = "EX-1", text = "src/model.ts exists with all exports typed." },
  { id = "EX-2", text = "state singleton initialized with correct default values." },
  { id = "EX-3", text = "web/map/model.js deleted." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (model.ts has zero errors)." },
  { id = "VA-1", expects = "Agent verifies normalizeGraph produces correct nodes Map and edges array from sample RawGraph JSON." },
  { id = "VA-2", expects = "Agent verifies neighbourhood BFS returns correct nodes and edges for depth 0, 1, 2." },
  { id = "VA-3", expects = "Agent verifies findFocus resolves case-insensitive canonical ref, loose canonical, title match, substring fallback." },
  { id = "VA-4", expects = "Agent verifies cmNeighbourhood with focusKey returns filtered nodes/edges; null focusKey returns all." },
  { id = "VA-5", expects = "Existing model.js tests in test.html still pass." }
]
specs        = []
requirements = []

