# Implementation plan for SL-091 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-091"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# Phase 00: scaffold — project config, types, empty src/, updated index.html.
# No TS files compile yet. Sets up the build toolchain.
[[phase]]
id        = "PHASE-00"
name      = "Scaffold project config and type definitions"
objective = "Create package.json, tsconfig.json, vite.config.ts, vitest.config.ts, eslint.config.js, src/types.ts, move style.css to src/, update index.html to load a single module script. No TS files compile yet — just the skeleton."
entrance_criteria = [
  { id = "EN-1", text = "Design locked and committed; no unresolved design questions." },
  { id = "EN-2", text = "Existing web/map/ JS source files are committed and unchanged." }
]
exit_criteria = [
  { id = "EX-1", text = "package.json exists with dependencies (typescript, vite, eslint, typescript-eslint, @eslint/js, globals, vitest) and scripts (dev: vite, typecheck: tsc --noEmit, lint: eslint --max-warnings=0, test: vitest run, build: bun run typecheck && bun run lint && bun run test && vite build)." },
  { id = "EX-2", text = "tsconfig.json exists with compilerOptions: strict, moduleResolution bundler, target es2020, noUncheckedIndexedAccess, verbatimModuleSyntax, exactOptionalPropertyTypes, noImplicitOverride, noImplicitReturns, useUnknownInCatchVariables, skipLibCheck: false, noUnusedLocals, noUnusedParameters, isolatedModules, allowJs: false, checkJs: false." },
  { id = "EX-3", text = "vite.config.ts exists with proxy /api → localhost:8080 and publicDir: public." },
  { id = "EX-4", text = "vitest.config.ts exists (extends vite.config.ts, environment: node)." },
  { id = "EX-5", text = "src/types.ts exists with all shared interfaces from the design." },
  { id = "EX-6", text = "src/style.css exists (moved from web/map/style.css)." },
  { id = "EX-7", text = "web/map/public/vendor/github-markdown.css exists (moved from web/map/vendor/)." },
  { id = "EX-8", text = "index.html updated: single <script type=\"module\" src=\"/src/app.ts\">, old <script> tags removed. CSS link stays." },
  { id = "EX-9", text = "bun install succeeds." },
  { id = "EX-10", text = "eslint.config.js exists (flat config, ESLint v9+): js.configs.recommended + tseslint.configs.strictTypeChecked + tseslint.configs.stylisticTypeChecked, plus LLM-damage-containment rules (no-explicit-any, no-unsafe-*, no-floating-promises, no-misused-promises, switch-exhaustiveness-check, strict-boolean-expressions, consistent-type-imports, await-thenable, require-await, return-await), plus restricted-syntax bans (JSXElement, innerHTML/outerHTML assignment, insertAdjacentHTML, eval, new Function, window.* assignment, no-restricted-globals for bare event). Per-file overrides for render.ts/concept-map.ts innerHTML sites (eslint-disable-next-line, not blanket weakening). reportUnusedDisableDirectives: error." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (with empty src/app.ts stub that imports nothing)." },
  { id = "VT-2", expects = "bun run dev starts Vite without errors (app.ts just renders placeholder)." },
  { id = "VT-3", expects = "existing map server integration tests pass (no Rust changes yet)." },
  { id = "VT-4", expects = "eslint --max-warnings=0 passes." }
]
specs        = []
requirements = []

# Phase 01: router.ts — pure string parsing, no DOM, no deps beyond types.ts.
[[phase]]
id        = "PHASE-01"
name      = "Test-design → implement router.ts per behaviour contract"
objective = "Convert router.js to TypeScript with exact parity. Test-first: a separate agent designs Vitest behaviour-contract tests against router.js's actual outputs (RED), then the satisfier implements router.ts until all tests pass (GREEN) and tsc/eslint are clean. Export parseHash, buildHash, setFocus, setEdge."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-00 exits green: scaffold exists, tsc passes on empty app.ts, Vite starts." },
  { id = "EN-2", text = "Router behaviour-contract tests designed and committed by a separate agent (test designer ≠ satisfier). Tests run via Vitest (bun run test). Tests encode the contract: parseHash edge cases (empty hash, malformed, depth, edge view), buildHash round-trips (focus and edge views with/without depth). Tests fail against empty src/router.test.ts stub (RED)." }
]
exit_criteria = [
  { id = "EX-1", text = "src/router.ts exists with all functions exported and correctly typed." },
  { id = "EX-2", text = "src/router.test.ts exists alongside router.ts (the behaviour contract tests — designed before implementation)." },
  { id = "EX-3", text = "src/router.ts compiled and typechecks; web/map/router.js retained as test scaffold (not deleted until PHASE-12)." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (router.ts has zero errors)." },
  { id = "VT-2", expects = "Existing router.js tests in test.html still pass (old .js file loaded)." },
  { id = "VT-3", expects = "eslint --max-warnings=0 passes." },
  { id = "VT-4", expects = "All router behaviour-contract tests pass via Vitest (bun run test) — GREEN." }
]
specs        = []
requirements = []

