# Phase 10: app.ts — entry point + test.html conversion + vendor cleanup.
[[phase]]
id        = "PHASE-10"
name      = "Convert app.js → src/app.ts, convert test.html, clean up vendor/"
objective = "Convert app.js to TypeScript entry point. Imports all modules. bootstrap() and renderView() functions. Convert test.html to <script type=\"module\"> with import statements. Remove old vendor bundles (d3.v7.min.js, d3-dag.min.js, markdown-it.min.js, purify.min.js). Remove old style.css from web/map/ root."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-09 exits green: priority.ts compiled and verified." },
  { id = "EN-2", text = "All .js source files deleted (only .ts remain in src/)." }
]
exit_criteria = [
  { id = "EX-1", text = "src/app.ts exists with bootstrap() and renderView() typed." },
  { id = "EX-2", text = "test.html converted to <script type=\"module\"> importing from ../src/*.ts." },
  { id = "EX-3", text = "Old vendor bundles deleted (d3.v7.min.js, d3-dag.min.js, markdown-it.min.js, purify.min.js)." },
  { id = "EX-4", text = "web/map/style.css deleted (now at src/style.css)." },
  { id = "EX-5", text = "web/map/vendor/ directory contains only README.md." }
]
verification = [
  { id = "VT-1", expects = "tsc --noEmit passes (all .ts files, zero errors)." },
  { id = "VT-2", expects = "bun run dev starts Vite, browser loads the app, all test.html tests pass." },
  { id = "VT-3", expects = "bun run build produces dist/ with index.html, hashed JS/CSS, vendor/github-markdown.css." },
  { id = "VH-1", expects = "Manual smoke: navigate graph, search entities, filter by kind, toggle depth, toggle semantic/actionability view, view markdown, edit concept map — all function identically to pre-conversion behaviour." }
]
specs        = []
requirements = []

# Phase 11: Rust integration — assets.rs cfg_attr, .gitignore, verify tests.
[[phase]]
id        = "PHASE-11"
name      = "Update Rust embedding and gitignore"
objective = "Change rust-embed folder to use cfg_attr: debug embeds web/map/, release embeds web/map/dist/. Add dist/ and node_modules/ to .gitignore. Verify all map server integration tests pass."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-10 exits green: app.ts, test.html converted, vendor cleaned, Vite build works." }
]
exit_criteria = [
  { id = "EX-1", text = "src/map_server/assets.rs uses cfg_attr for debug/release folder selection." },
  { id = "EX-2", text = ".gitignore includes web/map/dist/ and web/map/node_modules/." },
  { id = "EX-3", text = "cargo build (debug) succeeds, embeds web/map/." },
  { id = "EX-4", text = "cargo build --release succeeds after bun run build, embeds web/map/dist/." }
]
verification = [
  { id = "VT-1", expects = "cargo test -p doctrine -- all map server integration tests pass (debug embed)." },
  { id = "VT-2", expects = "cargo build --release succeeds (requires bun run build first)." },
  { id = "VT-3", expects = "just gate passes (zero clippy warnings, workspace tests green)." }
]
specs        = []
requirements = []

