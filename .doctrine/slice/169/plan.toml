# Implementation plan for SL-169 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-169"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Shared tags-default helper"
objective = "Lift the conditional 'splice tags before title iff any row tagged' rule into a single listing::default_with_tags helper, and refactor backlog's existing inline splice onto it (no parallel implementation). Foundation for every per-kind conditional default."
entrance_criteria = [
  { id = "EN-1", text = "SL-169 design.md is locked; D3 names the helper signature." },
]
exit_criteria = [
  { id = "EX-1", text = "listing::default_with_tags(base, any_tagged) -> Vec<&str> exists: returns base.to_vec() when !any_tagged; otherwise splices 'tags' immediately before 'title'; never mutates base; a base lacking 'title' is returned unchanged." },
  { id = "EX-2", text = "backlog.rs list dispatch calls default_with_tags; the inline flat_map splice (was ~1237-1250) is removed — one source of the rule remains." },
]
verification = [
  { id = "VT-1", expects = "Unit tests on default_with_tags: tagged base -> tags before title; untagged -> base verbatim; base without title -> unchanged." },
  { id = "VT-2", expects = "Existing backlog list goldens pass unchanged — behaviour-equivalence proof for the refactor." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Tags columns — rows already carrying tags"
objective = "Add the tags column + conditional default to the column sites whose row type already carries tags: governance (GOV_COLUMNS — serves adr/policy/standard/rfc in one edit) and knowledge (KN_COLUMNS); add the conditional default to revision (REV_COLUMNS already has the tags column)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 merged: listing::default_with_tags available." },
]
exit_criteria = [
  { id = "EX-1", text = "GOV_COLUMNS and KN_COLUMNS each carry a tags Column (paint_tag, PerToken); governance::run_list and knowledge::run_list compute any_tagged and route the default through default_with_tags; revision::run_list does likewise." },
  { id = "EX-2", text = "For adr/policy/standard/rfc/knowledge/revision: a tagged corpus shows tags immediately before title by default; an untagged corpus is byte-identical to pre-change output." },
]
verification = [
  { id = "VT-1", expects = "list goldens per kind, tagged + untagged cases (untagged proves byte-identity)." },
  { id = "VT-2", expects = "list --columns explicit selection includes/orders tags for each kind regardless of corpus tagging." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Tags columns — rows needing a field"
objective = "Add tags: Vec<String> to SliceRowTuple and SpecListRow, populate from the unified root-level tags, then add the tags column + conditional default for slice and spec."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 merged: listing::default_with_tags available." },
]
exit_criteria = [
  { id = "EX-1", text = "SliceRowTuple and SpecListRow carry tags populated from Meta.tags (or equivalent root-level source); SLICE_COLUMNS and SPEC_COLUMNS gain a tags Column; slice::run_list and spec::run_list route the default through default_with_tags." },
  { id = "EX-2", text = "slice/spec list: tagged corpus shows tags before title; untagged corpus byte-identical to pre-change." },
]
verification = [
  { id = "VT-1", expects = "list goldens for slice + spec, tagged + untagged." },
  { id = "VT-2", expects = "list --columns tags selection works for slice + spec." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "REC + review taggable read surfaces"
objective = "Open the taggable gate for REC and review and wire their full read surface (IMP-144 core): row tags field, list column + conditional default, and show / --json rendering."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 merged: listing::default_with_tags available." },
]
exit_criteria = [
  { id = "EX-1", text = "tag::TAGGABLE includes \"REC\" and \"RV\"; the TAGGABLE-coverage unit test (tag.rs ~271) still passes." },
  { id = "EX-2", text = "rec and review ListRow carry tags; REC_COLUMNS and REVIEW_COLUMNS gain a tags Column; rec::run_list and review::run_list route the default through default_with_tags (review's derived columns are orthogonal)." },
  { id = "EX-3", text = "rec show / --json and review show / --json render tags; review tags ride the flattened ReviewDoc inside the 'review' object." },
]
verification = [
  { id = "VT-1", expects = "doctrine tag set REC-001 <t> and RV-001 <t> round-trip (was rejected as not-taggable)." },
  { id = "VT-2", expects = "rec/review list goldens (tagged + untagged) and show/--json goldens carrying tags." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Non-tags surface conformance — relation --columns + concept-map casing"
objective = "Close the two remaining SPEC-013 conformance gaps that are independent of tags: wire --columns into relation list/census (D1), and normalise concept-map list headers to lowercase (D5)."
entrance_criteria = [
  { id = "EN-1", text = "SL-169 design.md locked (D1, D5). No dependency on the tags phases." },
]
exit_criteria = [
  { id = "EX-1", text = "RelationCommand::List and ::Census accept --columns; the value threads through pub render_list/render_census (relation_query.rs) into the private table helpers, replacing the hardcoded None." },
  { id = "EX-2", text = "CONCEPT_MAP_COLUMNS header fields are lowercase (id/status/tags/slug/title); name fields unchanged." },
]
verification = [
  { id = "VT-1", expects = "e2e_list_columns_golden covers RelationRow + CensusRow; e2e_list_conformance matrix includes relation + census; relation list --columns source,label,state and relation census --columns label,count select/order correctly." },
  { id = "VT-2", expects = "concept-map list golden renders lowercase headers." },
]
specs        = []
requirements = []
