# Implementation plan for SL-021 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-021"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored — edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md §
# reference forms): EN-1 entry, EX-1 exit, and verification by mode —
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.

[[phase]]
id        = "PHASE-01"
name      = "Taxonomy"
objective = "Confirm the candidate tree (design §2) and produce the per-spec source map; settle the open boundary calls so fan-out runs against an unambiguous roster. Output is disposable scaffolding (phase sheet / handover) — never a committed artifact."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked — D1 re-locked per F1-A (whole-system context root); PRD-012/PRD-013 authored; SL-022 relational spine shipped." },
]
exit_criteria = [
  { id = "EX-1", text = "Confirmed roster + per-spec source map recorded in the gitignored phase sheet (NOT committed — SL-019 CHARGE VII)." },
  { id = "EX-2", text = "Boundary calls settled: slice surface component-vs-container; PRD-010 shipped subset (exempt, named); CLI-surface container in/out." },
  { id = "EX-3", text = "Every shipped-mechanism PRD mapped to ≥1 descending node via single-valued descends_from; exemptions named explicitly, never silent." },
]
verification = [
  { id = "VA-1", expects = "Agent reviews the roster against the §2 rule — capability-complete descent, no false containment under the root, no silent exemption." },
  { id = "VH-1", expects = "User agrees the roster + boundary calls before any spec is authored (scope: reviewed and agreed before authoring)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "Exemplar trio"
objective = "Author the three-shape exemplar end-to-end — whole-system context root 'Doctrine', entity-engine container, ADR component — locking the retrospective altitude bar before any fan-out (design §3)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 roster + source map confirmed and user-agreed." },
]
exit_criteria = [
  { id = "EX-1", text = "Three specs authored with the coordinated three-write model: identity TOML incl. hand-edited spine fields + template-shaped md body + spec req add REQ entities (pending, present-tense shipped obligations)." },
  { id = "EX-2", text = "Root is an anchor-free whole-system synthesis (no parent, no descent, REQ-085); entity-engine container parent=root carries entity-model.md content under the F4 rule; ADR component descends_from=PRD-008, parent=container." },
]
verification = [
  { id = "VT-1", expects = "doctrine spec validate green for the trio; spec show reassembles all three with spine fields rendered." },
  { id = "VH-1", expects = "User reviews and accepts the trio as the quality bar (the retrospective altitude — mechanism-as-shipped, no current-vs-target language)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Skill rework"
objective = "Rework spec-tech SKILL.md to be exemplar-driven — add the relational spine, C4 guidance, and hand-edit authoring reality, pointing at the locked trio (design §4). Template untouched."
entrance_criteria = [
  { id = "EN-1", text = "Trio authored, validated, and accepted as the bar (PHASE-02 EX-1/EX-2/VH-1)." },
]
exit_criteria = [
  { id = "EX-1", text = "SKILL.md carries: the spine (descends_from tech→PRD single-valued; parent single-parent acyclic; containment-vs-peer rule), C4 guidance (stop at container/component), three-write authoring reality (spine is hand-edited TOML, spec validate the gate), the dual-posture rule (retrospective + forward both legal per PRD-013), and points at the exemplar trio. install/templates/spec-tech.md not edited." },
  { id = "EX-2", text = "Refresh ritual run: doctrine skills install + touch src/skills.rs + rebuild (skill-refresh-command)." },
]
verification = [
  { id = "VT-1", expects = "just check green after the refresh." },
  { id = "VA-1", expects = "Agent diff-reviews SKILL.md against design §4 — every item present, template untouched." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-04"
name      = "Fan-out"
objective = "Author the remaining ~11-13 specs from the exemplar trio + reconciled skill + per-spec source map, top-down (containers land before their components so each child's parent resolves), at capped width (design §5)."
entrance_criteria = [
  { id = "EN-1", text = "Skill reworked (PHASE-03); confirmed roster + source map available from PHASE-01." },
]
exit_criteria = [
  { id = "EX-1", text = "Every roster node has an authored SPEC-NNN (identity + spine fields + template-shaped md body + pending REQ entities), following the exemplar shape." },
  { id = "EX-2", text = "parent resolves for every child — containers authored before/with their components; fan-out ran in waves (containers, then components)." },
]
verification = [
  { id = "VT-1", expects = "doctrine spec validate green as specs land; spec show reassembles each." },
  { id = "VA-1", expects = "Agent checks each spec holds altitude — shipped how, present-tense; thin components carry kind-specific config/statuses/render contracts, not stubs (anti-anaemia bar, §9)." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-05"
name      = "Edges, validate, coverage audit"
objective = "Author the weighty interactions edges, retrofit SPEC-001/SPEC-002 parent=root, run the corpus-wide integrity gates and the capability-coverage audit, and flip specs draft→active (design §6/§7)."
entrance_criteria = [
  { id = "EN-1", text = "Fan-out complete — every roster node authored (PHASE-04 EX-1)." },
]
exit_criteria = [
  { id = "EX-1", text = "interactions.toml peer edges (uses/calls) authored only where weighty; no edge duplicates what containment already says." },
  { id = "EX-2", text = "SPEC-001/SPEC-002 parent=root retrofitted (mechanical single-field add, F5) — corpus is one tree." },
  { id = "EX-3", text = "Specs flipped draft→active (edit-preserving status transition)." },
  { id = "EX-4", text = "No taxonomy/source-map scaffolding committed — grep the diff (SL-019 CHARGE VII)." },
]
verification = [
  { id = "VT-1", expects = "doctrine spec validate clean corpus-wide: parent resolution + acyclicity, descent targets resolve to product specs, no dangling interaction FKs, no orphan REQs, no duplicate labels. just check green." },
  { id = "VA-1", expects = "Capability-coverage audit — every shipped-mechanism PRD reachable via ≥1 descends_from (registry scan/grep); exemptions (PRD-010, mechanism unbuilt) listed explicitly." },
]
specs        = []
requirements = []
