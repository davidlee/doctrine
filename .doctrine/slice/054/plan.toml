[[phase]]
id        = "PHASE-01"
name      = "RenderOpts seam â€” behaviour-preserving widening"
objective = """
Replace the `color: bool` render axis with a `RenderOpts { color, term_width }` \
bundle at the `render_columns` seam (folds F3 from the SL-053 review) and add a \
bare `term_width: Option<u16>` param to `render_table` â€” threading every \
production + test caller. NO behaviour change: every caller passes the default / \
`None` path, and `render_table`'s body still always selects `Disabled` (the \
`Some(w)` wrapping arm is deferred to PHASE-02). The existing suites passing \
unchanged ARE the behaviour-preservation proof.
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked â€” external (codex) review folded at bc9ca0b; SL-053 colour path live on main." },
]
exit_criteria = [
  { id = "EX-1", text = "`RenderOpts { color: bool, term_width: Option<u16> }` defined (Debug/Clone/Copy/Default); `RenderOpts::default()` == `{ color: false, term_width: None }`." },
  { id = "EX-2", text = "`render_columns` takes `RenderOpts`; `render_table` takes `term_width: Option<u16>`; `ListArgs.color: bool` becomes `ListArgs.render: RenderOpts`." },
  { id = "EX-3", text = "All 10 production `render_columns` sites (incl. the rec.rs:576 empty-branch), the 4 cfg(test) helpers, the `coverage_view::render_table` wrapper, and `priority::{survey_human,next_human}` are threaded; `render_table` body still always `Disabled`." },
]
verification = [
  { id = "VT-1", expects = "The full existing in-crate + black-box suite passes UNCHANGED â€” byte-identical piped output (the behaviour-preservation gate)." },
  { id = "VT-2", expects = "`RenderOpts::default()` equals `{ color: false, term_width: None }` (pinned by a test)." },
  { id = "VT-3", expects = "`cargo clippy` (plain) zero warnings; `just check` green." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "render_table wrapping engine â€” pure"
objective = """
Implement terminal-width wrapping in the pure `render_table`: when `term_width` \
is `Some(w)` AND `w` fits the grid, switch to `ContentArrangement::Dynamic` + \
`set_width(w)`; keep `force_no_tty()`, outer-edge padding-zeroing, and per-line \
`trim_end` UNCONDITIONAL (spike: orthogonal to wrap); fall back to `Disabled` \
when `w` is below the grid's structural minimum (`grid_min_width(cols)`). Pure \
layer â€” driven entirely by passing `Some(w)` in tests; no shell yet.
"""
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete â€” `render_table` carries `term_width`, the seam is threaded, suites green." },
]
exit_criteria = [
  { id = "EX-1", text = "`render_table` `Some(w)` arm: `grid_min_width(cols)` fit test (borders + padding + â‰Ą1 char/col, matching comfy-table `available_content_width`); `fits` â‡’ `Dynamic + set_width(w)`, else `Disabled`." },
  { id = "EX-2", text = "`force_no_tty()`, outer-edge padding-zero, and per-line `trim_end` remain unconditional across both arms." },
]
verification = [
  { id = "VT-1", expects = "`render_table(wide_grid, Some(40))` yields multi-line rows; every wrapped line carries the `â”‚` separator; no line exceeds the budget after `trim_end`." },
  { id = "VT-2", expects = "`render_table(wide_6_7_col_grid, Some(20))` returns the `Disabled` byte-output (grid-floor fallback, `20 < grid_min_width`); a `w` just at/above the minimum wraps." },
  { id = "VT-3", expects = "A `ByValue`-painted wide cell with `RenderOpts { color: true, term_width: Some(w) }` wraps, and ANSI-stripping reproduces the plain wrapped layout (RSK-3; first `ByValue`-under-wrap coverage)." },
  { id = "VT-4", expects = "The existing SL-053 exact-shape `None`/`Disabled` tests pass UNCHANGED (None-invariance)." },
  { id = "VT-5", expects = "`cargo clippy` (plain) zero warnings; `just check` green." },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "Shell width resolution â€” wire it live"
objective = """
Resolve terminal width in the impure shell (`tty.rs`: pure `terminal_width(is_tty, \
cols)` split + crossterm `stdout_terminal_width` probe, coarse `MIN_WRAP_WIDTH=16` \
degenerate floor) and wire it into the 3 shell resolution points so TTY surfaces \
