]
exit_criteria = [
  { id = "EX-1", text = "`tty.rs` gains `stdout_terminal_width() -> Option<u16>` (crossterm `terminal::size`, isatty-gated) + pure `terminal_width(is_tty, cols)` floored at `MIN_WRAP_WIDTH = 16` (0/narrow â‡’ None), mirroring `stdout_color_enabled`/`color_enabled`." },
  { id = "EX-2", text = "`term_width` resolved at the 3 shell points: `CommonListArgs::into_list_args` (â†’ `ListArgs.render.term_width`), `coverage_view::run`, and `priority::mod` run (â†’ `survey_human`/`next_human`)." },
]
verification = [
  { id = "VT-1", expects = "`terminal_width(false, _) == None`; `(true, Some(80)) == Some(80)`; `(true, Some(0)) == None`; `(true, Some(8)) == None` (below floor). Live isatty branch documented-not-driven." },
  { id = "VT-2", expects = "Goldens stay green UNCHANGED â€” piped â‡’ `None` â‡’ width-free output (determinism; a moved golden signals width leaking into a pipe)." },
  { id = "VT-3", expects = "No new *compiled crate* â€” `crossterm = \"0.29\"` is declared direct (required for nameability: comfy-table re-exports only `style::*`, not `terminal::size`) but matches the version already resolved transitively via comfy-table, so `cargo tree` shows no new crate weight. (Erratum, design Â§5: the original 'no Cargo.toml edit' premise was false.)" },
  { id = "VT-4", expects = "`just check` green; `cargo clippy` (plain) zero warnings." },
]
