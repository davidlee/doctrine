# Implementation plan for SL-157 ‚Äî the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) ‚Äî never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-157"

[specs]                          # empty in v1 ‚Äî no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# One [[phase]] per ordered phase. Ids are PHASE-NN (zero-padded), immutable and
# never reused once authored ‚Äî edits append, they never renumber. Criterion ids
# are local to their phase, bare, and equally immutable (.doctrine/glossary.md ¬ß
# reference forms): EN-1 entry, EX-1 exit, and verification by mode ‚Äî
# VT-1 test (automated), VA-1 agent check, VH-1 human acceptance.
[[phase]]
id        = "PHASE-01"
name      = "Strip the None-leg speculative resync"
objective = """
Remove `advance_pure_ref`'s post-CAS re-probe/resync and the machinery only it \
uses (`resync_worktree_hard`, `Disposition::RacedDesync`), per design ¬ß3-¬ß4. The \
not-checked-out advance becomes pure CAS-and-done. The checked-out leg, the M4 \
dirty pre-gate, and the ADR-012 D4 CAS contract are untouched. One atomic phase: \
the deletions are mutually dependent (a partial deletion leaves an unused fn / \
variant ‚Üí clippy `dead_code` fails the gate), so they land in a single commit. \
Behaviour-preserving ‚Äî the existing integrate-safety e2e suite is the proof and \
stays green unchanged; only the `resync_worktree_hard` unit test is removed.\
"""
entrance_criteria = [
  { id = "EN-1", text = "design.md locked; design-target selectors recorded (src/dispatch.rs, src/git.rs)." },
  { id = "EN-2", text = "Baseline behaviour-preservation gate green BEFORE edits: `just check` passes and the integrate e2e set in tests/e2e_dispatch_sync.rs is green (the regression baseline)." },
]
exit_criteria = [
  { id = "EX-1", text = "`advance_pure_ref`'s `RefCas::Updated` arm is unconditional `Disposition::AdvancedPureRef` ‚Äî no `worktree_for_ref` re-probe, no `resync_worktree_hard` call ‚Äî and carries the required do-not-re-add comment (design ¬ß3)." },
  { id = "EX-2", text = "`resync_worktree_hard` removed from src/git.rs with its unit test (`resync_worktree_hard_resyncs_stale_index_after_pure_ref_advance`); shared helper `main_at_c1_with_descendant_c2` RETAINED (3 other callers)." },
  { id = "EX-3", text = "`Disposition::RacedDesync` variant + its `label()` arm removed; `AdvancedResynced` RETAINED (checked-out leg); stale doc-comments trimmed (fn doc dispatch.rs:1818-1821, report doc 1893, AdvancedResynced doc 2260-2264)." },
  { id = "EX-4", text = "`advance_checked_out`, `ff_advance_in_worktree` (+ its tests), the M4 dirty pre-gate, and `report_integrate`'s body are unchanged (no structural edit ‚Äî RacedDesync rode the catch-all arm)." },
  { id = "EX-5", text = "`just gate` green: `cargo clippy` zero warnings, fmt clean, `--workspace` tests pass." },
]
verification = [
  { id = "VT-1", expects = "The integrate-safety e2e set stays green UNCHANGED: integrate_trunk_fast_forwards_then_is_idempotent, integrate_trunk_refuses_non_fast_forward, integrate_refuses_clobbered_prepared_ref, integrate_trunk_checked_out_ff_leaves_clean_tree (VT-2 regression), integrate_trunk_not_checked_out_advances_ref_leaves_live_checkout_clean (surviving pure-ref path), integrate_report_emits_disposition_and_preserves_stdout_reflist (advanced+resynced via the checked-out leg)." },
  { id = "VT-2", expects = "`cargo build` + `cargo clippy` clean ‚Äî no `dead_code`/unused warnings, proving no orphaned fn, variant, or helper after the removals." },
  { id = "VA-1", expects = "Review confirms ONLY the resync machinery is removed: checked-out leg + M4 gate + D4 CAS contract intact; AdvancedResynced label preserved; the do-not-re-add comment present; no new test added for the unsupported main-checked-out race (design ¬ß6)." },
]
specs             = []           # per-phase narrowing of the plan's specs
requirements      = []
