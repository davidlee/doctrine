  { id = "EN-2", text = "dep_seq.rs unchanged from current HEAD â€” existing append/status seams green" },
]
exit_criteria = [
  { id = "EX-1", text = "`remove_after(doc, to, rank_ceiling)` removes matching inline tables from `after` array, edit-preserving" },
  { id = "EX-2", text = "`remove(toml_path, to, rank_ceiling)` IO wrapper: readâ†’parseâ†’coreâ†’write-once; no-op holds mtime" },
  { id = "EX-3", text = "All existing tests still green (append, read, status seams)" },
]
