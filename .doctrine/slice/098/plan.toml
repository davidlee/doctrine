objective = "Edit the /reconcile skill (plugins master): amend the no-op gate (step 2) so orphan content counts as brief content and the gate does not fire while any orphan is unplaced (C2). Add sub-step 4f (Orphan placement) after the existing 4e split rule — for each orphaned requirement: determine spec home(s), work with existing REQ-NNN, handle multi-spec placement as sibling REQs with traced lineage (B1 — one introduce row per spec, each minting its own REQ-NNN), negotiate wording, author REV rows, record REQ-DNN → REQ-NNN mappings in revision-NNN.md ### Orphan placements. Define stuck (non-terminal, close refuses) and withdrawn (design-level retraction) outcomes (E2). Carry the /consult altitude guardrail (IMP-097 deferred)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-03 complete (brief orphan sub-section defined for reconcile to consume)" },
