# Implementation plan for SL-098 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-098"

[specs]
primary       = []
collaborators = []

# plan.toml [requirements] stays empty in v1 (no registry yet) — SL-098 §4
# honours the /plan skill constraint. The REQ-D → REQ-NNN verification mapping
# lives in plan.md prose (the ## Requirements verification narrative list, not a
# table — D1), not here.
[requirements]
targets      = []
dependencies = []

# ── Phase sequencing ──────────────────────────────────────────────────────
# Five prose-only skill edits, one phase per skill, in data-flow order:
# design (produces design-requirements.toml) → plan (maps REQ-D→phase) →
# audit (surfaces orphans in the brief) → reconcile (places orphans via REV
# step 4f) → close (advisory check). Each phase's walkthrough (design §11a–§11e)
# is its verification target. No code changes — verification is VA (agent reads
# the edited skill) with an intermediate VH coherence check after PHASE-03 and a
# final VH end-to-end check at PHASE-05 (F1).
#
# Scope (G1): slice-098.md names 5 skills — /spec-product and /spec-tech are
# deferred to IMP-096 (design §10). Plan follows design §8.
#
# No dogfooding (G2): SL-098 is a skill-guidance slice with no implied
# requirements of its own, so the §11a–§11e walkthroughs run against
# hypothetical artefact state, not SL-098's own. Inherent to the slice kind;
# verification confidence is bounded accordingly.

[[phase]]
id        = "PHASE-01"
name      = "/design — collect-decisions + requirements-pass states + sidecar format"
objective = "Edit the /design skill (plugins master): insert 'Collect decisions' (new state 2) and 'Requirements pass' (new state 4) around the renumbered 'Ask clarifying questions' (state 3, content unchanged — B2: they are distinct activities, not absorbed). Define the design-requirements.toml [[implied]] sidecar as the authoritative home for implied requirements (handle, statement, kind, home_hint, descends_from) with design.md ## Implied Requirements as prose reference only. Add the 'what requirements are implied but not captured' adversarial-review vector. Add guardrails (no structured fields in prose; altitude ambiguity noted in home_hint, not forced). Update BOTH the numbered state list and the <Process State Machine> XML block in sync (E1). Reword the collect-decisions 'read the design doc' instruction to handle greenfield (G3)."
entrance_criteria = [
  { id = "EN-1", text = "design.md locked and committed (RV-078 + post-plan amendment landed)" },
  { id = "EN-2", text = "skill-file baseline confirmed: plugins/doctrine/skills/ is the master; install targets (.doctrine/skills, .agents/skills, .dirge/skills) are gitignored and not edited" },
]
exit_criteria = [
  { id = "EX-1", text = "/design numbered state list shows 'Collect decisions' (state 2), 'Ask clarifying questions' (state 3, renumbered), 'Requirements pass' (state 4) — no absorption, no duplicate" },
  { id = "EX-2", text = "/design <Process State Machine> XML block lists the same states with matching transitions; the 'Adversarial review → Ask clarifying questions' back-edge survives (E1)" },
  { id = "EX-3", text = "/design skill documents the design-requirements.toml [[implied]] format with all five fields (handle, statement, kind, home_hint, descends_from)" },
  { id = "EX-4", text = "/design skill instructs that design.md ## Implied Requirements is prose reference only — one-line summaries pointing to the TOML, no repeated structured fields" },
  { id = "EX-5", text = "/design adversarial-review section carries the requirements attack vector ('what requirements are implied by these decisions but not captured in design-requirements.toml?')" },
  { id = "EX-6", text = "/design guardrails: no structured implied-req fields in prose; altitude ambiguity recorded in home_hint and deferred to /reconcile, not forced at design" },
  { id = "EX-7", text = "collect-decisions instruction handles greenfield (works from slice scope + Explore output when no design doc exists yet — G3), not 'read the current state of the design doc' verbatim" },
]
verification = [
  { id = "VA-1", expects = "reading /design SKILL.md numbered list: Collect decisions (2), Ask clarifying questions (3), Requirements pass (4) — three distinct states" },
  { id = "VA-2", expects = "reading /design SKILL.md <Process State Machine> XML: same three states named, Adversarial review → Ask clarifying questions back-edge present" },
  { id = "VA-3", expects = "reading /design SKILL.md: design-requirements.toml format block shows all five [[implied]] fields" },
  { id = "VA-4", expects = "reading /design SKILL.md: ## Implied Requirements guidance says prose reference only (no Statement:/Kind:/Home: field blocks)" },
  { id = "VA-5", expects = "reading /design SKILL.md: adversarial-review section includes the requirements attack vector" },
  { id = "VA-6", expects = "design §11a walkthrough holds against the edited skill in isolation" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-02"
name      = "/plan — requirements verification narrative in plan.md prose"
objective = "Edit the /plan skill (plugins master): add sub-step 2a (Requirements mapping) between read-design and scaffold — read design-requirements.toml, map each REQ-DNN handle to verifying phase(s), record the mapping in plan.md ## Requirements verification as a prose LIST (not a pipe-table — D1). Acknowledge explicitly that plan.toml [requirements] stays empty in v1 (F-5). Amend step 5's storage-rule prohibition to permit authored, agent-read verification narrative as a distinct category from tool-queried/derived data (D1)."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete (design-requirements.toml format canonical in /design; consumers can reference it)" },
]
exit_criteria = [
  { id = "EX-1", text = "/plan skill has sub-step 2a (Requirements mapping) between read-design (step 1) and scaffold (step 3)" },
  { id = "EX-2", text = "/plan skill specifies the plan.md ## Requirements verification section as a prose list (not a pipe-table — D1); example shows narrative bullets" },
  { id = "EX-3", text = "/plan skill explicitly acknowledges plan.toml [requirements] stays empty in v1 — the mapping lives in plan.md prose, not TOML (RV-078 F-3/F-5 resolution, reframed as a trade per D1)" },
  { id = "EX-4", text = "/plan step 5 storage-rule prohibition amended to permit authored, agent-read verification narrative as distinct from tool-queried/derived data" },
  { id = "EX-5", text = "/plan guardrail: a REQ-DNN with no phase assigned is a /consult trigger, not a silent drop" },
  { id = "EX-6", text = "/plan skill names the close check (§7) as advisory agent-discipline, not a binary-enforced gate (F2)" },
]
verification = [
  { id = "VA-1", expects = "reading /plan SKILL.md: sub-step 2a present and references design-requirements.toml" },
  { id = "VA-2", expects = "reading /plan SKILL.md: plan.md ## Requirements verification example is a prose list, not a pipe-table" },
  { id = "VA-3", expects = "reading /plan SKILL.md: plan.toml [requirements] empty-in-v1 constraint acknowledged with the plan.md rationale" },
  { id = "VA-4", expects = "reading /plan SKILL.md: step 5 prohibition amended to name the authored-agent-read-narrative exception" },
  { id = "VA-5", expects = "reading /plan SKILL.md: /consult guardrail for unassigned REQ-DNN present" },
  { id = "VA-6", expects = "design §11b walkthrough holds: plan.md list has one entry per design-requirements.toml [[implied]]; plan.toml [requirements] empty; no pipe-table" },
]
specs        = []
requirements = []

[[phase]]
id        = "PHASE-03"
name      = "/audit — orphan survey + brief sub-section"
objective = "Edit the /audit skill (plugins master): add sub-step 4a (Orphan survey) between raise/dispose and synthesis — read design-requirements.toml, cross-reference existing canonical REQ-NNN, hold the survey output for brief-writing at step 5 (G4). Add orphan entries to the reconciliation brief nested under ### Governance/spec (REV) as #### Orphaned requirements (REV introduce) (F-6). Handle legacy designs (no sidecar → no orphan section, not an error) and flag REQ-DNN present in sidecar but absent from plan.md as a finding."
entrance_criteria = [
  { id = "EN-1", text = "PHASE-01 complete (sidecar format canonical)" },
]
exit_criteria = [
  { id = "EX-1", text = "/audit skill has sub-step 4a (Orphan survey) between raise/dispose (step 3) and synthesis (step 4)" },
  { id = "EX-2", text = "/audit skill specifies the survey output is held for brief-writing at step 5 (not added to a brief that doesn't exist yet — G4)" },
  { id = "EX-3", text = "/audit skill specifies orphan entries nest under ### Governance/spec (REV) as #### Orphaned requirements (REV introduce) — a sub-section, not a peer (RV-078 F-6)" },
  { id = "EX-4", text = "/audit skill handles legacy designs: no design-requirements.toml → orphan survey yields nothing, not an error" },
  { id = "EX-5", text = "/audit skill flags a REQ-DNN in design-requirements.toml but absent from plan.md ## Requirements verification as a finding (audit identifies; reconcile decides)" },
  { id = "EX-6", text = "brief template in /audit skill shows the orphan sub-section in its final nested position relative to Per-slice and Governance/spec" },
]
verification = [
  { id = "VA-1", expects = "reading /audit SKILL.md: sub-step 4a present and references design-requirements.toml" },
  { id = "VA-2", expects = "reading /audit SKILL.md: survey output held for step 5 (G4 sequencing documented)" },
  { id = "VA-3", expects = "reading /audit SKILL.md: orphan section documented as #### nested under ### Governance/spec (REV), not a top-level peer" },
  { id = "VA-4", expects = "reading /audit SKILL.md: legacy-design (no sidecar) handling documented as non-error" },
  { id = "VA-5", expects = "reading /audit SKILL.md: sidecar/plan.md drift flagged as a finding" },
  { id = "VA-6", expects = "design §11c walkthrough holds: brief carries the nested orphan sub-section; legacy design yields no orphan section" },
  { id = "VH-1", expects = "intermediate coherence check (F1): /design, /plan, /audit edited skills tell one consistent REQ-D story so far — the sidecar format, the plan.md list, and the brief sub-section reference each other correctly; user confirms no drift introduced in PHASE-01 has propagated" },
]
specs        = []
requirements = []

