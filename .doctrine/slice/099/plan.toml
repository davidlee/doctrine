# Implementation plan for SL-099 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-099"

[specs]
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

[[phase]]
id        = "PHASE-01"
name      = "Schema + template widening"
objective = "Widen the Rust types (Lifespan, Provenance, RawSource, Memory, Draft, RecordArgs), TOML schema (lifespan, review_by, [[source]]), and template so new record flags parse, round-trip, and land in the written TOML without data loss."

[[phase.entrance_criteria]]
id   = "EN-1"
text = "Design D3 (template + Draft widening) is specified and locked; no unresolved design questions for schema surfaces."

[[phase.entrance_criteria]]
id   = "EN-2"
text = "Existing memory test suite passes (`cargo test -p doctrine -- memory`) as the unchanged baseline."

[[phase.exit_criteria]]
id   = "EX-1"
text = "`Lifespan` enum (5 variants + Display/FromStr) and `Provenance` struct exist in `src/memory.rs`."

[[phase.exit_criteria]]
id   = "EX-2"
text = "`RawSource` widened from empty struct to carry `kind`, `ref`, `note` fields (serde defaults)."

[[phase.exit_criteria]]
id   = "EX-3"
text = "`Memory` (validated projection) carries `relations: Vec<RawRelation>`, `lifespan: Option<Lifespan>`, `sources: Vec<Provenance>` — no longer dropped via `..`."

[[phase.exit_criteria]]
id   = "EX-4"
text = "`Draft` and `RecordArgs` widened with lifespan, review_by, sources, trust_level, severity."

[[phase.exit_criteria]]
id   = "EX-5"
text = "`render_memory_toml` emits lifespan line (when set), review_by, [[source]] blocks, and honours --trust/--severity overrides on existing [trust]/[ranking] blocks."

[[phase.exit_criteria]]
id   = "EX-6"
text = "Template `install/templates/memory.toml` carries lifespan key (absent by default), review_by substitution token, and [[source]] loop."

[[phase.exit_criteria]]
id   = "EX-7"
text = "All five new record flags (--lifespan, --review-by, --provenance-source, --trust, --severity) parse, accept valid values, and reject invalid values with clear error messages."

[[phase.verification]]
id      = "VT-1"
expects = "`Lifespan::from_str` parses all 5 variants; invalid string → error."

[[phase.verification]]
id      = "VT-2"
expects = "`Provenance` round-trips through TOML serialise/deserialise with all three fields (kind, ref, note)."

[[phase.verification]]
id      = "VT-3"
expects = "`Memory::try_from` maps `RawMemoryToml` with lifespan + relations + sources correctly into `Memory` fields."

[[phase.verification]]
id      = "VT-4"
expects = "`render_memory_toml` with lifespan=Some(Semantic) produces `lifespan = \"semantic\"`; with None produces no lifespan line."

[[phase.verification]]
id      = "VT-5"
expects = "`render_memory_toml` with sources=[Provenance{kind:\"code\", ref_:\"src/foo.rs\", note:\"\"}] produces `[[source]]` block with kind + ref."

[[phase.verification]]
id      = "VT-6"
expects = "`render_memory_toml` with trust_level=Some(\"high\") produces `trust_level = \"high\"` in [trust] block."

[[phase.verification]]
id      = "VT-7"
expects = "Existing memory parse tests pass unchanged — backward compatibility with no-new-field memories is proven."

[[phase.verification]]
id      = "VT-8"
expects = "`--lifespan garbage` on CLI → exit non-zero with parse error mentioning valid variants."

[[phase.verification]]
id      = "VA-1"
expects = "`just check` passes with zero warnings."

