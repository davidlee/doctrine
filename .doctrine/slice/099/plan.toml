[[phase]]
id        = "PHASE-05"
name      = "Lifespan filter + ageing"
objective = "Implement `lifespan_factor`, `effective_age`, sort key modulation, and `--lifespan` filter on `find`/`retrieve` — with behaviour-preservation: unset lifespan = 1.0 multiplier = identical sort."

[[phase.entrance_criteria]]
id   = "EN-1"
text = "PHASE-01 complete (Lifespan enum, Memory.lifespan field)."

[[phase.entrance_criteria]]
id   = "EN-2"
text = "Existing retrieve rank tests pass unchanged as baseline."

[[phase.exit_criteria]]
id   = "EX-1"
text = "`lifespan_factor(Option<Lifespan>) -> f64` returns correct multiplier per the design table (identity=0.0, semantic=0.1, procedural=0.33, episodic=1.0, working=10.0, None=1.0)."

[[phase.exit_criteria]]
id   = "EX-2"
text = "`effective_age(days: i64, lifespan: Option<Lifespan>) -> i64` modulates days by factor; sentinel `i64::MAX` passes through unchanged; valid ages clamp to `i64::MAX - 1`."

[[phase.exit_criteria]]
id   = "EX-3"
text = "`sort_key` key 8 uses `effective_age` instead of raw `days_between(…).unwrap_or(i64::MAX)`."

[[phase.exit_criteria]]
id   = "EX-4"
text = "`QueryContext` gains `lifespan: Option<Lifespan>`; `--lifespan` filter applied in `query()` filter cascade after `match_scope`."

[[phase.exit_criteria]]
id   = "EX-5"
text = "`--lifespan` flag on `find` and `retrieve` wired through CLI parsing."

[[phase.verification]]
id      = "VT-1"
expects = "Table-driven: `effective_age(10, Some(Semantic))` → 1; `effective_age(10, Some(Working))` → 100; `effective_age(10, None)` → 10."

[[phase.verification]]
id      = "VT-2"
expects = "`effective_age(i64::MAX, Some(Working))` → `i64::MAX` (sentinel never modulated)."

[[phase.verification]]
id      = "VT-3"
expects = "`rank` with two memories: same reviewed date, A.working vs B.semantic → B ranks higher than A (B's effective age is lower)."

[[phase.verification]]
id      = "VT-4"
expects = "Existing rank tests (`rank_ordinals_polarity_and_unknown_worst`, `rank_key8_more_recent_first_missing_last`, etc.) pass with zero edits — unset lifespan = 1.0 = identical sort."

[[phase.verification]]
id      = "VT-5"
expects = "`memory find --lifespan semantic` returns only semantic-lifespan memories; `memory find --lifespan working` returns only working-lifespan memories."

[[phase.verification]]
id      = "VT-6"
