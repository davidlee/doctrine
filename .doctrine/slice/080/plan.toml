# Implementation plan for SL-080 — the authored, durable phase plan.
#
# This is the single source of each phase's objective, criteria, verification,
# and links. Runtime status lives separately under .doctrine/state/ (phase
# tracking) — never record progress here. Hand-edit freely: the tool reads this
# file but does not rewrite it.
schema  = "doctrine.plan.overview"
version = 1
slice   = "SL-080"

[specs]                          # empty in v1 — no spec/requirement registry yet
primary       = []
collaborators = []

[requirements]
targets      = []
dependencies = []

# Phase 1: the centrepiece — the new /reconcile skill; independent of retunes
[[phase]]
id        = "PHASE-01"
name      = "Author the /reconcile skill"
objective = "Create .agents/skills/reconcile/SKILL.md as the sole spec-reconciliation writer per D1–D4, D8–D9."

entrance_criteria = [
  { id = "EN-1", text = "design.md locked — D1 (ownership split), D2 (two write surfaces), D3 (reconciliation brief shape), D4 (7-step reconcile process), D8 (no CLI verb), D9 (inspect targets, don't re-audit) are settled." },
]
exit_criteria = [
  { id = "EX-1", text = "SKILL.md written with valid YAML frontmatter (name, description)." },
  { id = "EX-2", text = "All 7 process steps from D4 described: read inputs, no-op gate, per-slice edits, REV authoring (including collision guard), approve & apply, manual prose landing, escalation gate." },
  { id = "EX-3", text = "Both write surfaces (direct edit for per-slice artefacts; REV for governance/spec truth) described per D2." },
  { id = "EX-4", text = "Reconciliation Outcome section shape described (REV rationale for REV-backed changes; RV ## Reconciliation Outcome for direct-edit)." },
  { id = "EX-5", text = "Escalation path (reconcile → design) and no-op case both handled." },
  { id = "EX-6", text = "REV collision guard described per D4 step 4 + split rule." },
  { id = "EX-7", text = "D9 honoured: reconcile inspects targets for applicability and edit-point location but does not perform new issue discovery — the audit/reconcile seam stays intact." },
]
verification = [
  { id = "VA-1", expects = "Skill prose covers all 7 D4 process steps without gap." },
  { id = "VA-2", expects = "Two write surfaces and their mechanisms are distinguishable in prose." },
  { id = "VA-3", expects = "Escalation and no-op paths are distinct sections or clearly signposted." },
  { id = "VA-4", expects = "Collision guard and split rule are both present and actionable." },
  { id = "VA-5", expects = "Skill does not reference a nonexistent `slice reconcile` CLI verb (D8)." },
  { id = "VA-6", expects = "Skill prose describes inspection scope (validate applicability, locate edit points, detect drift) without prescribing re-audit or fresh discovery per D9." },
  { id = "VT-1", expects = "Lint passes — zero warnings on YAML frontmatter and prose." },
]
specs        = []
requirements = []

# Phase 2: retune audit — strip writing, add reconciliation brief
[[phase]]
id        = "PHASE-02"
name      = "Retune /audit to identification-only"
objective = "Strip spec/governance writing from audit SKILL.md; add reconciliation brief as audit's final output per D5."

entrance_criteria = [
  { id = "EN-1", text = "Reconciliation brief shape (design D3) is understood. PHASE-01 is a soft sequencing preference — reading /reconcile before writing audit's handoff prose keeps cross-references consistent, but PHASE-02 may proceed concurrently if the D3 shape is known." },
]
exit_criteria = [
  { id = "EX-1", text = "No prose directs writing design.md or governance during audit." },
  { id = "EX-2", text = "Reconciliation brief step added: dedicated ## Reconciliation Brief section in the RV markdown, separate from ## Synthesis." },
  { id = "EX-3", text = "Findings stay verified — remediation belongs to reconcile; audit prose does not mutate finding disposition to fixed/remediated." },
  { id = "EX-4", text = "Audit's last step hands off to /reconcile (not directly to /close)." },
]
verification = [
  { id = "VA-1", expects = "No occurrence of 'design was wrong', 'reconcile design.md', or 'fix in place' in audit prose." },
  { id = "VA-2", expects = "## Reconciliation Brief section described with example shape matching D3." },
  { id = "VA-3", expects = "Synthesis section still described; distinct from reconciliation brief." },
  { id = "VA-4", expects = "Handoff step references /reconcile, not /close." },
  { id = "VT-1", expects = "Lint passes — zero warnings on YAML frontmatter and prose." },
]
specs        = []
requirements = []

# Phase 3: retune close — add spec-coherence gate
[[phase]]
id        = "PHASE-03"
name      = "Retune /close with spec-coherence gate"
objective = "Add the spec-coherence check to close SKILL.md per D6 — confirm reconciliation is complete before done."

entrance_criteria = [
  { id = "EN-1", text = "Reconcile outcome shape and REV lifecycle understood. PHASE-01 is a soft sequencing preference — reading /reconcile before drafting close's spec-coherence check ensures the resolution paths align, but PHASE-03 may proceed concurrently if the shapes are known from the design." },
  { id = "EN-2", text = "IMP-008 stale-prose list checked against current close SKILL.md: (1) tooling-gaps callout claiming 'no lifecycle transition verb' — absent; (2) hand-edit slice-nnn.toml direction — absent, uses verb; (3) audit.md references — uses RV-NNN throughout; (4) close-gate framing — uses verb, not sole guard. All four already addressed; confirm no regression." },
]
exit_criteria = [
  { id = "EX-1", text = "Spec-coherence gate added: before done, every governance/spec item resolved via done REV, RV-native disposition (withdrawn/tolerated with rationale), or escalated to design." },
  { id = "EX-2", text = "No free-floating 'rejected' disposition permitted — every item lands in one of the RV-native or REV states above." },
  { id = "EX-3", text = "Per-slice direct-edit items confirmed applied to design.md / slice-NNN.md." },
  { id = "EX-4", text = "RV ledger confirmed resolved (done · await=none)." },
  { id = "EX-5", text = "Reconcile outcome recorded (REV rationale and/or RV ## Reconciliation Outcome)." },
  { id = "EX-6", text = "Unresolved items → refuse close and return to /reconcile." },
]
verification = [
  { id = "VA-1", expects = "Spec-coherence gate prose enumerates all four resolution paths (REV done, withdrawn, tolerated, escalated)." },
  { id = "VA-2", expects = "Close skill does not reference audit.md — uses RV-NNN throughout (confirm IMP-008 item 3 still addressed)." },
  { id = "VA-3", expects = "Close skill uses doctrine slice status verb, not hand-edit (confirm IMP-008 item 2 still addressed)." },
  { id = "VA-4", expects = "Close-gate framing is believe-and-verify per IMP-008 item 4 — the verb enforces; the skill checks." },
  { id = "VA-5", expects = "No stale-prose items regressed." },
  { id = "VT-1", expects = "Lint passes — zero warnings on YAML frontmatter and prose." },
]
specs        = []
requirements = []

# Phase 4: routing wire + boot regeneration + install verification
[[phase]]
id        = "PHASE-04"
name      = "Wire /reconcile into routing and verify install"
objective = "Add the /reconcile row to install/routing-process.md; regenerate boot.md; verify embedding per D7 + ADR-009 F14 (shipped-not-reachable)."

entrance_criteria = [
  { id = "EN-1", text = "PHASE-01, PHASE-02, PHASE-03 all complete — all three skills must exist before routing can point at them. This is a hard structural gate: ADR-009 F14 forbids routing at a deferred skill (shipped-not-reachable)." },
]
exit_criteria = [
  { id = "EX-1", text = "install/routing-process.md contains the /reconcile routing row matching D7 text." },
  { id = "EX-2", text = "doctrine boot regenerates .doctrine/state/boot.md and the /reconcile row is present in the generated routing table (not just the source)." },
  { id = "EX-3", text = "doctrine claude install succeeds — the new skill is embedded." },
]
verification = [
  { id = "VH-1", expects = "Routing row text matches D7: 'Slice exists, audit complete, reconciliation brief ready → /reconcile'." },
  { id = "VA-1", expects = "Generated .doctrine/state/boot.md routing table contains the /reconcile row." },
  { id = "VA-2", expects = "doctrine claude install exit code 0; no errors in output." },
  { id = "VA-3", expects = "The three skills form a coherent chain in prose: audit identifies → reconcile writes → close confirms; cross-references are consistent across all three files." },
]
specs        = []
requirements = []
