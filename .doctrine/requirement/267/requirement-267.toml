description = "The estimate and value facets are each a single reusable, kind-agnostic schema attachable to any TOML-backed addressable entity; neither is slice-specific, so later adoption by other kinds is mechanical."
tags = []
acceptance_criteria = [
  "Each facet model is defined once and shared, not duplicated or specialised per entity kind.",
  "Attaching a facet to a new entity kind requires wiring the kind's parse/hydrate path, not remodelling its schema.",
  "No part of either schema assumes a slice-specific shape.",
]
