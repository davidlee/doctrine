slug = "keep-the-projection-disposable-and-never-a-source-of-truth"
title = "Keep the projection disposable and never a source of truth"
status = "active"
kind = "quality"

description = "The projected surface is always derived and disposable — it can be deleted and regenerated from authoritative governance with no loss — and never becomes the place a governance fact lives."
tags = []
acceptance_criteria = [
  "The surface can be deleted and fully regenerated from authoritative state with no loss.",
  "No governance fact originates in the surface; every fact it carries is owned by an authoritative source.",
  "The surface always carries a resolved handle for invoking the tool, even when every other category is empty.",
]
