id = 266
slug = "estimates-are-optional-everywhere-and-never-gate-work"
title = "Estimates and values are optional everywhere and never gate work"
status = "pending"
kind = "quality"

description = "Estimates and values are optional on every entity kind and never gate work; absence is surfaced at most as a generic nudge, never as a schema violation or a workflow block."
tags = []
acceptance_criteria = [
  "No dispatch, execute, audit, or close predicate reads estimate or value presence; a missing estimate or value cannot block, fatally warn, or refuse any workflow.",
  "An absent estimate or value is never a validation error.",
  "A wide estimate or any value is never auto-classified or used to force split pressure.",
  "The absence of a gating read is demonstrable structurally, not merely by a passing run.",
]
