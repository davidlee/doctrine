id = 97
slug = "author-optional-priority-edges-feeding-the-derived-engine"
title = "Author optional priority edges feeding the derived engine"
status = "pending"
kind = "functional"

description = "A backlog item may optionally author two item→item priority edges on its outbound relation seam: a hard `needs` edge (a payload-free id list — this item is blocked until those land) and a soft `after` edge (an inline-table list `{ to, rank }` — prefer this item after those, rank = preference strength). Both are optional enrichment, never required capture — an edgeless item still surveys by derived consequence + fallback (§4; PRD-011 §4). The authored field names are capture-surface ergonomics, decoupled from the graph engine's `dep`/`seq` overlay species: the adapter classifies `needs`→dep (hard, reject-on-cycle) and `after`→seq (soft, evict-on-cycle), so engine vocabulary never leaks into authored items. `after`'s `rank` is an edge attribute (pairwise preference strength), distinct in scope from the still-open item-level authored-priority scalar (PRD-011 OQ-001, FR-006). The `after` array order is the adapter's clock-free, stable `age` source (SPEC-001 D5); appends preserve order. This is the PRD-009 capture surface SPEC-001 REQ-096 consumes."
tags = []
acceptance_criteria = [
  "An item can author an optional hard `needs` edge (payload-free id list) and an optional soft `after` edge (`{ to, rank }` inline-table list) on its outbound seam; both default empty and require no capture.",
  "The authored `needs`/`after` names are mapped to the engine's dep/seq overlay species by policy/adapter; no graph-engine vocabulary appears in the authored item.",
  "An item with no `needs`/`after` edge is still captured and surveyed — no capture path requires a priority edge.",
  "`after`'s `rank` is an edge attribute (preference strength), never the item-level authored-priority scalar; the `after` array order is preserved across edit-preserving round-trips so it can serve as the adapter's stable `age` source.",
]
