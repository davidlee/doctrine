description = "A product spec can record a single parent product spec, marking it a child in a single-parent acyclic decomposition."
tags = []
acceptance_criteria = [
  "A product spec records a single parent product spec, marking it a child in the decomposition.",
  "Containment is stored once, outbound on the child; the parent's children are derived, never stored.",
  "A product spec has at most one parent, and no chain of parents forms a cycle.",
  "A parent must be a product spec; a tech parent is invalid.",
]
