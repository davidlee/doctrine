slug = "reassemble-a-spec-into-one-readable-whole-on-demand"
title = "Reassemble a spec into one readable whole on demand"
status = "active"
kind = "functional"

description = "An operator can read a spec as one document, reassembled on demand from its identity, prose body, and membered requirements, with no stored copy that can go stale."
tags = []
acceptance_criteria = [
  "The view composes identity, the prose body verbatim, and each membered requirement in membership order under its label and durable id.",
  "Each membered requirement renders its statement and acceptance criteria.",
  "The view is recomputed from present local state on each read and is never materialised as a stale copy.",
]
