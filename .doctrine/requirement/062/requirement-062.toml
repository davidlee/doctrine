schema = "doctrine.requirement"
version = 1

id = 62
slug = "transition-a-record-through-a-kind-valid-lifecycle-state"
title = "Transition a record through a kind-valid lifecycle state"
status = "active"
kind = "functional"

description = "A contributor moves a record to another state in its kind's lifecycle vocabulary; the change is atomic and edit-preserving, and states outside that kind's vocabulary are rejected."
tags = []
acceptance_criteria = [
  "A record advances only through its own kind's lifecycle vocabulary (e.g. assumption held→testing→validated/invalidated/obsolete).",
  "A transition to a state not in the record's kind vocabulary is rejected.",
  "A transition is atomic and round-trips without dropping comments or unknown keys.",
]
