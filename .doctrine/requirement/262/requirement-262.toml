schema = "doctrine.requirement"
version = 1

id = 262
slug = "validate-a-present-estimate-and-accept-its-absence"
title = "Validate a present estimate and accept its absence"
status = "pending"
kind = "functional"

description = "When [estimate] is present it must be structurally valid; when absent the entity is valid. Optional means omittable, not malformed."
tags = []
acceptance_criteria = [
  "A present estimate validates only when lower and upper are both present, finite, with lower >= 0 and upper >= lower.",
  "Missing lower, missing upper, NaN, +Infinity, -Infinity, negative lower, and upper < lower are each hard validation errors.",
  "An absent [estimate] passes validation.",
  "A malformed present estimate is rejected loudly, never silently repaired.",
]
