schema = "doctrine.requirement"
version = 1

id = 268
slug = "the-estimate-schema-is-forward-compatible"
title = "The estimate schema is forward-compatible"
status = "active"
kind = "quality"

description = "The v1 two-bound schema is forward-compatible: future optional fields (e.g. mode, distribution) can extend the facet without invalidating any estimate authored under v1."
tags = []
acceptance_criteria = [
  "A v1-valid estimate (lower/upper only) remains valid under any future facet extension.",
  "Adding optional richer fields does not require migrating existing estimates.",
  "v1 persists no inferred mode or distribution and does not pretend two bounds uniquely determine a distribution.",
]
