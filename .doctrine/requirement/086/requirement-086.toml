schema = "doctrine.requirement"
version = 1

id = 86
slug = "preserve-lineage-and-integrity-when-a-technical-spec-is-retired-or-superseded"
title = "Preserve lineage and integrity when a technical spec is retired or superseded"
status = "pending"
kind = "functional"

description = "A technical spec is retired or superseded through the shared lifecycle, recording recoverable lineage rather than being deleted or rewritten in place, and never silently orphaning its decomposition children. Dedicated merge and split verbs are reserved."
tags = []
acceptance_criteria = [
  "A technical spec can be retired or superseded through the shared spec lifecycle, with its lineage (what became what) recoverable.",
  "A transformed spec is never silently deleted or rewritten in place.",
  "Its decomposition children are never silently orphaned; re-parenting them is an explicit step, and an unresolved orphan is an integrity finding.",
]
