slug = "decompose-a-technical-spec-into-a-single-parent-acyclic-hierarchy"
title = "Decompose a technical spec into a single-parent acyclic hierarchy"
status = "pending"
kind = "functional"

description = "A coarser technical spec decomposes into finer child specs, each recording at most one parent, forming an acyclic hierarchy stored outbound on the child."
tags = []
acceptance_criteria = [
  "A technical spec can record a single parent spec, marking it a child in the decomposition.",
  "Containment is stored once, outbound on the child; the parent's children are derived, never stored.",
  "A spec has at most one parent, and no chain of parents forms a cycle.",
]
