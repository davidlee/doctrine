schema = "doctrine.requirement"
version = 1

id = 59
slug = "record-an-items-resolution-distinct-from-its-status"
title = "Record an item's resolution distinct from its status"
status = "active"
kind = "functional"

description = "A backlog item records why it left the active flow as a `resolution` field orthogonal to `status` — status says whether it is active, resolution says why it stopped."
tags = []
acceptance_criteria = [
  "A closed or resolved item carries a `resolution` (e.g. fixed, done, mitigated, accepted, expired, duplicate, wont_do, obsolete, promoted).",
  "No close-reason is encoded as a `status` state (status stays the canon five) nor stored in a kind facet.",
  "An active item has no resolution; promotion records `resolution = promoted`; a risk's accepted/expired exit is a `resolution`, not a risk-facet field.",
]
