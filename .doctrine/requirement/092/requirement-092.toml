schema = "doctrine.requirement"
version = 1

id = 92
slug = "acyclicity-is-declared-per-relation-kind"
title = "Cycle policy is per overlay: dep rejects, seq evicts"
status = "pending"
kind = "functional"

description = "Each typed edge overlay carries a core-configurable cycle policy. A dep (hard) overlay is reject-on-cycle: a cycle is invalid, surfaced as a diagnostic, and the affected query degrades to local authored priority plus stable fallback rather than a false topological order. A seq (soft) overlay is evict-on-cycle: a would-be cycle is broken by evicting the participating edge minimal under (rank asc, then age asc), so the overlay is always acyclic. Eviction is a build-time derived resolution and never mutates authored TOML."
tags = []
acceptance_criteria = [
  "A dep-overlay cycle is reported as a diagnostic naming the node ids and edge kinds and is treated as invalid (surfaced by validate), never silently ordered.",
  "A seq-overlay would-be cycle is resolved by evicting the participating edge minimal under (rank asc, then age asc); a new minimal edge evicts itself as a no-op.",
  "Eviction resolves at graph-build time as a derived view and mutates no authored edge; recomputing over unchanged authored state yields the same acyclic resolution.",
]
