acceptance_criteria = [
  "Each candidate carries id and title, item kind, lifecycle state, authored priority if present, actionability state, a primary derived reason, and relevant blockers or blocking consequences.",
  "The command defaults to actionable candidates first.",
  "The command transitions no item, creates no slice, and mutates no priority.",
]
