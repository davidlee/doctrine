schema = "doctrine.requirement"
version = 1

id = 94
slug = "derived-cache-is-policy-version-stamped-and-recompute-equivalent"
title = "Derived cache is policy-version-stamped for staleness detection"
status = "pending"
kind = "quality"

description = "Any persisted derived output stamps the policy version and an input signature identifying the authored state it was computed from, so a stale cache is recognisable. This is the staleness-detection mechanism only; the disposability and no-authored-mutation invariant (cache deletable, recompute-equivalent, never written as truth) is REQ-078's and is not restated here."
tags = []
acceptance_criteria = [
  "Cache/projection output records the policy version and an input signature identifying the authored state it was computed from.",
  "A cache whose stamped policy version or input signature no longer matches current authored state is recognisable as stale.",
  "Disposability, recompute-equivalence, and the no-authored-mutation invariant are inherited from REQ-078, not duplicated here.",
]
