# ADR-001 layering map — authoritative module-to-tier classification.
# Generated by PHASE-01 classify-first spike (SL-112) from the production-graph
# extractor (`cargo test --test architecture_layering dump_real_graph -- --nocapture --ignored`).
# Classified from code, not from ADR-001 prose — historical assignments were
# corrected where the code disagrees.
#
# Classification rule: tier = HIGHEST altitude of any non-test file (most-knowing-wins).
# - leaf    = imports std + leaf ONLY (no domain knowledge)
# - engine  = imports engine + leaf (domain model, NEVER command modules)
# - command = imports command + engine + leaf (CLI layer, run_* functions)
#
# Mixed umbrellas (modules where files span altitudes) are sub-classified at
# `module::submodule` granularity. Units NOT sub-classified must have all files
# at or below the assigned tier; the gate's MixedUmbrella assertion enforces this.

[tiers]
# tier = "leaf" | "engine" | "command"

# ── leaf (28) ────────────────────────────────────────────────────────────
# Import only std + other leaves. Pure utilities, impure seams, no domain knowledge.
boundary = "leaf"           # out=0: recorded source-delta row type — pure serde (SL-147 PHASE-02)
clock = "leaf"              # out=0: std-only time helpers
conduct = "leaf"            # out=0: conduct.toml defaults — pure constants
conformance = "leaf"        # out=0: path-conformance set algebra — pure (SL-147 PHASE-03)
contentset = "leaf"         # out=0: content set wrapper — pure library
corpus_guard = "leaf"       # out=0: SL-166 corpus-loss guard tokens/pathspec + pure g3 predicate
dep_seq = "leaf"            # out=0: dependency-sequence data types — pure
dispatch_config = "leaf"    # out=0: dispatch config defaults — pure
dtoml = "leaf"              # → estimate, value, conduct, dispatch_config, install_config, verify; verify→coverage is engine but dtoml is a TOML wrapper (pure seam); baselined below
estimate = "leaf"           # out=0: estimate facet types — pure
install_config = "leaf"     # out=0: [install] config defaults — pure (SL-152 PHASE-06)
facet = "leaf"   # → estimate, value, risk: EntityFacets aggregation — pure data, imports only leaf facet types
facet_write = "leaf"        # → fsutil (SL-113): shared facet read→mutate→write core — std+leaf only
fsutil = "leaf"             # out=0: filesystem utility — impure seam, no domain
git = "leaf"                # out=0: git ops — impure seam, no domain
globmatch = "leaf"          # → glob (external): shared glob_matches matcher (SL-147 PHASE-03)
finding = "leaf"            # out=0: unified doctor Finding type — pure (SL-168 PHASE-01, ADR-001 D2)
kinds = "leaf"              # out=0: entity-kind vocabulary — pure constants
ledger = "leaf"             # out=0: review ledger types — pure
lexical = "leaf"            # out=0: BM25/lexical engine — pure (no domain)
lifecycle = "leaf"          # out=0: lifecycle FSM — pure
links = "leaf"              # out=0: wikilink extraction — pure
listing = "leaf"            # out=0: listing/render primitives — pure presentation
plan = "leaf"               # out=0: plan phase types — pure
projection = "leaf"         # out=0: priority projection enum — pure
registry = "leaf"           # out=0: spec registry index — pure
risk = "leaf"               # out=0: risk facet types + exposure — pure (SL-133 PHASE-02 extraction from backlog)
root = "leaf"               # out=0: project-root resolution — impure seam
tag = "leaf"                # out=0: tag normalization — pure
tomlfmt = "leaf"            # out=0: TOML formatting helpers — pure
tty = "leaf"                # out=0: terminal width/color — impure seam
value = "leaf"              # out=0: value facet types — pure
regression = "leaf"         # out=0: SL-170 S1 pure failure-set diff — parse/diff/render, no IO
vtgate = "leaf"             # out=0: SL-170 S3 pure VT existence/shape gate — check/render, no IO

# ── engine (15) ──────────────────────────────────────────────────────────
# Import engines + leaves; do NOT import command modules. Core domain model,
# entity-kind handler scaffold, shared infrastructure.
entity = "engine"           # → fsutil only; the hub — kind-agnostic directory-entity scaffold
reserve = "engine"          # SL-148: claim-backend selection seam; → entity/git/dtoml (out=3)
meta = "engine"             # → entity only; shared metadata-list substrate
relation = "engine"         # → entity, kinds; relation vocabulary leaf (design: engine-tier relation rules)
state = "engine"            # → fsutil, install, plan; runtime state; install→ upward baselined
status = "engine"           # → backlog, boot, git, listing, meta, priority, root; CLI dashboard — imports command modules (backlog=cmd, boot=cmd, priority=cmd) → sub-classified below
input = "engine"            # → entity; CLI-input resolution (ADR-001 wrongly said leaf; imports entity=engine)
verify = "engine"           # → coverage; project verification config + pure base resolution
coverage = "engine"         # → requirement; requirement is command → upward baselined
coverage_scan = "engine"    # → coverage, git; impure reconcile-reader shell
coverage_store = "engine"   # → clock, coverage, dtoml, fsutil, git, requirement, root, slice, verify; requirement→cmd, slice→cmd baselined
coverage_verify = "engine"  # → coverage, coverage_store, git, requirement, root, verify; upward edges baselined
coverage_view = "engine"    # → coverage, coverage_scan, listing, requirement, root, spec, tty; upward edges baselined
supersede = "engine"        # → entity, knowledge; supersession policy gate; knowledge→cmd baselined
backlog_order = "engine"    # → backlog, projection; ordering engine; backlog→ upward baselined
paths = "engine"            # PHASE-01/SL-139: shared entity-file-path projection; engine-tier, no clap/command imports
relation_query = "command"  # SL-137: pure relation projection+filter engine over &Catalog; imports catalog and integrity (both cmd) — uniformly command

# ── command (22) ─────────────────────────────────────────────────────────
# Import commands + engines + leaves. CLI layer, run_* functions, user-facing verbs.
adr = "command"             # → engine/leaf + install; ADR entity-kind handler
backlog = "command"         # → engine/leaf; backlog entity-kind handler + CLI
boot = "command"            # → engine/leaf + adr, governance, install, memory, policy, standard, worktree
catalog = "command"         # → engine/leaf + adr, backlog, knowledge, memory, policy, rec, review, revision, slice, spec, standard; umbrella — sub-classified below
commands = "command"        # → catalog, integrity, map_server, mcp_server, root, corpus, lazyspec; CLI command dispatch (SL-115: cli::Command + dispatch; guard; coverage/map/dep_seq/relation/supersede/inspect/facet/validate shells; serve)
concept_map = "command"     # → engine/leaf; concept-map entity-kind handler
corpus = "command"          # → boot, git, install, memory, root; corpus install machinery
dispatch = "command"        # → git, ledger, listing, root, slice, state, worktree; dispatch orchestrator
doctor_checks = "command"   # → engine/leaf + catalog::scan, integrity; native doctor checks (SL-168 PHASE-03/04)
governance = "command"      # → engine/leaf; doc: "Command-tier governance spine"
install = "command"         # → boot, corpus, root, skills; install/bootstrap verb
integrity = "command"       # → engine/leaf + adr, backlog, concept_map, knowledge, policy, rec, requirement, review, revision, slice, spec, standard; cross-kind integrity
knowledge = "command"       # → engine/leaf; knowledge entity-kind handler
lazyspec = "command"        # → engine/leaf + adr, backlog, requirement, slice, spec; spec projection
main = "command"            # → commands, engine/leaf; binary entrypoint
map_server = "command"      # → catalog, concept_map, fsutil, integrity, memory, priority; web map server
search = "command"            # → catalog, integrity, lexical, listing; BM25 search over entity bodies
mcp_server = "command"      # → listing, review, root; MCP stdio server
memory = "command"          # → engine/leaf + catalog, lexical, links, retrieve; memory entity-kind handler
policy = "command"          # → engine/leaf; policy entity-kind handler
priority = "command"        # → engine/leaf + backlog_order, integrity, knowledge, relation_graph; priority subsystem; sub-classified below
rec = "command"             # → engine/leaf + coverage; rec entity-kind handler
reconcile = "command"       # → coverage, coverage_scan, integrity, rec, requirement, root, slice; reconciliation verb
requirement = "command"     # → engine/leaf + install; requirement entity-kind handler
retrieve = "command"        # → engine/leaf + lexical, links, memory; retrieval verb
review = "command"          # → engine/leaf + contentset, input, integrity, worktree; review entity-kind handler
revision = "command"        # → engine/leaf + rec, requirement; revision entity-kind handler
rfc = "command"             # → engine/leaf + catalog, integrity, kinds; RFC entity-kind handler
relation_graph = "command"  # uniformly command — all-kind seam through adr, backlog, catalog, …
skills = "command"          # → boot, fsutil, install, root; skills plugin infrastructure
slice = "command"           # → engine/leaf + coverage, coverage_scan, conduct, dtoml, estimate, input, lifecycle, plan, rec, requirement, review, state, value; slice entity-kind handler
spec = "command"            # → engine/leaf + registry, requirement; spec entity-kind handler
standard = "command"        # → engine/leaf; standard entity-kind handler
worktree = "command"        # → fsutil, git, root, slice; worktree fork/coordinate/import
regression_run = "command"  # SL-170 S1 impure shell → coverage_store, git, regression, worktree, root

# ── sub-classified umbrellas ─────────────────────────────────────────────
# Mixed umbrellas force sub-classification (design D9). The top-level module
# (mod.rs) carries its own tier; files that reach higher are classified
# separately here.
"catalog::scan" = "command"       # reaches adr, backlog, knowledge, memory, policy, rec, review, revision, slice, spec, standard — 9 command modules
"catalog::hydrate" = "engine"     # pure entity hydration
"catalog::graph" = "engine"       # pure graph projection
"catalog::diagnostic" = "engine"  # pure diagnostic dump
"priority::graph" = "engine"      # pure relation_graph consumer
"priority::config" = "leaf"       # [priority] config load + clamp; imports std + serde + toml only (SL-133)
"status::run_status" = "command"  # the run_* CLI entry — reaches backlog, boot, priority
"worktree::shared" = "engine"     # cross-machine helpers; imports git (leaf)
"worktree::allowlist" = "leaf"    # pure tier-classification core; imports glob (external) only — no domain, disk, git, clock, or rng (D4)
"worktree::jail" = "leaf"         # SL-182: pure jail core — no disk/git/clock/rng; topology+capability+policy-read done by the shell, passed in as data (R1)
"worktree::pretooluse" = "command"  # SL-182 PHASE-03: PreToolUse hook shell — stdin JSON in, hookSpecificOutput out; drives jail (leaf) + shared topology (engine)
"worktree::marker" = "engine"
"worktree::provision" = "engine"   # provision is impure shell; imports engine + leaf
"worktree::import" = "engine"      # import classify+run; imports engine + leaf
"worktree::land" = "engine"        # land classify+run; imports engine + leaf
"worktree::gc" = "engine"          # gc classify+run; imports engine + leaf
"worktree::fork" = "engine"        # fork; imports engine + leaf
"worktree::subagent" = "engine"    # subagent stamp+verify; imports engine + leaf
"worktree::coordinate" = "command"  # coordinate calls crate::slice::run_phases (upward edge, Non-Goal)
     # worker-identity marker; imports root (leaf), shared (engine); file I/O for marker state

# ── relation_graph (mixed, not sub-classified) ────────────────────────────
# relation_graph imports adr, backlog, catalog, dep_seq, entity, governance,
# integrity, listing, policy, projection, relation, spec, standard.
# It is uniformly COMMAND — every sub-file reaches the command tier through
# its all-kind seam. Not a mixed umbrella (no sub-file is engine-pure).

[tangle_baseline]
# Per-tier cyclic-edge counts (same-tier edges with both endpoints in a
# non-trivial SCC). Measured from the production graph.
#
# Engine tangle = 0 (CHR-015 done: conduct↔dtoml cycle broken).
# Command tangle is large (~32-module SCC) — normal for a CLI verb layer;
# baselined here, ratcheted by the gate (may not grow).
leaf = 0
engine = 0
command = 123

# ── Accepted violations ──────────────────────────────────────────────────
# Every genuine upward edge (from lower tier to higher tier). Frozen —
# may shrink, MUST NOT grow. Each entry needs a reason and follow_up.

[[accepted_violation]]
from = "state"; to = "install"
reason = "ADR-001 install-as-utility wart (pre-existing): state uses install::asset_text for scaffolding"
follow_up = "SL-112"

[[accepted_violation]]
from = "backlog_order"; to = "backlog"
reason = "backlog_order imports backlog::ItemKind — ordering engine depends on kind definition in command module"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage"; to = "requirement"
reason = "coverage imports requirement::CoverageStatus and ReqStatus for its data model"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage_store"; to = "requirement"
reason = "coverage_store imports requirement::CoverageStatus for the write path"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage_store"; to = "slice"
reason = "coverage_store references slice for slice-aware coverage records"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage_verify"; to = "requirement"
reason = "coverage_verify imports requirement::CoverageStatus for VT re-derivation"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage_view"; to = "requirement"
reason = "coverage_view imports requirement::{ReqKind, ReqStatus} for its read view"
follow_up = "SL-112"

[[accepted_violation]]
from = "coverage_view"; to = "spec"
reason = "coverage_view imports spec for spec-aware coverage rendering"
follow_up = "SL-112"

[[accepted_violation]]
from = "supersede"; to = "knowledge"
reason = "supersede imports knowledge for cross-kind supersession tracking"
follow_up = "SL-112"

[[accepted_violation]]
from = "dtoml"; to = "verify"
reason = "dtoml imports verify for config validation; verify→coverage is an engine import but dtoml is the pure TOML seam"
follow_up = "SL-112"

