description = "The core doctrine workflow at conceptual altitude: how work originates and is prioritised, the slice lifecycle state machine with its human gates and closure seam, the normative/observed truth model that makes reconciliation doctrinal, the conduct axis, the governance change-axes, and the support ecosystem — for agents and especially human users."
dsl = """
# ── Entry: route before you act ──
Substantive Work > is gated by > Routing Gate
Routing Gate > chooses > Governing Skill
Routing Gate > enforces > No Code Without Approved Plan
Routing Gate > authority is > Boot Snapshot
Boot Snapshot > regenerated by > Boot Command
Routing Gate > leans on > Memory
Governing Skill > wraps > Doctrine CLI

# ── Origins: where work comes from ──
User Intent > becomes > Slice
Idea or Problem > captured as > Backlog Item
Backlog > holds > Backlog Item
Backlog Item > promotes to > Slice
Dependency Graph > drives > Survey
Survey > ranks > Eligible Entity
Next > filters to > Actionable Entity
Actionable Entity > re-enters > Routing Gate

# ── The slice lifecycle (explicit state machine) ──
Slice > begins as > Proposed
Proposed > advances to > Design
Design > stress-tested by > Inquisition
Design > produces > Design Document
Design > locks before > Plan
Plan > gates to > Ready
Ready > advances to > Started
Started > advances to > Audit
Audit > advances to > Reconcile
Reconcile > advances to > Done
Audit Finding > may return to > Started
Reconcile > may return to > Audit
Reconcile > may escalate to > Design
Slice > may abandon to > Abandoned

# ── Inside a phase ──
Phase > executes during > Started
Phase > planned via > Phase Plan
Phase > built through > TDD Loop
Phase > verified against > Entry & Exit Criteria

# ── Human gates & the conduct axis ──
Ready > is a > Human Gate
Reconcile > is a > Human Gate
Conduct Axis > is orthogonal to > Slice Lifecycle
Conduct Axis > declares > Conduct Actor
Conduct Axis > declares > Autonomy
Conduct Actor > ranges over > Agent, Self, Peer, Team
Autonomy > ranges over > Auto, Draft, Gate

# ── Execution postures during Started ──
Started > conducted as > Solo
Started > conducted as > Dispatch
Solo > driven by > Single Agent
Dispatch > isolates via > Worktree Fork
Dispatch > orchestrated by > Orchestrator

# ── Specifications & the truth model ──
PRD > is a > Spec
Tech Spec > descends from > PRD
Requirement > descends from > Spec
Spec > owns > Normative Truth
Coverage > records > Observed Truth
Audit > records findings in > Review Ledger
Inquisition > records findings in > Review Ledger
Audit Finding > lives in > Review Ledger
Audit Finding > records > Observed Truth
Normative Truth > may diverge from > Observed Truth
Drift > reconciled by > Reconcile
Drift > never resolved by > Precedence
Reconcile > sole authors > Reconciled Status
Reconcile > applies one > Reconcile Move
Slice > governed by > Spec

# ── Governance & change axes ──
Slice > changes > Codebase
Revision > changes > Spec
Architectural Decision > recorded as > ADR
ADR > governs > Slice
Newer ADR > supersedes > Older ADR

# ── Membership: each kind answers a different question ──
Backlog Item > answers > what to do?
ADR > answers > what was decided?
Knowledge Record > answers > what do we know?
Memory > answers > what to retrieve?

# ── Relating entities (the graph substrate) ──
Needs > authors > Blocking Prerequisite
After > authors > Soft Sequence
Link > authors > Relation Edge
Blocking Prerequisite > feeds > Dependency Graph
Soft Sequence > feeds > Dependency Graph
Relation Edge > feeds > Dependency Graph

# ── Mid-flight support & conduct postures ──
Consult > resolves > Tradeoff
Canon > surfaces > Governance
Record Memory > enriches > Memory
Retrieve Memory > surfaces > Memory
Notes > records > Progress
Handover > transfers > Context
Pairing > is a > Conduct Posture
Walkthrough > is a > Conduct Posture
Conduct Posture > overlays > Governing Skill

# ── External interaction ──
GitHub Issue > feeds > Backlog
GitHub PR > reviewed by > Peer
Peer > performs > Review
Team > coordinates > Dispatch"""
