  "SECONDARY QUADRATIC (distinct from the overflow, same risk): the eviction-to-fixpoint passes pass2_evict (resolve.rs:198) and evict_layer_cycles (resolve.rs:478) recompute a full SCC pass (cyclic_components/Tarjan) per evicted edge -> O(E*(V+E)). Measured ~quadratic: 3.5s at 100 nodes/9.9k edges, 59s at 200 nodes/39.8k edges (~17x for 4x edges). participates (resolve.rs:224) linearly rescans all cyclic components per candidate, compounding it. Fix: evict all safe minimal participants in one SCC pass, or incrementally re-test only the affected component instead of restarting Tarjan each round",
