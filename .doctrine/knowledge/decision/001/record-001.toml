created = "2026-06-26"
updated = "2026-06-26"
tags = []

[facet]                         # every field typed; seeded empty (captured later)
context      = "RFC-008 D-c: should gating edges be outbound from the unsettled record (record shows what it affects) or inbound from the dependent (dependent declares `needs → record`)?"
choice       = "Outbound-from-record: the unsettled record authors `gates → target`. The gate is an assertion of effect, not a dependency declaration."
alternatives = ["inbound-from-record (dependent declares `needs → record`)", "bidirectional (both sides author)"]
rationale    = "ADR-004 (relations outbound-only, reciprocity derived) establishes the pattern. The record knows what it affects; the dependent can derive which records gate it. Inbound `needs` already exists for direct dependency declarations — gating is a different intent: the record's unsettled state blocks, not the dependent's missing input."
consequences = ["SL-158's graph layer projects gates from the unsettled record outward", "`blocked_by` is derived as the inverse of outbound gates", "coordinate with IMP-033 (cross-kind dep/seq)"]
decided_by   = ""
decided_on   = ""

