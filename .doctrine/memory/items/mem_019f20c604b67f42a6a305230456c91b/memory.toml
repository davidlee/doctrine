title = "CLI id-form split: two parsing functions, three conventions"
summary = "The CLI uses two id-parsing functions: parse_entity_ref (governance.rs, accepts both SL-123 and 123) and parse_canonical_ref (integrity.rs, prefixed-only). ~30 verbs use the former, ~15 the latter, ~16 use raw u32 (bare-only). IMP-227 tracks unification."
