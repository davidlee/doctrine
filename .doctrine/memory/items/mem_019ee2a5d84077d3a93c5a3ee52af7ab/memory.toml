title = "git reset --keep cannot resync a worktree whose branch already advanced under it"
summary = "After a branch ref advances under a live checkout (pure update-ref), reset --keep/--merge see HEAD==target → no diff and leave the worktree stale; reset --hard (gated on a clean tree) is the correct resync."
