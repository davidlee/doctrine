memory_uid = "mem_019f179725c17680ab977ab7650f1707"
memory_key = "mem.pattern.doctrine.key-resolution-ignores-status"
schema_version = 1
memory_type = "pattern"
status = "active"
title = "Memory key→uid resolution ignores status — retiring a capture needs the items/ alias symlink physically removed"
summary = "`memory show <key>` resolves via the items/ alias symlink and returns the local capture even when it is archived/superseded; status filters `find` only, not key→uid resolution. To re-point <key> at a shipped master you must `git rm` the items/ mem.<key> symlink — a status change alone is insufficient. Corollary: `memory status superseded --by <successor>` resolves the successor against items/ only, so a shipped master under memory/ can never be named as a supersession successor."
created = "2026-06-30"
updated = "2026-06-30"

