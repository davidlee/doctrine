status = "active"
title = "SubagentStart hook process cwd is the worker worktree, breaking auto-stamp provision"
summary = "Claude Code runs the SubagentStart hook with process cwd = the spawned subagent's own worktree, not the orchestrator tree — so the auto stamp's source==fork guard trips and the worker is never stamped."
created = "2026-06-20"
updated = "2026-06-20"

