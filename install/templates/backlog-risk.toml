schema = "doctrine.backlog"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
kind = "{{kind}}"
status = "open"
resolution = ""                 # seeded empty so `backlog edit` sets it in place
created = "{{date}}"
updated = "{{date}}"
tags = []

[facet]                         # risk only — every field typed; seeded empty
likelihood = ""                 # low | medium | high | critical
impact     = ""                 # low | medium | high | critical
origin     = ""
controls   = []

[relationships]                 # outbound-only (ADR-004); seeded empty
slices = []
specs  = []
drift  = []
needs    = []                   # item→item hard prerequisite
after    = []                   # item→item soft sequence: { to, rank? }
triggers = []                   # watched source globs: { globs, note? }
