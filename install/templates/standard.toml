schema = "doctrine.standard"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
status = "draft"
created = "{{date}}"
updated = "{{date}}"

[relationships]
# Reserved. Empty in v1 — supersession and tagging are not wired yet.
# Authored-but-inert: present so the shape is stable when those land.
supersedes    = []   # STD ids this one replaces (relationship, not a status — design D2)
superseded_by = []   # reverse link is derived
related       = []   # non-superseding cross-references
tags          = []   # free-form classification
