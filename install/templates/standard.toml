schema = "doctrine.standard"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
status = "draft"
created = "{{date}}"
updated = "{{date}}"

[relationships]
# Reserved. Empty in v1 — supersession and tagging are not wired yet.
# Authored-but-inert: present so the shape is stable when those land.
supersedes    = []   # STD ids this one replaces (relationship, not a status — design D2)
superseded_by = []   # reverse link is derived
tags          = []   # free-form classification

# `related` cross-references are uniform `[[relation]]` rows now (SL-048 "the cut"),
# never a typed key here. Author one with `doctrine link STD-NNN related <target>`;
# `doctrine inspect STD-NNN` renders it. The supersession pair + tags stay typed.
