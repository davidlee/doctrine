schema = "doctrine.policy"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
status = "draft"
created = "{{date}}"
updated = "{{date}}"

[relationships]
# The `supersedes` and `related` axes are uniform `[[relation]]` rows now (SL-095,
# SL-048). Author them with `doctrine link POL-NNN supersedes|related <target>`.
# `doctrine inspect POL-NNN` renders them. `superseded_by` (ADR-004) and `tags` stay typed.
superseded_by = []   # reverse link is derived
tags          = []   # free-form classification

