schema = "doctrine.knowledge"
version = 1

id = {{id}}
slug = {{slug}}
title = {{title}}
record_kind = "assumption"
status = "held"
created = "{{date}}"
updated = "{{date}}"
tags = []

[facet]                         # every field typed; seeded empty (captured later)
claim           = ""
confidence      = ""            # low | medium | high
basis           = ""            # observation | prior-art | design-inference | external-source | operator-judgement
validation_plan = ""
validated_by    = ""
validated_on    = ""
invalidated_by  = ""
invalidated_on  = ""

[evidence]                      # free-text citations (supports / contradicts / notes)
supports    = []
contradicts = []
notes       = []
