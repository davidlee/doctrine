# SPDX-License-Identifier: MIT
target = ".doctrine"

[dirs]
create = [
  ".doctrine/adr",
  ".doctrine/agents",
  ".doctrine/memory/items",
  ".doctrine/requirement",
  ".doctrine/scripts",
  ".doctrine/skills",
  ".doctrine/slice",
  ".doctrine/spec/product",
  ".doctrine/spec/tech",
  ".doctrine/templates",
]

[gitignore]
# Runtime state is disposable and must never be committed; the convenience
# `phases` symlink and ad-hoc `handover.md` are gitignored so they never enter
# the tracked authored tree (slice-004 D6/D8). Additive — re-install is a no-op.
#
# Memory: `items/` holds committed authored entities (created above, NOT ignored).
# The derived subtrees (index/embeddings/state) are regenerable — ignore the
# contents narrowly; never blanket `.doctrine/memory/*`, which would swallow
# the committed `items/` tree (slice-005 PHASE-06). `shipped/` is the
# binary-materialized global-memory corpus (SL-018) — derived, gitignored.
entries = [
  ".doctrine/state/",
  ".doctrine/slice/*/phases",
  ".doctrine/slice/*/handover.md",
  ".doctrine/memory/index/*",
  ".doctrine/memory/embeddings/*",
  ".doctrine/memory/state/*",
  ".doctrine/memory/shipped/",
  ".doctrine/skills/*",
]

[root_markers]
markers = [
  ".git",
  ".jj",
  ".project",
  "Cargo.toml",
]
