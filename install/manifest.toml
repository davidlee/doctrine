# SPDX-License-Identifier: MIT
target = ".doctrine"

[dirs]
create = [
  ".doctrine/adr",
  ".doctrine/agents",
  ".doctrine/backlog",
  ".doctrine/knowledge",
  ".doctrine/memory/items",
  ".doctrine/policy",
  ".doctrine/rec",
  ".doctrine/requirement",
  ".doctrine/review",
  ".doctrine/revision",
  ".doctrine/rfc",
  ".doctrine/scripts",
  ".doctrine/slice",
  ".doctrine/spec/product",
  ".doctrine/spec/tech",
  ".doctrine/standard",
  ".doctrine/templates",
]

[memory]
# Seed one key-addressed memory item into .doctrine/memory/items/ during install.
# The body is drawn from a template under install/templates/; the user edits it
# in place. Idempotent — re-install skips existing key symlinks.
seed_items = [
  { key = "mem.signpost.project.orientation", type = "signpost", title = "Project Orientation", body_template = "templates/seed-onboarding.md" }
]

[gitignore]
# Runtime state is disposable and must never be committed; the convenience
# `phases` symlink and ad-hoc `handover.md` are gitignored so they never enter
# the tracked authored tree (slice-004 D6/D8). Additive — re-install is a no-op.
#
# Memory: `items/` holds committed authored entities (created above, NOT ignored).
# The derived subtrees (index/embeddings/state) are regenerable — ignore the
# contents narrowly; never blanket `.doctrine/memory/*`, which would swallow
# the committed `items/` tree (slice-005 PHASE-06). `shipped/` is the
# binary-materialized global-memory corpus (SL-018) — derived, gitignored.
entries = [
  ".doctrine/state/",
  ".doctrine/slice/*/phases",
  ".doctrine/**/handover.md",
  ".doctrine/slice/*/inquisition.md",
  ".doctrine/memory/index/*",
  ".doctrine/memory/embeddings/*",
  ".doctrine/memory/state/*",
  ".doctrine/memory/shipped/",
  ".doctrine/skills/*",
]

[root_markers]
markers = [
  ".git",
  # ".jj",
  ".project",
  "Cargo.toml",
  "pyproject.toml",
  "justfile"
]
