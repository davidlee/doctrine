[dispatch]
# Preferred subprocess harness for dispatch workers.
# "pi"  — pi RPC mode (SL-108)
# "codex" — codex exec (default)
preferred-subprocess-harness = "pi"
# Force the subprocess arm even under a claude env-marker. SL-123 dogfoods the
# pi arm to fix the claude arm's wrong-base bug — running the fix on the broken
# arm is the bootstrap hazard we avoid here.
claude-force-subprocess-dispatch = true
# IMP-129 / IMP-124: trunk delivery ref dispatch advances to / the
# close-integration gate checks against. `main` is the dispatch landing zone
# (low-noise); `edge` is the daily authoring branch (high-churn).
deliver-to = "refs/heads/main"
